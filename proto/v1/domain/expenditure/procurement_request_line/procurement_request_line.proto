syntax = "proto3";

package domain.expenditure.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/expenditure/procurement_request_line";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/search.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/expenditure/procurement_request/procurement_request.proto";
import "domain/product/product/product.proto";
import "options/db.proto";

// ProcurementRequestLineFulfillmentMode (F1, round-6) — discriminates how
// approval of this line spawns its downstream artifact. Drives the
// approval-cascade dispatch in submit.go / approve.go.
enum ProcurementRequestLineFulfillmentMode {
  PROCUREMENT_REQUEST_LINE_FULFILLMENT_MODE_UNSPECIFIED = 0;
  PROCUREMENT_REQUEST_LINE_FULFILLMENT_MODE_OUTRIGHT    = 1;  // → PurchaseOrder + PurchaseOrderLineItem
  PROCUREMENT_REQUEST_LINE_FULFILLMENT_MODE_STOCKABLE   = 2;  // → PurchaseOrder (FRAMEWORK release) + GR
  PROCUREMENT_REQUEST_LINE_FULFILLMENT_MODE_RECURRING   = 3;  // → SupplierContract + Line(s)
  PROCUREMENT_REQUEST_LINE_FULFILLMENT_MODE_PETTY       = 4;  // → Expenditure direct (sundries)
}

// ProcurementRequestLineSpawnStatus (CRIT-3, round-6) — per-line spawn
// lifecycle tracked by the approval cascade. PR.status flips to
// APPROVED_PENDING_SPAWN at approve-time and only reaches APPROVED once
// every line on it reaches SPAWNED. FAILED lines are eligible for retry.
enum ProcurementRequestLineSpawnStatus {
  PROCUREMENT_REQUEST_LINE_SPAWN_STATUS_UNSPECIFIED = 0;
  PROCUREMENT_REQUEST_LINE_SPAWN_STATUS_PENDING     = 1;  // event emitted, worker has not started
  PROCUREMENT_REQUEST_LINE_SPAWN_STATUS_SPAWNING    = 2;  // worker started; downstream txn in progress
  PROCUREMENT_REQUEST_LINE_SPAWN_STATUS_SPAWNED     = 3;  // downstream artifact created and back-FK populated
  PROCUREMENT_REQUEST_LINE_SPAWN_STATUS_FAILED      = 4;  // eligible for retry; spawn_error populated
}

// ProcurementRequestLine is a line item on a ProcurementRequest.
// It may optionally pre-link to a SupplierContractLine if the item is
// already covered by a standing contract.
message ProcurementRequestLine {
  option (options.v1.table).table = true;

  string id = 1;

  // Parent request
  string procurement_request_id = 2 [(options.v1.db).references = "procurement_request", (options.v1.db).index = true];
  optional ProcurementRequest procurement_request = 3;

  // Product (optional)
  optional string product_id = 4 [(options.v1.db).references = "product", (options.v1.db).index = true];
  optional domain.product.v1.Product product = 5;

  // Line details
  string description = 6;
  string line_type = 7;                          // "goods" | "service" | "expense"
  double quantity = 8;
  int64 estimated_unit_price = 9;                // centavos
  int64 estimated_total_price = 10;              // centavos

  // Pre-link to a contract line if the item is covered by a standing contract
  optional string supplier_contract_line_id = 11; // FK to supplier_contract_line (no DB constraint)

  // GL / categorization
  optional string expenditure_category_id = 12 [(options.v1.db).references = "expenditure_category"];
  optional string expense_account_id = 13 [(options.v1.db).references = "account"];

  // Receiving location
  optional string location_id = 14 [(options.v1.db).references = "location"];

  // Display ordering
  int32 line_number = 15;

  // Audit
  bool active = 16 [(options.v1.db).default = "true"];
  optional int64 date_created = 17;
  optional string date_created_string = 18 [(options.v1.db).ignore = true];
  optional int64 date_modified = 19;
  optional string date_modified_string = 20 [(options.v1.db).ignore = true];

  // F1 (round-6): per-line fulfillment mode. Drives the approval cascade
  // dispatch (which Spawn helper to run).
  optional ProcurementRequestLineFulfillmentMode fulfillment_mode = 21 [(options.v1.db).index = true];

  // F2 (round-6): spawn back-FKs — set by the Spawn* helpers after the
  // downstream artifact is created. Exactly one of the three is populated
  // per line, determined by fulfillment_mode. Application-level FKs only
  // (no DB constraint, mirrors purchase_order_line_item linkage).
  optional string spawned_supplier_contract_id = 22;          // RECURRING → SupplierContract
  optional string spawned_purchase_order_line_item_id = 23;   // OUTRIGHT / STOCKABLE → PO line
  optional string spawned_expenditure_id = 24;                // PETTY → Expenditure direct

  // RECURRING-mode parameters — populated when fulfillment_mode=RECURRING
  // and used by SpawnSupplierContractForRecurring. cycle == billing cadence,
  // term == initial contract length.
  optional int32 recurring_cycle_value = 25;
  optional string recurring_cycle_unit = 26;                  // "month" | "year" | "week" | "day"
  optional int32 recurring_term_value = 27;
  optional string recurring_term_unit = 28;                   // same vocabulary

  // CRIT-3 (round-6): spawn lifecycle fields driving the per-line cascade.
  // PR.status is APPROVED_PENDING_SPAWN until every line reaches SPAWNED.
  ProcurementRequestLineSpawnStatus spawn_status = 29 [(options.v1.db).index = true];
  optional string spawn_error = 30;                           // free-text error from failed spawn (visible in AP UI)
  string spawn_idempotency_key = 31;                          // "{request_id}:{line_id}:{attempt_n}" — required for safe retry
  optional int64  spawn_attempted_at = 32;
  optional int64  spawn_completed_at = 33;
}

service ProcurementRequestLineDomainService {
  rpc CreateProcurementRequestLine(CreateProcurementRequestLineRequest) returns (CreateProcurementRequestLineResponse);
  rpc ReadProcurementRequestLine(ReadProcurementRequestLineRequest) returns (ReadProcurementRequestLineResponse);
  rpc UpdateProcurementRequestLine(UpdateProcurementRequestLineRequest) returns (UpdateProcurementRequestLineResponse);
  rpc DeleteProcurementRequestLine(DeleteProcurementRequestLineRequest) returns (DeleteProcurementRequestLineResponse);
  rpc ListProcurementRequestLines(ListProcurementRequestLinesRequest) returns (ListProcurementRequestLinesResponse);
  rpc GetProcurementRequestLineListPageData(GetProcurementRequestLineListPageDataRequest) returns (GetProcurementRequestLineListPageDataResponse);
  rpc GetProcurementRequestLineItemPageData(GetProcurementRequestLineItemPageDataRequest) returns (GetProcurementRequestLineItemPageDataResponse);
}

message CreateProcurementRequestLineRequest {
  ProcurementRequestLine data = 1;
}

message CreateProcurementRequestLineResponse {
  repeated ProcurementRequestLine data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadProcurementRequestLineRequest {
  ProcurementRequestLine data = 1;
}

message ReadProcurementRequestLineResponse {
  repeated ProcurementRequestLine data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateProcurementRequestLineRequest {
  ProcurementRequestLine data = 1;
}

message UpdateProcurementRequestLineResponse {
  repeated ProcurementRequestLine data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteProcurementRequestLineRequest {
  ProcurementRequestLine data = 1;
}

message DeleteProcurementRequestLineResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListProcurementRequestLinesRequest {
  optional string procurement_request_id = 1;
  optional domain.common.v1.SearchRequest search = 2;
  optional domain.common.v1.FilterRequest filters = 3;
  optional domain.common.v1.SortRequest sort = 4;
  optional domain.common.v1.PaginationRequest pagination = 5;
}

message ListProcurementRequestLinesResponse {
  repeated ProcurementRequestLine data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetProcurementRequestLineListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetProcurementRequestLineListPageDataResponse {
  repeated ProcurementRequestLine procurement_request_line_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetProcurementRequestLineItemPageDataRequest {
  string procurement_request_line_id = 1;
}

message GetProcurementRequestLineItemPageDataResponse {
  optional ProcurementRequestLine procurement_request_line = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
