syntax = "proto3";

package domain.expenditure.v1;

option go_package = "leapfor.xyz/esqyma/golang/v1/domain/expenditure/expenditure_line_item";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/search.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";

import "domain/expenditure/expenditure/expenditure.proto";
import "domain/product/product/product.proto";
import "options/db.proto";

message ExpenditureLineItem {
  string id = 1;
  optional int64 date_created = 2;
  optional string date_created_string = 3;
  optional int64 date_modified = 4;
  optional string date_modified_string = 5;
  bool active = 6;
  optional Expenditure expenditure = 7;
  string expenditure_id = 8;
  optional domain.product.v1.Product product = 9;
  optional string product_id = 10;
  string description = 11;
  double quantity = 12;
  int64 unit_price = 13; // centavos
  int64 total_price = 14; // centavos
  optional string notes = 16;
  string line_item_type = 17;                   // "item", "tax", "shipping", "discount"
  optional string inventory_item_id = 18 [(options.v1.db).references = "inventory_item"];       // FK to inventory_item (for purchase items going into stock)
  optional string location_id = 19 [(options.v1.db).references = "location"];             // FK to location (where received)
  optional string purchase_order_line_item_id = 20 [(options.v1.db).references = "purchase_order_line_item"];  // FK to PO line for line-level 3-way match

  // Supplier commitment back-edge
  optional string supplier_contract_line_id = 21; // FK to supplier_contract_line (no DB constraint)

  // Payroll calculator provenance (only populated for Expenditure(type='payroll') lines).
  // rate_table_id is pinned at calc time so reposting reproduces despite newer rate rows.
  optional string rate_table_id = 22;       // FK to rate_table (no DB constraint)
  optional string pay_cycle_id = 23;        // FK to pay_cycle (no DB constraint)
  optional int64 applied_basis_amount = 24; // centavos — the salary basis the line applied to
  optional double proration_factor = 25;    // 0.0–1.0, for mid-cycle compensation changes
  optional string calc_metadata = 26;       // JSON-encoded calculator audit (pre/post split, formula refs)
  optional string line_kind = 27;           // "earning_basic" | "earning_allowance" | "deduction_statutory" |
                                            // "deduction_tax" | "deduction_loan" | "employer_cost"
}

service ExpenditureLineItemDomainService {
  rpc CreateExpenditureLineItem(CreateExpenditureLineItemRequest) returns (CreateExpenditureLineItemResponse);
  rpc ReadExpenditureLineItem(ReadExpenditureLineItemRequest) returns (ReadExpenditureLineItemResponse);
  rpc UpdateExpenditureLineItem(UpdateExpenditureLineItemRequest) returns (UpdateExpenditureLineItemResponse);
  rpc DeleteExpenditureLineItem(DeleteExpenditureLineItemRequest) returns (DeleteExpenditureLineItemResponse);
  rpc ListExpenditureLineItems(ListExpenditureLineItemsRequest) returns (ListExpenditureLineItemsResponse);
  rpc GetExpenditureLineItemListPageData(GetExpenditureLineItemListPageDataRequest) returns (GetExpenditureLineItemListPageDataResponse);
  rpc GetExpenditureLineItemItemPageData(GetExpenditureLineItemItemPageDataRequest) returns (GetExpenditureLineItemItemPageDataResponse);
}

message CreateExpenditureLineItemRequest {
  ExpenditureLineItem data = 1;
}

message CreateExpenditureLineItemResponse {
  repeated ExpenditureLineItem data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadExpenditureLineItemRequest {
  ExpenditureLineItem data = 1;
}

message ReadExpenditureLineItemResponse {
  repeated ExpenditureLineItem data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateExpenditureLineItemRequest {
  ExpenditureLineItem data = 1;
}

message UpdateExpenditureLineItemResponse {
  repeated ExpenditureLineItem data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteExpenditureLineItemRequest {
  ExpenditureLineItem data = 1;
}

message DeleteExpenditureLineItemResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListExpenditureLineItemsRequest {
  optional string expenditure_id = 1;
  optional domain.common.v1.SearchRequest search = 2;
  optional domain.common.v1.FilterRequest filters = 3;
  optional domain.common.v1.SortRequest sort = 4;
  optional domain.common.v1.PaginationRequest pagination = 5;
}

message ListExpenditureLineItemsResponse {
  repeated ExpenditureLineItem data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetExpenditureLineItemListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetExpenditureLineItemListPageDataResponse {
  repeated ExpenditureLineItem expenditure_line_item_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetExpenditureLineItemItemPageDataRequest {
  string expenditure_line_item_id = 1;
}

message GetExpenditureLineItemItemPageDataResponse {
  optional ExpenditureLineItem expenditure_line_item = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
