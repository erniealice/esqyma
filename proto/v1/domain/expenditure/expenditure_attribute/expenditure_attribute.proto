syntax = "proto3";

package domain.expenditure.v1;

option go_package = "leapfor.xyz/esqyma/golang/v1/domain/expenditure/expenditure_attribute";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "domain/expenditure/expenditure/expenditure.proto";
import "domain/common/attribute.proto";

message ExpenditureAttribute {
  string id = 1;
  string expenditure_id = 2;
  string attribute_id = 3;
  string value = 4;
  Expenditure expenditure = 5;
  domain.common.v1.Attribute attribute = 6;
  optional int64 date_created = 7;
  optional string date_created_string = 8;
  optional int64 date_modified = 9;
  optional string date_modified_string = 10;
  bool active = 11;
}

service ExpenditureAttributeDomainService {
  rpc CreateExpenditureAttribute(CreateExpenditureAttributeRequest) returns (CreateExpenditureAttributeResponse);
  rpc ReadExpenditureAttribute(ReadExpenditureAttributeRequest) returns (ReadExpenditureAttributeResponse);
  rpc UpdateExpenditureAttribute(UpdateExpenditureAttributeRequest) returns (UpdateExpenditureAttributeResponse);
  rpc DeleteExpenditureAttribute(DeleteExpenditureAttributeRequest) returns (DeleteExpenditureAttributeResponse);
  rpc ListExpenditureAttributes(ListExpenditureAttributesRequest) returns (ListExpenditureAttributesResponse);

  // Enhanced list with pagination, filtering, sorting, search
  rpc GetExpenditureAttributeListPageData(GetExpenditureAttributeListPageDataRequest)
    returns (GetExpenditureAttributeListPageDataResponse);

  // Enhanced item view with related data
  rpc GetExpenditureAttributeItemPageData(GetExpenditureAttributeItemPageDataRequest)
    returns (GetExpenditureAttributeItemPageDataResponse);
}

message CreateExpenditureAttributeRequest {
  ExpenditureAttribute data = 1;
}

message CreateExpenditureAttributeResponse {
  repeated ExpenditureAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message CreateExpenditureAttributeBatchRequest {
  repeated ExpenditureAttribute data = 1;
}

message CreateExpenditureAttributeBatchResponse {
  repeated ExpenditureAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// CreateExpenditureAttributesByCode creates expenditure attributes using attribute codes.
// Internally resolves each code to an attribute ID before creating.
message ExpenditureAttributesByCodeData {
  string expenditure_id = 1;
  map<string, string> attributes_map = 2;  // {"attribute_code": "value", ...}
}

message CreateExpenditureAttributesByCodeRequest {
  ExpenditureAttributesByCodeData data = 1;
}

message CreateExpenditureAttributesByCodeResponse {
  repeated ExpenditureAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadExpenditureAttributeRequest {
  ExpenditureAttribute data = 1;
}

message ReadExpenditureAttributeResponse {
  repeated ExpenditureAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateExpenditureAttributeRequest {
  ExpenditureAttribute data = 1;
}

message UpdateExpenditureAttributeResponse {
  repeated ExpenditureAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteExpenditureAttributeRequest {
  ExpenditureAttribute data = 1;
}

message DeleteExpenditureAttributeResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListExpenditureAttributesRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListExpenditureAttributesResponse {
  repeated ExpenditureAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// Enhanced list request with core features
message GetExpenditureAttributeListPageDataRequest {
  // Pagination settings
  optional domain.common.v1.PaginationRequest pagination = 1;

  // Filter conditions
  optional domain.common.v1.FilterRequest filters = 2;

  // Sort settings
  optional domain.common.v1.SortRequest sort = 3;

  // Search settings
  optional domain.common.v1.SearchRequest search = 4;
}

// Enhanced list response with metadata
message GetExpenditureAttributeListPageDataResponse {
  // The expenditure attribute data
  repeated ExpenditureAttribute expenditure_attribute_list = 1;

  // Pagination metadata
  optional domain.common.v1.PaginationResponse pagination = 2;

  // Search results metadata (when search is used)
  repeated domain.common.v1.SearchResult search_results = 3;

  // Response status
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

// Simple item request
message GetExpenditureAttributeItemPageDataRequest {
  // The expenditure attribute ID to retrieve
  string expenditure_attribute_id = 1;
}

// Simple item response
message GetExpenditureAttributeItemPageDataResponse {
  // The expenditure attribute data
  optional ExpenditureAttribute expenditure_attribute = 1;

  // Response status
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
