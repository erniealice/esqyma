syntax = "proto3";

package domain.expenditure.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/expenditure/purchase_order_line_item";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/search.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/expenditure/purchase_order/purchase_order.proto";
import "domain/product/product/product.proto";
import "options/db.proto";

message PurchaseOrderLineItem {
  option (options.v1.table).table = true;

  string id = 1;

  // Parent PO
  optional PurchaseOrder purchase_order = 2;
  string purchase_order_id = 3 [(options.v1.db).references = "purchase_order", (options.v1.db).index = true];

  // Product
  optional domain.product.v1.Product product = 4;
  optional string product_id = 5 [(options.v1.db).references = "product", (options.v1.db).index = true];

  // Line details
  string description = 6;
  string line_type = 7;                    // "goods", "service", "expense"
  double quantity_ordered = 8;
  double quantity_received = 9;            // Updated on goods receipt
  double quantity_billed = 10;             // Updated on invoice match
  int64 unit_price = 11; // centavos
  int64 total_price = 12; // centavos

  // Receiving location
  optional string location_id = 13 [(options.v1.db).references = "location"];
  optional string inventory_item_id = 14 [(options.v1.db).references = "inventory_item"];

  // Delivery
  optional int64 required_by_date = 15;
  optional string required_by_date_string = 16;

  // Notes
  optional string notes = 17;
  int32 line_number = 18;                  // Display ordering

  // Audit
  bool active = 19 [(options.v1.db).default = "true"];
  optional int64 date_created = 20;
  optional string date_created_string = 21;
  optional int64 date_modified = 22;
  optional string date_modified_string = 23;
}

service PurchaseOrderLineItemDomainService {
  rpc CreatePurchaseOrderLineItem(CreatePurchaseOrderLineItemRequest) returns (CreatePurchaseOrderLineItemResponse);
  rpc ReadPurchaseOrderLineItem(ReadPurchaseOrderLineItemRequest) returns (ReadPurchaseOrderLineItemResponse);
  rpc UpdatePurchaseOrderLineItem(UpdatePurchaseOrderLineItemRequest) returns (UpdatePurchaseOrderLineItemResponse);
  rpc DeletePurchaseOrderLineItem(DeletePurchaseOrderLineItemRequest) returns (DeletePurchaseOrderLineItemResponse);
  rpc ListPurchaseOrderLineItems(ListPurchaseOrderLineItemsRequest) returns (ListPurchaseOrderLineItemsResponse);
  rpc GetPurchaseOrderLineItemListPageData(GetPurchaseOrderLineItemListPageDataRequest) returns (GetPurchaseOrderLineItemListPageDataResponse);
  rpc GetPurchaseOrderLineItemItemPageData(GetPurchaseOrderLineItemItemPageDataRequest) returns (GetPurchaseOrderLineItemItemPageDataResponse);
}

message CreatePurchaseOrderLineItemRequest {
  PurchaseOrderLineItem data = 1;
}

message CreatePurchaseOrderLineItemResponse {
  repeated PurchaseOrderLineItem data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadPurchaseOrderLineItemRequest {
  PurchaseOrderLineItem data = 1;
}

message ReadPurchaseOrderLineItemResponse {
  repeated PurchaseOrderLineItem data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdatePurchaseOrderLineItemRequest {
  PurchaseOrderLineItem data = 1;
}

message UpdatePurchaseOrderLineItemResponse {
  repeated PurchaseOrderLineItem data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeletePurchaseOrderLineItemRequest {
  PurchaseOrderLineItem data = 1;
}

message DeletePurchaseOrderLineItemResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListPurchaseOrderLineItemsRequest {
  optional string purchase_order_id = 1;
  optional domain.common.v1.SearchRequest search = 2;
  optional domain.common.v1.FilterRequest filters = 3;
  optional domain.common.v1.SortRequest sort = 4;
  optional domain.common.v1.PaginationRequest pagination = 5;
}

message ListPurchaseOrderLineItemsResponse {
  repeated PurchaseOrderLineItem data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetPurchaseOrderLineItemListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetPurchaseOrderLineItemListPageDataResponse {
  repeated PurchaseOrderLineItem purchase_order_line_item_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetPurchaseOrderLineItemItemPageDataRequest {
  string purchase_order_line_item_id = 1;
}

message GetPurchaseOrderLineItemItemPageDataResponse {
  optional PurchaseOrderLineItem purchase_order_line_item = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
