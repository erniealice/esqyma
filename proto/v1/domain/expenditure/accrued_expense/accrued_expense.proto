  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListAccruedExpenseSettlementsRequest {
  optional string accrued_expense_id = 1;
  optional string expenditure_id = 2;
  optional domain.common.v1.SearchRequest search = 3;
