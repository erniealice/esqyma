syntax = "proto3";

package domain.procurement.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/procurement/supplier_product_cost_plan";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/search.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/procurement/cost_plan/cost_plan.proto";
import "domain/procurement/supplier_product_plan/supplier_product_plan.proto";
import "options/db.proto";

// Buying-side billing treatment on a per-product-line basis.
// MINIMUM_COMMITMENT is buying-side specific — per-line minimums on USAGE_BASED plans.
enum SupplierProductCostPlanBillingTreatment {
  SUPPLIER_PRODUCT_COST_PLAN_BILLING_TREATMENT_UNSPECIFIED      = 0;
  SUPPLIER_PRODUCT_COST_PLAN_BILLING_TREATMENT_RECURRING        = 1;  // charge every cycle
  SUPPLIER_PRODUCT_COST_PLAN_BILLING_TREATMENT_ONE_TIME_INITIAL = 2;  // charge once on first expenditure of this subscription
  SUPPLIER_PRODUCT_COST_PLAN_BILLING_TREATMENT_USAGE_BASED      = 3;  // metered/consumed
  SUPPLIER_PRODUCT_COST_PLAN_BILLING_TREATMENT_MINIMUM_COMMITMENT = 4; // per-line minimum commitment; USAGE_BASED floor
}

message SupplierProductCostPlan {
  option (options.v1.table).table = true;
  string id = 1;
  optional int64 date_created = 2;
  optional string date_created_string = 3;
  optional int64 date_modified = 4;
  optional string date_modified_string = 5;
  bool active = 6 [(options.v1.db).default = "true"];
  optional CostPlan cost_plan = 7;
  string cost_plan_id = 8 [(options.v1.db).references = "cost_plan", (options.v1.db).index = true];

  // Model D parity: catalog-line FK to SupplierProductPlan, not directly to product_id.
  // SupplierProductCostPlan prices a specific SupplierProductPlan row.
  // Variant identity lives on SupplierProductPlan; this row reads it via join.
  optional SupplierProductPlan supplier_product_plan = 9;
  string supplier_product_plan_id = 10 [(options.v1.db).references = "supplier_product_plan", (options.v1.db).index = true];

  int64 billing_amount = 11;    // centavos — line price charged by the supplier in billing_currency
  string billing_currency = 12; // ISO 4217 currency code — must match parent CostPlan.billing_currency
  SupplierProductCostPlanBillingTreatment billing_treatment = 13;

  // Per-line effective dates; optional — overrides parent CostSchedule dates when set
  optional string date_start = 14;  // ISO 8601 date (YYYY-MM-DD)
  optional string date_end   = 15;  // ISO 8601 date (YYYY-MM-DD)
}

service SupplierProductCostPlanDomainService {
  rpc CreateSupplierProductCostPlan(CreateSupplierProductCostPlanRequest) returns (CreateSupplierProductCostPlanResponse);
  rpc ReadSupplierProductCostPlan(ReadSupplierProductCostPlanRequest) returns (ReadSupplierProductCostPlanResponse);
  rpc UpdateSupplierProductCostPlan(UpdateSupplierProductCostPlanRequest) returns (UpdateSupplierProductCostPlanResponse);
  rpc DeleteSupplierProductCostPlan(DeleteSupplierProductCostPlanRequest) returns (DeleteSupplierProductCostPlanResponse);
  rpc ListSupplierProductCostPlans(ListSupplierProductCostPlansRequest) returns (ListSupplierProductCostPlansResponse);
  rpc GetSupplierProductCostPlanListPageData(GetSupplierProductCostPlanListPageDataRequest)
    returns (GetSupplierProductCostPlanListPageDataResponse);
  rpc GetSupplierProductCostPlanItemPageData(GetSupplierProductCostPlanItemPageDataRequest)
    returns (GetSupplierProductCostPlanItemPageDataResponse);
}

message CreateSupplierProductCostPlanRequest {
  SupplierProductCostPlan data = 1;
}

message CreateSupplierProductCostPlanResponse {
  repeated SupplierProductCostPlan data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadSupplierProductCostPlanRequest {
  SupplierProductCostPlan data = 1;
}

message ReadSupplierProductCostPlanResponse {
  repeated SupplierProductCostPlan data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateSupplierProductCostPlanRequest {
  SupplierProductCostPlan data = 1;
}

message UpdateSupplierProductCostPlanResponse {
  repeated SupplierProductCostPlan data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteSupplierProductCostPlanRequest {
  SupplierProductCostPlan data = 1;
}

message DeleteSupplierProductCostPlanResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListSupplierProductCostPlansRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListSupplierProductCostPlansResponse {
  repeated SupplierProductCostPlan data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetSupplierProductCostPlanListPageDataRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message GetSupplierProductCostPlanListPageDataResponse {
  repeated SupplierProductCostPlan supplier_product_cost_plan_list = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
  optional domain.common.v1.PaginationResponse pagination = 4;
  repeated domain.common.v1.SearchResult search_results = 5;
}

message GetSupplierProductCostPlanItemPageDataRequest {
  string supplier_product_cost_plan_id = 1;
}

message GetSupplierProductCostPlanItemPageDataResponse {
  SupplierProductCostPlan supplier_product_cost_plan = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
