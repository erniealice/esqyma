syntax = "proto3";

package domain.procurement.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/procurement/cost_schedule";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/search.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "options/db.proto";
import "google/protobuf/timestamp.proto";

message CostSchedule {
  option (options.v1.table).table = true;
  string id = 1;
  optional int64 date_created = 2;
  optional string date_created_string = 3;
  optional int64 date_modified = 4;
  optional string date_modified_string = 5;
  bool active = 6 [(options.v1.db).default = "true"];
  string name = 7;
  optional string description = 8;
  google.protobuf.Timestamp date_time_start = 9; // UTC timestamp; display TZ resolved per-request
  optional google.protobuf.Timestamp date_time_end = 10; // UTC timestamp; nil = open-ended
  optional string location_id = 11 [(options.v1.db).references = "location", (options.v1.db).index = true];
  optional string workspace_id = 12 [(options.v1.db).references = "workspace", (options.v1.db).index = true];
}

service CostScheduleDomainService {
  rpc CreateCostSchedule(CreateCostScheduleRequest) returns (CreateCostScheduleResponse);
  rpc ReadCostSchedule(ReadCostScheduleRequest) returns (ReadCostScheduleResponse);
  rpc UpdateCostSchedule(UpdateCostScheduleRequest) returns (UpdateCostScheduleResponse);
  rpc DeleteCostSchedule(DeleteCostScheduleRequest) returns (DeleteCostScheduleResponse);
  rpc ListCostSchedules(ListCostSchedulesRequest) returns (ListCostSchedulesResponse);
  rpc GetCostScheduleListPageData(GetCostScheduleListPageDataRequest) returns (GetCostScheduleListPageDataResponse);
  rpc GetCostScheduleItemPageData(GetCostScheduleItemPageDataRequest) returns (GetCostScheduleItemPageDataResponse);
  rpc FindApplicableCostSchedule(FindApplicableCostScheduleRequest) returns (FindApplicableCostScheduleResponse);
}

message CreateCostScheduleRequest {
  CostSchedule data = 1;
}

message CreateCostScheduleResponse {
  repeated CostSchedule data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadCostScheduleRequest {
  CostSchedule data = 1;
}

message ReadCostScheduleResponse {
  repeated CostSchedule data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateCostScheduleRequest {
  CostSchedule data = 1;
}

message UpdateCostScheduleResponse {
  repeated CostSchedule data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteCostScheduleRequest {
  CostSchedule data = 1;
}

message DeleteCostScheduleResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListCostSchedulesRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListCostSchedulesResponse {
  repeated CostSchedule data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetCostScheduleListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetCostScheduleListPageDataResponse {
  repeated CostSchedule cost_schedule_list = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
  optional domain.common.v1.PaginationResponse pagination = 4;
  repeated domain.common.v1.SearchResult search_results = 5;
}

message GetCostScheduleItemPageDataRequest {
  string cost_schedule_id = 1;
}

message GetCostScheduleItemPageDataResponse {
  optional CostSchedule cost_schedule = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message FindApplicableCostScheduleRequest {
  string location_id = 1;
  string date = 2; // ISO 8601 date (YYYY-MM-DD)
}

message FindApplicableCostScheduleResponse {
  optional CostSchedule cost_schedule = 1;
  bool found = 2;
  bool success = 3;
  optional domain.common.v1.Error error = 4;
}
