syntax = "proto3";

package domain.common.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/common";

// Sort request with multiple sort fields
message SortRequest {
  repeated SortField fields = 1;
}

// Individual sort field configuration
message SortField {
  string field = 1; // Field to sort by (supports dot notation)
  SortDirection direction = 2;
  NullOrder null_order = 3;

  // Type-specific options
  optional StringSortOptions string_options = 4;
  optional NumberSortOptions number_options = 5;
}

// Sort direction
enum SortDirection {
  ASC = 0;
  DESC = 1;
}

// Null value ordering
enum NullOrder {
  NULLS_FIRST = 0;
  NULLS_LAST = 1;
}

// String-specific sort options
message StringSortOptions {
  bool case_sensitive = 1;
  string locale = 2; // Locale for string comparison
}

// Number-specific sort options
message NumberSortOptions {
  bool absolute_value = 1; // Sort by absolute value
}