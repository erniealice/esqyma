syntax = "proto3";

package domain.common.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/common";

import "domain/common/error.proto";
import "domain/common/filter.proto";
import "domain/common/pagination.proto";
import "options/db.proto";

// Category represents a common category entity that can be used across domains.
// This provides a base structure for categorizing various entities like clients,
// products, locations, etc. Domain-specific categories can reference this common
// Category entity.
message Category {
  option (options.v1.table).table = true;

  // Unique identifier for the category
  string id = 1;

  // Human-readable name of the category
  string name = 2;

  // Detailed description of what this category represents
  string description = 3;

  // Code/identifier for the category (useful for system references)
  string code = 4;

  // Module or domain this category belongs to (e.g., "client", "product", "location")
  string module = 5;

  // Parent category ID if this is a sub-category (optional)
  optional string parent_id = 6 [(options.v1.db).references = "category", (options.v1.db).index = true];

  // Creation timestamp as Unix epoch (milliseconds)
  optional int64 date_created = 7;

  // Creation timestamp as human-readable string
  optional string date_created_string = 8;

  // Last modification timestamp as Unix epoch (milliseconds)
  optional int64 date_modified = 9;

  // Last modification timestamp as human-readable string
  optional string date_modified_string = 10;

  // Whether the category is currently active
  bool active = 11 [(options.v1.db).default = "true"];

  // Display order for sorting categories (optional)
  optional int32 display_order = 12;
}

// CategoryCodeValue represents a category by its code and value.
// Used for code-based category creation where the code is resolved to an ID internally.
message CategoryCodeValue {
  string code = 1;
  string value = 2;
}

// CategoryDomainService provides CRUD operations for the common Category entity.
service CategoryDomainService {
  rpc CreateCategory(CreateCategoryRequest) returns (CreateCategoryResponse);
  rpc ReadCategory(ReadCategoryRequest) returns (ReadCategoryResponse);
  rpc UpdateCategory(UpdateCategoryRequest) returns (UpdateCategoryResponse);
  rpc DeleteCategory(DeleteCategoryRequest) returns (DeleteCategoryResponse);
  rpc ListCategories(ListCategoriesRequest) returns (ListCategoriesResponse);
}

message CreateCategoryRequest {
  Category data = 1;
}

message CreateCategoryResponse {
  repeated Category data = 1;
  bool success = 2;
  optional Error error = 3;
}

message ReadCategoryRequest {
  Category data = 1;
}

message ReadCategoryResponse {
  repeated Category data = 1;
  bool success = 2;
  optional Error error = 3;
}

message UpdateCategoryRequest {
  Category data = 1;
}

message UpdateCategoryResponse {
  repeated Category data = 1;
  bool success = 2;
  optional Error error = 3;
}

message DeleteCategoryRequest {
  Category data = 1;
}

message DeleteCategoryResponse {
  repeated Category data = 1;
  bool success = 2;
  optional Error error = 3;
}

message ListCategoriesRequest {
  optional FilterRequest filters = 1;
  optional PaginationRequest pagination = 2;
}

message ListCategoriesResponse {
  repeated Category data = 1;
  bool success = 2;
  optional Error error = 3;
}
