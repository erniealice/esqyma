syntax = "proto3";

package domain.common.v1;

import "google/protobuf/any.proto";

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/common";

/**
 * Error severity levels
 */
enum ErrorSeverity {
  ERROR_SEVERITY_UNSPECIFIED = 0;
  ERROR_SEVERITY_INFO = 1;
  ERROR_SEVERITY_WARNING = 2;
  ERROR_SEVERITY_ERROR = 3;
  ERROR_SEVERITY_CRITICAL = 4;
}

/**
 * Error categories for better classification
 */
enum ErrorCategory {
  ERROR_CATEGORY_UNSPECIFIED = 0;
  ERROR_CATEGORY_VALIDATION = 1;
  ERROR_CATEGORY_AUTHENTICATION = 2;
  ERROR_CATEGORY_AUTHORIZATION = 3;
  ERROR_CATEGORY_NOT_FOUND = 4;
  ERROR_CATEGORY_CONFLICT = 5;
  ERROR_CATEGORY_RATE_LIMIT = 6;
  ERROR_CATEGORY_INTERNAL_SERVER = 7;
  ERROR_CATEGORY_EXTERNAL_SERVICE = 8;
  ERROR_CATEGORY_NETWORK = 9;
  ERROR_CATEGORY_TIMEOUT = 10;
}

/**
 * Individual error detail for field-specific errors
 */
message ErrorDetail {
  string field = 1;
  string message = 2;
  string code = 3;
  map<string, string> metadata = 4;
}

/**
 * Main error message structure
 */
message Error {
  string code = 1;
  int32 status_code = 2;
  string description = 3;
  string message = 4;
  ErrorSeverity severity = 5;
  ErrorCategory category = 6;
  repeated ErrorDetail details = 7;
  string trace_id = 8;
  string timestamp = 9;
  string service = 10;
  string operation = 11;
  map<string, string> metadata = 12;
}

/**
 * Result wrapper for service responses
 */
message ServiceResult {
  oneof result {
    google.protobuf.Any data = 1;
    Error error = 2;
  }
  bool success = 3;
  string request_id = 4;
  string timestamp = 5;
}

/**
 * Generic success response
 */
message SuccessResponse {
  string message = 1;
  string request_id = 2;
  string timestamp = 3;
  map<string, string> metadata = 4;
}

/**
 * Generic error response
 */
message ErrorResponse {
  Error error = 1;
  string request_id = 2;
  string timestamp = 3;
}
