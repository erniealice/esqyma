syntax = "proto3";

package domain.common.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/common";

import "domain/common/error.proto";
import "domain/common/filter.proto";
import "domain/common/pagination.proto";
import "options/db.proto";

message Attribute {
  option (options.v1.table).table = true;
  string id = 1;
  string name = 2;
  string description = 3;
  string code = 4;
  string data_type = 5;
  string module = 6;
  optional int64 date_created = 7;
  optional string date_created_string = 8;
  optional int64 date_modified = 9;
  optional string date_modified_string = 10;
  bool active = 11 [(options.v1.db).default = "true"];
}

// AttributeCodeValue represents an attribute by its code and value.
// Used for code-based attribute creation where the code is resolved to an ID internally.
message AttributeCodeValue {
  string code = 1;
  string value = 2;
}

service AttributeDomainService {
  rpc CreateAttribute(CreateAttributeRequest) returns (CreateAttributeResponse);
  rpc ReadAttribute(ReadAttributeRequest) returns (ReadAttributeResponse);
  rpc UpdateAttribute(UpdateAttributeRequest) returns (UpdateAttributeResponse);
  rpc DeleteAttribute(DeleteAttributeRequest) returns (DeleteAttributeResponse);
  rpc ListAttributes(ListAttributesRequest) returns (ListAttributesResponse);
}

message CreateAttributeRequest {
  Attribute data = 1;
}

message CreateAttributeResponse {
  repeated Attribute data = 1;
  bool success = 2;
  optional Error error = 3;
}

message ReadAttributeRequest {
  Attribute data = 1;
}

message ReadAttributeResponse {
  repeated Attribute data = 1;
  bool success = 2;
  optional Error error = 3;
}

message UpdateAttributeRequest {
  Attribute data = 1;
}

message UpdateAttributeResponse {
  repeated Attribute data = 1;
  bool success = 2;
  optional Error error = 3;
}

message DeleteAttributeRequest {
  Attribute data = 1;
}

message DeleteAttributeResponse {
  repeated Attribute data = 1;
  bool success = 2;
  optional Error error = 3;
}

message ListAttributesRequest {
  optional FilterRequest filters = 1;
  optional PaginationRequest pagination = 2;
}

message ListAttributesResponse {
  repeated Attribute data = 1;
  bool success = 2;
  optional Error error = 3;
}
