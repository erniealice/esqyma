syntax = "proto3";

package domain.inventory.v1;

option go_package = "leapfor.xyz/esqyma/golang/v1/domain/inventory/inventory_transaction";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "domain/inventory/inventory_item/inventory_item.proto";

message InventoryTransaction {
  string id = 1;
  optional int64 date_created = 2;
  optional string date_created_string = 3;
  optional int64 date_modified = 4;
  optional string date_modified_string = 5;
  bool active = 6;
  optional InventoryItem inventory_item = 7;
  string inventory_item_id = 8;
  string transaction_type = 9;
  double quantity = 10;
  optional int64 transaction_date = 11;
  optional string transaction_date_string = 12;
  optional string reference_type = 13;
  optional string reference_id = 14;
  optional string from_location_id = 15;
  optional string to_location_id = 16;
  optional string notes = 17;
  string status = 18;
  optional string serial_number = 19;
  optional string performed_by = 20;
}

service InventoryTransactionDomainService {
  rpc CreateInventoryTransaction(CreateInventoryTransactionRequest) returns (CreateInventoryTransactionResponse);
  rpc ReadInventoryTransaction(ReadInventoryTransactionRequest) returns (ReadInventoryTransactionResponse);
  rpc UpdateInventoryTransaction(UpdateInventoryTransactionRequest) returns (UpdateInventoryTransactionResponse);
  rpc DeleteInventoryTransaction(DeleteInventoryTransactionRequest) returns (DeleteInventoryTransactionResponse);
  rpc ListInventoryTransactions(ListInventoryTransactionsRequest) returns (ListInventoryTransactionsResponse);

  // NEW: Enhanced list with pagination, filtering, sorting, search
  rpc GetInventoryTransactionListPageData(GetInventoryTransactionListPageDataRequest)
    returns (GetInventoryTransactionListPageDataResponse);

  // NEW: Enhanced item view with related data
  rpc GetInventoryTransactionItemPageData(GetInventoryTransactionItemPageDataRequest)
    returns (GetInventoryTransactionItemPageDataResponse);

  // Movements list page — JOIN-enriched query with date, location, type, search filters.
  rpc GetInventoryMovementsListPageData(GetInventoryMovementsListPageDataRequest)
    returns (GetInventoryMovementsListPageDataResponse);
}

message CreateInventoryTransactionRequest {
  InventoryTransaction data = 1;
}

message CreateInventoryTransactionResponse {
  repeated InventoryTransaction data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadInventoryTransactionRequest {
  InventoryTransaction data = 1;
}

message ReadInventoryTransactionResponse {
  repeated InventoryTransaction data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateInventoryTransactionRequest {
  InventoryTransaction data = 1;
}

message UpdateInventoryTransactionResponse {
  repeated InventoryTransaction data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteInventoryTransactionRequest {
  InventoryTransaction data = 1;
}

message DeleteInventoryTransactionResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListInventoryTransactionsRequest {
  optional string inventory_item_id = 1;
  optional string transaction_type = 2;
  optional domain.common.v1.SearchRequest search = 3;
  optional domain.common.v1.FilterRequest filters = 4;
  optional domain.common.v1.SortRequest sort = 5;
  optional domain.common.v1.PaginationRequest pagination = 6;
}

message ListInventoryTransactionsResponse {
  repeated InventoryTransaction data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// NEW: Enhanced list request with core features
message GetInventoryTransactionListPageDataRequest {
  // Pagination settings
  domain.common.v1.PaginationRequest pagination = 1;

  // Filter conditions
  domain.common.v1.FilterRequest filters = 2;

  // Sort settings
  domain.common.v1.SortRequest sort = 3;

  // Search settings
  domain.common.v1.SearchRequest search = 4;
}

// NEW: Enhanced list response with metadata
message GetInventoryTransactionListPageDataResponse {
  // The inventory transaction data
  repeated InventoryTransaction inventory_transaction_list = 1;

  // Pagination metadata
  optional domain.common.v1.PaginationResponse pagination = 2;

  // Search results metadata (when search is used)
  repeated domain.common.v1.SearchResult search_results = 3;

  // Response status
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

// NEW: Simple item request
message GetInventoryTransactionItemPageDataRequest {
  // The inventory transaction ID to retrieve
  string inventory_transaction_id = 1;
}

// NEW: Simple item response
message GetInventoryTransactionItemPageDataResponse {
  // The inventory transaction data
  InventoryTransaction inventory_transaction = 1;

  // Response status
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// Movements list page row — denormalized data from inventory_transaction + joined tables.
message InventoryMovementRow {
  string id = 1;
  string transaction_date = 2;  // ISO 8601 date (YYYY-MM-DD)
  string transaction_type = 3;
  double quantity = 4;
  string item_name = 5;         // from inventory_item.name
  string location_id = 6;       // from inventory_item.location_id
  string item_sku = 7;          // from inventory_item.sku
  string variant_sku = 8;       // from product_variant.sku
  string product_name = 9;      // from product.name
  optional string serial_number = 10;
  optional string reference_type = 11;
  optional string reference_id = 12;
  optional string performed_by = 13;
}

message GetInventoryMovementsListPageDataRequest {
  optional string date_from = 1;      // ISO 8601 date (YYYY-MM-DD), empty = no lower bound
  optional string date_to = 2;        // ISO 8601 date (YYYY-MM-DD), empty = no upper bound
  optional string location_id = 3;    // filter by inventory_item.location_id
  optional string transaction_type = 4; // filter by transaction_type
  optional string search = 5;         // ILIKE search across product_name, SKUs, item_name
}

message GetInventoryMovementsListPageDataResponse {
  repeated InventoryMovementRow data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
