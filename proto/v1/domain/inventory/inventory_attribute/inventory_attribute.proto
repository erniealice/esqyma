syntax = "proto3";

package domain.inventory.v1;

option go_package = "leapfor.xyz/esqyma/golang/v1/domain/inventory/inventory_attribute";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "domain/inventory/inventory_item/inventory_item.proto";
import "domain/common/attribute.proto";

message InventoryAttribute {
  string id = 1;
  string inventory_item_id = 2;
  string attribute_id = 3;
  string value = 4;
  InventoryItem inventory_item = 5;
  domain.common.v1.Attribute attribute = 6;
  optional int64 date_created = 7;
  optional string date_created_string = 8;
  optional int64 date_modified = 9;
  optional string date_modified_string = 10;
  bool active = 11;
}

service InventoryAttributeDomainService {
  rpc CreateInventoryAttribute(CreateInventoryAttributeRequest) returns (CreateInventoryAttributeResponse);
  rpc ReadInventoryAttribute(ReadInventoryAttributeRequest) returns (ReadInventoryAttributeResponse);
  rpc UpdateInventoryAttribute(UpdateInventoryAttributeRequest) returns (UpdateInventoryAttributeResponse);
  rpc DeleteInventoryAttribute(DeleteInventoryAttributeRequest) returns (DeleteInventoryAttributeResponse);
  rpc ListInventoryAttributes(ListInventoryAttributesRequest) returns (ListInventoryAttributesResponse);

  // NEW: Enhanced list with pagination, filtering, sorting, search
  rpc GetInventoryAttributeListPageData(GetInventoryAttributeListPageDataRequest)
    returns (GetInventoryAttributeListPageDataResponse);

  // NEW: Enhanced item view with related data
  rpc GetInventoryAttributeItemPageData(GetInventoryAttributeItemPageDataRequest)
    returns (GetInventoryAttributeItemPageDataResponse);
}

message CreateInventoryAttributeRequest {
  InventoryAttribute data = 1;
}

message CreateInventoryAttributeResponse {
  repeated InventoryAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message CreateInventoryAttributeBatchRequest {
  repeated InventoryAttribute data = 1;
}

message CreateInventoryAttributeBatchResponse {
  repeated InventoryAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// CreateInventoryAttributesByCode creates inventory attributes using attribute codes.
// Internally resolves each code to an attribute ID before creating.
message InventoryAttributesByCodeData {
  string inventory_item_id = 1;
  map<string, string> attributes_map = 2;  // {"attribute_code": "value", ...}
}

message CreateInventoryAttributesByCodeRequest {
  InventoryAttributesByCodeData data = 1;
}

message CreateInventoryAttributesByCodeResponse {
  repeated InventoryAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadInventoryAttributeRequest {
  InventoryAttribute data = 1;
}

message ReadInventoryAttributeResponse {
  repeated InventoryAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateInventoryAttributeRequest {
  InventoryAttribute data = 1;
}

message UpdateInventoryAttributeResponse {
  repeated InventoryAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteInventoryAttributeRequest {
  InventoryAttribute data = 1;
}

message DeleteInventoryAttributeResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListInventoryAttributesRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListInventoryAttributesResponse {
  repeated InventoryAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// NEW: Enhanced list request with core features
message GetInventoryAttributeListPageDataRequest {
  // Pagination settings
  domain.common.v1.PaginationRequest pagination = 1;

  // Filter conditions
  domain.common.v1.FilterRequest filters = 2;

  // Sort settings
  domain.common.v1.SortRequest sort = 3;

  // Search settings
  domain.common.v1.SearchRequest search = 4;
}

// NEW: Enhanced list response with metadata
message GetInventoryAttributeListPageDataResponse {
  // The inventory attribute data
  repeated InventoryAttribute inventory_attribute_list = 1;

  // Pagination metadata
  optional domain.common.v1.PaginationResponse pagination = 2;

  // Search results metadata (when search is used)
  repeated domain.common.v1.SearchResult search_results = 3;

  // Response status
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

// NEW: Simple item request
message GetInventoryAttributeItemPageDataRequest {
  // The inventory attribute ID to retrieve
  string inventory_attribute_id = 1;
}

// NEW: Simple item response
message GetInventoryAttributeItemPageDataResponse {
  // The inventory attribute data
  InventoryAttribute inventory_attribute = 1;

  // Response status
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
