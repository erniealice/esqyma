syntax = "proto3";

package domain.treasury.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/treasury/disbursement_schedule";

import "domain/common/error.proto";
import "domain/common/search.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/pagination.proto";

message DisbursementSchedule {
  string id = 1;
  optional int64 date_created = 2;
  optional string date_created_string = 3;
  optional int64 date_modified = 4;
  optional string date_modified_string = 5;
  bool active = 6;
  string expenditure_id = 7;               // FK to expenditure
  int32 sequence = 8;
  int64 amount = 9;                        // Centavos
  string due_date = 10; // ISO 8601 date (YYYY-MM-DD)
  reserved 11; // was due_date_string
  string status = 12;                      // "pending", "paid", "partial", "overdue"
  optional int64 paid_amount = 13;
  optional int64 paid_date = 14;
  optional string disbursement_id = 15;    // FK to disbursement (when paid)
  optional string payment_term_id = 16;
}

service DisbursementScheduleDomainService {
  rpc CreateDisbursementSchedule(CreateDisbursementScheduleRequest) returns (CreateDisbursementScheduleResponse);
  rpc ReadDisbursementSchedule(ReadDisbursementScheduleRequest) returns (ReadDisbursementScheduleResponse);
  rpc UpdateDisbursementSchedule(UpdateDisbursementScheduleRequest) returns (UpdateDisbursementScheduleResponse);
  rpc DeleteDisbursementSchedule(DeleteDisbursementScheduleRequest) returns (DeleteDisbursementScheduleResponse);
  rpc ListDisbursementSchedules(ListDisbursementSchedulesRequest) returns (ListDisbursementSchedulesResponse);
  rpc GetDisbursementScheduleListPageData(GetDisbursementScheduleListPageDataRequest)
    returns (GetDisbursementScheduleListPageDataResponse);
  rpc GetDisbursementScheduleItemPageData(GetDisbursementScheduleItemPageDataRequest)
    returns (GetDisbursementScheduleItemPageDataResponse);
}

message CreateDisbursementScheduleRequest {
  DisbursementSchedule data = 1;
}

message CreateDisbursementScheduleResponse {
  repeated DisbursementSchedule data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadDisbursementScheduleRequest {
  DisbursementSchedule data = 1;
}

message ReadDisbursementScheduleResponse {
  repeated DisbursementSchedule data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateDisbursementScheduleRequest {
  DisbursementSchedule data = 1;
}

message UpdateDisbursementScheduleResponse {
  repeated DisbursementSchedule data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteDisbursementScheduleRequest {
  DisbursementSchedule data = 1;
}

message DeleteDisbursementScheduleResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListDisbursementSchedulesRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListDisbursementSchedulesResponse {
  repeated DisbursementSchedule data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetDisbursementScheduleListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetDisbursementScheduleListPageDataResponse {
  repeated DisbursementSchedule disbursement_schedule_list = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
  optional domain.common.v1.PaginationResponse pagination = 4;
  repeated domain.common.v1.SearchResult search_results = 5;
}

message GetDisbursementScheduleItemPageDataRequest {
  string disbursement_schedule_id = 1;
}

message GetDisbursementScheduleItemPageDataResponse {
  optional DisbursementSchedule disbursement_schedule = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
