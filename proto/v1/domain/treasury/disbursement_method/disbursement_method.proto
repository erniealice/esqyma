syntax = "proto3";

package domain.payment.v1;

option go_package = "leapfor.xyz/esqyma/golang/v1/domain/treasury/disbursement_method";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

message DisbursementMethod {
  string id = 1;
  optional int64 date_created = 2;
  optional string date_created_string = 3;
  optional int64 date_modified = 4;
  optional string date_modified_string = 5;
  bool active = 6;
  string name = 7;
  oneof method_details {
    DisbursementCardDetails card = 8;
    DisbursementBankAccountDetails bank_account = 9;
  }
  optional string provider_name = 10;
}

message DisbursementCardDetails {
  string card_type = 1;
  string last_four_digits = 2;
  int32 expiry_month = 3;
  int32 expiry_year = 4;
}

message DisbursementBankAccountDetails {
  string bank_name = 1;
  string last_four_digits = 2;
}

service DisbursementMethodDomainService {
  rpc CreateDisbursementMethod(CreateDisbursementMethodRequest) returns (CreateDisbursementMethodResponse);
  rpc ReadDisbursementMethod(ReadDisbursementMethodRequest) returns (ReadDisbursementMethodResponse);
  rpc UpdateDisbursementMethod(UpdateDisbursementMethodRequest) returns (UpdateDisbursementMethodResponse);
  rpc DeleteDisbursementMethod(DeleteDisbursementMethodRequest) returns (DeleteDisbursementMethodResponse);
  rpc ListDisbursementMethods(ListDisbursementMethodsRequest) returns (ListDisbursementMethodsResponse);

  rpc GetDisbursementMethodListPageData(GetDisbursementMethodListPageDataRequest)
    returns (GetDisbursementMethodListPageDataResponse);

  rpc GetDisbursementMethodItemPageData(GetDisbursementMethodItemPageDataRequest)
    returns (GetDisbursementMethodItemPageDataResponse);
}

message CreateDisbursementMethodRequest {
  DisbursementMethod data = 1;
}

message CreateDisbursementMethodResponse {
  repeated DisbursementMethod data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadDisbursementMethodRequest {
  DisbursementMethod data = 1;
}

message ReadDisbursementMethodResponse {
  repeated DisbursementMethod data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateDisbursementMethodRequest {
  DisbursementMethod data = 1;
}

message UpdateDisbursementMethodResponse {
  repeated DisbursementMethod data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteDisbursementMethodRequest {
  DisbursementMethod data = 1;
}

message DeleteDisbursementMethodResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListDisbursementMethodsRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListDisbursementMethodsResponse {
  repeated DisbursementMethod data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetDisbursementMethodListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetDisbursementMethodListPageDataResponse {
  repeated DisbursementMethod disbursement_method_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetDisbursementMethodItemPageDataRequest {
  string disbursement_method_id = 1;
}

message GetDisbursementMethodItemPageDataResponse {
  DisbursementMethod disbursement_method = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
