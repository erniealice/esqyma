syntax = "proto3";

package domain.treasury.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/treasury/disbursement_attribute";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "domain/treasury/disbursement/disbursement.proto";
import "domain/common/attribute.proto";

message DisbursementAttribute {
  string id = 1;
  string disbursement_id = 2;
  string attribute_id = 3;
  string value = 4;
  Disbursement disbursement = 5;
  domain.common.v1.Attribute attribute = 6;
  optional int64 date_created = 7;
  optional string date_created_string = 8;
  optional int64 date_modified = 9;
  optional string date_modified_string = 10;
  bool active = 11;
}

service DisbursementAttributeDomainService {
  rpc CreateDisbursementAttribute(CreateDisbursementAttributeRequest) returns (CreateDisbursementAttributeResponse);
  rpc ReadDisbursementAttribute(ReadDisbursementAttributeRequest) returns (ReadDisbursementAttributeResponse);
  rpc UpdateDisbursementAttribute(UpdateDisbursementAttributeRequest) returns (UpdateDisbursementAttributeResponse);
  rpc DeleteDisbursementAttribute(DeleteDisbursementAttributeRequest) returns (DeleteDisbursementAttributeResponse);
  rpc ListDisbursementAttributes(ListDisbursementAttributesRequest) returns (ListDisbursementAttributesResponse);

  rpc GetDisbursementAttributeListPageData(GetDisbursementAttributeListPageDataRequest)
    returns (GetDisbursementAttributeListPageDataResponse);

  rpc GetDisbursementAttributeItemPageData(GetDisbursementAttributeItemPageDataRequest)
    returns (GetDisbursementAttributeItemPageDataResponse);
}

message CreateDisbursementAttributeRequest {
  DisbursementAttribute data = 1;
}

message CreateDisbursementAttributeResponse {
  repeated DisbursementAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message CreateDisbursementAttributeBatchRequest {
  repeated DisbursementAttribute data = 1;
}

message CreateDisbursementAttributeBatchResponse {
  repeated DisbursementAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// CreateDisbursementAttributesByCode creates disbursement attributes using attribute codes.
// Internally resolves each code to an attribute ID before creating.
message DisbursementAttributesByCodeData {
  string disbursement_id = 1;
  map<string, string> attributes_map = 2;  // {"attribute_code": "value", ...}
}

message CreateDisbursementAttributesByCodeRequest {
  DisbursementAttributesByCodeData data = 1;
}

message CreateDisbursementAttributesByCodeResponse {
  repeated DisbursementAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadDisbursementAttributeRequest {
  DisbursementAttribute data = 1;
}

message ReadDisbursementAttributeResponse {
  repeated DisbursementAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateDisbursementAttributeRequest {
  DisbursementAttribute data = 1;
}

message UpdateDisbursementAttributeResponse {
  repeated DisbursementAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteDisbursementAttributeRequest {
  DisbursementAttribute data = 1;
}

message DeleteDisbursementAttributeResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListDisbursementAttributesRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListDisbursementAttributesResponse {
  repeated DisbursementAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetDisbursementAttributeListPageDataRequest {
  domain.common.v1.PaginationRequest pagination = 1;
  domain.common.v1.FilterRequest filters = 2;
  domain.common.v1.SortRequest sort = 3;
  domain.common.v1.SearchRequest search = 4;
}

message GetDisbursementAttributeListPageDataResponse {
  repeated DisbursementAttribute disbursement_attribute_list = 1;
  domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetDisbursementAttributeItemPageDataRequest {
  string disbursement_attribute_id = 1;
}

message GetDisbursementAttributeItemPageDataResponse {
  DisbursementAttribute disbursement_attribute = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
