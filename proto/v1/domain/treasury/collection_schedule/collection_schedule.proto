syntax = "proto3";

package domain.treasury.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/treasury/collection_schedule";

import "domain/common/error.proto";
import "domain/common/search.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/pagination.proto";

message CollectionSchedule {
  string id = 1;
  optional int64 date_created = 2;
  optional string date_created_string = 3;
  optional int64 date_modified = 4;
  optional string date_modified_string = 5;
  bool active = 6;
  string revenue_id = 7;                   // FK to revenue
  int32 sequence = 8;                      // Installment number (1, 2, 3...)
  int64 amount = 9;                        // Centavos
  int64 due_date = 10;                     // Unix timestamp
  optional string due_date_string = 11;
  string status = 12;                      // "pending", "paid", "partial", "overdue"
  optional int64 paid_amount = 13;         // Centavos collected so far
  optional int64 paid_date = 14;
  optional string collection_id = 15;      // FK to collection (when paid)
  optional string payment_term_id = 16;    // FK to payment_term
}

service CollectionScheduleDomainService {
  rpc CreateCollectionSchedule(CreateCollectionScheduleRequest) returns (CreateCollectionScheduleResponse);
  rpc ReadCollectionSchedule(ReadCollectionScheduleRequest) returns (ReadCollectionScheduleResponse);
  rpc UpdateCollectionSchedule(UpdateCollectionScheduleRequest) returns (UpdateCollectionScheduleResponse);
  rpc DeleteCollectionSchedule(DeleteCollectionScheduleRequest) returns (DeleteCollectionScheduleResponse);
  rpc ListCollectionSchedules(ListCollectionSchedulesRequest) returns (ListCollectionSchedulesResponse);
  rpc GetCollectionScheduleListPageData(GetCollectionScheduleListPageDataRequest)
    returns (GetCollectionScheduleListPageDataResponse);
  rpc GetCollectionScheduleItemPageData(GetCollectionScheduleItemPageDataRequest)
    returns (GetCollectionScheduleItemPageDataResponse);
}

message CreateCollectionScheduleRequest {
  CollectionSchedule data = 1;
}

message CreateCollectionScheduleResponse {
  repeated CollectionSchedule data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadCollectionScheduleRequest {
  CollectionSchedule data = 1;
}

message ReadCollectionScheduleResponse {
  repeated CollectionSchedule data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateCollectionScheduleRequest {
  CollectionSchedule data = 1;
}

message UpdateCollectionScheduleResponse {
  repeated CollectionSchedule data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteCollectionScheduleRequest {
  CollectionSchedule data = 1;
}

message DeleteCollectionScheduleResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListCollectionSchedulesRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListCollectionSchedulesResponse {
  repeated CollectionSchedule data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetCollectionScheduleListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetCollectionScheduleListPageDataResponse {
  repeated CollectionSchedule collection_schedule_list = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
  optional domain.common.v1.PaginationResponse pagination = 4;
  repeated domain.common.v1.SearchResult search_results = 5;
}

message GetCollectionScheduleItemPageDataRequest {
  string collection_schedule_id = 1;
}

message GetCollectionScheduleItemPageDataResponse {
  optional CollectionSchedule collection_schedule = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
