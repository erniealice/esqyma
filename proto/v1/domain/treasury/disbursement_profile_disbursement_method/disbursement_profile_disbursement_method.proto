syntax = "proto3";

package domain.payment.v1;

option go_package = "leapfor.xyz/esqyma/golang/v1/domain/treasury/disbursement_profile_disbursement_method";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "domain/treasury/disbursement_profile/disbursement_profile.proto";
import "domain/treasury/disbursement_method/disbursement_method.proto";

message DisbursementProfileDisbursementMethod {
  string id = 1;
  optional int64 date_created = 2;
  optional string date_created_string = 3;
  optional int64 date_modified = 4;
  optional string date_modified_string = 5;
  bool active = 6;
  optional DisbursementProfile disbursement_profile = 7;
  string disbursement_profile_id = 8;
  optional DisbursementMethod disbursement_method = 9;
  string disbursement_method_id = 10;
  bool primary = 11;
  optional string notes = 12;
  optional int32 display_order = 13;
  string payment_identifier = 14;
  string identifier_type = 15;
  optional string display_name = 16;
  bool masked = 17;
}

service DisbursementProfileDisbursementMethodDomainService {
  rpc CreateDisbursementProfileDisbursementMethod(CreateDisbursementProfileDisbursementMethodRequest) returns (CreateDisbursementProfileDisbursementMethodResponse);
  rpc ReadDisbursementProfileDisbursementMethod(ReadDisbursementProfileDisbursementMethodRequest) returns (ReadDisbursementProfileDisbursementMethodResponse);
  rpc UpdateDisbursementProfileDisbursementMethod(UpdateDisbursementProfileDisbursementMethodRequest) returns (UpdateDisbursementProfileDisbursementMethodResponse);
  rpc DeleteDisbursementProfileDisbursementMethod(DeleteDisbursementProfileDisbursementMethodRequest) returns (DeleteDisbursementProfileDisbursementMethodResponse);
  rpc ListDisbursementProfileDisbursementMethods(ListDisbursementProfileDisbursementMethodsRequest) returns (ListDisbursementProfileDisbursementMethodsResponse);
  rpc GetDisbursementProfileDisbursementMethodListPageData(GetDisbursementProfileDisbursementMethodListPageDataRequest)
    returns (GetDisbursementProfileDisbursementMethodListPageDataResponse);
  rpc GetDisbursementProfileDisbursementMethodItemPageData(GetDisbursementProfileDisbursementMethodItemPageDataRequest)
    returns (GetDisbursementProfileDisbursementMethodItemPageDataResponse);
}

message CreateDisbursementProfileDisbursementMethodRequest {
  DisbursementProfileDisbursementMethod data = 1;
}

message CreateDisbursementProfileDisbursementMethodResponse {
  repeated DisbursementProfileDisbursementMethod data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadDisbursementProfileDisbursementMethodRequest {
  DisbursementProfileDisbursementMethod data = 1;
}

message ReadDisbursementProfileDisbursementMethodResponse {
  repeated DisbursementProfileDisbursementMethod data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateDisbursementProfileDisbursementMethodRequest {
  DisbursementProfileDisbursementMethod data = 1;
}

message UpdateDisbursementProfileDisbursementMethodResponse {
  repeated DisbursementProfileDisbursementMethod data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteDisbursementProfileDisbursementMethodRequest {
  DisbursementProfileDisbursementMethod data = 1;
}

message DeleteDisbursementProfileDisbursementMethodResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListDisbursementProfileDisbursementMethodsRequest {
  optional string disbursement_profile_id = 1;
  optional string disbursement_method_id = 2;
  optional bool primary_only = 3;
  optional domain.common.v1.SearchRequest search = 4;
  optional domain.common.v1.FilterRequest filters = 5;
  optional domain.common.v1.SortRequest sort = 6;
  optional domain.common.v1.PaginationRequest pagination = 7;
}

message ListDisbursementProfileDisbursementMethodsResponse {
  repeated DisbursementProfileDisbursementMethod data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetDisbursementProfileDisbursementMethodListPageDataRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message GetDisbursementProfileDisbursementMethodListPageDataResponse {
  repeated DisbursementProfileDisbursementMethod disbursement_profile_disbursement_method_list = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
  optional domain.common.v1.PaginationResponse pagination = 4;
  repeated domain.common.v1.SearchResult search_results = 5;
}

message GetDisbursementProfileDisbursementMethodItemPageDataRequest {
  string disbursement_profile_disbursement_method_id = 1;
}

message GetDisbursementProfileDisbursementMethodItemPageDataResponse {
  DisbursementProfileDisbursementMethod disbursement_profile_disbursement_method = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
