syntax = "proto3";

package domain.treasury.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/treasury/treasury_disbursement_supplier_billing_event";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/search.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";

import "options/db.proto";

// Junction entity linking a MILESTONE advance TreasuryDisbursement to one or more
// SupplierBillingEvent rows (buying-side mirror of TreasuryCollectionBillingEvent).
message TreasuryDisbursementSupplierBillingEvent {
  option (options.v1.table).table = true;

  string id = 1;
  string workspace_id = 2 [(options.v1.db).index = true];

  string treasury_disbursement_id   = 10 [(options.v1.db).references = "treasury_disbursement",   (options.v1.db).index = true];
  string supplier_billing_event_id  = 11 [(options.v1.db).references = "supplier_billing_event",  (options.v1.db).index = true];

  // Centavos; portion of the advance assigned to this milestone.
  int64 tranche_amount = 20;

  // Set when this junction is consumed by RecognizeMilestoneAdvance.
  optional string expense_recognition_id = 30 [(options.v1.db).references = "expense_recognition", (options.v1.db).index = true];

  bool active = 90 [(options.v1.db).default = "true"];
  optional int64 date_created = 91;
  optional int64 date_modified = 92;
}

service TreasuryDisbursementSupplierBillingEventDomainService {
  rpc CreateTreasuryDisbursementSupplierBillingEvent(CreateTreasuryDisbursementSupplierBillingEventRequest) returns (CreateTreasuryDisbursementSupplierBillingEventResponse);
  rpc ReadTreasuryDisbursementSupplierBillingEvent(ReadTreasuryDisbursementSupplierBillingEventRequest) returns (ReadTreasuryDisbursementSupplierBillingEventResponse);
  rpc UpdateTreasuryDisbursementSupplierBillingEvent(UpdateTreasuryDisbursementSupplierBillingEventRequest) returns (UpdateTreasuryDisbursementSupplierBillingEventResponse);
  rpc DeleteTreasuryDisbursementSupplierBillingEvent(DeleteTreasuryDisbursementSupplierBillingEventRequest) returns (DeleteTreasuryDisbursementSupplierBillingEventResponse);
  rpc ListTreasuryDisbursementSupplierBillingEvents(ListTreasuryDisbursementSupplierBillingEventsRequest) returns (ListTreasuryDisbursementSupplierBillingEventsResponse);
}

message CreateTreasuryDisbursementSupplierBillingEventRequest  { TreasuryDisbursementSupplierBillingEvent data = 1; }
message CreateTreasuryDisbursementSupplierBillingEventResponse {
  repeated TreasuryDisbursementSupplierBillingEvent data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
message ReadTreasuryDisbursementSupplierBillingEventRequest  { TreasuryDisbursementSupplierBillingEvent data = 1; }
message ReadTreasuryDisbursementSupplierBillingEventResponse {
  repeated TreasuryDisbursementSupplierBillingEvent data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
message UpdateTreasuryDisbursementSupplierBillingEventRequest  { TreasuryDisbursementSupplierBillingEvent data = 1; }
message UpdateTreasuryDisbursementSupplierBillingEventResponse {
  repeated TreasuryDisbursementSupplierBillingEvent data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
message DeleteTreasuryDisbursementSupplierBillingEventRequest  { TreasuryDisbursementSupplierBillingEvent data = 1; }
message DeleteTreasuryDisbursementSupplierBillingEventResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}
message ListTreasuryDisbursementSupplierBillingEventsRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}
message ListTreasuryDisbursementSupplierBillingEventsResponse {
  repeated TreasuryDisbursementSupplierBillingEvent data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
