syntax = "proto3";

package domain.treasury.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/treasury/disbursement";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "domain/subscription/subscription/subscription.proto";
import "domain/common/advance_kind/advance_kind.proto";
import "options/db.proto";

message Disbursement {
  string id = 1;
  optional int64 date_created = 2;
  optional string date_created_string = 3;
  optional int64 date_modified = 4;
  optional string date_modified_string = 5;
  bool active = 6;
  string name = 7;
  optional domain.subscription.v1.Subscription subscription = 8;
  string subscription_id = 9;
  int64 amount = 10; // centavos
  string status = 11;
  // --- expenditure-related fields ---
  string expenditure_id = 20;               // FK to expenditure table
  string disbursement_type = 21;            // "purchase", "expense", "subscription_refund"
  string disbursement_method_id = 22;       // FK to disbursement_method
  string currency = 23;
  string reference_number = 24;
  string payment_date = 25;                  // ISO 8601 date (YYYY-MM-DD)
  string approved_by = 26;                  // who authorized the outflow

  reserved 27; // was payment_date_string

  // GL traceability
  optional string journal_entry_id = 28;    // FK to journal_entry — set when disbursement is posted to ledger

  // FK back-edge — FS-D shared-fund-sources plan (2026-05-17).
  // Links this disbursement to the FundTransaction (kind=SETTLEMENT) that was inserted
  // when outstanding draws were settled from this workspace's cash. NULL when the disbursement
  // is a direct cash outflow with no shared-fund involvement.
  optional string fund_transaction_id = 29 [(options.v1.db).references = "fund_transaction"];

  // --- Advance Cash Events (Plan B, 20260517-advance-cash-events) ---
  // When advance_kind != NONE, this TreasuryDisbursement IS the advance payment;
  // ExpenseRecognition rows draining the advance back-ref via expense_recognition.advance_disbursement_id.
  optional domain.common.v1.AdvanceKind advance_kind = 30;
  optional domain.common.v1.AdvanceStatus advance_status = 31;
  optional string advance_start_date = 32;             // ISO 8601 YYYY-MM-DD
  optional string advance_end_date = 33;
  optional int32 advance_period_count = 34;
  optional string advance_period_unit = 35;            // "day" | "week" | "month" | "year"
  optional int64 advance_total_amount = 36;            // centavos; snapshot of original advance amount
  optional int64 advance_remaining_amount = 37;        // centavos; decremented by AmortizeAdvanceDisbursement
  optional int64 advance_recognized_amount = 38;       // centavos; SUM(linked expense_recognition.total_amount)
  optional string advance_balance_account_id = 39 [(options.v1.db).references = "account"];  // asset (prepaid)
  optional string advance_target_account_id = 40  [(options.v1.db).references = "account"];  // expense account
  optional string advance_expiry_date = 41;            // optional, v2 — escheat / expiration
  optional domain.common.v1.AdvanceProrationPolicy advance_proration_policy = 42;  // TIME_BASED first-tranche; default FULL_TRANCHE

  // Plan B Decision B — counterparty FK; additive.
  optional string supplier_id = 43 [(options.v1.db).references = "supplier", (options.v1.db).index = true];
}

// ---------------------------------------------------------------------------
// Use-case messages — Plan B Phase 2 + Phase 7 advance workflows (buying side).
// Consumed by espyna internal use cases. NOT bound to any RPC; the consumer
// adapter (consumer/adapter_treasury_advances.go) calls the use case directly
// via the Container.
// ---------------------------------------------------------------------------

// AmortizeAdvanceDisbursementRequest — buying-side Plan B Phase 2 amortize.
message AmortizeAdvanceDisbursementRequest {
  string treasury_disbursement_id = 1;
  string as_of_date = 2;
  string workspace_id = 3;
  string actor_id = 4;
  optional string idempotency_key = 5;
  optional string run_id = 6;       // set when invoked from an ExpenseRecognitionRun batch
}

message AmortizeAdvanceDisbursementResponse {
  domain.common.v1.AdvanceAmortizeOutcome outcome = 1;
  optional string expense_recognition_id = 2;             // populated when outcome == CREATED
  optional string conflicting_expense_recognition_id = 3; // populated when outcome == SKIPPED
  int64 new_remaining_amount = 4;
  int64 new_recognized_amount = 5;
  domain.common.v1.AdvanceStatus new_status = 6;
  string tranche_start = 7;
  string tranche_end = 8;
  int64 tranche_amount = 9;
  optional domain.common.v1.Error error = 10;
}

// SettleUnscheduledAdvanceDisbursementRequest — UNSCHEDULED settle (buying side).
message SettleUnscheduledAdvanceDisbursementRequest {
  string treasury_disbursement_id = 1;
  int64 amount = 2;
  string target_account_id = 3;
  string reason = 4;
  string workspace_id = 5;
  string actor_id = 6;
}

message SettleUnscheduledAdvanceDisbursementResponse {
  int64 new_remaining_amount = 1;
  int64 new_recognized_amount = 2;
  domain.common.v1.AdvanceStatus new_status = 3;
  optional domain.common.v1.Error error = 4;
}

// RefundUnscheduledAdvanceDisbursementRequest — UNSCHEDULED refund (buying side).
message RefundUnscheduledAdvanceDisbursementRequest {
  string treasury_disbursement_id = 1;
  int64 amount = 2;
  string refund_method = 3;
  string destination = 4;
  string reason = 5;
  string workspace_id = 6;
  string actor_id = 7;
}

message RefundUnscheduledAdvanceDisbursementResponse {
  int64 new_remaining_amount = 1;
  domain.common.v1.AdvanceStatus new_status = 2;
  optional domain.common.v1.Error error = 3;
}

// CancelAdvanceDisbursementRequest — flip advance_status to CANCELLED (buying side).
message CancelAdvanceDisbursementRequest {
  string treasury_disbursement_id = 1;
  string reason = 2;
  string workspace_id = 3;
  string actor_id = 4;
}

message CancelAdvanceDisbursementResponse {
  domain.common.v1.AdvanceStatus new_status = 1;
  optional domain.common.v1.Error error = 2;
}

// RecognizeMilestoneAdvanceDisbursementRequest — Plan B Phase 7 milestone
// recognition (buying side). Anchors on a
// (disbursement_id, supplier_billing_event_id) junction row.
message RecognizeMilestoneAdvanceDisbursementRequest {
  string treasury_disbursement_id = 1;
  string supplier_billing_event_id = 2;
  string actor_id = 3;
  string workspace_id = 4;
  optional string run_id = 5;
}

message RecognizeMilestoneAdvanceDisbursementResponse {
  domain.common.v1.AdvanceAmortizeOutcome outcome = 1;
  optional string expense_recognition_id = 2;
  optional string conflicting_expense_recognition_id = 3;
  int64 new_remaining_amount = 4;
  int64 new_recognized_amount = 5;
  domain.common.v1.AdvanceStatus new_status = 6;
  int64 tranche_amount = 7;
  optional domain.common.v1.Error error = 8;
}

// ---------------------------------------------------------------------------
// Advances dashboard (disbursement-side) — entity-aligned projection messages.
// Introduced by docs/plan/20260518-hexagonal-strict-adherence/ Phase 1.A as
// the entity-side replacement for the deleted cross-entity grouping package
// domain/treasury/advances_dashboard/. Consumed by the
// ListAdvanceDisbursementsForDashboard use case under
// internal/application/usecases/treasury/disbursement/.
// ---------------------------------------------------------------------------

message ListAdvanceDisbursementsForDashboardRequest {
  string workspace_id = 1;
  string as_of_date = 2;  // YYYY-MM-DD; reserved for future filtering
}

message AdvanceDisbursementDashboardRow {
  string advance_id = 1;
  string reference_number = 2;
  string counterparty_name = 3;
  domain.common.v1.AdvanceKind kind = 4;
  domain.common.v1.AdvanceStatus status = 5;
  string currency = 6;
  int64 total_amount = 7;
  int64 remaining_amount = 8;
  int64 recognized_amount = 9;
  float utilization_pct = 10;
  string start_date = 11;
  string end_date = 12;
}

message ListAdvanceDisbursementsForDashboardResponse {
  repeated AdvanceDisbursementDashboardRow rows = 1;
  int64 total_remaining = 2;
  int32 active_count = 3;
  int32 fully_recognized_count = 4;
  optional domain.common.v1.Error error = 5;
}

service DisbursementDomainService {
  rpc CreateDisbursement(CreateDisbursementRequest) returns (CreateDisbursementResponse);
  rpc ReadDisbursement(ReadDisbursementRequest) returns (ReadDisbursementResponse);
  rpc UpdateDisbursement(UpdateDisbursementRequest) returns (UpdateDisbursementResponse);
  rpc DeleteDisbursement(DeleteDisbursementRequest) returns (DeleteDisbursementResponse);
  rpc ListDisbursements(ListDisbursementsRequest) returns (ListDisbursementsResponse);

  rpc GetDisbursementListPageData(GetDisbursementListPageDataRequest)
    returns (GetDisbursementListPageDataResponse);

  rpc GetDisbursementItemPageData(GetDisbursementItemPageDataRequest)
    returns (GetDisbursementItemPageDataResponse);
}

message CreateDisbursementRequest {
  Disbursement data = 1;
}

message CreateDisbursementResponse {
  repeated Disbursement data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadDisbursementRequest {
  Disbursement data = 1;
}

message ReadDisbursementResponse {
  repeated Disbursement data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateDisbursementRequest {
  Disbursement data = 1;
}

message UpdateDisbursementResponse {
  repeated Disbursement data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteDisbursementRequest {
  Disbursement data = 1;
}

message DeleteDisbursementResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListDisbursementsRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListDisbursementsResponse {
  repeated Disbursement data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetDisbursementListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetDisbursementListPageDataResponse {
  repeated Disbursement disbursement_list = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
  optional domain.common.v1.PaginationResponse pagination = 4;
  repeated domain.common.v1.SearchResult search_results = 5;
}

message GetDisbursementItemPageDataRequest {
  string disbursement_id = 1;
}

message GetDisbursementItemPageDataResponse {
  optional Disbursement disbursement = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
