syntax = "proto3";

package domain.treasury.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/treasury/disbursement_supplier_billing_event";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/search.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";

import "options/db.proto";

// Junction entity linking a MILESTONE advance TreasuryDisbursement to one or more
// SupplierBillingEvent rows (buying-side mirror of CollectionBillingEvent).
message DisbursementSupplierBillingEvent {
  option (options.v1.table).table = true;

  string id = 1;
  string workspace_id = 2 [(options.v1.db).index = true];

  string treasury_disbursement_id   = 10 [(options.v1.db).references = "treasury_disbursement",   (options.v1.db).index = true];
  string supplier_billing_event_id  = 11 [(options.v1.db).references = "supplier_billing_event",  (options.v1.db).index = true];

  // Centavos; portion of the advance assigned to this milestone.
  int64 tranche_amount = 20;

  // Set when this junction is consumed by RecognizeMilestoneAdvance.
  optional string expense_recognition_id = 30 [(options.v1.db).references = "expense_recognition", (options.v1.db).index = true];

  bool active = 90 [(options.v1.db).default = "true"];
  optional int64 date_created = 91;
  optional int64 date_modified = 92;
}

service DisbursementSupplierBillingEventDomainService {
  rpc CreateDisbursementSupplierBillingEvent(CreateDisbursementSupplierBillingEventRequest) returns (CreateDisbursementSupplierBillingEventResponse);
  rpc ReadDisbursementSupplierBillingEvent(ReadDisbursementSupplierBillingEventRequest) returns (ReadDisbursementSupplierBillingEventResponse);
  rpc UpdateDisbursementSupplierBillingEvent(UpdateDisbursementSupplierBillingEventRequest) returns (UpdateDisbursementSupplierBillingEventResponse);
  rpc DeleteDisbursementSupplierBillingEvent(DeleteDisbursementSupplierBillingEventRequest) returns (DeleteDisbursementSupplierBillingEventResponse);
  rpc ListDisbursementSupplierBillingEvents(ListDisbursementSupplierBillingEventsRequest) returns (ListDisbursementSupplierBillingEventsResponse);
}

message CreateDisbursementSupplierBillingEventRequest  { DisbursementSupplierBillingEvent data = 1; }
message CreateDisbursementSupplierBillingEventResponse {
  repeated DisbursementSupplierBillingEvent data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
message ReadDisbursementSupplierBillingEventRequest  { DisbursementSupplierBillingEvent data = 1; }
message ReadDisbursementSupplierBillingEventResponse {
  repeated DisbursementSupplierBillingEvent data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
message UpdateDisbursementSupplierBillingEventRequest  { DisbursementSupplierBillingEvent data = 1; }
message UpdateDisbursementSupplierBillingEventResponse {
  repeated DisbursementSupplierBillingEvent data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
message DeleteDisbursementSupplierBillingEventRequest  { DisbursementSupplierBillingEvent data = 1; }
message DeleteDisbursementSupplierBillingEventResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}
message ListDisbursementSupplierBillingEventsRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}
message ListDisbursementSupplierBillingEventsResponse {
  repeated DisbursementSupplierBillingEvent data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
