syntax = "proto3";

package domain.treasury.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/treasury/advances_dashboard";

import "domain/common/error.proto";
import "domain/common/advance_kind/advance_kind.proto";

// ---------------------------------------------------------------------------
// Use-case messages — workspace-level Advances Dashboard (Plan B Phase 3,
// 20260517-advance-cash-events). Consumed by the espyna GetAdvancesDashboard
// use case via the consumer adapter (consumer/adapter_treasury_advances.go).
// NOT bound to any RPC; this proto is message-only by design.
// ---------------------------------------------------------------------------

message GetAdvancesDashboardRequest {
  string workspace_id = 1;
  string as_of_date = 2;  // YYYY-MM-DD; informational only — caller-supplied default
}

// AdvancesDashboardRow projects one advance row (selling or buying side) into
// a shape the view layer can render directly.
message AdvancesDashboardRow {
  string advance_id = 1;
  string reference_number = 2;
  string counterparty_name = 3;
  domain.common.v1.AdvanceKind kind = 4;
  domain.common.v1.AdvanceStatus status = 5;
  string currency = 6;
  int64 total_amount = 7;
  int64 remaining_amount = 8;
  int64 recognized_amount = 9;
  float utilization_pct = 10;
  string start_date = 11;
  string end_date = 12;
}

message GetAdvancesDashboardResponse {
  repeated AdvancesDashboardRow outflow_rows = 1;
  repeated AdvancesDashboardRow inflow_rows = 2;
  int64 outflow_total_remaining = 3;
  int64 inflow_total_remaining = 4;
  int32 outflow_active_count = 5;
  int32 inflow_active_count = 6;
  int32 outflow_fully_recognized = 7;
  int32 inflow_fully_recognized = 8;
  int64 total_prepaid = 9;
  int64 total_deferred = 10;
  int32 active_count = 11;
  int32 fully_recognized_count = 12;
  optional domain.common.v1.Error error = 13;
}
