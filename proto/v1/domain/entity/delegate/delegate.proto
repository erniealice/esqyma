syntax = "proto3";

package domain.entity.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/entity/delegate";

import "domain/common/error.proto";
import "domain/common/search.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/pagination.proto";

import "domain/entity/user/user.proto";
import "domain/entity/delegate_client/delegate_client.proto";
import "options/db.proto";

message Delegate {
  option (options.v1.table).table = true;

  string id = 1;
  optional User user = 2;
  string user_id = 3 [(options.v1.db).references = "user", (options.v1.db).index = true];
  optional int64 date_created = 4;
  optional string date_created_string = 5;
  optional int64 date_modified = 6;
  optional string date_modified_string = 7;
  bool active = 8 [(options.v1.db).default = "true"];
  repeated DelegateClient delegate_clients = 9;
}

service DelegateDomainService {
  rpc CreateDelegate(CreateDelegateRequest) returns (CreateDelegateResponse);
  rpc ReadDelegate(ReadDelegateRequest) returns (ReadDelegateResponse);
  rpc UpdateDelegate(UpdateDelegateRequest) returns (UpdateDelegateResponse);
  rpc DeleteDelegate(DeleteDelegateRequest) returns (DeleteDelegateResponse);
  rpc ListDelegates(ListDelegatesRequest) returns (ListDelegatesResponse);
  rpc GetDelegateListPageData(GetDelegateListPageDataRequest) returns (GetDelegateListPageDataResponse);
  rpc GetDelegateItemPageData(GetDelegateItemPageDataRequest) returns (GetDelegateItemPageDataResponse);
}

message CreateDelegateRequest {
  Delegate data = 1;
}

message CreateDelegateResponse {
  repeated Delegate data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadDelegateRequest {
  Delegate data = 1;
}

message ReadDelegateResponse {
  repeated Delegate data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateDelegateRequest {
  Delegate data = 1;
}

message UpdateDelegateResponse {
  repeated Delegate data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteDelegateRequest {
  Delegate data = 1;
}

message DeleteDelegateResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListDelegatesRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListDelegatesResponse {
  repeated Delegate data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetDelegateListPageDataRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message GetDelegateListPageDataResponse {
  repeated Delegate delegate_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetDelegateItemPageDataRequest {
  string delegate_id = 1;
}

message GetDelegateItemPageDataResponse {
  optional Delegate delegate = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}