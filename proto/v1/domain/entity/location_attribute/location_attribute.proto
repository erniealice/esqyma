syntax = "proto3";

package domain.entity.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/entity/location_attribute";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "domain/entity/location/location.proto";
import "domain/common/attribute.proto";
import "options/db.proto";

message LocationAttribute {
  option (options.v1.table).table = true;
  option (options.v1.table).unique_together = "location_id,attribute_id";
  string id = 1;
  string location_id = 2 [(options.v1.db).references = "location", (options.v1.db).index = true];
  string attribute_id = 3 [(options.v1.db).references = "attribute", (options.v1.db).index = true];
  string value = 4;
  Location location = 5;
  domain.common.v1.Attribute attribute = 6;
  optional int64 date_created = 7;
  optional string date_created_string = 8;
  optional int64 date_modified = 9;
  optional string date_modified_string = 10;
}

service LocationAttributeDomainService {
  rpc CreateLocationAttribute(CreateLocationAttributeRequest) returns (CreateLocationAttributeResponse);
  rpc ReadLocationAttribute(ReadLocationAttributeRequest) returns (ReadLocationAttributeResponse);
  rpc UpdateLocationAttribute(UpdateLocationAttributeRequest) returns (UpdateLocationAttributeResponse);
  rpc DeleteLocationAttribute(DeleteLocationAttributeRequest) returns (DeleteLocationAttributeResponse);
  rpc ListLocationAttributes(ListLocationAttributesRequest) returns (ListLocationAttributesResponse);

  // Enhanced list with pagination, filtering, sorting, search
  rpc GetLocationAttributeListPageData(GetLocationAttributeListPageDataRequest)
    returns (GetLocationAttributeListPageDataResponse);

  // Enhanced item view
  rpc GetLocationAttributeItemPageData(GetLocationAttributeItemPageDataRequest)
    returns (GetLocationAttributeItemPageDataResponse);
}

message CreateLocationAttributeRequest {
  LocationAttribute data = 1;
}

message CreateLocationAttributeResponse {
  repeated LocationAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadLocationAttributeRequest {
  LocationAttribute data = 1;
}

message ReadLocationAttributeResponse {
  repeated LocationAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateLocationAttributeRequest {
  LocationAttribute data = 1;
}

message UpdateLocationAttributeResponse {
  repeated LocationAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteLocationAttributeRequest {
  LocationAttribute data = 1;
}

message DeleteLocationAttributeResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListLocationAttributesRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListLocationAttributesResponse {
  repeated LocationAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// Enhanced list request
message GetLocationAttributeListPageDataRequest {
  domain.common.v1.PaginationRequest pagination = 1;
  domain.common.v1.FilterRequest filters = 2;
  domain.common.v1.SortRequest sort = 3;
  domain.common.v1.SearchRequest search = 4;
}

// Enhanced list response
message GetLocationAttributeListPageDataResponse {
  repeated LocationAttribute location_attribute_list = 1;
  domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

// Item request
message GetLocationAttributeItemPageDataRequest {
  string location_attribute_id = 1;
}

// Item response
message GetLocationAttributeItemPageDataResponse {
  LocationAttribute location_attribute = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
