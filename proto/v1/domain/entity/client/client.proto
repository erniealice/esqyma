syntax = "proto3";

package domain.entity.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/entity/client";

import "domain/common/error.proto";
import "domain/common/search.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/pagination.proto";
import "options/db.proto";

import "domain/entity/user/user.proto";
import "domain/entity/client_category/client_category.proto";
import "domain/entity/payment_term/payment_term.proto";

// FK References: revenue.client_id, expenditure.vendor_id,
// event_client.client_id, subscription.client_id,
// delegate_client.client_id, client_category.client_id
message Client {
  option (options.v1.table).table = true;

  string id = 1;
  optional User user = 2;
  string user_id = 3 [(options.v1.db).references = "user", (options.v1.db).index = true];
  optional int64 date_created = 4;
  optional string date_created_string = 5;
  optional int64 date_modified = 6;
  optional string date_modified_string = 7;
  bool active = 8 [(options.v1.db).default = "true"];
  string internal_id = 9 [(options.v1.db).unique = true];
  optional string category_id = 10 [(options.v1.db).references = "client_category"];
  optional ClientCategory category = 11;
  optional string name = 12;
  optional string street_address = 15;
  optional string city = 16;
  optional string province = 17;
  optional string postal_code = 18;
  optional string notes = 19;
  repeated ClientCategory categories = 20;
  optional string payment_term_id = 21;
  optional PaymentTerm payment_term = 22;
  // ISO 4217 currency code — currency this client is billed in. When unset,
  // the subscription/invoice flow falls back to Workspace.functional_currency.
  // Used by the subscription drawer to filter applicable PricePlans.
  optional string billing_currency = 23;
  optional string status = 24;                  // "prospect", "active", "on_hold", "blocked", "inactive"
  optional string country = 25;                 // ISO 3166-1 alpha-2 country code
  optional string website = 26;
}

service ClientDomainService {
  rpc CreateClient(CreateClientRequest) returns (CreateClientResponse);
  rpc ReadClient(ReadClientRequest) returns (ReadClientResponse);
  rpc UpdateClient(UpdateClientRequest) returns (UpdateClientResponse);
  rpc DeleteClient(DeleteClientRequest) returns (DeleteClientResponse);
  rpc ListClients(ListClientsRequest) returns (ListClientsResponse);
  rpc GetClientListPageData(GetClientListPageDataRequest) returns (GetClientListPageDataResponse);
  rpc GetClientItemPageData(GetClientItemPageDataRequest) returns (GetClientItemPageDataResponse);
  rpc SearchClientsByName(SearchClientsByNameRequest) returns (SearchClientsByNameResponse);
}

message CreateClientRequest {
  Client data = 1;
}

message CreateClientResponse {
  repeated Client data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadClientRequest {
  Client data = 1;
}

message ReadClientResponse {
  repeated Client data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateClientRequest {
  Client data = 1;
}

message UpdateClientResponse {
  repeated Client data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteClientRequest {
  Client data = 1;
}

message DeleteClientResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListClientsRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListClientsResponse {
  repeated Client data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetClientListPageDataRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message GetClientListPageDataResponse {
  repeated Client client_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetClientItemPageDataRequest {
  string client_id = 1;
}

message GetClientItemPageDataResponse {
  optional Client client = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message SearchClientsByNameRequest {
  string query = 1;
  optional int32 limit = 2;
}

message SearchClientsByNameResponse {
  repeated SearchClientResult results = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message SearchClientResult {
  string id = 1;
  string label = 2;
}