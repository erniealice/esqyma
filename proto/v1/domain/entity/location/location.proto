syntax = "proto3";

package domain.entity.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/entity/location";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";
import "options/db.proto";

// FK References: revenue.location_id, expenditure.location_id,
// inventory_item.location_id, price_list.location_id,
// plan_location.location_id, location_attribute.location_id
message Location {
  option (options.v1.table).table = true;
  string id = 1;
  string name = 2;
  string address = 3;
  optional int64 date_created = 4;
  optional string date_created_string = 5;
  optional int64 date_modified = 6;
  optional string date_modified_string = 7;
  bool active = 8 [(options.v1.db).default = "true"];
  optional string description = 9;
}

service LocationDomainService {
  rpc CreateLocation(CreateLocationRequest) returns (CreateLocationResponse);
  rpc ReadLocation(ReadLocationRequest) returns (ReadLocationResponse);
  rpc UpdateLocation(UpdateLocationRequest) returns (UpdateLocationResponse);
  rpc DeleteLocation(DeleteLocationRequest) returns (DeleteLocationResponse);
  rpc ListLocations(ListLocationsRequest) returns (ListLocationsResponse);

  // NEW: Enhanced list with pagination, filtering, sorting, search
  rpc GetLocationListPageData(GetLocationListPageDataRequest)
    returns (GetLocationListPageDataResponse);

  // NEW: Enhanced item view with related data
  rpc GetLocationItemPageData(GetLocationItemPageDataRequest)
    returns (GetLocationItemPageDataResponse);
}

message CreateLocationRequest {
  Location data = 1;
}

message CreateLocationResponse {
  repeated Location data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadLocationRequest {
  Location data = 1;
}

message ReadLocationResponse {
  repeated Location data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateLocationRequest {
  Location data = 1;
}

message UpdateLocationResponse {
  repeated Location data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteLocationRequest {
  Location data = 1;
}

message DeleteLocationResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListLocationsRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListLocationsResponse {
  repeated Location data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// NEW: Enhanced list request with search, filtering, sorting, pagination
message GetLocationListPageDataRequest {
  // Pagination parameters
  domain.common.v1.PaginationRequest pagination = 1;

  // Filter parameters
  domain.common.v1.FilterRequest filters = 2;

  // Sort parameters
  domain.common.v1.SortRequest sort = 3;

  // Search parameters
  domain.common.v1.SearchRequest search = 4;
}

// NEW: Enhanced list response with metadata
message GetLocationListPageDataResponse {
  // The location data
  repeated Location location_list = 1;

  // Pagination metadata
  domain.common.v1.PaginationResponse pagination = 2;

  // Search results metadata (when search is used)
  repeated domain.common.v1.SearchResult search_results = 3;

  // Response status
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

// NEW: Simple item request
message GetLocationItemPageDataRequest {
  // The location ID to retrieve
  string location_id = 1;
}

// NEW: Simple item response
message GetLocationItemPageDataResponse {
  // The location data
  Location location = 1;

  // Response status
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}