syntax = "proto3";

package domain.entity.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/entity/delegate_supplier";

import "domain/common/error.proto";
import "domain/common/search.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/pagination.proto";

import "domain/entity/supplier/supplier.proto";
import "options/db.proto";

// DelegateSupplier anchors sessions for PRINCIPAL_TYPE_SUPPLIER_DELEGATE.
// Mirror of DelegateClient — a Delegate user acts ON BEHALF OF a specific Supplier.
// A single Delegate row may have both DelegateClient rows and DelegateSupplier rows.
// workspace_id is denormalized from supplier.workspace_id for query efficiency.
message DelegateSupplier {
  option (options.v1.table).table = true;
  option (options.v1.table).unique_together = "delegate_id,supplier_id";

  string id                            = 1;
  string delegate_id                   = 2 [(options.v1.db).references = "delegate",   (options.v1.db).index = true];
  optional Supplier supplier           = 3;
  string supplier_id                   = 4 [(options.v1.db).references = "supplier",   (options.v1.db).index = true];
  string role_id                       = 5 [(options.v1.db).references = "role",       (options.v1.db).index = true];
  string granted_by_user_id            = 6 [(options.v1.db).references = "user"];
  optional string workspace_id         = 7 [(options.v1.db).references = "workspace",  (options.v1.db).index = true];
  optional int64 date_created          = 8;
  optional string date_created_string  = 9;
  optional int64 date_modified         = 10;
  optional string date_modified_string = 11;
  bool active                          = 12 [(options.v1.db).default = "true"];
}

service DelegateSupplierDomainService {
  rpc CreateDelegateSupplier(CreateDelegateSupplierRequest) returns (CreateDelegateSupplierResponse);
  rpc ReadDelegateSupplier(ReadDelegateSupplierRequest) returns (ReadDelegateSupplierResponse);
  rpc UpdateDelegateSupplier(UpdateDelegateSupplierRequest) returns (UpdateDelegateSupplierResponse);
  rpc DeleteDelegateSupplier(DeleteDelegateSupplierRequest) returns (DeleteDelegateSupplierResponse);
  rpc ListDelegateSuppliers(ListDelegateSuppliersRequest) returns (ListDelegateSuppliersResponse);
  rpc GetDelegateSupplierListPageData(GetDelegateSupplierListPageDataRequest) returns (GetDelegateSupplierListPageDataResponse);
  rpc GetDelegateSupplierItemPageData(GetDelegateSupplierItemPageDataRequest) returns (GetDelegateSupplierItemPageDataResponse);
}

message CreateDelegateSupplierRequest {
  DelegateSupplier data = 1;
}

message CreateDelegateSupplierResponse {
  repeated DelegateSupplier data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadDelegateSupplierRequest {
  DelegateSupplier data = 1;
}

message ReadDelegateSupplierResponse {
  repeated DelegateSupplier data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateDelegateSupplierRequest {
  DelegateSupplier data = 1;
}

message UpdateDelegateSupplierResponse {
  repeated DelegateSupplier data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteDelegateSupplierRequest {
  DelegateSupplier data = 1;
}

message DeleteDelegateSupplierResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListDelegateSuppliersRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListDelegateSuppliersResponse {
  repeated DelegateSupplier data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetDelegateSupplierListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetDelegateSupplierListPageDataResponse {
  repeated DelegateSupplier delegate_supplier_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetDelegateSupplierItemPageDataRequest {
  string delegate_supplier_id = 1;
}

message GetDelegateSupplierItemPageDataResponse {
  optional DelegateSupplier delegate_supplier = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
