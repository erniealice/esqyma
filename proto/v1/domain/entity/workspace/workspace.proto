syntax = "proto3";

package domain.entity.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/entity/workspace";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";
import "options/db.proto";

message Workspace {
  option (options.v1.table).table = true;
  string id = 1;
  string name = 2;
  string description = 3;
  bool private = 4;
  optional string workflow_template_id = 5 [(options.v1.db).references = "workflow_template", (options.v1.db).index = true];
  optional int64 date_created = 6;
  optional string date_created_string = 7;
  optional int64 date_modified = 8;
  optional string date_modified_string = 9;
  bool active = 10 [(options.v1.db).default = "true"];
  // ISO-4217 reporting-currency code for this workspace (e.g. "PHP", "USD"). This
  // is the accounting functional currency: books are kept and reports produced
  // in this currency. Transactions in a different currency snapshot an exchange
  // rate at recognition time and record a converted amount in this currency.
  optional string functional_currency = 11;
  // ISO 3166 country or country-subdivision code (e.g. "PH", "US-CA", "EU-DE").
  // Drives statutory rate-table lookup and payroll calculator selection.
  optional string compliance_region = 12;

  // Drift-recovered column (DB had this; proto did not)
  optional string default_currency = 13;        // ISO 4217 default currency for new entities (separate from functional_currency)

  // IANA timezone name (e.g. "Asia/Manila", "America/Los_Angeles"). Source of
  // truth for billing-cycle math, period boundaries, AR aging buckets, and
  // any "what calendar day is this?" computation. Domain reads only — display
  // (e.g. "edited 5 min ago") may still resolve via user/operator tz.
  optional string timezone = 14;

  // Tax identity fields — Phase 1 tax integration
  optional string tin = 15;                         // Taxpayer Identification Number
  optional bool tax_inclusive_pricing = 16;         // When true, PricePlan amounts are gross-of-SURCHARGE (extract). Default false (exclusive).
  optional bool tax_computation_enabled = 17;       // Master gate: when false, ComputeTaxesForRevenue is a no-op. Default true.
  optional string home_jurisdiction = 18;           // Jurisdiction scope for SURCHARGE lookups (e.g. "PH-NATIONAL"). Defaults to compliance_region for backward compat.

  // Display format preferences — drive UI date/time rendering across the workspace.
  // Values are Go time-layout strings (e.g. "Jan 2, 2006" or "2006-01-02") for
  // date_format, and "3:04 PM" / "15:04" etc. for time_format.
  // When empty the UI falls back to the locale default for the compliance_region.
  optional string date_format = 19;                 // Preferred date display format (Go layout string)
  optional string time_format = 20;                 // Preferred time display format (Go layout string)

  // FK back-edge — Wave 4 self-domain plan (2026-05-17).
  // Convenience denorm: current Ichizen plan FK. The true source of truth is
  // TenantSubscription.workspace_id — this field is a fast-path lookup for
  // the /app/billing view. See architecture.md §3.5.
  optional string tenant_subscription_id = 21 [(options.v1.db).references = "tenant_subscription", (options.v1.db).index = true];
}

service WorkspaceDomainService {
  rpc CreateWorkspace(CreateWorkspaceRequest) returns (CreateWorkspaceResponse);
  rpc ReadWorkspace(ReadWorkspaceRequest) returns (ReadWorkspaceResponse);
  rpc UpdateWorkspace(UpdateWorkspaceRequest) returns (UpdateWorkspaceResponse);
  rpc DeleteWorkspace(DeleteWorkspaceRequest) returns (DeleteWorkspaceResponse);
  rpc ListWorkspaces(ListWorkspacesRequest) returns (ListWorkspacesResponse);

  rpc GetWorkspaceListPageData(GetWorkspaceListPageDataRequest) returns (GetWorkspaceListPageDataResponse);
  rpc GetWorkspaceItemPageData(GetWorkspaceItemPageDataRequest) returns (GetWorkspaceItemPageDataResponse);

  rpc SwitchWorkspace(SwitchWorkspaceRequest) returns (SwitchWorkspaceResponse);
  rpc ListUserWorkspaces(ListUserWorkspacesRequest) returns (ListUserWorkspacesResponse);
}

message CreateWorkspaceRequest {
  Workspace data = 1;
}

message CreateWorkspaceResponse {
  repeated Workspace data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadWorkspaceRequest {
  Workspace data = 1;
}

message ReadWorkspaceResponse {
  repeated Workspace data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateWorkspaceRequest {
  Workspace data = 1;
}

message UpdateWorkspaceResponse {
  repeated Workspace data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteWorkspaceRequest {
  Workspace data = 1;
}

message DeleteWorkspaceResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListWorkspacesRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListWorkspacesResponse {
  repeated Workspace data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetWorkspaceListPageDataRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message GetWorkspaceListPageDataResponse {
  repeated Workspace workspace_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetWorkspaceItemPageDataRequest {
  string workspace_id = 1;
}

message GetWorkspaceItemPageDataResponse {
  optional Workspace workspace = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// SwitchWorkspaceRequest — switch the active workspace for a session.
message SwitchWorkspaceRequest {
  string workspace_id = 1;     // Target workspace ID
  string session_token = 2;    // Current session token (from cookie)
}

message SwitchWorkspaceResponse {
  bool success = 1;
  optional string workspace_user_id = 2;  // The resolved workspace_user.id
  optional string workspace_name = 3;     // The workspace name for UI confirmation
  optional domain.common.v1.Error error = 4;
}

// ListUserWorkspacesRequest — list workspaces accessible to the current user.
message ListUserWorkspacesRequest {
  string user_id = 1;
}

message UserWorkspace {
  string workspace_id = 1;
  string workspace_name = 2;
  string workspace_user_id = 3;  // The workspace_user.id for this user+workspace
  bool is_current = 4;           // Whether this is the currently active workspace
}

message ListUserWorkspacesResponse {
  repeated UserWorkspace workspaces = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}