syntax = "proto3";

package domain.entity.v1;

option go_package = "github.com/erniealice/esqyma/pkg/schema/v1/domain/entity/client_workspace_user";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";
import "options/db.proto";

// ClientWorkspaceUser binds a workspace_user to a client account (the account
// team). It is the composite-FK target that subscription_workspace_user
// constrains against (project servicers must be a subset of the account team).
message ClientWorkspaceUser {
  option (options.v1.table).table = true;

  string id = 1;
  optional int64 date_created = 2;
  optional string date_created_string = 3 [(options.v1.db).ignore = true];
  optional int64 date_modified = 4;
  optional string date_modified_string = 5 [(options.v1.db).ignore = true];
  bool active = 6 [(options.v1.db).default = "true"];

  string workspace_id = 7 [(options.v1.db).references = "workspace", (options.v1.db).index = true];
  string client_id = 8 [(options.v1.db).references = "client", (options.v1.db).index = true];
  string workspace_user_id = 9 [(options.v1.db).references = "workspace_user", (options.v1.db).index = true];
  bool is_owner = 10 [(options.v1.db).default = "false"];
}

service ClientWorkspaceUserDomainService {
  rpc CreateClientWorkspaceUser(CreateClientWorkspaceUserRequest) returns (CreateClientWorkspaceUserResponse);
  rpc ReadClientWorkspaceUser(ReadClientWorkspaceUserRequest) returns (ReadClientWorkspaceUserResponse);
  rpc UpdateClientWorkspaceUser(UpdateClientWorkspaceUserRequest) returns (UpdateClientWorkspaceUserResponse);
  rpc DeleteClientWorkspaceUser(DeleteClientWorkspaceUserRequest) returns (DeleteClientWorkspaceUserResponse);
  rpc ListClientWorkspaceUsers(ListClientWorkspaceUsersRequest) returns (ListClientWorkspaceUsersResponse);

  // Enhanced list with pagination, filtering, sorting, search
  rpc GetClientWorkspaceUserListPageData(GetClientWorkspaceUserListPageDataRequest)
    returns (GetClientWorkspaceUserListPageDataResponse);

  // Enhanced item view with related data
  rpc GetClientWorkspaceUserItemPageData(GetClientWorkspaceUserItemPageDataRequest)
    returns (GetClientWorkspaceUserItemPageDataResponse);
}

message CreateClientWorkspaceUserRequest {
  ClientWorkspaceUser data = 1;
}

message CreateClientWorkspaceUserResponse {
  repeated ClientWorkspaceUser data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadClientWorkspaceUserRequest {
  ClientWorkspaceUser data = 1;
}

message ReadClientWorkspaceUserResponse {
  repeated ClientWorkspaceUser data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateClientWorkspaceUserRequest {
  ClientWorkspaceUser data = 1;
}

message UpdateClientWorkspaceUserResponse {
  repeated ClientWorkspaceUser data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteClientWorkspaceUserRequest {
  ClientWorkspaceUser data = 1;
}

message DeleteClientWorkspaceUserResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListClientWorkspaceUsersRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListClientWorkspaceUsersResponse {
  repeated ClientWorkspaceUser data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetClientWorkspaceUserListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetClientWorkspaceUserListPageDataResponse {
  repeated ClientWorkspaceUser client_workspace_user_list = 1;
  domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetClientWorkspaceUserItemPageDataRequest {
  string client_workspace_user_id = 1;
}

message GetClientWorkspaceUserItemPageDataResponse {
  ClientWorkspaceUser client_workspace_user = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
