syntax = "proto3";

package domain.entity.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/entity/supplier_attribute";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "domain/entity/supplier/supplier.proto";
import "domain/common/attribute.proto";
import "options/db.proto";

message SupplierAttribute {
  option (options.v1.table).table = true;
  option (options.v1.table).unique_together = "supplier_id,attribute_id";

  string id = 1;
  string supplier_id = 2 [(options.v1.db).references = "supplier", (options.v1.db).index = true];
  string attribute_id = 3 [(options.v1.db).references = "attribute", (options.v1.db).index = true];
  string value = 4;
  Supplier supplier = 5;
  domain.common.v1.Attribute attribute = 6;
  optional int64 date_created = 7;
  optional string date_created_string = 8;
  optional int64 date_modified = 9;
  optional string date_modified_string = 10;
  bool active = 11 [(options.v1.db).default = "true"];
}

service SupplierAttributeDomainService {
  rpc CreateSupplierAttribute(CreateSupplierAttributeRequest) returns (CreateSupplierAttributeResponse);
  rpc ReadSupplierAttribute(ReadSupplierAttributeRequest) returns (ReadSupplierAttributeResponse);
  rpc UpdateSupplierAttribute(UpdateSupplierAttributeRequest) returns (UpdateSupplierAttributeResponse);
  rpc DeleteSupplierAttribute(DeleteSupplierAttributeRequest) returns (DeleteSupplierAttributeResponse);
  rpc ListSupplierAttributes(ListSupplierAttributesRequest) returns (ListSupplierAttributesResponse);
  rpc GetSupplierAttributeListPageData(GetSupplierAttributeListPageDataRequest)
    returns (GetSupplierAttributeListPageDataResponse);
  rpc GetSupplierAttributeItemPageData(GetSupplierAttributeItemPageDataRequest)
    returns (GetSupplierAttributeItemPageDataResponse);
}

message CreateSupplierAttributeRequest {
  SupplierAttribute data = 1;
}

message CreateSupplierAttributeResponse {
  repeated SupplierAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadSupplierAttributeRequest {
  SupplierAttribute data = 1;
}

message ReadSupplierAttributeResponse {
  repeated SupplierAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateSupplierAttributeRequest {
  SupplierAttribute data = 1;
}

message UpdateSupplierAttributeResponse {
  repeated SupplierAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteSupplierAttributeRequest {
  SupplierAttribute data = 1;
}

message DeleteSupplierAttributeResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListSupplierAttributesRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListSupplierAttributesResponse {
  repeated SupplierAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetSupplierAttributeListPageDataRequest {
  domain.common.v1.PaginationRequest pagination = 1;
  domain.common.v1.FilterRequest filters = 2;
  domain.common.v1.SortRequest sort = 3;
  domain.common.v1.SearchRequest search = 4;
}

message GetSupplierAttributeListPageDataResponse {
  repeated SupplierAttribute supplier_attribute_list = 1;
  domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetSupplierAttributeItemPageDataRequest {
  string supplier_attribute_id = 1;
}

message GetSupplierAttributeItemPageDataResponse {
  SupplierAttribute supplier_attribute = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
