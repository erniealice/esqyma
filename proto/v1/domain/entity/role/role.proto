syntax = "proto3";

package domain.entity.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/entity/role";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "domain/entity/workspace/workspace.proto";
import "domain/entity/role_permission/role_permission.proto";
import "options/db.proto";

message Role {
  option (options.v1.table).table = true;

  string id = 1;
  optional string workspace_id = 2 [(options.v1.db).references = "workspace", (options.v1.db).index = true];
  optional Workspace workspace = 3;
  string name = 4;
  string description = 5;
  string color = 6;
  optional int64 date_created = 7;
  optional string date_created_string = 8;
  optional int64 date_modified = 9;
  optional string date_modified_string = 10;
  bool active = 11 [(options.v1.db).default = "true"];
  repeated RolePermission role_permissions = 12;
}

service RoleDomainService {
  rpc CreateRole(CreateRoleRequest) returns (CreateRoleResponse);
  rpc ReadRole(ReadRoleRequest) returns (ReadRoleResponse);
  rpc UpdateRole(UpdateRoleRequest) returns (UpdateRoleResponse);
  rpc DeleteRole(DeleteRoleRequest) returns (DeleteRoleResponse);
  rpc ListRoles(ListRolesRequest) returns (ListRolesResponse);

  rpc GetRoleListPageData(GetRoleListPageDataRequest) returns (GetRoleListPageDataResponse);
  rpc GetRoleItemPageData(GetRoleItemPageDataRequest) returns (GetRoleItemPageDataResponse);
}

message CreateRoleRequest {
  Role data = 1;
}

message CreateRoleResponse {
  repeated Role data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadRoleRequest {
  Role data = 1;
}

message ReadRoleResponse {
  repeated Role data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateRoleRequest {
  Role data = 1;
}

message UpdateRoleResponse {
  repeated Role data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteRoleRequest {
  Role data = 1;
}

message DeleteRoleResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListRolesRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListRolesResponse {
  repeated Role data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetRoleListPageDataRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message GetRoleListPageDataResponse {
  repeated Role role_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetRoleItemPageDataRequest {
  string role_id = 1;
}

message GetRoleItemPageDataResponse {
  optional Role role = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}