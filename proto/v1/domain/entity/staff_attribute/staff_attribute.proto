syntax = "proto3";

package domain.entity.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/entity/staff_attribute";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "domain/entity/staff/staff.proto";
import "domain/common/attribute.proto";
import "options/db.proto";

message StaffAttribute {
  option (options.v1.table).table = true;
  option (options.v1.table).unique_together = "staff_id,attribute_id";
  string id = 1;
  string staff_id = 2 [(options.v1.db).references = "staff", (options.v1.db).index = true];
  string attribute_id = 3 [(options.v1.db).references = "attribute", (options.v1.db).index = true];
  string value = 4;
  Staff staff = 5;
  domain.common.v1.Attribute attribute = 6;
  optional int64 date_created = 7;
  optional string date_created_string = 8;
  optional int64 date_modified = 9;
  optional string date_modified_string = 10;
  bool active = 11 [(options.v1.db).default = "true"];
}

service StaffAttributeDomainService {
  rpc CreateStaffAttribute(CreateStaffAttributeRequest) returns (CreateStaffAttributeResponse);
  rpc ReadStaffAttribute(ReadStaffAttributeRequest) returns (ReadStaffAttributeResponse);
  rpc UpdateStaffAttribute(UpdateStaffAttributeRequest) returns (UpdateStaffAttributeResponse);
  rpc DeleteStaffAttribute(DeleteStaffAttributeRequest) returns (DeleteStaffAttributeResponse);
  rpc ListStaffAttributes(ListStaffAttributesRequest) returns (ListStaffAttributesResponse);

  // NEW: Enhanced list with pagination, filtering, sorting, search
  rpc GetStaffAttributeListPageData(GetStaffAttributeListPageDataRequest)
    returns (GetStaffAttributeListPageDataResponse);

  // NEW: Enhanced item view with related data
  rpc GetStaffAttributeItemPageData(GetStaffAttributeItemPageDataRequest)
    returns (GetStaffAttributeItemPageDataResponse);
}

message CreateStaffAttributeRequest {
  StaffAttribute data = 1;
}

message CreateStaffAttributeResponse {
  repeated StaffAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadStaffAttributeRequest {
  StaffAttribute data = 1;
}

message ReadStaffAttributeResponse {
  repeated StaffAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateStaffAttributeRequest {
  StaffAttribute data = 1;
}

message UpdateStaffAttributeResponse {
  repeated StaffAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteStaffAttributeRequest {
  StaffAttribute data = 1;
}

message DeleteStaffAttributeResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListStaffAttributesRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListStaffAttributesResponse {
  repeated StaffAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// NEW: Enhanced list request with core features
message GetStaffAttributeListPageDataRequest {
  // Pagination settings
  domain.common.v1.PaginationRequest pagination = 1;

  // Filter conditions
  domain.common.v1.FilterRequest filters = 2;

  // Sort settings
  domain.common.v1.SortRequest sort = 3;

  // Search settings
  domain.common.v1.SearchRequest search = 4;
}

// NEW: Enhanced list response with metadata
message GetStaffAttributeListPageDataResponse {
  // The staff attribute data
  repeated StaffAttribute staff_attribute_list = 1;

  // Pagination metadata
  domain.common.v1.PaginationResponse pagination = 2;

  // Search results metadata (when search is used)
  repeated domain.common.v1.SearchResult search_results = 3;

  // Response status
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

// NEW: Simple item request
message GetStaffAttributeItemPageDataRequest {
  // The staff attribute ID to retrieve
  string staff_attribute_id = 1;
}

// NEW: Simple item response
message GetStaffAttributeItemPageDataResponse {
  // The staff attribute data
  StaffAttribute staff_attribute = 1;

  // Response status
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
