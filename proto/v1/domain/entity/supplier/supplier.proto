syntax = "proto3";

package domain.entity.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/entity/supplier";

import "domain/common/error.proto";
import "domain/common/search.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/pagination.proto";
import "options/db.proto";

import "domain/entity/user/user.proto";
import "domain/entity/supplier_category/supplier_category.proto";
import "domain/entity/payment_term/payment_term.proto";

// FK References: expenditure.supplier_id, asset.supplier_id,
// asset_maintenance.supplier_id, supplier_category.supplier_id,
// supplier_attribute.supplier_id
message Supplier {
  option (options.v1.table).table = true;

  string id = 1;
  optional User user = 2;
  string user_id = 3 [(options.v1.db).references = "user", (options.v1.db).index = true];
  optional int64 date_created = 4;
  optional string date_created_string = 5;
  optional int64 date_modified = 6;
  optional string date_modified_string = 7;
  bool active = 8 [(options.v1.db).default = "true"];
  string internal_id = 9 [(options.v1.db).unique = true];
  optional string category_id = 10 [(options.v1.db).references = "supplier_category"];
  optional SupplierCategory category = 11;
  string supplier_type = 12;                    // "company" or "individual"
  string name = 13;
  optional string tax_id = 14;                  // TIN/VAT/EIN
  optional string registration_number = 15;     // Business registration number
  optional string street_address = 16;
  optional string city = 17;
  optional string province = 18;
  optional string postal_code = 19;
  optional string country = 20;                 // ISO 3166 country code
  optional string billing_currency = 21;        // ISO 4217 currency code — currency this supplier invoices you in
  optional string payment_terms = 22;           // "net_30", "net_60", "2_10_net_30", "immediate"
  optional int32 lead_time_days = 23;           // Default delivery lead time
  optional int64 credit_limit = 24; // centavos            // Maximum outstanding payable
  optional string status = 25;                  // "active", "blocked", "on_hold"
  optional string client_id = 26 [(options.v1.db).references = "client", (options.v1.db).index = true];
  optional string website = 27;
  optional string notes = 28;
  repeated SupplierCategory categories = 29;
  optional string payment_term_id = 30 [(options.v1.db).references = "payment_term"];
  optional PaymentTerm payment_term = 31;
  optional string timezone = 32;                // IANA timezone (e.g. "Asia/Manila")
  // Discriminator: "vendor" (default) | "contractor" | "agency" | "regulator" | "employee".
  // Drives kind-aware permission gating, list filters, and payroll routing
  // (Supplier(kind='employee') is the employee identity primitive).
  optional string kind = 33 [(options.v1.db).index = true];
  // Salary-data privacy hooks (only populated when kind='employee'). Visible only to
  // callers holding payroll:read:compensation permission; redacted by default in
  // ListSuppliers / GetSupplier responses.
  optional string position = 34;
  optional string department = 35;
}

service SupplierDomainService {
  rpc CreateSupplier(CreateSupplierRequest) returns (CreateSupplierResponse);
  rpc ReadSupplier(ReadSupplierRequest) returns (ReadSupplierResponse);
  rpc UpdateSupplier(UpdateSupplierRequest) returns (UpdateSupplierResponse);
  rpc DeleteSupplier(DeleteSupplierRequest) returns (DeleteSupplierResponse);
  rpc ListSuppliers(ListSuppliersRequest) returns (ListSuppliersResponse);
  rpc GetSupplierListPageData(GetSupplierListPageDataRequest) returns (GetSupplierListPageDataResponse);
  rpc GetSupplierItemPageData(GetSupplierItemPageDataRequest) returns (GetSupplierItemPageDataResponse);
}

message CreateSupplierRequest {
  Supplier data = 1;
}

message CreateSupplierResponse {
  repeated Supplier data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadSupplierRequest {
  Supplier data = 1;
}

message ReadSupplierResponse {
  repeated Supplier data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateSupplierRequest {
  Supplier data = 1;
}

message UpdateSupplierResponse {
  repeated Supplier data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteSupplierRequest {
  Supplier data = 1;
}

message DeleteSupplierResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListSuppliersRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListSuppliersResponse {
  repeated Supplier data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetSupplierListPageDataRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message GetSupplierListPageDataResponse {
  repeated Supplier supplier_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetSupplierItemPageDataRequest {
  string supplier_id = 1;
}

message GetSupplierItemPageDataResponse {
  optional Supplier supplier = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
