syntax = "proto3";

package domain.entity.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/entity/staff";

import "domain/common/error.proto";
import "domain/common/search.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/pagination.proto";

import "domain/entity/user/user.proto";
import "options/db.proto";

// EmploymentType is the EMPLOYMENT model on entity/staff (Performance Evaluation §E2;
// Q-EMPLOYMENT-TYPE-1). It is ORTHOGONAL to Staff.status (availability) and is never
// overloaded onto status. The Staff.employment_type column stays `string` (existing-entity
// convention, pairs with `active`); this enum is the canonical value vocabulary.
enum EmploymentType {
  EMPLOYMENT_TYPE_UNSPECIFIED   = 0;
  EMPLOYMENT_TYPE_EMPLOYED      = 1;
  EMPLOYMENT_TYPE_CONTRACTOR    = 2;
  EMPLOYMENT_TYPE_EXTERNAL      = 3;
  EMPLOYMENT_TYPE_PARTNER       = 4;
  EMPLOYMENT_TYPE_RETAINED      = 5;
  EMPLOYMENT_TYPE_SUBCONTRACTOR = 6;
}

message Staff {
  option (options.v1.table).table = true;
  string id = 1;
  optional User user = 2;
  string user_id = 3 [(options.v1.db).references = "user", (options.v1.db).index = true];
  optional int64 date_created = 4;
  optional string date_created_string = 5 [(options.v1.db).ignore = true];
  optional int64 date_modified = 6;
  optional string date_modified_string = 7 [(options.v1.db).ignore = true];
  bool active = 8 [(options.v1.db).default = "true"];

  // Performance Evaluation §E1 — the leased human = Identity. All ADDITIVE + optional
  // (entity/staff is a POPULATED live table; no NOT NULL here). Two orthogonal axes:
  //   * status (existing string) carries AVAILABILITY (available|assigned|bench|offboarded)
  //   * employment_type carries the EMPLOYMENT model (see EmploymentType enum) — never overloaded onto status
  optional string workspace_id     = 9 [(options.v1.db).references = "workspace", (options.v1.db).index = true]; // multi-tenant scope
  optional string status           = 10;  // AVAILABILITY: available|assigned|bench|offboarded (active = status NOT IN {offboarded})
  optional string employment_type  = 11;  // EMPLOYMENT model (string; values from EmploymentType): EMPLOYED|CONTRACTOR|EXTERNAL|PARTNER|RETAINED|SUBCONTRACTOR
  optional string seniority        = 12;  // display snapshot; canonical rank = ProductVariant/ProductOption
  optional string employment_start = 13;  // ISO 8601
  optional string employment_end   = 14;  // ISO 8601 (nil = active)
}

service StaffDomainService {
  rpc CreateStaff(CreateStaffRequest) returns (CreateStaffResponse);
  rpc ReadStaff(ReadStaffRequest) returns (ReadStaffResponse);
  rpc UpdateStaff(UpdateStaffRequest) returns (UpdateStaffResponse);
  rpc DeleteStaff(DeleteStaffRequest) returns (DeleteStaffResponse);
  rpc ListStaffs(ListStaffsRequest) returns (ListStaffsResponse);
  rpc GetStaffListPageData(GetStaffListPageDataRequest) returns (GetStaffListPageDataResponse);
  rpc GetStaffItemPageData(GetStaffItemPageDataRequest) returns (GetStaffItemPageDataResponse);
}

message CreateStaffRequest {
  Staff data = 1;
}

message CreateStaffResponse {
  repeated Staff data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadStaffRequest {
  Staff data = 1;
}

message ReadStaffResponse {
  repeated Staff data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateStaffRequest {
  Staff data = 1;
}

message UpdateStaffResponse {
  repeated Staff data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteStaffRequest {
  Staff data = 1;
}

message DeleteStaffResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListStaffsRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListStaffsResponse {
  repeated Staff data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetStaffListPageDataRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message GetStaffListPageDataResponse {
  repeated Staff staff_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetStaffItemPageDataRequest {
  string staff_id = 1;
}

message GetStaffItemPageDataResponse {
  optional Staff staff = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}