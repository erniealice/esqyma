syntax = "proto3";

package domain.entity.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/entity/user";

import "domain/common/error.proto";
import "domain/common/search.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/pagination.proto";
import "options/db.proto";

message User {
  option (options.v1.table).table = true;

  string id = 1;
  string first_name = 2;
  string last_name = 3;
  string email_address = 4 [(options.v1.db).unique = true];
  string mobile_number = 10 [(options.v1.db).index = true];
  string password_hash = 11;
  optional int64 date_created = 5;
  optional string date_created_string = 6;
  optional int64 date_modified = 7;
  optional string date_modified_string = 8;
  bool active = 9 [(options.v1.db).default = "true"];
}

service UserDomainService {
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc ReadUser(ReadUserRequest) returns (ReadUserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc GetUserListPageData(GetUserListPageDataRequest) returns (GetUserListPageDataResponse);
  rpc GetUserItemPageData(GetUserItemPageDataRequest) returns (GetUserItemPageDataResponse);
}

message CreateUserRequest {
  User data = 1;
}

message CreateUserResponse {
  repeated User data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadUserRequest {
  User data = 1;
}

message ReadUserResponse {
  repeated User data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateUserRequest {
  User data = 1;
}

message UpdateUserResponse {
  repeated User data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteUserRequest {
  User data = 1;
}

message DeleteUserResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListUsersRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListUsersResponse {
  repeated User data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
  optional string next_page_token = 4;
}

message GetUserListPageDataRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message GetUserListPageDataResponse {
  repeated User user_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetUserItemPageDataRequest {
  string user_id = 1;
}

message GetUserItemPageDataResponse {
  optional User user = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}