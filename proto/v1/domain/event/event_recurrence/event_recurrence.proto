syntax = "proto3";

package domain.event.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/event/event_recurrence";

import "domain/common/error.proto";
import "domain/common/search.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/pagination.proto";
import "options/db.proto";

// Defines the recurrence pattern for events.
message EventRecurrence {
  option (options.v1.table).table = true;
  string id = 1;
  string name = 2;
  optional string description = 3;
  string recurrence_pattern = 4; // e.g., "DAILY", "WEEKLY", "MONTHLY", "YEARLY", or RRULE string
  optional int64 date_created = 5;
  optional string date_created_string = 6;
  optional int64 date_modified = 7;
  optional string date_modified_string = 8;
  bool active = 9 [(options.v1.db).default = "true"];
}

service EventRecurrenceDomainService {
  rpc CreateEventRecurrence(CreateEventRecurrenceRequest) returns (CreateEventRecurrenceResponse);
  rpc ReadEventRecurrence(ReadEventRecurrenceRequest) returns (ReadEventRecurrenceResponse);
  rpc UpdateEventRecurrence(UpdateEventRecurrenceRequest) returns (UpdateEventRecurrenceResponse);
  rpc DeleteEventRecurrence(DeleteEventRecurrenceRequest) returns (DeleteEventRecurrenceResponse);
  rpc ListEventRecurrences(ListEventRecurrencesRequest) returns (ListEventRecurrencesResponse);
}

message CreateEventRecurrenceRequest {
  EventRecurrence data = 1;
}

message CreateEventRecurrenceResponse {
  repeated EventRecurrence data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadEventRecurrenceRequest {
  EventRecurrence data = 1;
}

message ReadEventRecurrenceResponse {
  repeated EventRecurrence data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateEventRecurrenceRequest {
  EventRecurrence data = 1;
}

message UpdateEventRecurrenceResponse {
  repeated EventRecurrence data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteEventRecurrenceRequest {
  EventRecurrence data = 1;
}

message DeleteEventRecurrenceResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListEventRecurrencesRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListEventRecurrencesResponse {
  repeated EventRecurrence data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
