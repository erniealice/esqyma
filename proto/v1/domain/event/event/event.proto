syntax = "proto3";

package domain.event.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/event/event";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";
import "domain/event/event_client/event_client.proto";
import "options/db.proto";

message Event {
  option (options.v1.table).table = true;
  string id = 1;
  string name = 2;
  optional string description = 3;
  optional int64 date_created = 4;
  optional string date_created_string = 5;
  optional int64 date_modified = 6;
  optional string date_modified_string = 7;
  bool active = 8 [(options.v1.db).default = "true"];
  int64 start_date_time_utc = 9;
  int64 end_date_time_utc = 10;
  string timezone = 11;
  optional string start_date_time_utc_string = 12;
  optional string end_date_time_utc_string = 13;
  repeated EventClient event_clients = 14;
}

service EventDomainService {
  rpc CreateEvent(CreateEventRequest) returns (CreateEventResponse);
  rpc ReadEvent(ReadEventRequest) returns (ReadEventResponse);
  rpc UpdateEvent(UpdateEventRequest) returns (UpdateEventResponse);
  rpc DeleteEvent(DeleteEventRequest) returns (DeleteEventResponse);
  rpc ListEvents(ListEventsRequest) returns (ListEventsResponse);

  // NEW: Enhanced list with pagination, filtering, sorting, search - optimized for time-based queries
  rpc GetEventListPageData(GetEventListPageDataRequest)
    returns (GetEventListPageDataResponse);

  // NEW: Enhanced item view with related scheduling data
  rpc GetEventItemPageData(GetEventItemPageDataRequest)
    returns (GetEventItemPageDataResponse);
}

message CreateEventRequest {
  Event data = 1;
}

message CreateEventResponse {
  repeated Event data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadEventRequest {
  Event data = 1;
}

message ReadEventResponse {
  repeated Event data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateEventRequest {
  Event data = 1;
}

message UpdateEventResponse {
  repeated Event data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteEventRequest {
  Event data = 1;
}

message DeleteEventResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListEventsRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListEventsResponse {
  repeated Event data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// NEW: Enhanced list page data request with time-based filtering
message GetEventListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

// NEW: Enhanced list page data response with time-based optimization
message GetEventListPageDataResponse {
  repeated Event event_list = 1;
  domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

// NEW: Enhanced item page data request
message GetEventItemPageDataRequest {
  string event_id = 1;
}

// NEW: Enhanced item page data response with related scheduling data
message GetEventItemPageDataResponse {
  Event event = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}