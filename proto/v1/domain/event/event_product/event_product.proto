syntax = "proto3";

package domain.event.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/event/event_product";

import "domain/common/error.proto";
import "domain/common/search.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/pagination.proto";

import "domain/event/event/event.proto";
import "domain/product/product/product.proto";
import "options/db.proto";

message EventProduct {
  option (options.v1.table).table = true;
  option (options.v1.table).unique_together = "event_id,product_id";
  string id = 1;
  optional Event event = 2;
  string event_id = 3 [(options.v1.db).references = "event", (options.v1.db).index = true];
  optional domain.product.v1.Product product = 4;
  string product_id = 5 [(options.v1.db).references = "product", (options.v1.db).index = true];
  optional int64 date_created = 6;
  optional string date_created_string = 7;
  optional int64 date_modified = 8;
  optional string date_modified_string = 9;
  bool active = 10 [(options.v1.db).default = "true"];
  optional int32 quantity = 11;
  optional double unit_price = 12;
  optional string currency = 13;
  optional double total_price = 14;
  optional string notes = 15;
}

service EventProductDomainService {
  rpc CreateEventProduct(CreateEventProductRequest) returns (CreateEventProductResponse);
  rpc ReadEventProduct(ReadEventProductRequest) returns (ReadEventProductResponse);
  rpc UpdateEventProduct(UpdateEventProductRequest) returns (UpdateEventProductResponse);
  rpc DeleteEventProduct(DeleteEventProductRequest) returns (DeleteEventProductResponse);
  rpc ListEventProducts(ListEventProductsRequest) returns (ListEventProductsResponse);
}

message CreateEventProductRequest {
  EventProduct data = 1;
}

message CreateEventProductResponse {
  repeated EventProduct data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadEventProductRequest {
  EventProduct data = 1;
}

message ReadEventProductResponse {
  repeated EventProduct data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateEventProductRequest {
  EventProduct data = 1;
}

message UpdateEventProductResponse {
  repeated EventProduct data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteEventProductRequest {
  EventProduct data = 1;
}

message DeleteEventProductResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListEventProductsRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListEventProductsResponse {
  repeated EventProduct data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}