syntax = "proto3";

package domain.asset.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/asset/asset_maintenance";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "options/db.proto";

// MaintenanceType categorizes the kind of maintenance work.
enum MaintenanceType {
  MAINTENANCE_TYPE_UNSPECIFIED = 0;
  MAINTENANCE_TYPE_PREVENTIVE = 1;
  MAINTENANCE_TYPE_CORRECTIVE = 2;
  MAINTENANCE_TYPE_INSPECTION = 3;
  MAINTENANCE_TYPE_CALIBRATION = 4;
  MAINTENANCE_TYPE_OVERHAUL = 5;
}

// MaintenanceStatus tracks the progress of a maintenance event.
enum MaintenanceStatus {
  MAINTENANCE_STATUS_UNSPECIFIED = 0;
  MAINTENANCE_STATUS_SCHEDULED = 1;
  MAINTENANCE_STATUS_IN_PROGRESS = 2;
  MAINTENANCE_STATUS_COMPLETED = 3;
  MAINTENANCE_STATUS_CANCELLED = 4;
  MAINTENANCE_STATUS_OVERDUE = 5;
}

// MaintenancePriority indicates urgency of the maintenance work.
enum MaintenancePriority {
  MAINTENANCE_PRIORITY_UNSPECIFIED = 0;
  MAINTENANCE_PRIORITY_LOW = 1;
  MAINTENANCE_PRIORITY_MEDIUM = 2;
  MAINTENANCE_PRIORITY_HIGH = 3;
  MAINTENANCE_PRIORITY_CRITICAL = 4;
}

message AssetMaintenance {
  option (options.v1.table).table = true;
  string id = 1;
  string asset_id = 2 [(options.v1.db).references = "asset", (options.v1.db).index = true];
  MaintenanceType maintenance_type = 3;
  MaintenancePriority priority = 4;
  MaintenanceStatus status = 5;
  optional string scheduled_date = 6; // ISO 8601 date (YYYY-MM-DD)
  reserved 7; // was scheduled_date_string
  optional string start_date = 8; // ISO 8601 date (YYYY-MM-DD)
  reserved 9; // was start_date_string
  optional string completion_date = 10; // ISO 8601 date (YYYY-MM-DD)
  reserved 11; // was completion_date_string
  optional string description = 12;
  optional int64 cost = 13; // centavos
  bool is_capitalized = 14;
  optional string performed_by = 15;
  optional string vendor_id = 16;        // FK to entity.Client
  optional string work_order_number = 17;
  optional string next_maintenance_date = 18; // ISO 8601 date (YYYY-MM-DD)
  reserved 19; // was next_maintenance_date_string
  optional int32 recurrence_interval_days = 20;
  optional string notes = 21;

  // Audit fields
  optional int64 date_created = 22;
  optional string date_created_string = 23;
  optional int64 date_modified = 24;
  optional string date_modified_string = 25;
  bool active = 26 [(options.v1.db).default = "true"];
}

service AssetMaintenanceDomainService {
  rpc CreateAssetMaintenance(CreateAssetMaintenanceRequest) returns (CreateAssetMaintenanceResponse);
  rpc ReadAssetMaintenance(ReadAssetMaintenanceRequest) returns (ReadAssetMaintenanceResponse);
  rpc UpdateAssetMaintenance(UpdateAssetMaintenanceRequest) returns (UpdateAssetMaintenanceResponse);
  rpc DeleteAssetMaintenance(DeleteAssetMaintenanceRequest) returns (DeleteAssetMaintenanceResponse);
  rpc ListAssetMaintenances(ListAssetMaintenancesRequest) returns (ListAssetMaintenancesResponse);

  // Enhanced page data (for UI views)
  rpc GetAssetMaintenanceListPageData(GetAssetMaintenanceListPageDataRequest)
    returns (GetAssetMaintenanceListPageDataResponse);

  rpc GetAssetMaintenanceItemPageData(GetAssetMaintenanceItemPageDataRequest)
    returns (GetAssetMaintenanceItemPageDataResponse);
}

message CreateAssetMaintenanceRequest {
  AssetMaintenance data = 1;
}

message CreateAssetMaintenanceResponse {
  repeated AssetMaintenance data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadAssetMaintenanceRequest {
  AssetMaintenance data = 1;
}

message ReadAssetMaintenanceResponse {
  repeated AssetMaintenance data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateAssetMaintenanceRequest {
  AssetMaintenance data = 1;
}

message UpdateAssetMaintenanceResponse {
  repeated AssetMaintenance data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteAssetMaintenanceRequest {
  AssetMaintenance data = 1;
}

message DeleteAssetMaintenanceResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListAssetMaintenancesRequest {
  optional string asset_id = 1;
  optional domain.common.v1.SearchRequest search = 2;
  optional domain.common.v1.FilterRequest filters = 3;
  optional domain.common.v1.SortRequest sort = 4;
  optional domain.common.v1.PaginationRequest pagination = 5;
}

message ListAssetMaintenancesResponse {
  repeated AssetMaintenance data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetAssetMaintenanceListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetAssetMaintenanceListPageDataResponse {
  repeated AssetMaintenance asset_maintenance_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetAssetMaintenanceItemPageDataRequest {
  string asset_maintenance_id = 1;
}

message GetAssetMaintenanceItemPageDataResponse {
  optional AssetMaintenance asset_maintenance = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
