syntax = "proto3";

package domain.asset.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/asset/asset_revaluation";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "options/db.proto";

message AssetRevaluation {
  option (options.v1.table).table = true;
  string id = 1;
  string asset_id = 2 [(options.v1.db).references = "asset", (options.v1.db).index = true];
  string revaluation_date = 3; // ISO 8601 date (YYYY-MM-DD)
  reserved 4; // was revaluation_date_string
  int64 previous_carrying_amount = 5; // centavos
  int64 new_fair_value = 6; // centavos
  int64 revaluation_amount = 7; // centavos
  bool is_increase = 8;
  int64 recognized_in_pnl = 9; // centavos
  int64 recognized_in_oci = 10; // centavos
  int64 revaluation_surplus_balance = 11; // centavos
  optional string appraiser_name = 12;
  optional string valuation_method = 13;  // Market comparison, income approach, replacement cost
  optional string journal_entry_id = 14;  // FK to ledger.Journal (future)
  optional string notes = 15;

  // Audit fields
  optional int64 date_created = 16;
  optional string date_created_string = 17 [(options.v1.db).ignore = true];
  optional int64 date_modified = 18;
  optional string date_modified_string = 19 [(options.v1.db).ignore = true];
  bool active = 20 [(options.v1.db).default = "true"];
}

service AssetRevaluationDomainService {
  rpc CreateAssetRevaluation(CreateAssetRevaluationRequest) returns (CreateAssetRevaluationResponse);
  rpc ReadAssetRevaluation(ReadAssetRevaluationRequest) returns (ReadAssetRevaluationResponse);
  rpc UpdateAssetRevaluation(UpdateAssetRevaluationRequest) returns (UpdateAssetRevaluationResponse);
  rpc DeleteAssetRevaluation(DeleteAssetRevaluationRequest) returns (DeleteAssetRevaluationResponse);
  rpc ListAssetRevaluations(ListAssetRevaluationsRequest) returns (ListAssetRevaluationsResponse);

  // Enhanced page data (for UI views)
  rpc GetAssetRevaluationListPageData(GetAssetRevaluationListPageDataRequest)
    returns (GetAssetRevaluationListPageDataResponse);

  rpc GetAssetRevaluationItemPageData(GetAssetRevaluationItemPageDataRequest)
    returns (GetAssetRevaluationItemPageDataResponse);
}

message CreateAssetRevaluationRequest {
  AssetRevaluation data = 1;
}

message CreateAssetRevaluationResponse {
  repeated AssetRevaluation data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadAssetRevaluationRequest {
  AssetRevaluation data = 1;
}

message ReadAssetRevaluationResponse {
  repeated AssetRevaluation data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateAssetRevaluationRequest {
  AssetRevaluation data = 1;
}

message UpdateAssetRevaluationResponse {
  repeated AssetRevaluation data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteAssetRevaluationRequest {
  AssetRevaluation data = 1;
}

message DeleteAssetRevaluationResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListAssetRevaluationsRequest {
  optional string asset_id = 1;
  optional domain.common.v1.SearchRequest search = 2;
  optional domain.common.v1.FilterRequest filters = 3;
  optional domain.common.v1.SortRequest sort = 4;
  optional domain.common.v1.PaginationRequest pagination = 5;
}

message ListAssetRevaluationsResponse {
  repeated AssetRevaluation data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetAssetRevaluationListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetAssetRevaluationListPageDataResponse {
  repeated AssetRevaluation asset_revaluation_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetAssetRevaluationItemPageDataRequest {
  string asset_revaluation_id = 1;
}

message GetAssetRevaluationItemPageDataResponse {
  optional AssetRevaluation asset_revaluation = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// Use-case messages (consumed by espyna use cases, not bound to an RPC).
// NOTE: RevalueAssetRequest/Response are already defined in asset/asset.proto
// for the repo-level CRUD RPC, so use-case messages use the UseCaseRequest suffix.

// RevalueAssetUseCaseRequest is the input to the IAS 16 revaluation use case.
message RevalueAssetUseCaseRequest {
  string asset_id = 1;
  int64 new_fair_value = 2;       // centavos
  optional string appraiser_name = 3;
  optional string valuation_method = 4;
  optional string notes = 5;
}

// RevalueAssetUseCaseResponse is the output of the IAS 16 revaluation use case.
message RevalueAssetUseCaseResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
  optional AssetRevaluation revaluation = 3;
  // asset_transaction_id surfaces the FK back-ref without requiring a
  // cross-package import of asset_transaction.proto.
  optional string asset_transaction_id = 4;
}

// PreviewRevaluationUseCaseRequest is the input to the read-only preview use case.
message PreviewRevaluationUseCaseRequest {
  string asset_id = 1;
  int64 new_fair_value = 2;   // centavos
}

// PreviewRevaluationUseCaseResponse is the predicted IAS 16.39-40 split.
message PreviewRevaluationUseCaseResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
  int64 previous_carrying_amount = 3;   // centavos
  int64 new_fair_value = 4;             // centavos
  int64 revaluation_amount = 5;         // signed; positive=up, negative=down
  bool is_increase = 6;
  int64 recognized_in_pnl = 7;          // signed centavos
  int64 recognized_in_oci = 8;          // signed centavos
  int64 new_surplus_balance = 9;        // centavos
  int64 prior_surplus_balance = 10;
  int64 prior_pnl_loss_balance = 11;
}
