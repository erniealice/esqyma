syntax = "proto3";

package domain.tax.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/tax/tax_authority";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";
import "options/db.proto";

message TaxAuthority {
  option (options.v1.table).table = true;

  string id = 1;
  optional int64 date_created = 2;
  optional string date_created_string = 3;
  optional int64 date_modified = 4;
  optional string date_modified_string = 5;
  bool active = 6 [(options.v1.db).default = "true"];

  // Short unique code used in rate lookups (e.g. "BIR", "HMRC", "IRS")
  string code = 7 [(options.v1.db).unique = true];
  string name = 8;
  // ISO 3166-1 alpha-2 country code (e.g. "PH", "GB", "US")
  string country_code = 9;
  // Jurisdiction scope this authority governs (e.g. "PH-NATIONAL", "UK", "US-CA")
  string jurisdiction = 10;
}

service TaxAuthorityDomainService {
  rpc ReadTaxAuthority(ReadTaxAuthorityRequest) returns (ReadTaxAuthorityResponse);
  rpc ListTaxAuthorities(ListTaxAuthoritiesRequest) returns (ListTaxAuthoritiesResponse);
  rpc GetTaxAuthorityListPageData(GetTaxAuthorityListPageDataRequest) returns (GetTaxAuthorityListPageDataResponse);
  rpc GetTaxAuthorityItemPageData(GetTaxAuthorityItemPageDataRequest) returns (GetTaxAuthorityItemPageDataResponse);
}

message ReadTaxAuthorityRequest {
  TaxAuthority data = 1;
}

message ReadTaxAuthorityResponse {
  repeated TaxAuthority data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ListTaxAuthoritiesRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListTaxAuthoritiesResponse {
  repeated TaxAuthority data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetTaxAuthorityListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetTaxAuthorityListPageDataResponse {
  repeated TaxAuthority tax_authority_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetTaxAuthorityItemPageDataRequest {
  string tax_authority_id = 1;
}

message GetTaxAuthorityItemPageDataResponse {
  optional TaxAuthority tax_authority = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
