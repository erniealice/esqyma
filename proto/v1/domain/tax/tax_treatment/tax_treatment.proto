syntax = "proto3";

package domain.tax.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/tax/tax_treatment";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";
import "options/db.proto";

// TaxTreatment — jurisdiction-agnostic taxability category for a product.
// The same STANDARD code resolves to 12% in PH, 20% in UK, 19% in DE, etc.
// Rows are seed-only (no operator CRUD in v1).
message TaxTreatment {
  option (options.v1.table).table = true;

  string id = 1;
  optional int64 date_created = 2;
  optional string date_created_string = 3;
  optional int64 date_modified = 4;
  optional string date_modified_string = 5;
  bool active = 6 [(options.v1.db).default = "true"];

  // Short unique code: STANDARD, REDUCED, ZERO_RATED, EXEMPT, OUT_OF_SCOPE
  string code = 7 [(options.v1.db).unique = true];
  string name = 8;
  optional string description = 9;
}

service TaxTreatmentDomainService {
  rpc ReadTaxTreatment(ReadTaxTreatmentRequest) returns (ReadTaxTreatmentResponse);
  rpc ListTaxTreatments(ListTaxTreatmentsRequest) returns (ListTaxTreatmentsResponse);
  rpc GetTaxTreatmentListPageData(GetTaxTreatmentListPageDataRequest) returns (GetTaxTreatmentListPageDataResponse);
  rpc GetTaxTreatmentItemPageData(GetTaxTreatmentItemPageDataRequest) returns (GetTaxTreatmentItemPageDataResponse);
}

message ReadTaxTreatmentRequest {
  TaxTreatment data = 1;
}

message ReadTaxTreatmentResponse {
  repeated TaxTreatment data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ListTaxTreatmentsRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListTaxTreatmentsResponse {
  repeated TaxTreatment data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetTaxTreatmentListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetTaxTreatmentListPageDataResponse {
  repeated TaxTreatment tax_treatment_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetTaxTreatmentItemPageDataRequest {
  string tax_treatment_id = 1;
}

message GetTaxTreatmentItemPageDataResponse {
  optional TaxTreatment tax_treatment = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
