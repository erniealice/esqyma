syntax = "proto3";

package domain.communication.v1;

option go_package = "github.com/erniealice/esqyma/pkg/schema/v1/domain/communication/conversation_post";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";
import "options/db.proto";

// SenderPrincipalType identifies the principal class that authored a post
// (proto ENUM — Q-MSG-13 / directive G — NOT string). DB pins via
// CHECK (sender_principal_type IN ('client','staff')).
enum SenderPrincipalType {
  SENDER_PRINCIPAL_TYPE_UNSPECIFIED = 0;
  SENDER_PRINCIPAL_TYPE_CLIENT = 1;
  SENDER_PRINCIPAL_TYPE_STAFF = 2;
}

// ConversationSourceType identifies the ingress channel of a post
// (proto ENUM — Q-MSG-10 / directive G — NOT string). DB pins via
// CHECK (source_type IN ('portal','email')).
enum ConversationSourceType {
  CONVERSATION_SOURCE_TYPE_UNSPECIFIED = 0;
  CONVERSATION_SOURCE_TYPE_PORTAL = 1;  // v1
  CONVERSATION_SOURCE_TYPE_EMAIL = 2;   // v2 seam — inbound email reply (Q-MSG-10)
}

// ConversationPost is the thread child (NEVER "Message" — protobuf reserved word).
message ConversationPost {
  option (options.v1.table).table = true;

  string id = 1;
  optional int64 date_created = 2;
  optional string date_created_string = 3 [(options.v1.db).ignore = true];
  optional int64 date_modified = 4;
  optional string date_modified_string = 5 [(options.v1.db).ignore = true];
  bool active = 6 [(options.v1.db).default = "true"];

  string conversation_id = 7 [(options.v1.db).references = "conversation", (options.v1.db).index = true];
  string workspace_id = 8 [(options.v1.db).index = true];   // denorm — copied from parent at create (directive H); workspace-scoped post queries w/o join
  string client_id = 9 [(options.v1.db).references = "client", (options.v1.db).index = true]; // denorm from parent — IDOR belt-and-suspenders
  SenderPrincipalType sender_principal_type = 10;               // proto ENUM (Q-MSG-13 / directive G — NOT string)
  string sender_principal_id = 11;                             // principal/grant binding id (Q-MSG-13 / codex H1 — beyond user_id)
  string sender_user_id = 12 [(options.v1.db).references = "user"];
  string body = 13;                                            // post text — rendered TEXT-ONLY, NEVER template.HTML/safeHTML (XSS invariant; redteam N)
  ConversationSourceType source_type = 14;                     // proto ENUM (Q-MSG-10 / directive G — NOT string): PORTAL (v1) | EMAIL (v2 seam)
  optional string client_token = 15 [(options.v1.db).index = true]; // idempotency key (Q-MSG-7); REQUIRED non-empty for portal/composer posts
  optional int64 sent_at = 16 [(options.v1.db).index = true];
  // Attachments via document.Attachment: module_key="conversation_post", foreign_key=<this.id> (Q-MSG-4)
}

service ConversationPostDomainService {
  rpc CreateConversationPost(CreateConversationPostRequest) returns (CreateConversationPostResponse);
  rpc ReadConversationPost(ReadConversationPostRequest) returns (ReadConversationPostResponse);
  rpc UpdateConversationPost(UpdateConversationPostRequest) returns (UpdateConversationPostResponse);
  rpc DeleteConversationPost(DeleteConversationPostRequest) returns (DeleteConversationPostResponse);
  rpc ListConversationPosts(ListConversationPostsRequest) returns (ListConversationPostsResponse);

  // Enhanced list with pagination, filtering, sorting, search
  rpc GetConversationPostListPageData(GetConversationPostListPageDataRequest)
    returns (GetConversationPostListPageDataResponse);

  // Enhanced item view
  rpc GetConversationPostItemPageData(GetConversationPostItemPageDataRequest)
    returns (GetConversationPostItemPageDataResponse);
}

message CreateConversationPostRequest {
  ConversationPost data = 1;
}

message CreateConversationPostResponse {
  repeated ConversationPost data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadConversationPostRequest {
  ConversationPost data = 1;
}

message ReadConversationPostResponse {
  repeated ConversationPost data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateConversationPostRequest {
  ConversationPost data = 1;
}

message UpdateConversationPostResponse {
  repeated ConversationPost data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteConversationPostRequest {
  ConversationPost data = 1;
}

message DeleteConversationPostResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListConversationPostsRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListConversationPostsResponse {
  repeated ConversationPost data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetConversationPostListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetConversationPostListPageDataResponse {
  repeated ConversationPost conversation_post_list = 1;
  domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetConversationPostItemPageDataRequest {
  string conversation_post_id = 1;
}

message GetConversationPostItemPageDataResponse {
  ConversationPost conversation_post = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
