syntax = "proto3";

package domain.communication.v1;

option go_package = "github.com/erniealice/esqyma/pkg/schema/v1/domain/communication/conversation_read_receipt";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";
import "options/db.proto";

// ConversationReadReceipt is the per-reader-principal unread high-water mark.
// One receipt per reader PRINCIPAL per conversation (Q-MSG-12).
// UNIQUE(conversation_id, reader_principal_type, reader_principal_id) is enforced at the DB.
message ConversationReadReceipt {
  option (options.v1.table).table = true;

  string id = 1;
  optional int64 date_created = 2;
  optional int64 date_modified = 4;
  bool active = 6 [(options.v1.db).default = "true"];

  string conversation_id = 7 [(options.v1.db).references = "conversation", (options.v1.db).index = true];
  string reader_principal_type = 8;                            // principal-scoped reader (Q-MSG-12 / codex H1)
  string reader_principal_id = 9;                              // binding/grant id of the reader principal
  string user_id = 10 [(options.v1.db).references = "user", (options.v1.db).index = true];
  string workspace_id = 11 [(options.v1.db).index = true];     // directive H — copied from parent
  optional string last_read_post_id = 12 [(options.v1.db).references = "conversation_post"]; // THE single monotonic cursor (Q-MSG-12)
  optional int64 last_read_at = 13;                            // DISPLAY-ONLY denorm; NOT the unread comparison key
  // UNIQUE(conversation_id, reader_principal_type, reader_principal_id) — one receipt per reader PRINCIPAL per conversation (Q-MSG-12)
}

service ConversationReadReceiptDomainService {
  rpc CreateConversationReadReceipt(CreateConversationReadReceiptRequest) returns (CreateConversationReadReceiptResponse);
  rpc ReadConversationReadReceipt(ReadConversationReadReceiptRequest) returns (ReadConversationReadReceiptResponse);
  rpc UpdateConversationReadReceipt(UpdateConversationReadReceiptRequest) returns (UpdateConversationReadReceiptResponse);
  rpc DeleteConversationReadReceipt(DeleteConversationReadReceiptRequest) returns (DeleteConversationReadReceiptResponse);
  rpc ListConversationReadReceipts(ListConversationReadReceiptsRequest) returns (ListConversationReadReceiptsResponse);

  // Enhanced list with pagination, filtering, sorting, search
  rpc GetConversationReadReceiptListPageData(GetConversationReadReceiptListPageDataRequest)
    returns (GetConversationReadReceiptListPageDataResponse);

  // Enhanced item view
  rpc GetConversationReadReceiptItemPageData(GetConversationReadReceiptItemPageDataRequest)
    returns (GetConversationReadReceiptItemPageDataResponse);
}

message CreateConversationReadReceiptRequest {
  ConversationReadReceipt data = 1;
}

message CreateConversationReadReceiptResponse {
  repeated ConversationReadReceipt data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadConversationReadReceiptRequest {
  ConversationReadReceipt data = 1;
}

message ReadConversationReadReceiptResponse {
  repeated ConversationReadReceipt data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateConversationReadReceiptRequest {
  ConversationReadReceipt data = 1;
}

message UpdateConversationReadReceiptResponse {
  repeated ConversationReadReceipt data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteConversationReadReceiptRequest {
  ConversationReadReceipt data = 1;
}

message DeleteConversationReadReceiptResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListConversationReadReceiptsRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListConversationReadReceiptsResponse {
  repeated ConversationReadReceipt data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetConversationReadReceiptListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetConversationReadReceiptListPageDataResponse {
  repeated ConversationReadReceipt conversation_read_receipt_list = 1;
  domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetConversationReadReceiptItemPageDataRequest {
  string conversation_read_receipt_id = 1;
}

message GetConversationReadReceiptItemPageDataResponse {
  ConversationReadReceipt conversation_read_receipt = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
