syntax = "proto3";

package domain.communication.v1;

option go_package = "github.com/erniealice/esqyma/pkg/schema/v1/domain/communication/conversation";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";
import "options/db.proto";

// ConversationStatus represents the lifecycle state of a conversation / ticket.
// Re-openable: CLOSED -> OPEN allowed (Q-MSG-6). The DB pins this domain via a
// CHECK constraint (status IN ('open','in_progress','resolved','closed')).
enum ConversationStatus {
  CONVERSATION_STATUS_UNSPECIFIED = 0;
  CONVERSATION_STATUS_OPEN = 1;
  CONVERSATION_STATUS_IN_PROGRESS = 2;
  CONVERSATION_STATUS_RESOLVED = 3;
  CONVERSATION_STATUS_CLOSED = 4;   // re-openable: CLOSED -> OPEN allowed (Q-MSG-6)
}

// Conversation is the thread header / ticket aggregate for the communication domain.
message Conversation {
  option (options.v1.table).table = true;

  string id = 1;
  optional int64 date_created = 2;
  optional string date_created_string = 3 [(options.v1.db).ignore = true];
  optional int64 date_modified = 4;
  optional string date_modified_string = 5 [(options.v1.db).ignore = true];
  bool active = 6 [(options.v1.db).default = "true"];

  string workspace_id = 7 [(options.v1.db).references = "workspace", (options.v1.db).index = true];
  string client_id = 8 [(options.v1.db).references = "client", (options.v1.db).index = true];
  // ^ DENORMALIZED for the IDOR gate; stamped from session.acting_as_client_id at create; NEVER from form (Q-MSG-5)
  // ^ workspace_id + client_id are the IDOR anchors -> NOT NULL from CREATE TABLE + CHECK(<> '') (directive F)
  string subject = 9;
  ConversationStatus status = 10;                                 // proto ENUM (Q-MSG-6 / directive G — NOT string)
  optional string assigned_to_user_id = 11 [(options.v1.db).references = "user", (options.v1.db).index = true];  // Q-MSG-11
  optional string reference_entity_type = 12;                     // "request" | "invoice" | ... ALLOWLIST CHECK (Q-MSG-14)
  optional string reference_entity_id = 13 [(options.v1.db).index = true];  // soft ref v1; hard FK when Plan-1 lands
  string created_by_user_id = 14 [(options.v1.db).references = "user"];
  optional int64 last_post_at = 15 [(options.v1.db).index = true]; // denorm: drives inbox sort + "2h" timestamps
  optional int64 sla_due_at = 16;                                 // nullable; forward-compat for response-SLA (v2)
}

service ConversationDomainService {
  rpc CreateConversation(CreateConversationRequest) returns (CreateConversationResponse);
  rpc ReadConversation(ReadConversationRequest) returns (ReadConversationResponse);
  rpc UpdateConversation(UpdateConversationRequest) returns (UpdateConversationResponse);
  rpc DeleteConversation(DeleteConversationRequest) returns (DeleteConversationResponse);
  rpc ListConversations(ListConversationsRequest) returns (ListConversationsResponse);

  // Enhanced list with pagination, filtering, sorting, search
  rpc GetConversationListPageData(GetConversationListPageDataRequest)
    returns (GetConversationListPageDataResponse);

  // Enhanced item view with related thread data
  rpc GetConversationItemPageData(GetConversationItemPageDataRequest)
    returns (GetConversationItemPageDataResponse);
}

message CreateConversationRequest {
  Conversation data = 1;
}

message CreateConversationResponse {
  repeated Conversation data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadConversationRequest {
  Conversation data = 1;
}

message ReadConversationResponse {
  repeated Conversation data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateConversationRequest {
  Conversation data = 1;
}

message UpdateConversationResponse {
  repeated Conversation data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteConversationRequest {
  Conversation data = 1;
}

message DeleteConversationResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListConversationsRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListConversationsResponse {
  repeated Conversation data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetConversationListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetConversationListPageDataResponse {
  repeated Conversation conversation_list = 1;
  domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetConversationItemPageDataRequest {
  string conversation_id = 1;
}

message GetConversationItemPageDataResponse {
  Conversation conversation = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
