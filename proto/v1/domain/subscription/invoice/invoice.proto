syntax = "proto3";

package domain.subscription.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/subscription/invoice";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "domain/subscription/subscription/subscription.proto";
import "options/db.proto";

message Invoice {
  option (options.v1.table).table = true;
  string id = 1;
  string invoice_number = 2;
  int64 amount = 3; // centavos
  optional int64 date_created = 4;
  optional string date_created_string = 5;
  optional int64 date_modified = 6;
  optional string date_modified_string = 7;
  bool active = 8 [(options.v1.db).default = "true"];
  optional Subscription subscription = 9;
  string subscription_id = 10 [(options.v1.db).references = "subscription", (options.v1.db).index = true];
}

service InvoiceDomainService {
  rpc CreateInvoice(CreateInvoiceRequest) returns (CreateInvoiceResponse);
  rpc ReadInvoice(ReadInvoiceRequest) returns (ReadInvoiceResponse);
  rpc UpdateInvoice(UpdateInvoiceRequest) returns (UpdateInvoiceResponse);
  rpc DeleteInvoice(DeleteInvoiceRequest) returns (DeleteInvoiceResponse);
  rpc ListInvoices(ListInvoicesRequest) returns (ListInvoicesResponse);

  // NEW: Enhanced list with pagination, filtering, sorting, search
  rpc GetInvoiceListPageData(GetInvoiceListPageDataRequest)
    returns (GetInvoiceListPageDataResponse);

  // NEW: Enhanced item view with related data
  rpc GetInvoiceItemPageData(GetInvoiceItemPageDataRequest)
    returns (GetInvoiceItemPageDataResponse);
}

message CreateInvoiceRequest {
  Invoice data = 1;
}

message CreateInvoiceResponse {
  repeated Invoice data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadInvoiceRequest {
  Invoice data = 1;
}

message ReadInvoiceResponse {
  repeated Invoice data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateInvoiceRequest {
  Invoice data = 1;
}

message UpdateInvoiceResponse {
  repeated Invoice data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteInvoiceRequest {
  Invoice data = 1;
}

message DeleteInvoiceResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListInvoicesRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListInvoicesResponse {
  repeated Invoice data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// NEW: Enhanced list page data request with pagination, filtering, sorting, search
message GetInvoiceListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetInvoiceListPageDataResponse {
  repeated Invoice invoice_list = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
  optional domain.common.v1.PaginationResponse pagination = 4;
  repeated domain.common.v1.SearchResult search_results = 5;
}

// NEW: Enhanced item page data request
message GetInvoiceItemPageDataRequest {
  string invoice_id = 1;
}

message GetInvoiceItemPageDataResponse {
  optional Invoice invoice = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}