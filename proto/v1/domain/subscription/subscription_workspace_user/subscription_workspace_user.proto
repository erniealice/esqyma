syntax = "proto3";

package domain.subscription.v1;

option go_package = "github.com/erniealice/esqyma/pkg/schema/v1/domain/subscription/subscription_workspace_user";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";
import "options/db.proto";

// SubscriptionWorkspaceUser binds a workspace_user to a subscription (the
// project servicing team). client_id is denormalized so the composite FK
// (client_id, workspace_user_id) -> client_workspace_user can enforce the
// fail-closed rule: project servicers must be a subset of the account team.
// client_id therefore carries NO `references` annotation here — it is part of
// the composite FK enforced in SQL, not a standalone FK.
message SubscriptionWorkspaceUser {
  option (options.v1.table).table = true;

  string id = 1;
  optional int64 date_created = 2;
  optional string date_created_string = 3 [(options.v1.db).ignore = true];
  optional int64 date_modified = 4;
  optional string date_modified_string = 5 [(options.v1.db).ignore = true];
  bool active = 6 [(options.v1.db).default = "true"];

  string workspace_id = 7 [(options.v1.db).references = "workspace", (options.v1.db).index = true];
  string subscription_id = 8 [(options.v1.db).references = "subscription", (options.v1.db).index = true];
  // Denormalized — NO standalone FK; part of the composite FK enforced in SQL.
  string client_id = 9;
  string workspace_user_id = 10 [(options.v1.db).references = "workspace_user", (options.v1.db).index = true];
  bool is_owner = 11 [(options.v1.db).default = "false"];
}

service SubscriptionWorkspaceUserDomainService {
  rpc CreateSubscriptionWorkspaceUser(CreateSubscriptionWorkspaceUserRequest) returns (CreateSubscriptionWorkspaceUserResponse);
  rpc ReadSubscriptionWorkspaceUser(ReadSubscriptionWorkspaceUserRequest) returns (ReadSubscriptionWorkspaceUserResponse);
  rpc UpdateSubscriptionWorkspaceUser(UpdateSubscriptionWorkspaceUserRequest) returns (UpdateSubscriptionWorkspaceUserResponse);
  rpc DeleteSubscriptionWorkspaceUser(DeleteSubscriptionWorkspaceUserRequest) returns (DeleteSubscriptionWorkspaceUserResponse);
  rpc ListSubscriptionWorkspaceUsers(ListSubscriptionWorkspaceUsersRequest) returns (ListSubscriptionWorkspaceUsersResponse);

  // Enhanced list with pagination, filtering, sorting, search
  rpc GetSubscriptionWorkspaceUserListPageData(GetSubscriptionWorkspaceUserListPageDataRequest)
    returns (GetSubscriptionWorkspaceUserListPageDataResponse);

  // Enhanced item view with related data
  rpc GetSubscriptionWorkspaceUserItemPageData(GetSubscriptionWorkspaceUserItemPageDataRequest)
    returns (GetSubscriptionWorkspaceUserItemPageDataResponse);
}

message CreateSubscriptionWorkspaceUserRequest {
  SubscriptionWorkspaceUser data = 1;
}

message CreateSubscriptionWorkspaceUserResponse {
  repeated SubscriptionWorkspaceUser data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadSubscriptionWorkspaceUserRequest {
  SubscriptionWorkspaceUser data = 1;
}

message ReadSubscriptionWorkspaceUserResponse {
  repeated SubscriptionWorkspaceUser data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateSubscriptionWorkspaceUserRequest {
  SubscriptionWorkspaceUser data = 1;
}

message UpdateSubscriptionWorkspaceUserResponse {
  repeated SubscriptionWorkspaceUser data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteSubscriptionWorkspaceUserRequest {
  SubscriptionWorkspaceUser data = 1;
}

message DeleteSubscriptionWorkspaceUserResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListSubscriptionWorkspaceUsersRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListSubscriptionWorkspaceUsersResponse {
  repeated SubscriptionWorkspaceUser data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetSubscriptionWorkspaceUserListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetSubscriptionWorkspaceUserListPageDataResponse {
  repeated SubscriptionWorkspaceUser subscription_workspace_user_list = 1;
  domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetSubscriptionWorkspaceUserItemPageDataRequest {
  string subscription_workspace_user_id = 1;
}

message GetSubscriptionWorkspaceUserItemPageDataResponse {
  SubscriptionWorkspaceUser subscription_workspace_user = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
