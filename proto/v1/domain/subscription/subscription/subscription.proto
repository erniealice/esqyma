syntax = "proto3";

package domain.subscription.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/subscription/subscription";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "domain/subscription/price_plan/price_plan.proto";
import "domain/entity/client/client.proto";
import "domain/operation/job/job.proto";
import "options/db.proto";
import "google/protobuf/timestamp.proto";

message Subscription {
  option (options.v1.table).table = true;
  string id = 1;
  optional int64 date_created = 2;
  optional string date_created_string = 3;
  optional int64 date_modified = 4;
  optional string date_modified_string = 5;
  bool active = 6 [(options.v1.db).default = "true"];
  string name = 7;
  optional PricePlan price_plan = 8;
  string price_plan_id = 9 [(options.v1.db).references = "price_plan", (options.v1.db).index = true];
  optional domain.entity.v1.Client client = 10;
  string client_id = 11 [(options.v1.db).references = "client", (options.v1.db).index = true];
  optional google.protobuf.Timestamp date_time_start = 12; // UTC timestamp; display TZ resolved per-request
  reserved 13; // was date_start_string
  optional google.protobuf.Timestamp date_time_end = 14; // UTC timestamp; nil = open-ended
  reserved 15; // was date_end_string
  map<string, string> metadata = 16;

  // License pool management
  optional int32 quantity = 17;           // Number of licenses purchased
  optional int32 assigned_count = 18;     // Currently assigned (denormalized)
  optional int32 available_count = 19;    // quantity - assigned (denormalized)

  // License configuration
  optional string default_license_type = 20;  // Default for created licenses
  optional bool auto_assign = 21;             // Auto-assign to purchaser
  optional string code = 22;  // 7-char alphanumeric engagement code (e.g. "A3K7PXR")

  // AD_HOC × TOTAL_PACKAGE per-subscription entitlement override.
  // NULL = inherit pricePlan.entitled_occurrences. Set non-NULL when an
  // operator clicks "Extend pool" — the override is the new total, not a delta.
  // See docs/plan/20260501-ad-hoc-subscription-billing/plan.md §2.3 (codex MAJ-1).
  optional int32 entitled_occurrences_override = 23;

  // Workspace ownership — subscriptions are scoped per workspace.
  optional string workspace_id = 24 [(options.v1.db).references = "workspace", (options.v1.db).index = true];

  // FK back-edges — Wave 4 self-domain plan (2026-05-17).
  // Snapshot of the client billing profile / method that bills this subscription.
  // Stored as strings (no DB FK constraint) so they survive profile edits without
  // breaking history — see architecture.md §3.5 (tax-integration audit-primitive pattern).
  optional string collection_profile_id_snapshot = 25;
  optional string collection_method_id_snapshot = 26;
}

service SubscriptionDomainService {
  rpc CreateSubscription(CreateSubscriptionRequest) returns (CreateSubscriptionResponse);
  rpc ReadSubscription(ReadSubscriptionRequest) returns (ReadSubscriptionResponse);
  rpc UpdateSubscription(UpdateSubscriptionRequest) returns (UpdateSubscriptionResponse);
  rpc DeleteSubscription(DeleteSubscriptionRequest) returns (DeleteSubscriptionResponse);
  rpc ListSubscriptions(ListSubscriptionsRequest) returns (ListSubscriptionsResponse);

  // NEW: Enhanced list with pagination, filtering, sorting, search
  rpc GetSubscriptionListPageData(GetSubscriptionListPageDataRequest)
    returns (GetSubscriptionListPageDataResponse);

  // NEW: Enhanced item view with related data
  rpc GetSubscriptionItemPageData(GetSubscriptionItemPageDataRequest)
    returns (GetSubscriptionItemPageDataResponse);

  rpc CountActiveByClientIds(CountActiveByClientIdsRequest) returns (CountActiveByClientIdsResponse);

  // Reverse index: subscriptions referencing a given price plan. Hydrates
  // Client + PricePlan + PricePlan.Plan via the same JOIN path as
  // GetSubscriptionListPageData. Used by the price-plan detail "Engagements"
  // tab (centymo) — see docs/plan/20260504-price-plan-engagements-tab/.
  rpc ListSubscriptionsByPricePlan(ListSubscriptionsByPricePlanRequest)
    returns (ListSubscriptionsByPricePlanResponse);
}

message CreateSubscriptionRequest {
  Subscription data = 1;
}

message CreateSubscriptionResponse {
  repeated Subscription data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadSubscriptionRequest {
  Subscription data = 1;
}

message ReadSubscriptionResponse {
  repeated Subscription data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateSubscriptionRequest {
  Subscription data = 1;
}

message UpdateSubscriptionResponse {
  repeated Subscription data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteSubscriptionRequest {
  Subscription data = 1;
}

message DeleteSubscriptionResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListSubscriptionsRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListSubscriptionsResponse {
  repeated Subscription data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// NEW: Enhanced list request with core features
message GetSubscriptionListPageDataRequest {
  // Pagination settings
  domain.common.v1.PaginationRequest pagination = 1;

  // Filter conditions
  domain.common.v1.FilterRequest filters = 2;

  // Sort settings
  domain.common.v1.SortRequest sort = 3;

  // Search settings
  domain.common.v1.SearchRequest search = 4;
}

// NEW: Enhanced list response with metadata
message GetSubscriptionListPageDataResponse {
  // The subscription data
  repeated Subscription subscription_list = 1;

  // Pagination metadata
  domain.common.v1.PaginationResponse pagination = 2;

  // Search results metadata (when search is used)
  repeated domain.common.v1.SearchResult search_results = 3;

  // Response status
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

// NEW: Simple item request
message GetSubscriptionItemPageDataRequest {
  // The subscription ID to retrieve
  string subscription_id = 1;
}

// NEW: Simple item response
message GetSubscriptionItemPageDataResponse {
  // The subscription data
  Subscription subscription = 1;

  // Response status
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message CountActiveByClientIdsRequest {
  repeated string client_ids = 1;  // empty = count all clients in the workspace
}

message CountActiveByClientIdsResponse {
  // Keys are client IDs; values are counts of active subscriptions for each.
  // Clients with zero active subscriptions are omitted (caller defaults to 0).
  map<string, int32> counts = 1;
}

message ListSubscriptionsByPricePlanRequest {
  string price_plan_id = 1;
  // When true (default), only active subscriptions are returned.
  optional bool active_only = 2;
  // Optional pagination — omit for "all rows" (typical use case: a tab
  // listing engagements for one plan).
  optional domain.common.v1.PaginationRequest pagination = 3;
  // Optional sort — defaults to subscription name ascending when omitted.
  optional domain.common.v1.SortRequest sort = 4;
}

message ListSubscriptionsByPricePlanResponse {
  // Subscriptions hydrated with Client, PricePlan, and PricePlan.Plan so the
  // view layer can render Client name and Plan name without N+1 lookups.
  repeated Subscription subscription_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  bool success = 3;
  optional domain.common.v1.Error error = 4;
}

// Use-case messages (consumed by espyna use cases, not bound to an RPC).

// MaterializeJobsForSubscriptionRequest drives the auto-spawn-jobs-from-subscription
// use case (docs/plan/20260429-auto-spawn-jobs-from-subscription/plan.md §3).
message MaterializeJobsForSubscriptionRequest {
  string subscription_id = 1;
  // spawn_jobs is the operator-facing override. When false the use case
  // returns immediately with skipped_reason="operator_opt_out".
  bool spawn_jobs = 2;
}

// MaterializeJobsForSubscriptionResponse surfaces the spawned Jobs + skip reason.
message MaterializeJobsForSubscriptionResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
  repeated domain.operation.v1.Job spawned_jobs = 3;
  optional string skipped_reason = 4;
}

// MaterializeInstanceJobsForSubscriptionRequest drives the cyclic-instance-Job
// spawn use case (docs/plan/20260501-cyclic-subscription-jobs/plan.md §3).
message MaterializeInstanceJobsForSubscriptionRequest {
  string subscription_id = 1;
  // cycle_period_start is optional. When empty, the use case picks the next
  // un-spawned cycle. When non-empty, spawns exactly that one cycle (idempotent).
  optional string cycle_period_start = 2;
  // backfill, when true, walks the cycle window from sub.date_time_start up
  // to today and spawns every missing cycle (capped at MaxBackfillCycles).
  bool backfill = 3;
  // usage_request_date is the AD_HOC equivalent (ISO 8601 YYYY-MM-DD).
  // Defaults to today UTC when empty. Ignored on cyclic plans.
  optional string usage_request_date = 4;
}

// MaterializeInstanceJobsForSubscriptionResponse surfaces counts + skip reason.
// The full Job proto records are intentionally omitted (circular import constraint
// — same as MaterializeJobsForSubscriptionResponse above).
message MaterializeInstanceJobsForSubscriptionResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
  // spawned_cycle_count is the number of cycle accordions materialised.
  int32 spawned_cycle_count = 3;
  // spawned_job_count is the total cycle Job rows actually inserted.
  int32 spawned_job_count = 4;
  // once_at_start_job_count is how many ONCE_AT_ENGAGEMENT_START child Jobs fired.
  int32 once_at_start_job_count = 5;
  // engagement_was_newly_created reports whether this call created the
  // engagement-shell Job.
  bool engagement_was_newly_created = 6;
  optional string skipped_reason = 7;
  // backfill_capped_at > 0 when the backfill window exceeded the cap.
  int32 backfill_capped_at = 8;
}