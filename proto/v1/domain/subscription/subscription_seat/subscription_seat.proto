syntax = "proto3";

package domain.subscription.v1;

option go_package = "github.com/erniealice/esqyma/pkg/schema/v1/domain/subscription/subscription_seat";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";
import "options/db.proto";

// SubscriptionSeatStatus is the lifecycle of a single headcount seat against a
// subscription. The DB pins this domain via a CHECK constraint
// (status IN ('proposed','active','replaced','ended')); UNSPECIFIED is excluded.
enum SubscriptionSeatStatus {
  SUBSCRIPTION_SEAT_STATUS_UNSPECIFIED = 0;
  SUBSCRIPTION_SEAT_STATUS_PROPOSED = 1;
  SUBSCRIPTION_SEAT_STATUS_ACTIVE = 2;
  SUBSCRIPTION_SEAT_STATUS_REPLACED = 3;
  SUBSCRIPTION_SEAT_STATUS_ENDED = 4;
}

// SubscriptionSeat is one billable/serviced headcount position on a subscription.
message SubscriptionSeat {
  option (options.v1.table).table = true;

  string id = 1;
  optional int64 date_created = 2;
  optional string date_created_string = 3 [(options.v1.db).ignore = true];
  optional int64 date_modified = 4;
  optional string date_modified_string = 5 [(options.v1.db).ignore = true];
  bool active = 6 [(options.v1.db).default = "true"];

  string workspace_id = 7 [(options.v1.db).references = "workspace", (options.v1.db).index = true];
  string subscription_id = 8 [(options.v1.db).references = "subscription", (options.v1.db).index = true];
  // CR-1: the person on the seat is entity/staff, NOT product/resource.
  string staff_id = 9 [(options.v1.db).references = "staff", (options.v1.db).index = true];
  // Denormalized IDOR anchor (stamped, never from form).
  string client_id = 10 [(options.v1.db).references = "client", (options.v1.db).index = true];
  // KEPT billing anchor.
  string product_plan_id = 11 [(options.v1.db).references = "product_plan", (options.v1.db).index = true];
  optional string product_variant_id = 12 [(options.v1.db).references = "product_variant"];
  optional int64 contracted_amount = 13;          // centavos (int64 money convention)
  optional string contracted_currency = 14;
  optional string role_title = 15;
  optional string seniority = 16;
  optional int64 date_start = 17;
  optional int64 date_end = 18;
  SubscriptionSeatStatus status = 19;             // proto ENUM (NOT string); DB CHECK-pinned
  optional int32 review_cadence_value = 20;
  optional string review_cadence_unit = 21;
  optional string position = 22;
  // Self-reference: the seat this one supersedes (SR-2 replacement chain).
  optional string replaces_id = 23 [(options.v1.db).references = "subscription_seat"];
  // Soft-ref only: work_request table does not exist yet — NO FK annotation.
  optional string work_request_id = 24;
}

service SubscriptionSeatDomainService {
  rpc CreateSubscriptionSeat(CreateSubscriptionSeatRequest) returns (CreateSubscriptionSeatResponse);
  rpc ReadSubscriptionSeat(ReadSubscriptionSeatRequest) returns (ReadSubscriptionSeatResponse);
  rpc UpdateSubscriptionSeat(UpdateSubscriptionSeatRequest) returns (UpdateSubscriptionSeatResponse);
  rpc DeleteSubscriptionSeat(DeleteSubscriptionSeatRequest) returns (DeleteSubscriptionSeatResponse);
  rpc ListSubscriptionSeats(ListSubscriptionSeatsRequest) returns (ListSubscriptionSeatsResponse);

  // Enhanced list with pagination, filtering, sorting, search
  rpc GetSubscriptionSeatListPageData(GetSubscriptionSeatListPageDataRequest)
    returns (GetSubscriptionSeatListPageDataResponse);

  // Enhanced item view with related data
  rpc GetSubscriptionSeatItemPageData(GetSubscriptionSeatItemPageDataRequest)
    returns (GetSubscriptionSeatItemPageDataResponse);
}

message CreateSubscriptionSeatRequest {
  SubscriptionSeat data = 1;
}

message CreateSubscriptionSeatResponse {
  repeated SubscriptionSeat data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadSubscriptionSeatRequest {
  SubscriptionSeat data = 1;
}

message ReadSubscriptionSeatResponse {
  repeated SubscriptionSeat data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateSubscriptionSeatRequest {
  SubscriptionSeat data = 1;
}

message UpdateSubscriptionSeatResponse {
  repeated SubscriptionSeat data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteSubscriptionSeatRequest {
  SubscriptionSeat data = 1;
}

message DeleteSubscriptionSeatResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListSubscriptionSeatsRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListSubscriptionSeatsResponse {
  repeated SubscriptionSeat data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetSubscriptionSeatListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetSubscriptionSeatListPageDataResponse {
  repeated SubscriptionSeat subscription_seat_list = 1;
  domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetSubscriptionSeatItemPageDataRequest {
  string subscription_seat_id = 1;
}

message GetSubscriptionSeatItemPageDataResponse {
  SubscriptionSeat subscription_seat = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
