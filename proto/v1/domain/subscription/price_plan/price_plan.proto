syntax = "proto3";

package domain.subscription.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/subscription/price_plan";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/search.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";

import "domain/subscription/plan/plan.proto";
import "options/db.proto";

enum BillingKind {
  BILLING_KIND_UNSPECIFIED = 0;
  BILLING_KIND_ONE_TIME    = 1;  // single charge, no ongoing cycles
  BILLING_KIND_RECURRING   = 2;  // open-ended cycling (cancel-anytime subscription)
  BILLING_KIND_CONTRACT    = 3;  // fixed-term commitment (may have periodic billing within)
}

enum AmountBasis {
  AMOUNT_BASIS_UNSPECIFIED        = 0;
  AMOUNT_BASIS_PER_CYCLE          = 1;  // amount = per-cycle fee
  AMOUNT_BASIS_TOTAL_PACKAGE      = 2;  // amount = one-shot total
  AMOUNT_BASIS_DERIVED_FROM_LINES = 3;  // amount ignored; sum ProductPricePlan prices
}

message PricePlan {
  option (options.v1.table).table = true;
  string id = 1;
  optional Plan plan = 2;
  string plan_id = 3 [(options.v1.db).references = "plan", (options.v1.db).index = true];
  optional string name = 4;
  optional string description = 5;
  optional int64 date_created = 6;
  optional string date_created_string = 7;
  optional int64 date_modified = 8;
  optional string date_modified_string = 9;
  bool active = 10 [(options.v1.db).default = "true"];
  int64 billing_amount = 11;    // centavos — charged to the client in billing_currency
  string billing_currency = 12; // ISO 4217 currency code — what the client is billed in
  // DEPRECATED: migrate to billing_cycle_* and default_term_* — see docs/plan/20260421-pricing-unification/plan.md
  // Now optional: BILLING_KIND_ONE_TIME plans hide the cycle row in the UI, so the legacy
  // duration_value/unit dual-write input can be empty. Column NULL-ability follows the proto
  // (migration 20260425150000_price_plan_duration_value_nullable).
  optional int32 duration_value = 13;
  optional string duration_unit = 14;
  // Email template paths/URLs for dynamic email rendering
  optional string confirmation_template = 15;  // Template for welcome/confirmation emails (first payment)
  optional string receipt_template = 16;       // Template for receipt emails (recurring payments)
  // Parent schedule — owns location + date range for this plan.
  // Field 17 was previously location_id (removed 2026-04-17); use price_schedule_id instead.
  optional string price_schedule_id = 18 [(options.v1.db).references = "price_schedule", (options.v1.db).index = true];
  BillingKind billing_kind = 19;
  AmountBasis amount_basis = 20;

  // Billing cadence — only meaningful when billing_kind ∈ {RECURRING, CONTRACT with periodic billing}
  optional int32  billing_cycle_value = 21;
  optional string billing_cycle_unit  = 22;  // "day" | "week" | "month" | "year"

  // Default catalog validity/term; null = open-ended. Subscription.date_end overrides per-instance.
  optional int32  default_term_value = 23;
  optional string default_term_unit  = 24;
}

service PricePlanDomainService {
  rpc CreatePricePlan(CreatePricePlanRequest) returns (CreatePricePlanResponse);
  rpc ReadPricePlan(ReadPricePlanRequest) returns (ReadPricePlanResponse);
  rpc UpdatePricePlan(UpdatePricePlanRequest) returns (UpdatePricePlanResponse);
  rpc DeletePricePlan(DeletePricePlanRequest) returns (DeletePricePlanResponse);
  rpc ListPricePlans(ListPricePlansRequest) returns (ListPricePlansResponse);
  rpc GetPricePlanListPageData(GetPricePlanListPageDataRequest) returns (GetPricePlanListPageDataResponse);
  rpc GetPricePlanItemPageData(GetPricePlanItemPageDataRequest) returns (GetPricePlanItemPageDataResponse);
}

message CreatePricePlanRequest {
  PricePlan data = 1;
}

message CreatePricePlanResponse {
  repeated PricePlan data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadPricePlanRequest {
  PricePlan data = 1;
}

message ReadPricePlanResponse {
  repeated PricePlan data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdatePricePlanRequest {
  PricePlan data = 1;
}

message UpdatePricePlanResponse {
  repeated PricePlan data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeletePricePlanRequest {
  PricePlan data = 1;
}

message DeletePricePlanResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListPricePlansRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message ListPricePlansResponse {
  repeated PricePlan data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetPricePlanListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetPricePlanListPageDataResponse {
  repeated PricePlan price_plan_list = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
  optional domain.common.v1.PaginationResponse pagination = 4;
  repeated domain.common.v1.SearchResult search_results = 5;
}

message GetPricePlanItemPageDataRequest {
  string price_plan_id = 1;
}

message GetPricePlanItemPageDataResponse {
  optional PricePlan price_plan = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}