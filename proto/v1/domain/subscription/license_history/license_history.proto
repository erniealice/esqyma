syntax = "proto3";

package domain.subscription.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/subscription/license_history";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";
import "domain/subscription/license/license.proto";
import "options/db.proto";

// LicenseHistoryAction defines what happened to a license
enum LicenseHistoryAction {
  LICENSE_HISTORY_ACTION_UNSPECIFIED = 0;
  LICENSE_HISTORY_ACTION_CREATED = 1;      // License created (with or without assignment)
  LICENSE_HISTORY_ACTION_ASSIGNED = 2;     // Assigned to someone (from unassigned)
  LICENSE_HISTORY_ACTION_REVOKED = 3;      // Assignment removed (back to unassigned)
  LICENSE_HISTORY_ACTION_REASSIGNED = 4;   // Transferred to different assignee
  LICENSE_HISTORY_ACTION_SUSPENDED = 5;    // Temporarily disabled
  LICENSE_HISTORY_ACTION_REACTIVATED = 6;  // Re-enabled after suspension
  LICENSE_HISTORY_ACTION_EXPIRED = 7;      // Validity ended
  LICENSE_HISTORY_ACTION_DELETED = 8;      // Soft deleted
}

// LicenseHistory tracks assignment changes over time (audit trail)
message LicenseHistory {
  option (options.v1.table).table = true;
  string id = 1;
  string license_id = 2 [(options.v1.db).references = "license", (options.v1.db).index = true];
  optional License license = 3;

  // Action type
  LicenseHistoryAction action = 4;

  // Who was affected (current/new assignee)
  optional string assignee_id = 5;
  optional string assignee_type = 6;
  optional string assignee_name = 7;

  // For reassignments: who was previous assignee
  optional string previous_assignee_id = 8;
  optional string previous_assignee_type = 9;
  optional string previous_assignee_name = 10;

  // Who performed the action
  string performed_by = 11;

  // Reason and notes
  optional string reason = 12;
  optional string notes = 13;

  // Snapshot of license status at time of action
  LicenseStatus license_status_before = 14;
  LicenseStatus license_status_after = 15;

  // Timestamps
  int64 date_created = 16;
  string date_created_string = 17;
  bool active = 18 [(options.v1.db).default = "true"];
}

service LicenseHistoryDomainService {
  // Create (internal - called by license operations)
  rpc CreateLicenseHistory(CreateLicenseHistoryRequest) returns (CreateLicenseHistoryResponse);

  // Read operations
  rpc ReadLicenseHistory(ReadLicenseHistoryRequest) returns (ReadLicenseHistoryResponse);
  rpc ListLicenseHistory(ListLicenseHistoryRequest) returns (ListLicenseHistoryResponse);

  // Page data
  rpc GetLicenseHistoryListPageData(GetLicenseHistoryListPageDataRequest)
    returns (GetLicenseHistoryListPageDataResponse);
}

// ============================================================================
// Create Request/Response Messages
// ============================================================================

message CreateLicenseHistoryRequest {
  LicenseHistory data = 1;
}

message CreateLicenseHistoryResponse {
  repeated LicenseHistory data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// ============================================================================
// Read Request/Response Messages
// ============================================================================

message ReadLicenseHistoryRequest {
  LicenseHistory data = 1;
}

message ReadLicenseHistoryResponse {
  repeated LicenseHistory data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ListLicenseHistoryRequest {
  optional string license_id = 1;  // Filter by license ID
  optional domain.common.v1.SearchRequest search = 2;
  optional domain.common.v1.FilterRequest filters = 3;
  optional domain.common.v1.SortRequest sort = 4;
  optional domain.common.v1.PaginationRequest pagination = 5;
}

message ListLicenseHistoryResponse {
  repeated LicenseHistory data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// ============================================================================
// Page Data Request/Response Messages
// ============================================================================

message GetLicenseHistoryListPageDataRequest {
  optional string license_id = 1;  // Filter by license ID
  domain.common.v1.PaginationRequest pagination = 2;
  domain.common.v1.FilterRequest filters = 3;
  domain.common.v1.SortRequest sort = 4;
  domain.common.v1.SearchRequest search = 5;
}

message GetLicenseHistoryListPageDataResponse {
  repeated LicenseHistory license_history_list = 1;
  domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}
