syntax = "proto3";

package domain.subscription.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/subscription/billing_event";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/search.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";

import "options/db.proto";

// Status lifecycle for a BillingEvent.
//   UNSPECIFIED — materialized at job/sub create, awaiting trigger.
//   READY       — operator can recognize revenue against this event.
//   BILLED      — Revenue created, revenue_id set.
//   WAIVED      — operator decided not to bill (no Revenue ever created).
//   DEFERRED    — child of a partial bill; reserves the remainder amount.
//   CANCELLED   — milestone scope changed; event will not bill.
enum BillingEventStatus {
  BILLING_EVENT_STATUS_UNSPECIFIED = 0;
  BILLING_EVENT_STATUS_READY       = 1;
  BILLING_EVENT_STATUS_BILLED      = 2;
  BILLING_EVENT_STATUS_WAIVED      = 3;
  BILLING_EVENT_STATUS_DEFERRED    = 4;
  BILLING_EVENT_STATUS_CANCELLED   = 5;
}

// What advanced this event from UNSPECIFIED to READY.
//   PHASE_COMPLETED — JobPhase.status transitioned to COMPLETED (use-case hook).
//   MANUAL_EARLY    — operator clicked Mark Ready before the phase completed.
//   MANUAL_LATE     — operator marked it ready after phase completion (retro).
//   DATE            — date trigger fired (v1: operator clicks; v2: cron sweep).
enum BillingEventTrigger {
  BILLING_EVENT_TRIGGER_UNSPECIFIED     = 0;
  BILLING_EVENT_TRIGGER_PHASE_COMPLETED = 1;
  BILLING_EVENT_TRIGGER_MANUAL_EARLY    = 2;
  BILLING_EVENT_TRIGGER_MANUAL_LATE     = 3;
  BILLING_EVENT_TRIGGER_DATE            = 4;
}

message BillingEvent {
  option (options.v1.table).table = true;

  string id = 1;
  optional int64 date_created = 2;
  optional string date_created_string = 3;
  optional int64 date_modified = 4;
  optional string date_modified_string = 5;
  bool active = 6 [(options.v1.db).default = "true"];

  // Required parent — every BillingEvent belongs to a Subscription.
  string subscription_id = 7
    [(options.v1.db).references = "subscription", (options.v1.db).index = true];

  // Operational links — all nullable to support no-Job retainer flows.
  optional string job_id = 8
    [(options.v1.db).references = "job", (options.v1.db).index = true];
  optional string job_phase_id = 9
    [(options.v1.db).references = "job_phase", (options.v1.db).index = true];
  optional string job_template_phase_id = 10
    [(options.v1.db).references = "job_template_phase", (options.v1.db).index = true];
  optional string product_price_plan_id = 11
    [(options.v1.db).references = "product_price_plan", (options.v1.db).index = true];

  // Money — resolved at materialization time from JobTemplatePhase weight rules.
  int64  billable_amount  = 12;  // centavos
  string billing_currency = 13;  // ISO 4217

  // Lifecycle.
  BillingEventStatus  status  = 14;
  BillingEventTrigger trigger = 15;

  // Outcome.
  optional string revenue_id = 16
    [(options.v1.db).references = "revenue", (options.v1.db).index = true];
  optional int64  triggered_at = 17;
  optional int64  billed_at    = 18;
  optional string reason       = 19;

  // Partial-billing chain: when an operator bills less than billable_amount
  // and chooses leave_remainder_open=true, a child BillingEvent is spawned
  // with status=DEFERRED and parent_event_id pointing back to the parent.
  optional string parent_event_id = 20
    [(options.v1.db).references = "billing_event"];
  optional string sequence_label = 21;  // e.g. "M1 partial #2"
}

service BillingEventDomainService {
  rpc CreateBillingEvent(CreateBillingEventRequest) returns (CreateBillingEventResponse);
  rpc ReadBillingEvent(ReadBillingEventRequest) returns (ReadBillingEventResponse);
  rpc UpdateBillingEvent(UpdateBillingEventRequest) returns (UpdateBillingEventResponse);
  rpc DeleteBillingEvent(DeleteBillingEventRequest) returns (DeleteBillingEventResponse);
  rpc ListBillingEvents(ListBillingEventsRequest) returns (ListBillingEventsResponse);
  rpc GetBillingEventListPageData(GetBillingEventListPageDataRequest)
    returns (GetBillingEventListPageDataResponse);
  rpc GetBillingEventItemPageData(GetBillingEventItemPageDataRequest)
    returns (GetBillingEventItemPageDataResponse);

  // Extras
  rpc ListBySubscription(ListBillingEventsBySubscriptionRequest)
    returns (ListBillingEventsBySubscriptionResponse);
  rpc ListByJobPhase(ListBillingEventsByJobPhaseRequest)
    returns (ListBillingEventsByJobPhaseResponse);
  rpc SetStatus(SetBillingEventStatusRequest) returns (SetBillingEventStatusResponse);
}

message CreateBillingEventRequest {
  BillingEvent data = 1;
}

message CreateBillingEventResponse {
  repeated BillingEvent data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadBillingEventRequest {
  BillingEvent data = 1;
}

message ReadBillingEventResponse {
  repeated BillingEvent data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateBillingEventRequest {
  BillingEvent data = 1;
}

message UpdateBillingEventResponse {
  repeated BillingEvent data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteBillingEventRequest {
  BillingEvent data = 1;
}

message DeleteBillingEventResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListBillingEventsRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListBillingEventsResponse {
  repeated BillingEvent data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetBillingEventListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetBillingEventListPageDataResponse {
  repeated BillingEvent billing_event_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetBillingEventItemPageDataRequest {
  string billing_event_id = 1;
}

message GetBillingEventItemPageDataResponse {
  optional BillingEvent billing_event = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// Extras

message ListBillingEventsBySubscriptionRequest {
  string subscription_id = 1;
}

message ListBillingEventsBySubscriptionResponse {
  repeated BillingEvent billing_events = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ListBillingEventsByJobPhaseRequest {
  string job_phase_id = 1;
}

message ListBillingEventsByJobPhaseResponse {
  repeated BillingEvent billing_events = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message SetBillingEventStatusRequest {
  string billing_event_id = 1;
  BillingEventStatus status = 2;
  BillingEventTrigger trigger = 3;
  optional string reason = 4;
}

message SetBillingEventStatusResponse {
  optional BillingEvent data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
