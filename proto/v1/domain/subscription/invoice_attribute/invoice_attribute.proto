syntax = "proto3";

package domain.subscription.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/subscription/invoice_attribute";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "domain/subscription/invoice/invoice.proto";
import "domain/common/attribute.proto";
import "options/db.proto";

message InvoiceAttribute {
  option (options.v1.table).table = true;
  option (options.v1.table).unique_together = "invoice_id,attribute_id";
  string id = 1;
  string invoice_id = 2 [(options.v1.db).references = "invoice", (options.v1.db).index = true];
  string attribute_id = 3 [(options.v1.db).references = "attribute", (options.v1.db).index = true];
  string value = 4;
  Invoice invoice = 5;
  domain.common.v1.Attribute attribute = 6;
  optional int64 date_created = 7;
  optional string date_created_string = 8;
  optional int64 date_modified = 9;
  optional string date_modified_string = 10;
  bool active = 11 [(options.v1.db).default = "true"];
}

service InvoiceAttributeDomainService {
  rpc CreateInvoiceAttribute(CreateInvoiceAttributeRequest) returns (CreateInvoiceAttributeResponse);
  rpc ReadInvoiceAttribute(ReadInvoiceAttributeRequest) returns (ReadInvoiceAttributeResponse);
  rpc UpdateInvoiceAttribute(UpdateInvoiceAttributeRequest) returns (UpdateInvoiceAttributeResponse);
  rpc DeleteInvoiceAttribute(DeleteInvoiceAttributeRequest) returns (DeleteInvoiceAttributeResponse);
  rpc ListInvoiceAttributes(ListInvoiceAttributesRequest) returns (ListInvoiceAttributesResponse);

  // NEW: Enhanced list with pagination, filtering, sorting, search
  rpc GetInvoiceAttributeListPageData(GetInvoiceAttributeListPageDataRequest)
    returns (GetInvoiceAttributeListPageDataResponse);

  // NEW: Enhanced item view with related data
  rpc GetInvoiceAttributeItemPageData(GetInvoiceAttributeItemPageDataRequest)
    returns (GetInvoiceAttributeItemPageDataResponse);
}

message CreateInvoiceAttributeRequest {
  InvoiceAttribute data = 1;
}

message CreateInvoiceAttributeResponse {
  repeated InvoiceAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadInvoiceAttributeRequest {
  InvoiceAttribute data = 1;
}

message ReadInvoiceAttributeResponse {
  repeated InvoiceAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateInvoiceAttributeRequest {
  InvoiceAttribute data = 1;
}

message UpdateInvoiceAttributeResponse {
  repeated InvoiceAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteInvoiceAttributeRequest {
  InvoiceAttribute data = 1;
}

message DeleteInvoiceAttributeResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListInvoiceAttributesRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListInvoiceAttributesResponse {
  repeated InvoiceAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// NEW: Enhanced list request with core features
message GetInvoiceAttributeListPageDataRequest {
  // Pagination settings
  domain.common.v1.PaginationRequest pagination = 1;

  // Filter conditions
  domain.common.v1.FilterRequest filters = 2;

  // Sort settings
  domain.common.v1.SortRequest sort = 3;

  // Search settings
  domain.common.v1.SearchRequest search = 4;
}

// NEW: Enhanced list response with metadata
message GetInvoiceAttributeListPageDataResponse {
  // The invoice attribute data
  repeated InvoiceAttribute invoice_attribute_list = 1;

  // Pagination metadata
  domain.common.v1.PaginationResponse pagination = 2;

  // Search results metadata (when search is used)
  repeated domain.common.v1.SearchResult search_results = 3;

  // Response status
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

// NEW: Simple item request
message GetInvoiceAttributeItemPageDataRequest {
  // The invoice attribute ID to retrieve
  string invoice_attribute_id = 1;
}

// NEW: Simple item response
message GetInvoiceAttributeItemPageDataResponse {
  // The invoice attribute data
  InvoiceAttribute invoice_attribute = 1;

  // Response status
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
