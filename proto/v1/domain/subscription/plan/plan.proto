syntax = "proto3";

package domain.subscription.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/subscription/plan";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";
import "domain/subscription/plan_location/plan_location.proto";
import "options/db.proto";

message Plan {
  option (options.v1.table).table = true;
  optional string id = 1;
  optional int64 date_created = 2;
  optional string date_created_string = 3;
  optional int64 date_modified = 4;
  optional string date_modified_string = 5;
  bool active = 6 [(options.v1.db).default = "true"];
  string name = 7;
  optional string description = 8;
  repeated PlanLocation plan_locations = 9;
  optional string thumbnail_url = 10;
  reserved 11;
  reserved "fulfillment_type";
  // NULL = master plan, appears on /app/services/packages/list.
  // SET  = client-scoped, hidden from master list.
  optional string client_id = 12 [(options.v1.db).references = "client", (options.v1.db).index = true];
  // Self-FK to the master Plan that this clone was derived from. NULL when
  // this row IS the master. SET when this row is a client-scoped clone created
  // by CustomizePlanForClient — points at the master plan that was cloned.
  //
  // Invariants enforced at use-case layer (CustomizePlanForClient):
  //   • Always exactly one level deep — cloning a clone flattens parent_id to
  //     the same master, never the intermediate clone. No grandchildren.
  //   • Immutable after insert — UpdatePlan ignores body input on this field.
  //   • Acyclicity — the use case rejects parent_id = self.
  //
  // Reports group master + all variants via:
  //   WHERE id = $masterID OR parent_id = $masterID
  optional string parent_id = 13
    [(options.v1.db).references = "plan", (options.v1.db).index = true];
  // Root JobTemplate for the operational workflow this engagement runs.
  // NULL = Plan has no operational tracking (advisory retainers, R1 retail
  // patterns); auto-spawn use case skips silently. SET = MaterializeJobsForSubscription
  // resolves this template to spawn the root Job. Multi-template Plans link
  // additional templates via JobTemplateRelation rows. See plan §2.1.
  optional string job_template_id = 14
    [(options.v1.db).references = "job_template", (options.v1.db).index = true];

  // Number of cycle Job instances spawned per billing cycle. Default 1
  // (semantically — NULL is treated as 1). Examples:
  //   Pro Cleaning Biweekly (billed monthly) = 2
  //   Lawn Care Weekly      (billed monthly) = 4
  //   Pool Quarterly        (billed quarterly) = 1
  // Spawn semantics: cycle_index increments globally; period_start of each
  // sub-cycle = billing_cycle_start + (k-1) × (cycle_length / N) for k=1..N.
  // Validation: must be >= 1 when Plan.job_template_id is set. Reset to 1
  // when job_template_id is cleared. See
  // docs/plan/20260430-cyclic-subscription-jobs/plan.md §2.4.
  optional int32 visits_per_cycle = 15;

  // Drift-recovered columns (DB had these; proto did not)
  optional string legacy_price_list_id = 16;    // Legacy migration shim — links to old price-list IDs
  optional string workspace_id = 17 [(options.v1.db).references = "workspace", (options.v1.db).index = true];
}

service PlanDomainService {
  rpc CreatePlan(CreatePlanRequest) returns (CreatePlanResponse);
  rpc ReadPlan(ReadPlanRequest) returns (ReadPlanResponse);
  rpc UpdatePlan(UpdatePlanRequest) returns (UpdatePlanResponse);
  rpc DeletePlan(DeletePlanRequest) returns (DeletePlanResponse);
  rpc ListPlans(ListPlansRequest) returns (ListPlansResponse);

  // NEW: Enhanced list with pagination, filtering, sorting, search
  rpc GetPlanListPageData(GetPlanListPageDataRequest)
    returns (GetPlanListPageDataResponse);

  // NEW: Enhanced item view with related data
  rpc GetPlanItemPageData(GetPlanItemPageDataRequest)
    returns (GetPlanItemPageDataResponse);
  rpc SearchPlansByName(SearchPlansByNameRequest) returns (SearchPlansByNameResponse);
}

message CreatePlanRequest {
  Plan data = 1;
}

message CreatePlanResponse {
  repeated Plan data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadPlanRequest {
  Plan data = 1;
}

message ReadPlanResponse {
  repeated Plan data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdatePlanRequest {
  Plan data = 1;
}

message UpdatePlanResponse {
  repeated Plan data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeletePlanRequest {
  Plan data = 1;
}

message DeletePlanResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListPlansRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListPlansResponse {
  repeated Plan data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// NEW: Enhanced list page data request with pagination, filtering, sorting, search
message GetPlanListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetPlanListPageDataResponse {
  repeated Plan plan_list = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
  optional domain.common.v1.PaginationResponse pagination = 4;
  repeated domain.common.v1.SearchResult search_results = 5;
}

// NEW: Enhanced item page data request
message GetPlanItemPageDataRequest {
  string plan_id = 1;
}

message GetPlanItemPageDataResponse {
  optional Plan plan = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message SearchPlansByNameRequest {
  string query = 1;
  optional int32 limit = 2;
}

message SearchPlansByNameResponse {
  repeated SearchPlanResult results = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message SearchPlanResult {
  string id = 1;
  string label = 2;
}

// ---------------------------------------------------------------------------
// Use-case messages (consumed by espyna use cases, not bound to an RPC).
// ---------------------------------------------------------------------------

// CustomizePlanForClientRequest carries the inputs to clone a master Plan +
// PricePlan tree under a client's namespace.
message CustomizePlanForClientRequest {
  string source_plan_id = 1;       // Plan to clone from
  string source_price_plan_id = 2; // PricePlan to clone from
  string client_id = 3;            // Target client_id stamped on every cloned row
  optional string subscription_id = 4; // Optional: when set, repoint subscription.price_plan_id atomically
  optional string new_schedule_name = 5; // Pre-built display name; falls back to "<Client> - Price Schedule" when empty
}

// CustomizePlanForClientResponse carries the resolved IDs produced by the
// flow. reused = true iff a matching client PriceSchedule was found and
// reused (no new schedule row was inserted). Full PricePlan/PriceSchedule
// records are intentionally omitted (cross-package proto imports would
// circle back through plan.proto); callers needing the full rows re-read by
// ID. The full Plan row is included since it is local to this proto.
message CustomizePlanForClientResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
  string new_plan_id = 3;
  string new_price_plan_id = 4;
  string new_price_schedule_id = 5;
  bool reused = 6;
  optional Plan plan = 7;
}