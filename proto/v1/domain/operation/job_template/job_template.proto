syntax = "proto3";

package domain.operation.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/operation/job_template";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "domain/operation/enums/enums.proto";
import "options/db.proto";

message JobTemplate {
  option (options.v1.table).table = true;

  string id = 1;
  optional int64 date_created = 2;
  optional string date_created_string = 3;
  optional int64 date_modified = 4;
  optional string date_modified_string = 5;
  bool active = 6 [(options.v1.db).default = "true"];
  string name = 7;
  optional string description = 8;
  optional FulfillmentType default_fulfillment_type = 9;
  optional CostFlowType default_cost_flow_type = 10;
  optional BillingRuleType default_billing_rule_type = 11;
  optional string workspace_id = 12 [(options.v1.db).references = "workspace", (options.v1.db).index = true];

  // Versioning
  optional string template_code = 13 [(options.v1.db).index = true];
  optional int32 revision = 14;
  optional VersionStatus version_status = 15;
  optional int64 effective_from = 16;
  optional string effective_from_string = 17;
  optional int64 effective_to = 18;
  optional string effective_to_string = 19;
  optional string supersedes_template_id = 20 [(options.v1.db).references = "job_template"];
  optional string change_request_id = 21 [(options.v1.db).index = true];
  optional bool is_default = 22 [(options.v1.db).default = "false"];
  optional int64 published_at = 23;
  optional string published_at_string = 24;
  optional string published_by = 25;

  // reserved 26: BackflushPolicy enum imported from job_template_input/ in Wave 2
  reserved 26;

  // Defaults
  optional int32 default_lot_size = 27;
  optional string default_uom = 28;

  // Output target
  optional string output_product_id = 29 [(options.v1.db).references = "product", (options.v1.db).index = true];
  optional string output_product_variant_id = 30 [(options.v1.db).references = "product_variant", (options.v1.db).index = true];

  // Workflow
  optional string workflow_template_id = 31 [(options.v1.db).index = true];

  reserved 32 to 49;
}

service JobTemplateDomainService {
  rpc CreateJobTemplate(CreateJobTemplateRequest) returns (CreateJobTemplateResponse);
  rpc ReadJobTemplate(ReadJobTemplateRequest) returns (ReadJobTemplateResponse);
  rpc UpdateJobTemplate(UpdateJobTemplateRequest) returns (UpdateJobTemplateResponse);
  rpc DeleteJobTemplate(DeleteJobTemplateRequest) returns (DeleteJobTemplateResponse);
  rpc ListJobTemplates(ListJobTemplatesRequest) returns (ListJobTemplatesResponse);
  rpc GetJobTemplateListPageData(GetJobTemplateListPageDataRequest) returns (GetJobTemplateListPageDataResponse);
  rpc GetJobTemplateItemPageData(GetJobTemplateItemPageDataRequest) returns (GetJobTemplateItemPageDataResponse);
}

message CreateJobTemplateRequest {
  JobTemplate data = 1;
}

message CreateJobTemplateResponse {
  repeated JobTemplate data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadJobTemplateRequest {
  JobTemplate data = 1;
}

message ReadJobTemplateResponse {
  repeated JobTemplate data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateJobTemplateRequest {
  JobTemplate data = 1;
}

message UpdateJobTemplateResponse {
  repeated JobTemplate data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteJobTemplateRequest {
  JobTemplate data = 1;
}

message DeleteJobTemplateResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListJobTemplatesRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListJobTemplatesResponse {
  repeated JobTemplate data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetJobTemplateListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetJobTemplateListPageDataResponse {
  repeated JobTemplate job_template_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetJobTemplateItemPageDataRequest {
  string job_template_id = 1;
}

message GetJobTemplateItemPageDataResponse {
  optional JobTemplate job_template = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
