syntax = "proto3";

package domain.operation.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/operation/criteria_threshold";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "domain/operation/enums/enums.proto";
import "domain/operation/outcome_criteria/outcome_criteria.proto";
import "options/db.proto";

message CriteriaThreshold {
  option (options.v1.table).table = true;

  string id = 1;
  string outcome_criteria_id = 2 [(options.v1.db).references = "outcome_criteria", (options.v1.db).index = true];
  optional OutcomeCriteria outcome_criteria = 3;
  domain.operation.v1.ThresholdRole threshold_role = 4;
  double value = 5;
  bool active = 6 [(options.v1.db).default = "true"];
  optional int64 date_created = 7;
  optional string date_created_string = 8;
  optional int64 date_modified = 9;
  optional string date_modified_string = 10;
}

service CriteriaThresholdDomainService {
  rpc CreateCriteriaThreshold(CreateCriteriaThresholdRequest) returns (CreateCriteriaThresholdResponse);
  rpc ReadCriteriaThreshold(ReadCriteriaThresholdRequest) returns (ReadCriteriaThresholdResponse);
  rpc UpdateCriteriaThreshold(UpdateCriteriaThresholdRequest) returns (UpdateCriteriaThresholdResponse);
  rpc DeleteCriteriaThreshold(DeleteCriteriaThresholdRequest) returns (DeleteCriteriaThresholdResponse);
  rpc ListCriteriaThresholds(ListCriteriaThresholdsRequest) returns (ListCriteriaThresholdsResponse);
  rpc GetCriteriaThresholdListPageData(GetCriteriaThresholdListPageDataRequest) returns (GetCriteriaThresholdListPageDataResponse);
  rpc GetCriteriaThresholdItemPageData(GetCriteriaThresholdItemPageDataRequest) returns (GetCriteriaThresholdItemPageDataResponse);

  // Extra: filter by criteria
  rpc ListByCriteria(ListCriteriaThresholdsByCriteriaRequest) returns (ListCriteriaThresholdsByCriteriaResponse);
}

message CreateCriteriaThresholdRequest {
  CriteriaThreshold data = 1;
}

message CreateCriteriaThresholdResponse {
  repeated CriteriaThreshold data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadCriteriaThresholdRequest {
  CriteriaThreshold data = 1;
}

message ReadCriteriaThresholdResponse {
  repeated CriteriaThreshold data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateCriteriaThresholdRequest {
  CriteriaThreshold data = 1;
}

message UpdateCriteriaThresholdResponse {
  repeated CriteriaThreshold data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteCriteriaThresholdRequest {
  CriteriaThreshold data = 1;
}

message DeleteCriteriaThresholdResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListCriteriaThresholdsRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListCriteriaThresholdsResponse {
  repeated CriteriaThreshold data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetCriteriaThresholdListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetCriteriaThresholdListPageDataResponse {
  repeated CriteriaThreshold criteria_threshold_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetCriteriaThresholdItemPageDataRequest {
  string criteria_threshold_id = 1;
}

message GetCriteriaThresholdItemPageDataResponse {
  optional CriteriaThreshold criteria_threshold = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// Extra RPC messages

message ListCriteriaThresholdsByCriteriaRequest {
  string outcome_criteria_id = 1;
}

message ListCriteriaThresholdsByCriteriaResponse {
  repeated CriteriaThreshold criteria_thresholds = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
