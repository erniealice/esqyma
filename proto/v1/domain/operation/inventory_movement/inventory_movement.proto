syntax = "proto3";

package domain.operation.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/operation/inventory_movement";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "domain/operation/enums/enums.proto";
import "domain/product/product/product.proto";
import "domain/entity/location/location.proto";
import "options/db.proto";

// --- Message ---

message InventoryMovement {
  option (options.v1.table).table = true;

  string id = 1;
  MovementType movement_type = 4;
  string product_id = 5 [(options.v1.db).references = "product", (options.v1.db).index = true];
  optional domain.product.v1.Product product = 6;
  double quantity = 7;
  int64 unit_cost = 8; // centavos
  optional string from_location_id = 9 [(options.v1.db).references = "location"];
  optional domain.entity.v1.Location from_location = 10;
  optional string to_location_id = 11 [(options.v1.db).references = "location"];
  optional domain.entity.v1.Location to_location = 12;
  optional int64 movement_date = 13;
  optional string movement_date_string = 14;
  optional string created_by = 15;
  optional int64 date_created = 16;
  optional string date_created_string = 17;

  // New fields: job linkage
  optional string job_id = 18 [(options.v1.db).references = "job", (options.v1.db).index = true];
  optional string job_activity_id = 19 [(options.v1.db).references = "job_activity", (options.v1.db).index = true];

  // Inventory linkage
  optional string inventory_item_id = 20 [(options.v1.db).references = "inventory_item", (options.v1.db).index = true];
  optional string inventory_serial_id = 21 [(options.v1.db).references = "inventory_serial", (options.v1.db).index = true];

  // Generic reference
  optional string reference_type = 22;
  optional string reference_id = 23;

  // Metadata
  optional string status = 24;
  optional string notes = 25;
  optional string performed_by = 26;
  bool active = 27 [(options.v1.db).default = "true"];

  // Tenant isolation
  optional string workspace_id = 28 [(options.v1.db).references = "workspace", (options.v1.db).index = true];
}

// --- Service ---

service InventoryMovementDomainService {
  rpc CreateInventoryMovement(CreateInventoryMovementRequest) returns (CreateInventoryMovementResponse);
  rpc ReadInventoryMovement(ReadInventoryMovementRequest) returns (ReadInventoryMovementResponse);
  rpc UpdateInventoryMovement(UpdateInventoryMovementRequest) returns (UpdateInventoryMovementResponse);
  rpc DeleteInventoryMovement(DeleteInventoryMovementRequest) returns (DeleteInventoryMovementResponse);
  rpc ListInventoryMovements(ListInventoryMovementsRequest) returns (ListInventoryMovementsResponse);
  rpc GetInventoryMovementListPageData(GetInventoryMovementListPageDataRequest) returns (GetInventoryMovementListPageDataResponse);
  rpc GetInventoryMovementItemPageData(GetInventoryMovementItemPageDataRequest) returns (GetInventoryMovementItemPageDataResponse);

  // Extra: filter by job and by product
  rpc ListByJob(ListInventoryMovementsByJobRequest) returns (ListInventoryMovementsByJobResponse);
  rpc ListByProduct(ListInventoryMovementsByProductRequest) returns (ListInventoryMovementsByProductResponse);
}

// --- Standard CRUD messages ---

message CreateInventoryMovementRequest {
  InventoryMovement data = 1;
}

message CreateInventoryMovementResponse {
  repeated InventoryMovement data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadInventoryMovementRequest {
  InventoryMovement data = 1;
}

message ReadInventoryMovementResponse {
  repeated InventoryMovement data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateInventoryMovementRequest {
  InventoryMovement data = 1;
}

message UpdateInventoryMovementResponse {
  repeated InventoryMovement data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteInventoryMovementRequest {
  InventoryMovement data = 1;
}

message DeleteInventoryMovementResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListInventoryMovementsRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListInventoryMovementsResponse {
  repeated InventoryMovement data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// --- PageData messages ---

message GetInventoryMovementListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetInventoryMovementListPageDataResponse {
  repeated InventoryMovement inventory_movement_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetInventoryMovementItemPageDataRequest {
  string inventory_movement_id = 1;
}

message GetInventoryMovementItemPageDataResponse {
  optional InventoryMovement inventory_movement = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// --- Extra RPC messages ---

message ListInventoryMovementsByJobRequest {
  string job_id = 1;
}

message ListInventoryMovementsByJobResponse {
  repeated InventoryMovement inventory_movements = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ListInventoryMovementsByProductRequest {
  string product_id = 1;
}

message ListInventoryMovementsByProductResponse {
  repeated InventoryMovement inventory_movements = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
