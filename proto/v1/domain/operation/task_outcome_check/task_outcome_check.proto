syntax = "proto3";

package domain.operation.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/operation/task_outcome_check";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "domain/operation/task_outcome/task_outcome.proto";
import "domain/operation/criteria_option/criteria_option.proto";
import "options/db.proto";

// --- Message ---

message TaskOutcomeCheck {
  option (options.v1.table).table = true;

  string id = 1;
  string task_outcome_id = 2 [(options.v1.db).references = "task_outcome", (options.v1.db).index = true];
  optional TaskOutcome task_outcome = 3;
  string criteria_option_id = 4 [(options.v1.db).references = "criteria_option", (options.v1.db).index = true];
  optional CriteriaOption criteria_option = 5;
  bool checked = 6;
  optional string note = 7;
  optional int64 date_created = 8;
  optional string date_created_string = 9;
}

// --- Service ---

service TaskOutcomeCheckDomainService {
  rpc CreateTaskOutcomeCheck(CreateTaskOutcomeCheckRequest) returns (CreateTaskOutcomeCheckResponse);
  rpc ReadTaskOutcomeCheck(ReadTaskOutcomeCheckRequest) returns (ReadTaskOutcomeCheckResponse);
  rpc UpdateTaskOutcomeCheck(UpdateTaskOutcomeCheckRequest) returns (UpdateTaskOutcomeCheckResponse);
  rpc DeleteTaskOutcomeCheck(DeleteTaskOutcomeCheckRequest) returns (DeleteTaskOutcomeCheckResponse);
  rpc ListTaskOutcomeChecks(ListTaskOutcomeChecksRequest) returns (ListTaskOutcomeChecksResponse);
  rpc GetTaskOutcomeCheckListPageData(GetTaskOutcomeCheckListPageDataRequest) returns (GetTaskOutcomeCheckListPageDataResponse);
  rpc GetTaskOutcomeCheckItemPageData(GetTaskOutcomeCheckItemPageDataRequest) returns (GetTaskOutcomeCheckItemPageDataResponse);

  // Extra: filter by task outcome
  rpc ListByTaskOutcome(ListTaskOutcomeChecksByTaskOutcomeRequest) returns (ListTaskOutcomeChecksByTaskOutcomeResponse);
}

// --- Standard CRUD messages ---

message CreateTaskOutcomeCheckRequest {
  TaskOutcomeCheck data = 1;
}

message CreateTaskOutcomeCheckResponse {
  repeated TaskOutcomeCheck data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadTaskOutcomeCheckRequest {
  TaskOutcomeCheck data = 1;
}

message ReadTaskOutcomeCheckResponse {
  repeated TaskOutcomeCheck data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateTaskOutcomeCheckRequest {
  TaskOutcomeCheck data = 1;
}

message UpdateTaskOutcomeCheckResponse {
  repeated TaskOutcomeCheck data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteTaskOutcomeCheckRequest {
  TaskOutcomeCheck data = 1;
}

message DeleteTaskOutcomeCheckResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListTaskOutcomeChecksRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListTaskOutcomeChecksResponse {
  repeated TaskOutcomeCheck data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// --- PageData messages ---

message GetTaskOutcomeCheckListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetTaskOutcomeCheckListPageDataResponse {
  repeated TaskOutcomeCheck task_outcome_check_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetTaskOutcomeCheckItemPageDataRequest {
  string task_outcome_check_id = 1;
}

message GetTaskOutcomeCheckItemPageDataResponse {
  optional TaskOutcomeCheck task_outcome_check = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// --- Extra RPC messages ---

message ListTaskOutcomeChecksByTaskOutcomeRequest {
  string task_outcome_id = 1;
}

message ListTaskOutcomeChecksByTaskOutcomeResponse {
  repeated TaskOutcomeCheck task_outcome_checks = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
