syntax = "proto3";

package domain.operation.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/operation/job_phase";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "domain/operation/job/job.proto";
import "options/db.proto";

// --- Enum ---

enum PhaseStatus {
  PHASE_STATUS_UNSPECIFIED = 0;
  PHASE_STATUS_PENDING = 1;
  PHASE_STATUS_ACTIVE = 2;
  PHASE_STATUS_COMPLETED = 3;
}

// --- Message ---

message JobPhase {
  option (options.v1.table).table = true;

  string id = 1;
  optional int64 date_created = 2;
  optional string date_created_string = 3;
  optional int64 date_modified = 4;
  optional string date_modified_string = 5;
  bool active = 6;
  string job_id = 7 [(options.v1.db).references = "job", (options.v1.db).index = true];
  optional Job job = 8;
  string name = 9;
  int32 phase_order = 10;
  PhaseStatus status = 11;
  optional string template_phase_id = 12 [(options.v1.db).references = "job_template_phase", (options.v1.db).index = true];
  optional string resource_id = 13 [(options.v1.db).references = "resource", (options.v1.db).index = true];
  optional int64 planned_start = 14;
  optional string planned_start_string = 15;
  optional int64 planned_end = 16;
  optional string planned_end_string = 17;
  optional int64 actual_start = 18;
  optional string actual_start_string = 19;
  optional int64 actual_end = 20;
  optional string actual_end_string = 21;
  optional int32 setup_minutes = 22;
  optional double run_minutes_per_unit = 23;
  optional string predecessor_phase_id = 24 [(options.v1.db).references = "job_phase"];

  reserved 25 to 39;
}

// --- Service ---

service JobPhaseDomainService {
  rpc CreateJobPhase(CreateJobPhaseRequest) returns (CreateJobPhaseResponse);
  rpc ReadJobPhase(ReadJobPhaseRequest) returns (ReadJobPhaseResponse);
  rpc UpdateJobPhase(UpdateJobPhaseRequest) returns (UpdateJobPhaseResponse);
  rpc DeleteJobPhase(DeleteJobPhaseRequest) returns (DeleteJobPhaseResponse);
  rpc ListJobPhases(ListJobPhasesRequest) returns (ListJobPhasesResponse);
  rpc GetJobPhaseListPageData(GetJobPhaseListPageDataRequest) returns (GetJobPhaseListPageDataResponse);
  rpc GetJobPhaseItemPageData(GetJobPhaseItemPageDataRequest) returns (GetJobPhaseItemPageDataResponse);

  // Extra: filter by job
  rpc ListByJob(ListJobPhasesByJobRequest) returns (ListJobPhasesByJobResponse);
}

// --- Standard CRUD messages ---

message CreateJobPhaseRequest {
  JobPhase data = 1;
}

message CreateJobPhaseResponse {
  repeated JobPhase data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadJobPhaseRequest {
  JobPhase data = 1;
}

message ReadJobPhaseResponse {
  repeated JobPhase data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateJobPhaseRequest {
  JobPhase data = 1;
}

message UpdateJobPhaseResponse {
  repeated JobPhase data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteJobPhaseRequest {
  JobPhase data = 1;
}

message DeleteJobPhaseResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListJobPhasesRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListJobPhasesResponse {
  repeated JobPhase data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// --- PageData messages ---

message GetJobPhaseListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetJobPhaseListPageDataResponse {
  repeated JobPhase job_phase_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetJobPhaseItemPageDataRequest {
  string job_phase_id = 1;
}

message GetJobPhaseItemPageDataResponse {
  optional JobPhase job_phase = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// --- Extra RPC messages ---

message ListJobPhasesByJobRequest {
  string job_id = 1;
}

message ListJobPhasesByJobResponse {
  repeated JobPhase job_phases = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
