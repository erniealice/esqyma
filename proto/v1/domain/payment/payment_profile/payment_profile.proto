syntax = "proto3";

package domain.payment.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/payment/payment_profile";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "domain/entity/client/client.proto";
import "domain/payment/payment_method/payment_method.proto";
import "options/db.proto";

message PaymentProfile {
  option (options.v1.table).table = true;
  string id = 1;
  optional int64 date_created = 2;
  optional string date_created_string = 3;
  optional int64 date_modified = 4;
  optional string date_modified_string = 5;
  bool active = 6 [(options.v1.db).default = "true"];
  optional domain.entity.v1.Client client = 7;
  string client_id = 8 [(options.v1.db).references = "client", (options.v1.db).index = true];
  optional PaymentMethod payment_method = 9;
  string payment_method_id = 10 [(options.v1.db).references = "payment_method", (options.v1.db).index = true];
}

service PaymentProfileDomainService {
  rpc CreatePaymentProfile(CreatePaymentProfileRequest) returns (CreatePaymentProfileResponse);
  rpc ReadPaymentProfile(ReadPaymentProfileRequest) returns (ReadPaymentProfileResponse);
  rpc UpdatePaymentProfile(UpdatePaymentProfileRequest) returns (UpdatePaymentProfileResponse);
  rpc DeletePaymentProfile(DeletePaymentProfileRequest) returns (DeletePaymentProfileResponse);
  rpc ListPaymentProfiles(ListPaymentProfilesRequest) returns (ListPaymentProfilesResponse);
  rpc GetPaymentProfileListPageData(GetPaymentProfileListPageDataRequest)
    returns (GetPaymentProfileListPageDataResponse);
  rpc GetPaymentProfileItemPageData(GetPaymentProfileItemPageDataRequest)
    returns (GetPaymentProfileItemPageDataResponse);
}

message CreatePaymentProfileRequest {
  PaymentProfile data = 1;
}

message CreatePaymentProfileResponse {
  repeated PaymentProfile data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadPaymentProfileRequest {
  PaymentProfile data = 1;
}

message ReadPaymentProfileResponse {
  repeated PaymentProfile data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdatePaymentProfileRequest {
  PaymentProfile data = 1;
}

message UpdatePaymentProfileResponse {
  repeated PaymentProfile data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeletePaymentProfileRequest {
  PaymentProfile data = 1;
}

message DeletePaymentProfileResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListPaymentProfilesRequest {
  string client_id = 1;
  optional domain.common.v1.SearchRequest search = 2;
  optional domain.common.v1.FilterRequest filters = 3;
  optional domain.common.v1.SortRequest sort = 4;
  optional domain.common.v1.PaginationRequest pagination = 5;
}

message ListPaymentProfilesResponse {
  repeated PaymentProfile data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetPaymentProfileListPageDataRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message GetPaymentProfileListPageDataResponse {
  repeated PaymentProfile payment_profile_list = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
  optional domain.common.v1.PaginationResponse pagination = 4;
  repeated domain.common.v1.SearchResult search_results = 5;
}

message GetPaymentProfileItemPageDataRequest {
  string payment_profile_id = 1;
}

message GetPaymentProfileItemPageDataResponse {
  PaymentProfile payment_profile = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}