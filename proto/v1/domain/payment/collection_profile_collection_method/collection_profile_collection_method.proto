syntax = "proto3";

package domain.payment.v1;

option go_package = "leapfor.xyz/esqyma/golang/v1/domain/payment/collection_profile_collection_method";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "domain/payment/collection_profile/collection_profile.proto";
import "domain/payment/collection_method/collection_method.proto";

message CollectionProfileCollectionMethod {
  string id = 1;
  optional int64 date_created = 2;
  optional string date_created_string = 3;
  optional int64 date_modified = 4;
  optional string date_modified_string = 5;
  bool active = 6;
  optional CollectionProfile collection_profile = 7;
  string collection_profile_id = 8;
  optional CollectionMethod collection_method = 9;
  string collection_method_id = 10;
  bool primary = 11;
  optional string notes = 12;
  optional int32 display_order = 13;
  string payment_identifier = 14;
  string identifier_type = 15;
  optional string display_name = 16;
  bool masked = 17;
}

service CollectionProfileCollectionMethodDomainService {
  rpc CreateCollectionProfileCollectionMethod(CreateCollectionProfileCollectionMethodRequest) returns (CreateCollectionProfileCollectionMethodResponse);
  rpc ReadCollectionProfileCollectionMethod(ReadCollectionProfileCollectionMethodRequest) returns (ReadCollectionProfileCollectionMethodResponse);
  rpc UpdateCollectionProfileCollectionMethod(UpdateCollectionProfileCollectionMethodRequest) returns (UpdateCollectionProfileCollectionMethodResponse);
  rpc DeleteCollectionProfileCollectionMethod(DeleteCollectionProfileCollectionMethodRequest) returns (DeleteCollectionProfileCollectionMethodResponse);
  rpc ListCollectionProfileCollectionMethods(ListCollectionProfileCollectionMethodsRequest) returns (ListCollectionProfileCollectionMethodsResponse);
  rpc GetCollectionProfileCollectionMethodListPageData(GetCollectionProfileCollectionMethodListPageDataRequest)
    returns (GetCollectionProfileCollectionMethodListPageDataResponse);
  rpc GetCollectionProfileCollectionMethodItemPageData(GetCollectionProfileCollectionMethodItemPageDataRequest)
    returns (GetCollectionProfileCollectionMethodItemPageDataResponse);
}

message CreateCollectionProfileCollectionMethodRequest {
  CollectionProfileCollectionMethod data = 1;
}

message CreateCollectionProfileCollectionMethodResponse {
  repeated CollectionProfileCollectionMethod data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadCollectionProfileCollectionMethodRequest {
  CollectionProfileCollectionMethod data = 1;
}

message ReadCollectionProfileCollectionMethodResponse {
  repeated CollectionProfileCollectionMethod data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateCollectionProfileCollectionMethodRequest {
  CollectionProfileCollectionMethod data = 1;
}

message UpdateCollectionProfileCollectionMethodResponse {
  repeated CollectionProfileCollectionMethod data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteCollectionProfileCollectionMethodRequest {
  CollectionProfileCollectionMethod data = 1;
}

message DeleteCollectionProfileCollectionMethodResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListCollectionProfileCollectionMethodsRequest {
  optional string collection_profile_id = 1;
  optional string collection_method_id = 2;
  optional bool primary_only = 3;
  optional domain.common.v1.SearchRequest search = 4;
  optional domain.common.v1.FilterRequest filters = 5;
  optional domain.common.v1.SortRequest sort = 6;
  optional domain.common.v1.PaginationRequest pagination = 7;
}

message ListCollectionProfileCollectionMethodsResponse {
  repeated CollectionProfileCollectionMethod data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetCollectionProfileCollectionMethodListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetCollectionProfileCollectionMethodListPageDataResponse {
  repeated CollectionProfileCollectionMethod collection_profile_collection_method_list = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
  optional domain.common.v1.PaginationResponse pagination = 4;
  repeated domain.common.v1.SearchResult search_results = 5;
}

message GetCollectionProfileCollectionMethodItemPageDataRequest {
  string collection_profile_collection_method_id = 1;
}

message GetCollectionProfileCollectionMethodItemPageDataResponse {
  optional CollectionProfileCollectionMethod collection_profile_collection_method = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
