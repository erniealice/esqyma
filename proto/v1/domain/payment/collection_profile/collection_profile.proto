syntax = "proto3";

package domain.payment.v1;

option go_package = "leapfor.xyz/esqyma/golang/v1/domain/payment/collection_profile";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "domain/entity/client/client.proto";
import "domain/payment/collection_method/collection_method.proto";

message CollectionProfile {
  string id = 1;
  optional int64 date_created = 2;
  optional string date_created_string = 3;
  optional int64 date_modified = 4;
  optional string date_modified_string = 5;
  bool active = 6;
  optional domain.entity.v1.Client client = 7;
  string client_id = 8;
  optional CollectionMethod collection_method = 9;
  string collection_method_id = 10;
}

service CollectionProfileDomainService {
  rpc CreateCollectionProfile(CreateCollectionProfileRequest) returns (CreateCollectionProfileResponse);
  rpc ReadCollectionProfile(ReadCollectionProfileRequest) returns (ReadCollectionProfileResponse);
  rpc UpdateCollectionProfile(UpdateCollectionProfileRequest) returns (UpdateCollectionProfileResponse);
  rpc DeleteCollectionProfile(DeleteCollectionProfileRequest) returns (DeleteCollectionProfileResponse);
  rpc ListCollectionProfiles(ListCollectionProfilesRequest) returns (ListCollectionProfilesResponse);
  rpc GetCollectionProfileListPageData(GetCollectionProfileListPageDataRequest)
    returns (GetCollectionProfileListPageDataResponse);
  rpc GetCollectionProfileItemPageData(GetCollectionProfileItemPageDataRequest)
    returns (GetCollectionProfileItemPageDataResponse);
}

message CreateCollectionProfileRequest {
  CollectionProfile data = 1;
}

message CreateCollectionProfileResponse {
  repeated CollectionProfile data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadCollectionProfileRequest {
  CollectionProfile data = 1;
}

message ReadCollectionProfileResponse {
  repeated CollectionProfile data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateCollectionProfileRequest {
  CollectionProfile data = 1;
}

message UpdateCollectionProfileResponse {
  repeated CollectionProfile data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteCollectionProfileRequest {
  CollectionProfile data = 1;
}

message DeleteCollectionProfileResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListCollectionProfilesRequest {
  string client_id = 1;
  optional domain.common.v1.SearchRequest search = 2;
  optional domain.common.v1.FilterRequest filters = 3;
  optional domain.common.v1.SortRequest sort = 4;
  optional domain.common.v1.PaginationRequest pagination = 5;
}

message ListCollectionProfilesResponse {
  repeated CollectionProfile data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetCollectionProfileListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetCollectionProfileListPageDataResponse {
  repeated CollectionProfile collection_profile_list = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
  optional domain.common.v1.PaginationResponse pagination = 4;
  repeated domain.common.v1.SearchResult search_results = 5;
}

message GetCollectionProfileItemPageDataRequest {
  string collection_profile_id = 1;
}

message GetCollectionProfileItemPageDataResponse {
  optional CollectionProfile collection_profile = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
