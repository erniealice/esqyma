syntax = "proto3";

package domain.payment.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/payment/payment_method";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";
import "options/db.proto";

message PaymentMethod {
  option (options.v1.table).table = true;
  string id = 1;
  optional int64 date_created = 2;
  optional string date_created_string = 3;
  optional int64 date_modified = 4;
  optional string date_modified_string = 5;
  bool active = 6 [(options.v1.db).default = "true"];
  string name = 7;
  oneof method_details {
    CardDetails card = 8;
    BankAccountDetails bank_account = 9;
  }
  optional string provider_name = 10; // e.g., "Visa", "PayPal", "Chase Bank"
}

message CardDetails {
  string card_type = 1; // e.g., Visa, MasterCard
  string last_four_digits = 2;
  int32 expiry_month = 3;
  int32 expiry_year = 4;
}

message BankAccountDetails {
  string bank_name = 1;
  string last_four_digits = 2;
}

service PaymentMethodDomainService {
  rpc CreatePaymentMethod(CreatePaymentMethodRequest) returns (CreatePaymentMethodResponse);
  rpc ReadPaymentMethod(ReadPaymentMethodRequest) returns (ReadPaymentMethodResponse);
  rpc UpdatePaymentMethod(UpdatePaymentMethodRequest) returns (UpdatePaymentMethodResponse);
  rpc DeletePaymentMethod(DeletePaymentMethodRequest) returns (DeletePaymentMethodResponse);
  rpc ListPaymentMethods(ListPaymentMethodsRequest) returns (ListPaymentMethodsResponse);

  // NEW: Enhanced list with pagination, filtering, sorting, search
  rpc GetPaymentMethodListPageData(GetPaymentMethodListPageDataRequest)
    returns (GetPaymentMethodListPageDataResponse);

  // NEW: Enhanced item view with related data
  rpc GetPaymentMethodItemPageData(GetPaymentMethodItemPageDataRequest)
    returns (GetPaymentMethodItemPageDataResponse);
}

message CreatePaymentMethodRequest {
  PaymentMethod data = 1;
}

message CreatePaymentMethodResponse {
  repeated PaymentMethod data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadPaymentMethodRequest {
  PaymentMethod data = 1;
}

message ReadPaymentMethodResponse {
  repeated PaymentMethod data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdatePaymentMethodRequest {
  PaymentMethod data = 1;
}

message UpdatePaymentMethodResponse {
  repeated PaymentMethod data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeletePaymentMethodRequest {
  PaymentMethod data = 1;
}

message DeletePaymentMethodResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListPaymentMethodsRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListPaymentMethodsResponse {
  repeated PaymentMethod data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// NEW: Enhanced list request with core features
message GetPaymentMethodListPageDataRequest {
  // Pagination settings
  optional domain.common.v1.PaginationRequest pagination = 1;

  // Filter conditions
  optional domain.common.v1.FilterRequest filters = 2;

  // Sort settings
  optional domain.common.v1.SortRequest sort = 3;

  // Search settings
  optional domain.common.v1.SearchRequest search = 4;
}

// NEW: Enhanced list response with metadata
message GetPaymentMethodListPageDataResponse {
  // The payment method data
  repeated PaymentMethod payment_method_list = 1;

  // Pagination metadata
  optional domain.common.v1.PaginationResponse pagination = 2;

  // Search results metadata (when search is used)
  repeated domain.common.v1.SearchResult search_results = 3;

  // Response status
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

// NEW: Simple item request
message GetPaymentMethodItemPageDataRequest {
  // The payment method ID to retrieve
  string payment_method_id = 1;
}

// NEW: Simple item response
message GetPaymentMethodItemPageDataResponse {
  // The payment method data
  PaymentMethod payment_method = 1;

  // Response status
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}