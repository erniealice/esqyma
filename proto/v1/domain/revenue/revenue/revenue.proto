syntax = "proto3";

package domain.revenue.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/revenue/revenue";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/search.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";

import "domain/entity/client/client.proto";
import "domain/entity/location/location.proto";
import "domain/entity/payment_term/payment_term.proto";
import "options/db.proto";

message Revenue {
  string id = 1;
  optional int64 date_created = 2;
  optional string date_created_string = 3;
  optional int64 date_modified = 4;
  optional string date_modified_string = 5;
  bool active = 6;
  string name = 7;
  optional domain.entity.v1.Client client = 8;
  string client_id = 9;
  optional string revenue_date = 10; // ISO 8601 date (YYYY-MM-DD)
  reserved 11; // was revenue_date_string
  int64 total_amount = 12; // centavos
  string currency = 13;
  string status = 14;
  optional string reference_number = 15;
  optional string notes = 16;
  // field 17 reserved for future use
  optional string revenue_category_id = 18;
  optional domain.entity.v1.Location location = 19;
  string location_id = 20;
  optional string checkout_session_id = 21;   // Maya session reference
  optional string payment_provider = 22;      // "maya", "cash", etc.
  optional string fulfillment_type = 23;      // Client's delivery preference for physical goods: 'store_pickup' or 'home_delivery'. Not a fulfillment method — see Product.fulfillment_method.
  optional string delivery_address = 24;      // JSON or flat address string

  // GL integration
  optional string revenue_account_id = 25;    // Target GL revenue account for this transaction
  optional string journal_entry_id = 26;      // FK to journal_entry — set when ledger entry is posted
  optional string fulfillment_status = 27;   // Rollup of linked fulfillment records: 'pending', 'partial', 'fulfilled', 'failed'. Computed — do not set directly.
  optional string payment_term_id = 28;
  optional string due_date = 29; // ISO 8601 date (YYYY-MM-DD)
  reserved 30; // was due_date_string
  optional domain.entity.v1.PaymentTerm payment_term = 31;
  optional string subscription_id = 32;

  // Milestone billing traceability — populated only when the Revenue was
  // recognized through the MILESTONE branch (PricePlan.billing_kind=MILESTONE).
  // job_phase_id is denormalized at create time from BillingEvent.job_phase_id
  // for fast join-free reporting; billing_event_id is the one-to-one link
  // back to the source event row.
  optional string job_phase_id     = 33 [(options.v1.db).references = "job_phase",     (options.v1.db).index = true];
  optional string billing_event_id = 34 [(options.v1.db).references = "billing_event", (options.v1.db).index = true];
  optional string run_id           = 35 [(options.v1.db).references = "revenue_run",   (options.v1.db).index = true];

  // Tax denorm fields — Phase 1 tax integration
  // Populated by ComputeTaxesForRevenue; snapshotted at recognition time.
  optional int64 cash_amount_expected = 36;          // centavos: total_amount + SUM(SURCHARGE) - SUM(WITHHOLDING)
  optional int64 wht_amount_expected = 37;           // centavos: SUM(WITHHOLDING) — expected from buyer
  optional int64 wht_amount_certified = 38;          // centavos: SUM(actual_amount) across non-void WithholdingCertificate rows
  optional int64 wht_amount_variance = 39;           // centavos: wht_amount_expected - wht_amount_certified
  optional string settlement_status = 40;            // OPEN, CASH_RECEIVED_WHT_PENDING, FULLY_SETTLED, VARIANCE_OPEN
  optional bool tax_inclusive_pricing_snapshot = 41; // Snapshotted from workspace.tax_inclusive_pricing at recognition
  optional string tax_computation_enabled_snapshot = 42; // Snapshotted from workspace.tax_computation_enabled

  // Multi-currency / FX fields — Phase 1 tax integration
  optional string billing_currency = 43;             // ISO 4217 billing currency when different from functional_currency
  optional int64 billing_amount = 44;                // Original amount in billing_currency centavos (before FX conversion)
  optional int64 forex_rate_micro_units = 45;        // Snapshotted FX rate at recognition (functional per 1 billing unit * 1_000_000)
  optional string forex_rate_source = 46;            // "operator", "bsp_ref:<date>" — source of the FX rate used
}

// PreviewTaxLine — ephemeral, dry-run only. Not persisted.
// Populated in CreateRevenueWithLineItemsResponse when dry_run=true.
message PreviewTaxLine {
  string direction = 1;          // "SURCHARGE" or "WITHHOLDING"
  string tax_kind_snapshot = 2;
  optional string regulator_code_snapshot = 3;
  string authority_code_snapshot = 4;
  int64 taxable_base = 5;        // centavos
  int64 tax_amount = 6;          // centavos
  int32 rate_basis_points = 7;
  repeated string applied_to_line_item_ids = 8;
}

service RevenueDomainService {
  rpc CreateRevenue(CreateRevenueRequest) returns (CreateRevenueResponse);
  rpc ReadRevenue(ReadRevenueRequest) returns (ReadRevenueResponse);
  rpc UpdateRevenue(UpdateRevenueRequest) returns (UpdateRevenueResponse);
  rpc DeleteRevenue(DeleteRevenueRequest) returns (DeleteRevenueResponse);
  rpc ListRevenues(ListRevenuesRequest) returns (ListRevenuesResponse);
  rpc GetRevenueListPageData(GetRevenueListPageDataRequest) returns (GetRevenueListPageDataResponse);
  rpc GetRevenueItemPageData(GetRevenueItemPageDataRequest) returns (GetRevenueItemPageDataResponse);
  rpc CreateRevenueWithLineItems(CreateRevenueWithLineItemsRequest)
    returns (CreateRevenueWithLineItemsResponse);
}

message CreateRevenueRequest {
  Revenue data = 1;
}

message CreateRevenueResponse {
  repeated Revenue data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadRevenueRequest {
  Revenue data = 1;
}

message ReadRevenueResponse {
  repeated Revenue data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateRevenueRequest {
  Revenue data = 1;
}

message UpdateRevenueResponse {
  repeated Revenue data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteRevenueRequest {
  Revenue data = 1;
}

message DeleteRevenueResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListRevenuesRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListRevenuesResponse {
  repeated Revenue data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetRevenueListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetRevenueListPageDataResponse {
  repeated Revenue revenue_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetRevenueItemPageDataRequest {
  string revenue_id = 1;
}

message GetRevenueItemPageDataResponse {
  optional Revenue revenue = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message CreateRevenueWithLineItemsRequest {
  Revenue data = 1;
  // When set, the use case will resolve the subscription's price plan,
  // verify ProductPlan ⊂ ProductPricePlan coverage, and create line items
  // atomically alongside the Revenue. Empty = behaves like CreateRevenue.
  optional string subscription_id = 2;

  // Operator-supplied billing period (RFC3339) for revenue recognition.
  // Used for first-cycle detection and idempotency keying.
  optional string period_start = 3;
  optional string period_end   = 4;

  // Operator-supplied invoice issue date (ISO 8601 YYYY-MM-DD).
  // When empty, defaults to today.
  optional string revenue_date = 5;

  // Per-line operator overrides applied to the auto-populated draft.
  repeated LineItemOverride overrides = 6;

  // When true, the use case computes and returns the proposed Revenue + lines
  // but does NOT persist anything. Drawer GET path uses this for the preview.
  optional bool dry_run = 7;

  // When true, the use case skips header creation (the caller has already
  // created a Revenue) and only writes the line items against
  // existing_revenue_id. Used by the legacy manual revenue-add flow so the
  // single algorithm has one implementation. Pairs with existing_revenue_id.
  optional bool skip_header = 8;
  optional string existing_revenue_id = 9;

  // Reserved for a future force-override flag that bypasses the idempotency
  // check. NOT honored in v1 — see plan §11.3.
  reserved 10;
  reserved "force_override";

  // Milestone billing — engages the MILESTONE branch of recognize-revenue.
  // When billing_event_id is set, the use case keys idempotency on it
  // (single column) instead of (subscription_id, period_start, period_end).
  // override_total_amount + partial_reason support partial billing
  // (operator bills less than ev.billable_amount with a reason); when
  // leave_remainder_open=true, a child BillingEvent is spawned with
  // status=DEFERRED carrying the remainder.
  optional string billing_event_id      = 11;
  optional int64  override_total_amount = 12;
  optional string partial_reason        = 13;
  optional bool   leave_remainder_open  = 14;
}

message LineItemOverride {
  // Identifies the line being overridden by its source ProductPricePlan.
  string product_price_plan_id = 1;

  // When set, replaces the auto-populated unit price (centavos).
  optional int64 unit_price = 2;

  // When set, replaces the auto-populated quantity.
  optional double quantity = 3;

  // When set, replaces the auto-populated description.
  optional string description = 4;

  // When true, the operator removed this line from the draft preview.
  optional bool removed = 5;
}

message CreateRevenueWithLineItemsResponse {
  repeated Revenue data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;

  // Populated when the request was a dry_run preview. Mirrors the lines that
  // would be written. Empty when dry_run = false.
  repeated PreviewLineItem preview_lines = 4;

  // Non-blocking warnings (e.g. "plan has no billing cycle; defaulting to 1mo").
  repeated string warnings = 5;

  // Set when (subscription_id, period_start, period_end) collides with a
  // non-cancelled Revenue. Drawer surfaces a blocking banner with a link.
  optional string conflicting_revenue_id = 6;

  // Tax preview lines — populated when dry_run=true and tax_computation_enabled.
  // Shows the computed RevenueTaxLine rows without persisting them.
  repeated PreviewTaxLine preview_tax_lines = 7;
}

message PreviewLineItem {
  string product_price_plan_id = 1;
  string description = 2;
  int64 unit_price = 3;     // centavos
  double quantity = 4;
  int64 total_price = 5;    // centavos
  string currency = 6;
  // Treatment for badge rendering — one of "recurring", "first_cycle",
  // "usage_based", "one_time".
  string treatment = 7;
}
