syntax = "proto3";

package domain.revenue.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/revenue/revenue";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/search.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";

import "domain/entity/client/client.proto";
import "domain/entity/location/location.proto";
import "domain/entity/payment_term/payment_term.proto";

message Revenue {
  string id = 1;
  optional int64 date_created = 2;
  optional string date_created_string = 3;
  optional int64 date_modified = 4;
  optional string date_modified_string = 5;
  bool active = 6;
  string name = 7;
  optional domain.entity.v1.Client client = 8;
  string client_id = 9;
  optional string revenue_date = 10; // ISO 8601 date (YYYY-MM-DD)
  reserved 11; // was revenue_date_string
  int64 total_amount = 12; // centavos
  string currency = 13;
  string status = 14;
  optional string reference_number = 15;
  optional string notes = 16;
  // field 17 reserved for future use
  optional string revenue_category_id = 18;
  optional domain.entity.v1.Location location = 19;
  string location_id = 20;
  optional string checkout_session_id = 21;   // Maya session reference
  optional string payment_provider = 22;      // "maya", "cash", etc.
  optional string fulfillment_type = 23;      // Client's delivery preference for physical goods: 'store_pickup' or 'home_delivery'. Not a fulfillment method — see Product.fulfillment_method.
  optional string delivery_address = 24;      // JSON or flat address string

  // GL integration
  optional string revenue_account_id = 25;    // Target GL revenue account for this transaction
  optional string journal_entry_id = 26;      // FK to journal_entry — set when ledger entry is posted
  optional string fulfillment_status = 27;   // Rollup of linked fulfillment records: 'pending', 'partial', 'fulfilled', 'failed'. Computed — do not set directly.
  optional string payment_term_id = 28;
  optional string due_date = 29; // ISO 8601 date (YYYY-MM-DD)
  reserved 30; // was due_date_string
  optional domain.entity.v1.PaymentTerm payment_term = 31;
  optional string subscription_id = 32;
}

service RevenueDomainService {
  rpc CreateRevenue(CreateRevenueRequest) returns (CreateRevenueResponse);
  rpc ReadRevenue(ReadRevenueRequest) returns (ReadRevenueResponse);
  rpc UpdateRevenue(UpdateRevenueRequest) returns (UpdateRevenueResponse);
  rpc DeleteRevenue(DeleteRevenueRequest) returns (DeleteRevenueResponse);
  rpc ListRevenues(ListRevenuesRequest) returns (ListRevenuesResponse);
  rpc GetRevenueListPageData(GetRevenueListPageDataRequest) returns (GetRevenueListPageDataResponse);
  rpc GetRevenueItemPageData(GetRevenueItemPageDataRequest) returns (GetRevenueItemPageDataResponse);
  rpc CreateRevenueWithLineItems(CreateRevenueWithLineItemsRequest)
    returns (CreateRevenueWithLineItemsResponse);
}

message CreateRevenueRequest {
  Revenue data = 1;
}

message CreateRevenueResponse {
  repeated Revenue data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadRevenueRequest {
  Revenue data = 1;
}

message ReadRevenueResponse {
  repeated Revenue data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateRevenueRequest {
  Revenue data = 1;
}

message UpdateRevenueResponse {
  repeated Revenue data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteRevenueRequest {
  Revenue data = 1;
}

message DeleteRevenueResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListRevenuesRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListRevenuesResponse {
  repeated Revenue data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetRevenueListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetRevenueListPageDataResponse {
  repeated Revenue revenue_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetRevenueItemPageDataRequest {
  string revenue_id = 1;
}

message GetRevenueItemPageDataResponse {
  optional Revenue revenue = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message CreateRevenueWithLineItemsRequest {
  Revenue data = 1;
  // When set, the use case will resolve the subscription's price plan,
  // verify ProductPlan ⊂ ProductPricePlan coverage, and create line items
  // atomically alongside the Revenue. Empty = behaves like CreateRevenue.
  optional string subscription_id = 2;
}

message CreateRevenueWithLineItemsResponse {
  repeated Revenue data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
