syntax = "proto3";

package domain.revenue.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/revenue/revenue_run";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/search.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";

enum RevenueRunScopeKind {
  REVENUE_RUN_SCOPE_KIND_UNSPECIFIED = 0;
  REVENUE_RUN_SCOPE_KIND_SUBSCRIPTION = 1;
  REVENUE_RUN_SCOPE_KIND_CLIENT = 2;
  REVENUE_RUN_SCOPE_KIND_WORKSPACE = 3;
}

enum RevenueRunStatus {
  REVENUE_RUN_STATUS_UNSPECIFIED = 0;
  REVENUE_RUN_STATUS_PENDING = 1;
  REVENUE_RUN_STATUS_COMPLETE = 2;
  REVENUE_RUN_STATUS_FAILED = 3;
}

enum RevenueRunAttemptOutcome {
  REVENUE_RUN_ATTEMPT_OUTCOME_UNSPECIFIED = 0;
  REVENUE_RUN_ATTEMPT_OUTCOME_CREATED = 1;
  REVENUE_RUN_ATTEMPT_OUTCOME_SKIPPED = 2;
  REVENUE_RUN_ATTEMPT_OUTCOME_ERRORED = 3;
}

// RevenueRunSourceKind discriminates the source row from which a candidate /
// attempt was emitted. UNSPECIFIED is treated as SUBSCRIPTION_CYCLE for
// backward compatibility with pre-Plan-B run rows.
//
// Added 2026-05-17 by Plan B Phase 5 (advance-cash-events / Revenue Run).
enum RevenueRunSourceKind {
  REVENUE_RUN_SOURCE_KIND_UNSPECIFIED = 0;
  REVENUE_RUN_SOURCE_KIND_SUBSCRIPTION_CYCLE = 1;
  REVENUE_RUN_SOURCE_KIND_ADVANCE_COLLECTION = 2;
}

message RevenueRun {
  string id = 1;
  string workspace_id = 2;
  optional string client_id = 3;
  optional string subscription_id = 4;
  RevenueRunScopeKind scope_kind = 5;
  string as_of_date = 6; // YYYY-MM-DD
  int32 selection_count = 7;
  int32 created_count = 8;
  int32 skipped_count = 9;
  int32 errored_count = 10;
  RevenueRunStatus status = 11;
  string initiated_by = 12;
  optional int64 initiated_at = 13;
  optional int64 completed_at = 14;
  optional string notes = 15;
  bool active = 16;
  optional int64 date_created = 17;
  optional string date_created_string = 18;
  optional int64 date_modified = 19;
  optional string date_modified_string = 20;
}

message RevenueRunAttempt {
  string id = 1;
  string run_id = 2;
  string subscription_id = 3;
  string period_start = 4; // YYYY-MM-DD
  string period_end = 5; // YYYY-MM-DD
  string period_marker = 6;
  RevenueRunAttemptOutcome outcome = 7;
  optional string revenue_id = 8;
  optional string error_code = 9;
  optional string error_message = 10;
  optional int64 attempted_at = 11;
  bool active = 12;
  optional int64 date_created = 13;
  optional string date_created_string = 14;
  optional int64 date_modified = 15;
  optional string date_modified_string = 16;
  // source_kind discriminates SUBSCRIPTION_CYCLE vs ADVANCE_COLLECTION origin.
  // UNSPECIFIED is treated as SUBSCRIPTION_CYCLE so pre-Plan-B rows still
  // satisfy schema invariants. Plan B Phase 5.
  RevenueRunSourceKind source_kind = 17;
  // advance_collection_id is set when source_kind == ADVANCE_COLLECTION.
  optional string advance_collection_id = 18;
}

service RevenueRunDomainService {
  rpc CreateRevenueRun(CreateRevenueRunRequest) returns (CreateRevenueRunResponse);
  rpc ReadRevenueRun(ReadRevenueRunRequest) returns (ReadRevenueRunResponse);
  rpc UpdateRevenueRun(UpdateRevenueRunRequest) returns (UpdateRevenueRunResponse);
  rpc DeleteRevenueRun(DeleteRevenueRunRequest) returns (DeleteRevenueRunResponse);
  rpc ListRevenueRuns(ListRevenueRunsRequest) returns (ListRevenueRunsResponse);
  rpc CreateRevenueRunAttempt(CreateRevenueRunAttemptRequest) returns (CreateRevenueRunAttemptResponse);
  rpc ListRevenueRunAttempts(ListRevenueRunAttemptsRequest) returns (ListRevenueRunAttemptsResponse);
}

message CreateRevenueRunRequest {
  RevenueRun data = 1;
}

message CreateRevenueRunResponse {
  repeated RevenueRun data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadRevenueRunRequest {
  RevenueRun data = 1;
}

message ReadRevenueRunResponse {
  repeated RevenueRun data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateRevenueRunRequest {
  RevenueRun data = 1;
}

message UpdateRevenueRunResponse {
  repeated RevenueRun data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteRevenueRunRequest {
  RevenueRun data = 1;
}

message DeleteRevenueRunResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListRevenueRunsRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListRevenueRunsResponse {
  repeated RevenueRun data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
  optional domain.common.v1.PaginationResponse pagination = 4;
}

message CreateRevenueRunAttemptRequest {
  RevenueRunAttempt data = 1;
}

message CreateRevenueRunAttemptResponse {
  repeated RevenueRunAttempt data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ListRevenueRunAttemptsRequest {
  string run_id = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
}

message ListRevenueRunAttemptsResponse {
  repeated RevenueRunAttempt data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// ---------------------------------------------------------------------------
// Use-case messages (consumed by espyna use cases, not bound to an RPC).
// ---------------------------------------------------------------------------

// RevenueRunScope describes the filter for a candidate list or generate call.
// Empty fields mean "no filter for that dimension". Shared by
// ListRevenueRunCandidates and GenerateRevenueRun.
message RevenueRunScope {
  optional string workspace_id = 1;
  optional string client_id = 2;
  optional string subscription_id = 3;
  optional string as_of_date = 4; // YYYY-MM-DD; defaults to today (in workspace tz) when empty
}

// RevenueRunCandidate represents one billed period for one subscription that
// has not yet been invoiced (or that has a blocker preventing invoicing).
//
// As of Plan B Phase 5 (2026-05-17), a candidate may also represent the
// next-due tranche of an advance Collection (source_kind=ADVANCE_COLLECTION).
// When that's the case, subscription_id/subscription_name are empty and
// advance_collection_id is populated instead.
message RevenueRunCandidate {
  string subscription_id = 1;
  string subscription_name = 2;
  string client_id = 3;
  string client_name = 4;
  string plan_name = 5;
  string billing_cycle_label = 6;
  string currency = 7;
  string period_start = 8;  // YYYY-MM-DD
  string period_end = 9;    // YYYY-MM-DD
  string period_label = 10;
  string period_marker = 11;
  int64 amount = 12;
  int32 line_item_count = 13;
  bool eligible = 14;
  string blocker_reason = 15;
  // source_kind discriminates the origin of this candidate row.
  // UNSPECIFIED is treated as SUBSCRIPTION_CYCLE by view code.
  RevenueRunSourceKind source_kind = 16;
  // advance_collection_id is set when source_kind == ADVANCE_COLLECTION.
  optional string advance_collection_id = 17;
  // suppressing_advance_collection_id is set when source_kind ==
  // SUBSCRIPTION_CYCLE AND a TIME_BASED advance Collection overlaps this
  // period for the same client. The cycle candidate is rendered as a greyed
  // info-only row pointing at the advance.
  optional string suppressing_advance_collection_id = 18;
}

message ListRevenueRunCandidatesRequest {
  RevenueRunScope scope = 1;
  optional string cursor = 2;
  optional int32 limit = 3;
  // include_advance_collections opts-in to advance-Collection candidate
  // emission (Plan B Phase 5a). Default false → existing surfaces continue to
  // see subscription-only candidates. Surface commits flip this to true.
  optional bool include_advance_collections = 4;
}

message ListRevenueRunCandidatesResponse {
  repeated RevenueRunCandidate data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
  optional string next_cursor = 4;
}

// SelectedRevenueRunCandidate is one operator-confirmed selection to invoice.
//
// As of Plan B Phase 5, the selection may target an advance Collection
// (source_kind=ADVANCE_COLLECTION). When that's the case, subscription_id is
// empty and advance_collection_id is populated. Default UNSPECIFIED is
// treated as SUBSCRIPTION_CYCLE by GenerateRevenueRun for back-compat.
message SelectedRevenueRunCandidate {
  string subscription_id = 1;
  string period_start = 2;  // YYYY-MM-DD
  string period_end = 3;    // YYYY-MM-DD
  string period_marker = 4; // canonical idempotency anchor
  // source_kind discriminates the dispatcher branch in generate_revenue_run.
  RevenueRunSourceKind source_kind = 5;
  // advance_collection_id is set when source_kind == ADVANCE_COLLECTION.
  optional string advance_collection_id = 6;
}

// RevenueRunSelections carries either an explicit list or a filter token.
// Exactly one of explicit_list or filter_token should be set.
message RevenueRunSelections {
  repeated SelectedRevenueRunCandidate explicit_list = 1;
  optional string filter_token = 2; // signed server snapshot; deferred per v1 progress.md D9
}

message GenerateRevenueRunRequest {
  RevenueRunScope scope = 1;
  RevenueRunSelections selections = 2;
}

message GenerateRevenueRunResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
  optional RevenueRun run = 3;
  repeated RevenueRunAttempt attempts = 4;
}
