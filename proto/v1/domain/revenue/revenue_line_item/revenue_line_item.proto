syntax = "proto3";

package domain.revenue.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/revenue/revenue_line_item";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/search.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";

import "domain/revenue/revenue/revenue.proto";
import "domain/product/product/product.proto";

import "options/db.proto";

message RevenueLineItem {
  option (options.v1.table).table = true;

  string id = 1;
  optional int64 date_created = 2;
  optional string date_created_string = 3;
  optional int64 date_modified = 4;
  optional string date_modified_string = 5;
  bool active = 6;
  optional Revenue revenue = 7;
  string revenue_id = 8;
  optional domain.product.v1.Product product = 9;
  optional string product_id = 10;
  string description = 11;
  double quantity = 12;
  int64 unit_price = 13; // centavos
  int64 total_price = 14; // centavos
  optional string notes = 16;
  string line_item_type = 17;           // "item" or "discount"
  string inventory_item_id = 18;         // FK to inventory_item table
  string inventory_serial_id = 19;       // FK to inventory_serial table (for serialized items)
  optional string price_list_id = 20;    // FK to price_list
  optional string variant_id = 21;       // FK to product_variant
  optional string variant_label = 22;    // display label ("256GB Black")
  optional string location_id = 23;      // FK to location (where stock was pulled)
  optional int64 cost_price = 24; // centavos       // purchase cost for margin tracking
  optional string product_price_plan_id = 25 [(options.v1.db).references = "product_price_plan", (options.v1.db).index = true];
  optional string price_product_id = 26 [(options.v1.db).references = "price_product", (options.v1.db).index = true]; // FK to price_product — tracks which price_product was used for one-time revenue line items
  optional string job_activity_id = 27 [(options.v1.db).references = "job_activity", (options.v1.db).index = true]; // FK to job_activity — links line item to the activity that generated it

  // Drift-recovered columns (DB had these; proto did not)
  int64 line_amount = 28;                        // centavos — total amount for this line (NOT NULL in DB)
  optional string subscription_id = 29 [(options.v1.db).references = "subscription", (options.v1.db).index = true]; // FK to subscription — links line item to recurring source
  optional string workspace_id = 30 [(options.v1.db).references = "workspace", (options.v1.db).index = true];

  // Tax snapshot fields — Phase 1 tax integration
  // Snapshotted at revenue recognition time from product / product_price_plan.
  // Used by ComputeTaxesForRevenue as the authoritative treatment for this line.
  optional string tax_treatment_snapshot = 31;    // TaxTreatment.code at recognition (e.g. "STANDARD")
  optional string withholding_class_snapshot = 32; // TaxClass.code at recognition (e.g. "PROFESSIONAL_CORPORATE")

  // Multi-currency: original billing amount for this line before FX conversion.
  // NULL when billing_currency == functional_currency.
  optional int64 billing_amount = 33;             // centavos in billing_currency
}

service RevenueLineItemDomainService {
  rpc CreateRevenueLineItem(CreateRevenueLineItemRequest) returns (CreateRevenueLineItemResponse);
  rpc ReadRevenueLineItem(ReadRevenueLineItemRequest) returns (ReadRevenueLineItemResponse);
  rpc UpdateRevenueLineItem(UpdateRevenueLineItemRequest) returns (UpdateRevenueLineItemResponse);
  rpc DeleteRevenueLineItem(DeleteRevenueLineItemRequest) returns (DeleteRevenueLineItemResponse);
  rpc ListRevenueLineItems(ListRevenueLineItemsRequest) returns (ListRevenueLineItemsResponse);
  rpc GetRevenueLineItemListPageData(GetRevenueLineItemListPageDataRequest) returns (GetRevenueLineItemListPageDataResponse);
  rpc GetRevenueLineItemItemPageData(GetRevenueLineItemItemPageDataRequest) returns (GetRevenueLineItemItemPageDataResponse);
}

message CreateRevenueLineItemRequest {
  RevenueLineItem data = 1;
}

message CreateRevenueLineItemResponse {
  repeated RevenueLineItem data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadRevenueLineItemRequest {
  RevenueLineItem data = 1;
}

message ReadRevenueLineItemResponse {
  repeated RevenueLineItem data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateRevenueLineItemRequest {
  RevenueLineItem data = 1;
}

message UpdateRevenueLineItemResponse {
  repeated RevenueLineItem data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteRevenueLineItemRequest {
  RevenueLineItem data = 1;
}

message DeleteRevenueLineItemResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListRevenueLineItemsRequest {
  optional string revenue_id = 1;
  optional domain.common.v1.SearchRequest search = 2;
  optional domain.common.v1.FilterRequest filters = 3;
  optional domain.common.v1.SortRequest sort = 4;
  optional domain.common.v1.PaginationRequest pagination = 5;
}

message ListRevenueLineItemsResponse {
  repeated RevenueLineItem data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetRevenueLineItemListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetRevenueLineItemListPageDataResponse {
  repeated RevenueLineItem revenue_line_item_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetRevenueLineItemItemPageDataRequest {
  string revenue_line_item_id = 1;
}

message GetRevenueLineItemItemPageDataResponse {
  optional RevenueLineItem revenue_line_item = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
