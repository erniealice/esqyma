syntax = "proto3";

package domain.payroll.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/payroll/rate_table";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "options/db.proto";

// RateTableStatus drives versioning and supersession.
enum RateTableStatus {
  RATE_TABLE_STATUS_UNSPECIFIED = 0;
  RATE_TABLE_STATUS_DRAFT       = 1;
  RATE_TABLE_STATUS_ACTIVE      = 2;
  RATE_TABLE_STATUS_SUPERSEDED  = 3;
  RATE_TABLE_STATUS_VOIDED      = 4;
}

// RateTable is a versioned, jurisdiction-keyed bracket/rate set used by
// statutory deduction and tax calculators.
//
// Q11 decision: `kind` is a controlled-vocab string (not enum) because
// jurisdictions vary too much: SSS_EMPLOYEE_SHARE, FICA_OASDI, KV_EMPLOYEE,
// BIR_WITHHOLDING_SEMI_MONTHLY, etc. Linter checks the seed CSV.
//
// Lookup is always asOf=PayCycle.pay_date — never now() — so reposting
// reproduces despite newer rows.
message RateTable {
  option (options.v1.table).table = true;

  string id = 1;
  // Empty workspace_id = global default available to all workspaces in the region.
  optional string workspace_id = 2 [(options.v1.db).references = "workspace", (options.v1.db).index = true];

  // Routing
  string compliance_region = 3 [(options.v1.db).index = true]; // "PH" | "US-CA" | ...
  string kind = 4 [(options.v1.db).index = true];               // controlled vocab

  // Effective dating
  string effective_from = 5;          // ISO 8601 date
  optional string effective_to = 6;   // null = open-ended
  string version_label = 7;           // human-readable e.g. "PH-SSS-2025-01"
  optional string supersedes_id = 8;  // FK to a prior RateTable

  // Provenance
  string source_citation = 9;         // "RA 11199" / "TRAIN Law" / "RR 11-2018 Annex E"

  // Lifecycle
  RateTableStatus status = 10 [(options.v1.db).index = true];

  // Audit
  bool active = 11 [(options.v1.db).default = "true"];
  optional int64 date_created = 12;
  optional string date_created_string = 13;
  optional int64 date_modified = 14;
  optional string date_modified_string = 15;
}

service RateTableDomainService {
  rpc CreateRateTable(CreateRateTableRequest) returns (CreateRateTableResponse);
  rpc ReadRateTable(ReadRateTableRequest) returns (ReadRateTableResponse);
  rpc UpdateRateTable(UpdateRateTableRequest) returns (UpdateRateTableResponse);
  rpc DeleteRateTable(DeleteRateTableRequest) returns (DeleteRateTableResponse);
  rpc ListRateTables(ListRateTablesRequest) returns (ListRateTablesResponse);
  rpc GetRateTableListPageData(GetRateTableListPageDataRequest) returns (GetRateTableListPageDataResponse);
  rpc GetRateTableItemPageData(GetRateTableItemPageDataRequest) returns (GetRateTableItemPageDataResponse);
}

message CreateRateTableRequest { RateTable data = 1; }
message CreateRateTableResponse { repeated RateTable data = 1; bool success = 2; optional domain.common.v1.Error error = 3; }
message ReadRateTableRequest { RateTable data = 1; }
message ReadRateTableResponse { repeated RateTable data = 1; bool success = 2; optional domain.common.v1.Error error = 3; }
message UpdateRateTableRequest { RateTable data = 1; }
message UpdateRateTableResponse { repeated RateTable data = 1; bool success = 2; optional domain.common.v1.Error error = 3; }
message DeleteRateTableRequest { RateTable data = 1; }
message DeleteRateTableResponse { bool success = 1; optional domain.common.v1.Error error = 2; }

message ListRateTablesRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}
message ListRateTablesResponse { repeated RateTable data = 1; bool success = 2; optional domain.common.v1.Error error = 3; }

message GetRateTableListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}
message GetRateTableListPageDataResponse {
  repeated RateTable rate_table_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}
message GetRateTableItemPageDataRequest { string rate_table_id = 1; }
message GetRateTableItemPageDataResponse {
  optional RateTable rate_table = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
