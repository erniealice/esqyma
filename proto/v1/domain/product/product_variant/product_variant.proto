syntax = "proto3";

package domain.product.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/product/product_variant";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "domain/product/product/product.proto";
import "options/db.proto";

message ProductVariant {
  option (options.v1.table).table = true;
  string id = 1;
  string product_id = 2 [(options.v1.db).references = "product", (options.v1.db).index = true];
  string sku = 3;
  double price_override = 4;
  bool active = 5 [(options.v1.db).default = "true"];
  map<string, string> variant_attributes = 6;
  optional int64 date_created = 7;
  optional string date_created_string = 8;
  optional int64 date_modified = 9;
  optional string date_modified_string = 10;
  Product product = 11;
}

service ProductVariantDomainService {
  rpc CreateProductVariant(CreateProductVariantRequest) returns (CreateProductVariantResponse);
  rpc ReadProductVariant(ReadProductVariantRequest) returns (ReadProductVariantResponse);
  rpc UpdateProductVariant(UpdateProductVariantRequest) returns (UpdateProductVariantResponse);
  rpc DeleteProductVariant(DeleteProductVariantRequest) returns (DeleteProductVariantResponse);
  rpc ListProductVariants(ListProductVariantsRequest) returns (ListProductVariantsResponse);
  rpc GetProductVariantListPageData(GetProductVariantListPageDataRequest)
    returns (GetProductVariantListPageDataResponse);
  rpc GetProductVariantItemPageData(GetProductVariantItemPageDataRequest)
    returns (GetProductVariantItemPageDataResponse);
}

message CreateProductVariantRequest {
  ProductVariant data = 1;
}

message CreateProductVariantResponse {
  repeated ProductVariant data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message CreateProductVariantBatchRequest {
  repeated ProductVariant data = 1;
}

message CreateProductVariantBatchResponse {
  repeated ProductVariant data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadProductVariantRequest {
  ProductVariant data = 1;
}

message ReadProductVariantResponse {
  repeated ProductVariant data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateProductVariantRequest {
  ProductVariant data = 1;
}

message UpdateProductVariantResponse {
  repeated ProductVariant data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteProductVariantRequest {
  ProductVariant data = 1;
}

message DeleteProductVariantResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListProductVariantsRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListProductVariantsResponse {
  repeated ProductVariant data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetProductVariantListPageDataRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message GetProductVariantListPageDataResponse {
  repeated ProductVariant product_variant_list = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
  optional domain.common.v1.PaginationResponse pagination = 4;
  repeated domain.common.v1.SearchResult search_results = 5;
}

message GetProductVariantItemPageDataRequest {
  string product_variant_id = 1;
}

message GetProductVariantItemPageDataResponse {
  ProductVariant product_variant = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
