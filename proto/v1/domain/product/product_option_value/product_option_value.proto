syntax = "proto3";

package domain.product.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/product/product_option_value";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "domain/product/product_option/product_option.proto";
import "options/db.proto";
import "google/protobuf/struct.proto";

message ProductOptionValue {
  option (options.v1.table).table = true;
  option (options.v1.table).unique_together = "product_option_id,value";
  string id = 1;
  string product_option_id = 2 [(options.v1.db).references = "product_option", (options.v1.db).index = true];
  string label = 3;
  string value = 4;
  int32 sort_order = 5 [(options.v1.db).default = "0"];
  google.protobuf.Struct metadata = 6;
  bool active = 7 [(options.v1.db).default = "true"];
  optional int64 date_created = 8;
  optional string date_created_string = 9;
  optional int64 date_modified = 10;
  optional string date_modified_string = 11;
  ProductOption product_option = 12;
}

service ProductOptionValueDomainService {
  rpc CreateProductOptionValue(CreateProductOptionValueRequest) returns (CreateProductOptionValueResponse);
  rpc ReadProductOptionValue(ReadProductOptionValueRequest) returns (ReadProductOptionValueResponse);
  rpc UpdateProductOptionValue(UpdateProductOptionValueRequest) returns (UpdateProductOptionValueResponse);
  rpc DeleteProductOptionValue(DeleteProductOptionValueRequest) returns (DeleteProductOptionValueResponse);
  rpc ListProductOptionValues(ListProductOptionValuesRequest) returns (ListProductOptionValuesResponse);
  rpc GetProductOptionValueListPageData(GetProductOptionValueListPageDataRequest)
    returns (GetProductOptionValueListPageDataResponse);
  rpc GetProductOptionValueItemPageData(GetProductOptionValueItemPageDataRequest)
    returns (GetProductOptionValueItemPageDataResponse);
}

message CreateProductOptionValueRequest {
  ProductOptionValue data = 1;
}

message CreateProductOptionValueResponse {
  repeated ProductOptionValue data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadProductOptionValueRequest {
  ProductOptionValue data = 1;
}

message ReadProductOptionValueResponse {
  repeated ProductOptionValue data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateProductOptionValueRequest {
  ProductOptionValue data = 1;
}

message UpdateProductOptionValueResponse {
  repeated ProductOptionValue data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteProductOptionValueRequest {
  ProductOptionValue data = 1;
}

message DeleteProductOptionValueResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListProductOptionValuesRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListProductOptionValuesResponse {
  repeated ProductOptionValue data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetProductOptionValueListPageDataRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message GetProductOptionValueListPageDataResponse {
  repeated ProductOptionValue product_option_value_list = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
  optional domain.common.v1.PaginationResponse pagination = 4;
  repeated domain.common.v1.SearchResult search_results = 5;
}

message GetProductOptionValueItemPageDataRequest {
  string product_option_value_id = 1;
}

message GetProductOptionValueItemPageDataResponse {
  ProductOptionValue product_option_value = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
