syntax = "proto3";

package domain.product.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/product/resource";

import "domain/common/error.proto";
import "domain/common/search.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/pagination.proto";

import "domain/product/product/product.proto";
import "options/db.proto";

message Resource {
  option (options.v1.table).table = true;
  string id = 1;
  optional int64 date_created = 2;
  optional string date_created_string = 3;
  optional int64 date_modified = 4;
  optional string date_modified_string = 5;
  bool active = 6 [(options.v1.db).default = "true"];
  string name = 7;
  optional string description = 8;
  optional Product product = 9;
  string product_id = 10 [(options.v1.db).references = "product", (options.v1.db).index = true];
}

service ResourceDomainService {
  rpc CreateResource(CreateResourceRequest) returns (CreateResourceResponse);
  rpc ReadResource(ReadResourceRequest) returns (ReadResourceResponse);
  rpc UpdateResource(UpdateResourceRequest) returns (UpdateResourceResponse);
  rpc DeleteResource(DeleteResourceRequest) returns (DeleteResourceResponse);
  rpc ListResources(ListResourcesRequest) returns (ListResourcesResponse);
  rpc GetResourceListPageData(GetResourceListPageDataRequest) returns (GetResourceListPageDataResponse);
  rpc GetResourceItemPageData(GetResourceItemPageDataRequest) returns (GetResourceItemPageDataResponse);
}

message CreateResourceRequest {
  Resource data = 1;
}

message CreateResourceResponse {
  repeated Resource data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadResourceRequest {
  Resource data = 1;
}

message ReadResourceResponse {
  repeated Resource data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateResourceRequest {
  Resource data = 1;
}

message UpdateResourceResponse {
  repeated Resource data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteResourceRequest {
  Resource data = 1;
}

message DeleteResourceResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListResourcesRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListResourcesResponse {
  repeated Resource data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetResourceListPageDataRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message GetResourceListPageDataResponse {
  repeated Resource resource_list = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
  optional domain.common.v1.PaginationResponse pagination = 4;
  repeated domain.common.v1.SearchResult search_results = 5;
}

message GetResourceItemPageDataRequest {
  string resource_id = 1;
}

message GetResourceItemPageDataResponse {
  Resource resource = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}