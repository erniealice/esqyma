syntax = "proto3";

package domain.product.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/product/product_line";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";
import "options/db.proto";

// ProductLine is the many-to-many link between products and lines.
message ProductLine {
  option (options.v1.table).table = true;
  option (options.v1.table).unique_together = "product_id,line_id";
  string id = 1;
  optional int64 date_created = 2;
  optional string date_created_string = 3;
  optional int64 date_modified = 4;
  optional string date_modified_string = 5;
  bool active = 6 [(options.v1.db).default = "true"];
  string product_id = 7 [(options.v1.db).references = "product", (options.v1.db).index = true];
  string line_id = 8 [(options.v1.db).references = "line", (options.v1.db).index = true];
  int32 sort_order = 9;
}

service ProductLineDomainService {
  rpc CreateProductLine(CreateProductLineRequest) returns (CreateProductLineResponse);
  rpc ReadProductLine(ReadProductLineRequest) returns (ReadProductLineResponse);
  rpc UpdateProductLine(UpdateProductLineRequest) returns (UpdateProductLineResponse);
  rpc DeleteProductLine(DeleteProductLineRequest) returns (DeleteProductLineResponse);
  rpc ListProductLines(ListProductLinesRequest) returns (ListProductLinesResponse);
  rpc GetProductLineListPageData(GetProductLineListPageDataRequest)
    returns (GetProductLineListPageDataResponse);
  rpc GetProductLineItemPageData(GetProductLineItemPageDataRequest)
    returns (GetProductLineItemPageDataResponse);
}

message CreateProductLineRequest {
  ProductLine data = 1;
}

message CreateProductLineResponse {
  repeated ProductLine data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadProductLineRequest {
  ProductLine data = 1;
}

message ReadProductLineResponse {
  repeated ProductLine data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateProductLineRequest {
  ProductLine data = 1;
}

message UpdateProductLineResponse {
  repeated ProductLine data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteProductLineRequest {
  ProductLine data = 1;
}

message DeleteProductLineResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListProductLinesRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListProductLinesResponse {
  repeated ProductLine data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetProductLineListPageDataRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message GetProductLineListPageDataResponse {
  repeated ProductLine product_line_list = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
  optional domain.common.v1.PaginationResponse pagination = 4;
  repeated domain.common.v1.SearchResult search_results = 5;
}

message GetProductLineItemPageDataRequest {
  string product_line_id = 1;
}

message GetProductLineItemPageDataResponse {
  ProductLine product_line = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
