syntax = "proto3";

package domain.product.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/product/product_variant_image";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";
import "options/db.proto";

message ProductVariantImage {
  option (options.v1.table).table = true;
  string id = 1;
  optional int64 date_created = 2;
  optional string date_created_string = 3;
  optional int64 date_modified = 4;
  optional string date_modified_string = 5;
  bool active = 6 [(options.v1.db).default = "true"];
  string product_variant_id = 7 [(options.v1.db).references = "product_variant", (options.v1.db).index = true];
  string image_url = 8;
  optional string alt_text = 9;
  int32 sort_order = 10;
  bool is_primary = 11;
}

service ProductVariantImageDomainService {
  rpc CreateProductVariantImage(CreateProductVariantImageRequest) returns (CreateProductVariantImageResponse);
  rpc ReadProductVariantImage(ReadProductVariantImageRequest) returns (ReadProductVariantImageResponse);
  rpc UpdateProductVariantImage(UpdateProductVariantImageRequest) returns (UpdateProductVariantImageResponse);
  rpc DeleteProductVariantImage(DeleteProductVariantImageRequest) returns (DeleteProductVariantImageResponse);
  rpc ListProductVariantImages(ListProductVariantImagesRequest) returns (ListProductVariantImagesResponse);
  rpc GetProductVariantImageListPageData(GetProductVariantImageListPageDataRequest)
    returns (GetProductVariantImageListPageDataResponse);
  rpc GetProductVariantImageItemPageData(GetProductVariantImageItemPageDataRequest)
    returns (GetProductVariantImageItemPageDataResponse);
}

message CreateProductVariantImageRequest {
  ProductVariantImage data = 1;
}

message CreateProductVariantImageResponse {
  repeated ProductVariantImage data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadProductVariantImageRequest {
  ProductVariantImage data = 1;
}

message ReadProductVariantImageResponse {
  repeated ProductVariantImage data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateProductVariantImageRequest {
  ProductVariantImage data = 1;
}

message UpdateProductVariantImageResponse {
  repeated ProductVariantImage data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteProductVariantImageRequest {
  ProductVariantImage data = 1;
}

message DeleteProductVariantImageResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListProductVariantImagesRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListProductVariantImagesResponse {
  repeated ProductVariantImage data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetProductVariantImageListPageDataRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message GetProductVariantImageListPageDataResponse {
  repeated ProductVariantImage product_variant_image_list = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
  optional domain.common.v1.PaginationResponse pagination = 4;
  repeated domain.common.v1.SearchResult search_results = 5;
}

message GetProductVariantImageItemPageDataRequest {
  string product_variant_image_id = 1;
}

message GetProductVariantImageItemPageDataResponse {
  ProductVariantImage product_variant_image = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
