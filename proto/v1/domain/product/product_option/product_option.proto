syntax = "proto3";

package domain.product.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/product/product_option";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "domain/product/product/product.proto";
import "options/db.proto";

message ProductOption {
  option (options.v1.table).table = true;
  string id = 1;
  string product_id = 2 [(options.v1.db).references = "product", (options.v1.db).index = true];
  string name = 3;
  string code = 4;
  string data_type = 5 [(options.v1.db).default = "'text_list'"];
  int32 sort_order = 6 [(options.v1.db).default = "0"];
  bool active = 7 [(options.v1.db).default = "true"];
  optional int64 date_created = 8;
  optional string date_created_string = 9;
  optional int64 date_modified = 10;
  optional string date_modified_string = 11;
  Product product = 12;
  optional double min_value = 13;
  optional double max_value = 14;
  bool required = 15 [(options.v1.db).default = "false"];
  optional string description = 16;
}

service ProductOptionDomainService {
  rpc CreateProductOption(CreateProductOptionRequest) returns (CreateProductOptionResponse);
  rpc ReadProductOption(ReadProductOptionRequest) returns (ReadProductOptionResponse);
  rpc UpdateProductOption(UpdateProductOptionRequest) returns (UpdateProductOptionResponse);
  rpc DeleteProductOption(DeleteProductOptionRequest) returns (DeleteProductOptionResponse);
  rpc ListProductOptions(ListProductOptionsRequest) returns (ListProductOptionsResponse);
  rpc GetProductOptionListPageData(GetProductOptionListPageDataRequest)
    returns (GetProductOptionListPageDataResponse);
  rpc GetProductOptionItemPageData(GetProductOptionItemPageDataRequest)
    returns (GetProductOptionItemPageDataResponse);
}

message CreateProductOptionRequest {
  ProductOption data = 1;
}

message CreateProductOptionResponse {
  repeated ProductOption data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadProductOptionRequest {
  ProductOption data = 1;
}

message ReadProductOptionResponse {
  repeated ProductOption data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateProductOptionRequest {
  ProductOption data = 1;
}

message UpdateProductOptionResponse {
  repeated ProductOption data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteProductOptionRequest {
  ProductOption data = 1;
}

message DeleteProductOptionResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListProductOptionsRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListProductOptionsResponse {
  repeated ProductOption data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetProductOptionListPageDataRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message GetProductOptionListPageDataResponse {
  repeated ProductOption product_option_list = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
  optional domain.common.v1.PaginationResponse pagination = 4;
  repeated domain.common.v1.SearchResult search_results = 5;
}

message GetProductOptionItemPageDataRequest {
  string product_option_id = 1;
}

message GetProductOptionItemPageDataResponse {
  ProductOption product_option = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
