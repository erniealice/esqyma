syntax = "proto3";

package domain.product.v1;


option go_package = "github.com/erniealice/esqyma/golang/v1/domain/product/collection_plan";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";
import "options/db.proto";

message CollectionPlan {
  option (options.v1.table).table = true;
  option (options.v1.table).unique_together = "collection_id,plan_id";
  string id = 1;
  string collection_id = 2 [(options.v1.db).references = "collection", (options.v1.db).index = true];
  string plan_id = 3 [(options.v1.db).references = "plan", (options.v1.db).index = true];
  optional int64 date_created = 4;
  optional string date_created_string = 5;
  optional int64 date_modified = 6;
  optional string date_modified_string = 7;
  bool active = 8 [(options.v1.db).default = "true"];
}

service CollectionPlanDomainService {
  rpc CreateCollectionPlan(CreateCollectionPlanRequest) returns (CreateCollectionPlanResponse);
  rpc ReadCollectionPlan(ReadCollectionPlanRequest) returns (ReadCollectionPlanResponse);
  rpc UpdateCollectionPlan(UpdateCollectionPlanRequest) returns (UpdateCollectionPlanResponse);
  rpc DeleteCollectionPlan(DeleteCollectionPlanRequest) returns (DeleteCollectionPlanResponse);
  rpc ListCollectionPlans(ListCollectionPlansRequest) returns (ListCollectionPlansResponse);
  rpc GetCollectionPlanListPageData(GetCollectionPlanListPageDataRequest)
    returns (GetCollectionPlanListPageDataResponse);
  rpc GetCollectionPlanItemPageData(GetCollectionPlanItemPageDataRequest)
    returns (GetCollectionPlanItemPageDataResponse);
}

message CreateCollectionPlanRequest {
  CollectionPlan data = 1;
}

message CreateCollectionPlanResponse {
  repeated CollectionPlan data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadCollectionPlanRequest {
  CollectionPlan data = 1;
}

message ReadCollectionPlanResponse {
  repeated CollectionPlan data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateCollectionPlanRequest {
  CollectionPlan data = 1;
}

message UpdateCollectionPlanResponse {
  repeated CollectionPlan data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteCollectionPlanRequest {
  CollectionPlan data = 1;
}

message DeleteCollectionPlanResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListCollectionPlansRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListCollectionPlansResponse {
  repeated CollectionPlan data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetCollectionPlanListPageDataRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message GetCollectionPlanListPageDataResponse {
  repeated CollectionPlan collection_plan_list = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
  optional domain.common.v1.PaginationResponse pagination = 4;
  repeated domain.common.v1.SearchResult search_results = 5;
}

message GetCollectionPlanItemPageDataRequest {
  string collection_plan_id = 1;
}

message GetCollectionPlanItemPageDataResponse {
  CollectionPlan collection_plan = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}