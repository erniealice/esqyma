syntax = "proto3";

package domain.product.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/product/line";

import "domain/common/error.proto";
import "domain/common/search.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/pagination.proto";
import "domain/product/product_line/product_line.proto";
import "options/db.proto";

// Line represents a product taxonomy grouping used for product/service line organization.
message Line {
  option (options.v1.table).table = true;
  string id = 1;
  string name = 2;
  string description = 3;
  optional int64 date_created = 4;
  optional string date_created_string = 5;
  optional int64 date_modified = 6;
  optional string date_modified_string = 7;
  bool active = 8 [(options.v1.db).default = "true"];
  repeated ProductLine product_lines = 9;
}

service LineDomainService {
  rpc CreateLine(CreateLineRequest) returns (CreateLineResponse);
  rpc ReadLine(ReadLineRequest) returns (ReadLineResponse);
  rpc UpdateLine(UpdateLineRequest) returns (UpdateLineResponse);
  rpc DeleteLine(DeleteLineRequest) returns (DeleteLineResponse);
  rpc ListLines(ListLinesRequest) returns (ListLinesResponse);
  rpc GetLineListPageData(GetLineListPageDataRequest) returns (GetLineListPageDataResponse);
  rpc GetLineItemPageData(GetLineItemPageDataRequest) returns (GetLineItemPageDataResponse);
}

message CreateLineRequest {
  Line data = 1;
}

message CreateLineResponse {
  repeated Line data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadLineRequest {
  Line data = 1;
}

message ReadLineResponse {
  repeated Line data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateLineRequest {
  Line data = 1;
}

message UpdateLineResponse {
  repeated Line data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteLineRequest {
  Line data = 1;
}

message DeleteLineResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListLinesRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListLinesResponse {
  repeated Line data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetLineListPageDataRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message GetLineListPageDataResponse {
  repeated Line line_list = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
  optional domain.common.v1.PaginationResponse pagination = 4;
  repeated domain.common.v1.SearchResult search_results = 5;
}

message GetLineItemPageDataRequest {
  string line_id = 1;
}

message GetLineItemPageDataResponse {
  Line line = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
