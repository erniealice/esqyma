syntax = "proto3";

package domain.tenancy.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/tenancy/tenant_invoice";

import "domain/common/error.proto";
import "domain/common/search.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/pagination.proto";
import "options/db.proto";

// TenantInvoiceStatus tracks the billing lifecycle of a platform invoice.
enum TenantInvoiceStatus {
  TENANT_INVOICE_STATUS_UNSPECIFIED = 0;
  TENANT_INVOICE_STATUS_DRAFT       = 1;
  TENANT_INVOICE_STATUS_ISSUED      = 2;
  TENANT_INVOICE_STATUS_PAID        = 3;
  TENANT_INVOICE_STATUS_FAILED      = 4;
  TENANT_INVOICE_STATUS_VOIDED      = 5;
}

// TenantInvoice represents a billing invoice issued by Ichizen to a workspace
// for their platform subscription. Linked to TenantSubscription for the billing
// period it covers. Amounts in centavos.
message TenantInvoice {
  option (options.v1.table).table = true;

  string id                            = 1;
  optional int64 date_created          = 2;
  optional string date_created_string  = 3;
  optional int64 date_modified         = 4;
  optional string date_modified_string = 5;
  bool active                          = 6 [(options.v1.db).default = "true"];

  string workspace_id                  = 7 [(options.v1.db).references = "workspace", (options.v1.db).index = true];
  string tenant_subscription_id        = 8 [(options.v1.db).references = "tenant_subscription", (options.v1.db).index = true];

  string number                        = 9;  // human-facing invoice number
  TenantInvoiceStatus status           = 10;
  int64 amount                         = 11; // centavos
  string currency                      = 12; // ISO 4217
  string issued_at                     = 13; // ISO 8601 datetime
  optional string paid_at              = 14;
  optional string due_at               = 15;

  optional string download_url         = 16; // signed URL to PDF, cached
  optional string external_ref         = 17; // Ichizen master billing ref
}

service TenantInvoiceDomainService {
  rpc CreateTenantInvoice(CreateTenantInvoiceRequest) returns (CreateTenantInvoiceResponse);
  rpc ReadTenantInvoice(ReadTenantInvoiceRequest) returns (ReadTenantInvoiceResponse);
  rpc UpdateTenantInvoice(UpdateTenantInvoiceRequest) returns (UpdateTenantInvoiceResponse);
  rpc DeleteTenantInvoice(DeleteTenantInvoiceRequest) returns (DeleteTenantInvoiceResponse);
  rpc ListTenantInvoices(ListTenantInvoicesRequest) returns (ListTenantInvoicesResponse);
  rpc GetTenantInvoiceListPageData(GetTenantInvoiceListPageDataRequest) returns (GetTenantInvoiceListPageDataResponse);
  rpc GetTenantInvoiceItemPageData(GetTenantInvoiceItemPageDataRequest) returns (GetTenantInvoiceItemPageDataResponse);
}

message CreateTenantInvoiceRequest {
  TenantInvoice data = 1;
}

message CreateTenantInvoiceResponse {
  repeated TenantInvoice data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadTenantInvoiceRequest {
  TenantInvoice data = 1;
}

message ReadTenantInvoiceResponse {
  repeated TenantInvoice data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateTenantInvoiceRequest {
  TenantInvoice data = 1;
}

message UpdateTenantInvoiceResponse {
  repeated TenantInvoice data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteTenantInvoiceRequest {
  TenantInvoice data = 1;
}

message DeleteTenantInvoiceResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListTenantInvoicesRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListTenantInvoicesResponse {
  repeated TenantInvoice data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetTenantInvoiceListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetTenantInvoiceListPageDataResponse {
  repeated TenantInvoice tenant_invoice_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetTenantInvoiceItemPageDataRequest {
  string tenant_invoice_id = 1;
}

message GetTenantInvoiceItemPageDataResponse {
  optional TenantInvoice tenant_invoice = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
