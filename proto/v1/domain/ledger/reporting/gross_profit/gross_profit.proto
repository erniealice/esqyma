syntax = "proto3";

package domain.ledger.v1;

option go_package = "github.com/erniealice/esqyma/pkg/schema/v1/domain/ledger/reporting/gross_profit";

import "domain/common/error.proto";
import "domain/common/pagination.proto";

// GrossProfitReportRequest defines parameters for generating a gross profit report.
message GrossProfitReportRequest {
  optional string start_date = 1;           // ISO 8601 date (YYYY-MM-DD) — report period start
  optional string end_date = 2;             // ISO 8601 date (YYYY-MM-DD) — report period end
  optional string group_by = 3;            // "product", "location", "category", "period"
  optional string period_granularity = 4;  // "daily", "weekly", "monthly", "yearly" (when group_by=period)
  optional string product_id = 5;          // Filter by specific product
  optional string location_id = 6;         // Filter by specific location
  optional string revenue_category_id = 7; // Filter by revenue category
  optional string currency = 8;            // Filter by currency (default: all)
  optional domain.common.v1.PaginationRequest pagination = 9;
}

// GrossProfitLineItem represents one row in the gross profit report.
message GrossProfitLineItem {
  string group_key = 1;              // The grouping key value (product name, location, date, etc.)
  optional string group_id = 2;      // The grouping entity ID (product_id, location_id, etc.)
  int64 total_revenue = 3; // centavos          // Sum of revenue line item totals
  int64 total_discount = 4; // centavos         // Sum of discounts applied
  int64 net_revenue = 5; // centavos            // total_revenue - total_discount
  int64 cost_of_goods_sold = 6; // centavos     // Sum of COGS from inventory transactions
  int64 gross_profit = 7; // centavos           // net_revenue - cost_of_goods_sold
  double gross_profit_margin = 8;    // (gross_profit / net_revenue) * 100
  int64 units_sold = 9;             // Total units sold in this group
  int64 transaction_count = 10;      // Number of revenue transactions
}

// GrossProfitSummary provides report-level totals.
message GrossProfitSummary {
  int64 total_revenue = 1; // centavos
  int64 total_discount = 2; // centavos
  int64 net_revenue = 3; // centavos
  int64 total_cogs = 4; // centavos
  int64 total_gross_profit = 5; // centavos
  double overall_margin = 6;         // (total_gross_profit / net_revenue) * 100
  int64 total_units_sold = 7;
  int64 total_transactions = 8;
  string currency = 9;
  optional string start_date = 10; // ISO 8601 date (YYYY-MM-DD)
  optional string end_date = 11; // ISO 8601 date (YYYY-MM-DD)
}

// GrossProfitReportResponse returns the generated report.
message GrossProfitReportResponse {
  repeated GrossProfitLineItem line_items = 1;
  optional GrossProfitSummary summary = 2;
  optional domain.common.v1.PaginationResponse pagination = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

// LedgerReportingDomainService defines ledger reporting operations.
service LedgerReportingDomainService {
  rpc GetGrossProfitReport(GrossProfitReportRequest) returns (GrossProfitReportResponse);
  rpc GetCashBookReport(CashBookReportRequest) returns (CashBookReportResponse);
  rpc GetPayablesAgingReport(PayablesAgingReportRequest) returns (PayablesAgingReportResponse);
}

message CashBookReportRequest {
  optional int32 limit = 1; // default 200
}

message CashBookReportRow {
  string tx_date = 1;     // YYYY-MM-DD
  string description = 2;
  string reference = 3;
  string tx_type = 4;     // "Receipt" | "Expense" | "Purchase"
  int64 amount = 5;       // centavos
}

message CashBookReportResponse {
  repeated CashBookReportRow data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message PayablesAgingReportRequest {}

message PayablesAgingReportRow {
  string supplier_name = 1;
  int64 current = 2;          // centavos
  int64 days_30 = 3;          // centavos
  int64 days_60 = 4;          // centavos
  int64 days_90 = 5;          // centavos
  int64 over_90 = 6;          // centavos
  int64 total = 7;            // centavos
}

message PayablesAgingReportResponse {
  repeated PayablesAgingReportRow data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
