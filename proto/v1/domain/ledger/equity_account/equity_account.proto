syntax = "proto3";

package domain.ledger.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/ledger/equity_account";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "options/db.proto";

// EquityAccountType classifies the capital account's role in the equity section.
enum EquityAccountType {
  EQUITY_ACCOUNT_TYPE_UNSPECIFIED = 0;
  EQUITY_ACCOUNT_TYPE_OWNERS_CAPITAL = 1;              // Initial and additional capital contributions
  EQUITY_ACCOUNT_TYPE_OWNERS_DRAW = 2;                 // Withdrawals reducing equity
  EQUITY_ACCOUNT_TYPE_RETAINED_EARNINGS = 3;           // Accumulated profits/losses
  EQUITY_ACCOUNT_TYPE_ADDITIONAL_PAID_IN_CAPITAL = 4;  // Excess over par value (corporations)
}

// EquityAccount is a capital account in the Funding > Equity app.
// Each equity participant (owner, partner) has one or more capital accounts.
// Linked to a GL account for double-entry integration.
message EquityAccount {
  option (options.v1.table).table = true;

  string id = 1;
  string name = 2;
  EquityAccountType account_type = 3;
  optional string owner_name = 4;                  // Display name for the equity holder

  // GL account integration — FK to the Chart of Accounts
  string account_id = 5 [(options.v1.db).references = "account", (options.v1.db).index = true];

  // Running balance (updated on each equity transaction)
  int64 balance = 6 [(options.v1.db).default = "0"]; // centavos

  // Audit fields
  bool active = 7 [(options.v1.db).default = "true"];
  optional int64 date_created = 8;
  optional string date_created_string = 9;
  optional int64 date_modified = 10;
  optional string date_modified_string = 11;
}

service EquityAccountDomainService {
  // Standard CRUD
  rpc CreateEquityAccount(CreateEquityAccountRequest) returns (CreateEquityAccountResponse);
  rpc ReadEquityAccount(ReadEquityAccountRequest) returns (ReadEquityAccountResponse);
  rpc UpdateEquityAccount(UpdateEquityAccountRequest) returns (UpdateEquityAccountResponse);
  rpc DeleteEquityAccount(DeleteEquityAccountRequest) returns (DeleteEquityAccountResponse);
  rpc ListEquityAccounts(ListEquityAccountsRequest) returns (ListEquityAccountsResponse);

  // Enhanced page data (for UI views)
  rpc GetEquityAccountListPageData(GetEquityAccountListPageDataRequest) returns (GetEquityAccountListPageDataResponse);
  rpc GetEquityAccountItemPageData(GetEquityAccountItemPageDataRequest) returns (GetEquityAccountItemPageDataResponse);
}

message CreateEquityAccountRequest {
  EquityAccount data = 1;
}

message CreateEquityAccountResponse {
  repeated EquityAccount data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadEquityAccountRequest {
  EquityAccount data = 1;
}

message ReadEquityAccountResponse {
  repeated EquityAccount data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateEquityAccountRequest {
  EquityAccount data = 1;
}

message UpdateEquityAccountResponse {
  repeated EquityAccount data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteEquityAccountRequest {
  EquityAccount data = 1;
}

message DeleteEquityAccountResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListEquityAccountsRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListEquityAccountsResponse {
  repeated EquityAccount data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetEquityAccountListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetEquityAccountListPageDataResponse {
  repeated EquityAccount equity_account_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetEquityAccountItemPageDataRequest {
  string equity_account_id = 1;
}

message GetEquityAccountItemPageDataResponse {
  optional EquityAccount equity_account = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
