syntax = "proto3";

package domain.ledger.dashboard.v1;

option go_package = "github.com/erniealice/esqyma/pkg/schema/v1/domain/ledger/dashboard";

import "domain/common/error.proto";
import "domain/ledger/journal_entry/journal_entry.proto";

// LedgerStats is the typed stat-card payload. Centavos for monetary values.
message LedgerStats {
  int64 total_assets        = 1;
  int64 total_liabilities   = 2;
  int64 total_equity        = 3;
  int64 net_income_mtd      = 4;
  int64 unposted_journals   = 5;
  int64 posted_recent_count = 6;
}

// GetLedgerDashboardRequest is the request shape.
message GetLedgerDashboardRequest {
  string workspace_id = 1;
  // now_millis — unix milliseconds used for time-range stats (e.g. last 30 days).
  // Zero means "use server time".
  optional int64 now_millis = 2;
}

// GetLedgerDashboardResponse is the projection the view layer reads.
message GetLedgerDashboardResponse {
  bool success                          = 1;
  optional domain.common.v1.Error error = 2;
  LedgerStats stats                     = 3;
  // balance_by_type keys: asset / liability / equity / revenue / expense
  map<string, int64> balance_by_type    = 4;
  repeated domain.ledger.v1.JournalEntry unposted_top    = 5;
  repeated domain.ledger.v1.JournalEntry recent_entries  = 6;
}
