syntax = "proto3";

package domain.ledger.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/ledger/account_group";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "domain/ledger/account/account.proto";
import "options/db.proto";

// AccountGroup is a configurable Level 2 grouping for financial statement presentation.
// Groups sit between the fixed IAS 1 classification (Level 1) and individual accounts (Level 3).
// Examples: "Trade Receivables", "Property Plant and Equipment", "Accrued Liabilities".
message AccountGroup {
  option (options.v1.table).table = true;

  string id = 1;
  string name = 2;
  optional string description = 3;

  // Hierarchy context — group belongs to a fixed element and classification
  AccountElement element = 4;
  AccountClassification classification = 5;

  // Presentation order within its classification section on financial statements
  int32 display_order = 6 [(options.v1.db).default = "0"];

  // Audit fields
  bool active = 7 [(options.v1.db).default = "true"];
  optional int64 date_created = 8;
  optional string date_created_string = 9;
  optional int64 date_modified = 10;
  optional string date_modified_string = 11;
}

service AccountGroupDomainService {
  // Standard CRUD
  rpc CreateAccountGroup(CreateAccountGroupRequest) returns (CreateAccountGroupResponse);
  rpc ReadAccountGroup(ReadAccountGroupRequest) returns (ReadAccountGroupResponse);
  rpc UpdateAccountGroup(UpdateAccountGroupRequest) returns (UpdateAccountGroupResponse);
  rpc DeleteAccountGroup(DeleteAccountGroupRequest) returns (DeleteAccountGroupResponse);
  rpc ListAccountGroups(ListAccountGroupsRequest) returns (ListAccountGroupsResponse);

  // Enhanced page data (for UI views)
  rpc GetAccountGroupListPageData(GetAccountGroupListPageDataRequest) returns (GetAccountGroupListPageDataResponse);
  rpc GetAccountGroupItemPageData(GetAccountGroupItemPageDataRequest) returns (GetAccountGroupItemPageDataResponse);
}

message CreateAccountGroupRequest {
  AccountGroup data = 1;
}

message CreateAccountGroupResponse {
  repeated AccountGroup data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadAccountGroupRequest {
  AccountGroup data = 1;
}

message ReadAccountGroupResponse {
  repeated AccountGroup data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateAccountGroupRequest {
  AccountGroup data = 1;
}

message UpdateAccountGroupResponse {
  repeated AccountGroup data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteAccountGroupRequest {
  AccountGroup data = 1;
}

message DeleteAccountGroupResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListAccountGroupsRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListAccountGroupsResponse {
  repeated AccountGroup data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetAccountGroupListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetAccountGroupListPageDataResponse {
  repeated AccountGroup account_group_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetAccountGroupItemPageDataRequest {
  string account_group_id = 1;
}

message GetAccountGroupItemPageDataResponse {
  optional AccountGroup account_group = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
