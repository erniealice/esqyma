syntax = "proto3";

package domain.workflow.v1;

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";
import "options/db.proto";

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/workflow/activity_template";


// ActivityTemplate represents a template for workflow activities
message ActivityTemplate {
  option (options.v1.table).table = true;

  string id = 1;
  string name = 2;
  optional string description = 3;
  string stage_template_id = 4 [(options.v1.db).references = "stage_template", (options.v1.db).index = true];
  string status = 5;
  string activity_type = 6;
  optional int32 order_index = 7;
  optional bool is_required = 8;
  optional string condition_expression = 9;
  optional string assignee_type = 10;
  optional string default_assignee_id = 11;
  optional int32 estimated_duration_minutes = 12;
  optional string configuration_json = 13;
  optional string validation_rules_json = 14;
  optional string created_by = 15;
  optional int64 date_created = 16;
  optional string date_created_string = 17;
  optional int64 date_modified = 18;
  optional string date_modified_string = 19;
  bool active = 20 [(options.v1.db).default = "true"];
  optional string input_schema_json = 21;
  optional string output_schema_json = 22;
  optional string use_case_code = 23;
  optional string rollback_use_case_code = 24;
}

// CreateActivityTemplateRequest is the request message for creating an activity template
message CreateActivityTemplateRequest {
  ActivityTemplate data = 1;
}

// CreateActivityTemplateResponse is the response message for creating an activity template
message CreateActivityTemplateResponse {
  repeated ActivityTemplate data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// ReadActivityTemplateRequest is the request message for reading an activity template
message ReadActivityTemplateRequest {
  ActivityTemplate data = 1;
}

// ReadActivityTemplateResponse is the response message for reading an activity template
message ReadActivityTemplateResponse {
  repeated ActivityTemplate data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// UpdateActivityTemplateRequest is the request message for updating an activity template
message UpdateActivityTemplateRequest {
  ActivityTemplate data = 1;
}

// UpdateActivityTemplateResponse is the response message for updating an activity template
message UpdateActivityTemplateResponse {
  repeated ActivityTemplate data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// DeleteActivityTemplateRequest is the request message for deleting an activity template
message DeleteActivityTemplateRequest {
  ActivityTemplate data = 1;
}

// DeleteActivityTemplateResponse is the response message for deleting an activity template
message DeleteActivityTemplateResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

// ListActivityTemplatesRequest is the request message for listing activity templates
message ListActivityTemplatesRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

// ListActivityTemplatesResponse is the response message for listing activity templates
message ListActivityTemplatesResponse {
  repeated ActivityTemplate data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
  optional string next_page_token = 4;
}

// GetActivityTemplateListPageDataRequest is the request message for getting activity template list page data
message GetActivityTemplateListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

// GetActivityTemplateListPageDataResponse is the response message for getting activity template list page data
message GetActivityTemplateListPageDataResponse {
  repeated ActivityTemplate activity_template_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

// GetActivityTemplateItemPageDataRequest is the request message for getting activity template item page data
message GetActivityTemplateItemPageDataRequest {
  string activity_template_id = 1;
}

// GetActivityTemplateItemPageDataResponse is the response message for getting activity template item page data
message GetActivityTemplateItemPageDataResponse {
  optional ActivityTemplate activity_template = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// GetActivityTemplatesByStageTemplateRequest is the request message for getting activity templates by stage template
message GetActivityTemplatesByStageTemplateRequest {
  string stage_template_id = 1;
}

// GetActivityTemplatesByStageTemplateResponse is the response message for getting activity templates by stage template
message GetActivityTemplatesByStageTemplateResponse {
  repeated ActivityTemplate activity_templates = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// ActivityTemplateDomainService defines the gRPC service for activity template operations
service ActivityTemplateDomainService {
  rpc CreateActivityTemplate(CreateActivityTemplateRequest) returns (CreateActivityTemplateResponse);
  rpc ReadActivityTemplate(ReadActivityTemplateRequest) returns (ReadActivityTemplateResponse);
  rpc UpdateActivityTemplate(UpdateActivityTemplateRequest) returns (UpdateActivityTemplateResponse);
  rpc DeleteActivityTemplate(DeleteActivityTemplateRequest) returns (DeleteActivityTemplateResponse);
  rpc ListActivityTemplates(ListActivityTemplatesRequest) returns (ListActivityTemplatesResponse);
  rpc GetActivityTemplateListPageData(GetActivityTemplateListPageDataRequest) returns (GetActivityTemplateListPageDataResponse);
  rpc GetActivityTemplateItemPageData(GetActivityTemplateItemPageDataRequest) returns (GetActivityTemplateItemPageDataResponse);
  rpc GetActivityTemplatesByStageTemplate(GetActivityTemplatesByStageTemplateRequest) returns (GetActivityTemplatesByStageTemplateResponse);
}
