syntax = "proto3";

package domain.workflow.v1;

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";
import "options/db.proto";

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/workflow/stage_template";


// StageTemplate represents a template for workflow stages
message StageTemplate {
  option (options.v1.table).table = true;

  string id = 1;
  string name = 2;
  optional string description = 3;
  string workflow_template_id = 4 [(options.v1.db).references = "workflow_template", (options.v1.db).index = true];
  string status = 5;
  string stage_type = 6;
  optional int32 order_index = 7;
  optional bool is_required = 8;
  optional string condition_expression = 9;
  optional string created_by = 10;
  optional int64 date_created = 11;
  optional string date_created_string = 12;
  optional int64 date_modified = 13;
  optional string date_modified_string = 14;
  bool active = 15 [(options.v1.db).default = "true"];
}

// CreateStageTemplateRequest is the request message for creating a stage template
message CreateStageTemplateRequest {
  StageTemplate data = 1;
}

// CreateStageTemplateResponse is the response message for creating a stage template
message CreateStageTemplateResponse {
  repeated StageTemplate data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// ReadStageTemplateRequest is the request message for reading a stage template
message ReadStageTemplateRequest {
  StageTemplate data = 1;
}

// ReadStageTemplateResponse is the response message for reading a stage template
message ReadStageTemplateResponse {
  repeated StageTemplate data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// UpdateStageTemplateRequest is the request message for updating a stage template
message UpdateStageTemplateRequest {
  StageTemplate data = 1;
}

// UpdateStageTemplateResponse is the response message for updating a stage template
message UpdateStageTemplateResponse {
  repeated StageTemplate data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// DeleteStageTemplateRequest is the request message for deleting a stage template
message DeleteStageTemplateRequest {
  StageTemplate data = 1;
}

// DeleteStageTemplateResponse is the response message for deleting a stage template
message DeleteStageTemplateResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

// ListStageTemplatesRequest is the request message for listing stage templates
message ListStageTemplatesRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

// ListStageTemplatesResponse is the response message for listing stage templates
message ListStageTemplatesResponse {
  repeated StageTemplate data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
  optional string next_page_token = 4;
}

// GetStageTemplateListPageDataRequest is the request message for getting stage template list page data
message GetStageTemplateListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

// GetStageTemplateListPageDataResponse is the response message for getting stage template list page data
message GetStageTemplateListPageDataResponse {
  repeated StageTemplate stage_template_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

// GetStageTemplateItemPageDataRequest is the request message for getting stage template item page data
message GetStageTemplateItemPageDataRequest {
  string stage_template_id = 1;
}

// GetStageTemplateItemPageDataResponse is the response message for getting stage template item page data
message GetStageTemplateItemPageDataResponse {
  optional StageTemplate stage_template = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// GetStageTemplatesByWorkflowTemplateRequest is the request message for getting stage templates by workflow template
message GetStageTemplatesByWorkflowTemplateRequest {
  string workflow_template_id = 1;
}

// GetStageTemplatesByWorkflowTemplateResponse is the response message for getting stage templates by workflow template
message GetStageTemplatesByWorkflowTemplateResponse {
  repeated StageTemplate stage_templates = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// StageTemplateDomainService defines the gRPC service for stage template operations
service StageTemplateDomainService {
  rpc CreateStageTemplate(CreateStageTemplateRequest) returns (CreateStageTemplateResponse);
  rpc ReadStageTemplate(ReadStageTemplateRequest) returns (ReadStageTemplateResponse);
  rpc UpdateStageTemplate(UpdateStageTemplateRequest) returns (UpdateStageTemplateResponse);
  rpc DeleteStageTemplate(DeleteStageTemplateRequest) returns (DeleteStageTemplateResponse);
  rpc ListStageTemplates(ListStageTemplatesRequest) returns (ListStageTemplatesResponse);
  rpc GetStageTemplateListPageData(GetStageTemplateListPageDataRequest) returns (GetStageTemplateListPageDataResponse);
  rpc GetStageTemplateItemPageData(GetStageTemplateItemPageDataRequest) returns (GetStageTemplateItemPageDataResponse);
  rpc GetStageTemplatesByWorkflowTemplate(GetStageTemplatesByWorkflowTemplateRequest) returns (GetStageTemplatesByWorkflowTemplateResponse);
}
