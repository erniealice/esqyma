syntax = "proto3";

package infrastructure.auth.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/infrastructure/auth";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "infrastructure/auth/identity.proto";

// JwtToken represents a JSON Web Token with its claims
message JwtToken {
  // The encoded JWT token string
  string token = 1;

  // Token type (typically "Bearer")
  string token_type = 2;

  // When the token expires
  google.protobuf.Timestamp expires_at = 3;

  // When the token was issued
  google.protobuf.Timestamp issued_at = 4;

  // Issuer of the token
  string issuer = 5;

  // Audience for the token
  repeated string audience = 6;

  // Subject (user/service identifier)
  string subject = 7;

  // Scopes/permissions granted by this token
  repeated string scopes = 8;

  // Custom claims in the JWT
  map<string, string> custom_claims = 9;

  // Provider that issued this token
  Provider provider = 10;
}

// GenerateJwtTokenRequest is a request to generate a new JWT token
message GenerateJwtTokenRequest {
  // Identity to generate token for
  string identity_id = 1;

  // Provider to use for token generation
  Provider provider = 2;

  // How long the token should be valid (in seconds)
  int64 expires_in_seconds = 3;

  // Scopes/permissions to include in the token
  repeated string scopes = 4;

  // Custom claims to include in the token
  map<string, string> custom_claims = 5;

  // Audience for the token
  repeated string audience = 6;
}

// GenerateJwtTokenResponse contains the generated JWT token
message GenerateJwtTokenResponse {
  // The generated JWT token
  JwtToken token = 1;

  // Any warnings or notes about token generation
  string message = 2;
}

// ValidateJwtTokenRequest is a request to validate a JWT token
message ValidateJwtTokenRequest {
  // The JWT token string to validate
  string token = 1;

  // Provider to validate against
  Provider provider = 2;

  // Expected audience (optional, for additional validation)
  repeated string expected_audience = 3;

  // Required scopes (optional, for authorization check)
  repeated string required_scopes = 4;
}

// ValidateJwtTokenResponse contains the validation result
message ValidateJwtTokenResponse {
  // Whether the token is valid
  bool is_valid = 1;

  // The decoded token (if valid)
  JwtToken token = 2;

  // Identity associated with the token (if valid)
  Identity identity = 3;

  // Validation error message (if invalid)
  string error_message = 4;

  // Specific validation failures
  repeated ValidationError validation_errors = 5;
}

// ValidationError represents a specific validation failure
message ValidationError {
  // Type of validation error
  ValidationErrorType type = 1;

  // Human-readable error message
  string message = 2;
}

// ValidationErrorType enumerates possible validation errors
enum ValidationErrorType {
  VALIDATION_ERROR_TYPE_UNSPECIFIED = 0;
  VALIDATION_ERROR_TYPE_EXPIRED = 1;          // Token has expired
  VALIDATION_ERROR_TYPE_INVALID_SIGNATURE = 2; // Signature verification failed
  VALIDATION_ERROR_TYPE_INVALID_ISSUER = 3;    // Issuer doesn't match expected
  VALIDATION_ERROR_TYPE_INVALID_AUDIENCE = 4;  // Audience doesn't match expected
  VALIDATION_ERROR_TYPE_MISSING_CLAIMS = 5;    // Required claims are missing
  VALIDATION_ERROR_TYPE_INSUFFICIENT_SCOPES = 6; // Required scopes not present
  VALIDATION_ERROR_TYPE_MALFORMED = 7;         // Token is malformed
  VALIDATION_ERROR_TYPE_NOT_YET_VALID = 8;     // Token not yet valid (nbf claim)
}

// RefreshJwtRequest is a request to refresh an expired JWT token
// TODO: Implement refresh token functionality in future phase
message RefreshJwtRequest {
  // The refresh token (to be implemented)
  string refresh_token = 1;

  // Provider to use for token refresh
  Provider provider = 2;
}

// RefreshJwtResponse contains the refreshed JWT token
// TODO: Implement refresh token functionality in future phase
message RefreshJwtResponse {
  // The new access token
  JwtToken access_token = 1;

  // The new refresh token (optional, if rotation is enabled)
  string refresh_token = 2;
}