syntax = "proto3";

package infrastructure.auth.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/infrastructure/auth";

import "google/protobuf/timestamp.proto";
import "infrastructure/auth/identity.proto";
import "infrastructure/auth/jwt.proto";
import "infrastructure/auth/api_key.proto";

// AuthenticationDomainService provides authentication operations
service AuthenticationInfraService {
  // User authentication operations
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc Register(RegisterRequest) returns (RegisterResponse);

  // Password management
  rpc SendPasswordResetEmail(SendPasswordResetEmailRequest) returns (SendPasswordResetEmailResponse);
  rpc ConfirmPasswordReset(ConfirmPasswordResetRequest) returns (ConfirmPasswordResetResponse);

  // Email verification
  rpc SendVerificationEmail(SendVerificationEmailRequest) returns (SendVerificationEmailResponse);
  rpc VerifyEmail(VerifyEmailRequest) returns (VerifyEmailResponse);

  // Passwordless authentication
  rpc SendMagicLink(SendMagicLinkRequest) returns (SendMagicLinkResponse);

  // JWT token operations
  rpc GenerateJwtToken(GenerateJwtTokenRequest) returns (GenerateJwtTokenResponse);
  rpc ValidateJwtToken(ValidateJwtTokenRequest) returns (ValidateJwtTokenResponse);

  // API key operations
  rpc CreateApiKey(CreateApiKeyRequest) returns (CreateApiKeyResponse);
  rpc ValidateApiKey(ValidateApiKeyRequest) returns (ValidateApiKeyResponse);
  rpc RevokeApiKey(RevokeApiKeyRequest) returns (RevokeApiKeyResponse);
  rpc ListApiKeys(ListApiKeysRequest) returns (ListApiKeysResponse);

  // Session management
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);
  rpc InvalidateSession(InvalidateSessionRequest) returns (InvalidateSessionResponse);

  // TODO: Implement refresh token operations
  // rpc RefreshToken(RefreshJwtRequest) returns (RefreshJwtResponse);

  // TODO: Implement service-to-service authentication
  // rpc AuthenticateService(AuthenticateServiceRequest) returns (AuthenticateServiceResponse);
  // rpc GetServiceCredentials(GetServiceCredentialsRequest) returns (GetServiceCredentialsResponse);
}

// LoginRequest contains credentials for user login
message LoginRequest {
  // Authentication provider to use
  Provider provider = 1;

  // Authentication method
  oneof credentials {
    PasswordCredentials password = 100;
    OAuthCredentials oauth = 101;
    SamlCredentials saml = 102;
    EmailLinkCredentials email_link = 103;
  }

  // Optional: Device information for security
  DeviceInfo device_info = 200;
}

// PasswordCredentials for username/password authentication
message PasswordCredentials {
  // Username or email
  string username = 1;

  // Password
  string password = 2;

  // Optional: MFA code
  string mfa_code = 3;
}

// EmailLinkCredentials for passwordless email link authentication
message EmailLinkCredentials {
  // Email address
  string email = 1;

  // Email link/magic link received
  string email_link = 2;
}

// OAuthCredentials for OAuth authentication
message OAuthCredentials {
  // OAuth provider (google, facebook, github, etc.)
  string oauth_provider = 1;

  // Authorization code from OAuth flow
  string authorization_code = 2;

  // Redirect URI used in OAuth flow
  string redirect_uri = 3;
}

// SamlCredentials for SAML authentication
message SamlCredentials {
  // SAML response
  string saml_response = 1;

  // Relay state
  string relay_state = 2;
}

// DeviceInfo contains information about the device making the request
message DeviceInfo {
  // Device identifier
  string device_id = 1;

  // Device type (web, mobile, desktop, etc.)
  string device_type = 2;

  // User agent string
  string user_agent = 3;

  // IP address
  string ip_address = 4;

  // Location information (optional)
  string location = 5;
}

// LoginResponse contains the authentication result
message LoginResponse {
  // Whether login was successful
  bool success = 1;

  // The authenticated identity
  Identity identity = 2;

  // JWT access token
  JwtToken access_token = 3;

  // Session identifier (if session management is enabled)
  string session_id = 4;

  // When the session expires
  google.protobuf.Timestamp expires_at = 5;

  // Error message if login failed
  string error_message = 6;

  // Whether MFA is required
  bool requires_mfa = 7;

  // MFA challenge details (if required)
  MfaChallenge mfa_challenge = 8;
}

// MfaChallenge represents a multi-factor authentication challenge
// TODO: Expand MFA support in future phase
message MfaChallenge {
  // Type of MFA challenge
  string challenge_type = 1;

  // Challenge identifier
  string challenge_id = 2;

  // Instructions for completing the challenge
  string instructions = 3;
}

// LogoutRequest contains information for logging out
message LogoutRequest {
  // Identity to logout
  string identity_id = 1;

  // Session identifier (if using session management)
  string session_id = 2;

  // JWT token to invalidate (if using token-based auth)
  string token = 3;

  // Provider to logout from
  Provider provider = 4;
}

// LogoutResponse confirms the logout
message LogoutResponse {
  // Whether logout was successful
  bool success = 1;

  // Message about the logout
  string message = 2;
}

// ============================================================================
// Registration
// ============================================================================

// RegisterRequest for user registration
message RegisterRequest {
  // Email address
  string email = 1;

  // Password
  string password = 2;

  // Display name or username
  string display_name = 3;

  // Whether to send email verification
  bool send_verification_email = 4;

  // Provider to use for registration
  Provider provider = 5;

  // Optional: Additional metadata
  map<string, string> metadata = 6;
}

// RegisterResponse contains registration result
message RegisterResponse {
  // Whether registration was successful
  bool success = 1;

  // The created identity
  Identity identity = 2;

  // JWT access token (if auto-login enabled)
  JwtToken access_token = 3;

  // Error message if registration failed
  string error_message = 4;

  // Whether verification email was sent
  bool verification_email_sent = 5;
}

// ============================================================================
// Password Reset
// ============================================================================

// SendPasswordResetEmailRequest for sending password reset email
message SendPasswordResetEmailRequest {
  // Email address to send reset link to
  string email = 1;

  // Optional: Redirect URL for password reset page
  string redirect_url = 2;

  // Provider to use
  Provider provider = 3;
}

// SendPasswordResetEmailResponse confirms reset email was sent
message SendPasswordResetEmailResponse {
  // Whether the request was successful
  bool success = 1;

  // Message about the request
  string message = 2;

  // Error message if failed
  string error_message = 3;
}

// ConfirmPasswordResetRequest for confirming password reset with code
message ConfirmPasswordResetRequest {
  // Reset code from email
  string code = 1;

  // New password
  string new_password = 2;

  // Provider to use
  Provider provider = 3;
}

// ConfirmPasswordResetResponse confirms password was reset
message ConfirmPasswordResetResponse {
  // Whether reset was successful
  bool success = 1;

  // Message about the reset
  string message = 2;

  // Error message if failed
  string error_message = 3;
}

// ============================================================================
// Email Verification
// ============================================================================

// SendVerificationEmailRequest for sending verification email
message SendVerificationEmailRequest {
  // Email address to verify
  string email = 1;

  // Optional: Redirect URL after verification
  string redirect_url = 2;

  // Provider to use
  Provider provider = 3;
}

// SendVerificationEmailResponse confirms verification email was sent
message SendVerificationEmailResponse {
  // Whether the request was successful
  bool success = 1;

  // Message about the request
  string message = 2;

  // Error message if failed
  string error_message = 3;
}

// VerifyEmailRequest for verifying email with code
message VerifyEmailRequest {
  // Verification code from email
  string code = 1;

  // Provider to use
  Provider provider = 2;
}

// VerifyEmailResponse confirms email was verified
message VerifyEmailResponse {
  // Whether verification was successful
  bool success = 1;

  // Message about the verification
  string message = 2;

  // Error message if failed
  string error_message = 3;
}

// ============================================================================
// Magic Link / Passwordless Authentication
// ============================================================================

// SendMagicLinkRequest for sending passwordless login link
message SendMagicLinkRequest {
  // Email address to send magic link to
  string email = 1;

  // Optional: Redirect URL after login
  string redirect_url = 2;

  // Provider to use
  Provider provider = 3;
}

// SendMagicLinkResponse confirms magic link was sent
message SendMagicLinkResponse {
  // Whether the request was successful
  bool success = 1;

  // Message about the request
  string message = 2;

  // Error message if failed
  string error_message = 3;
}

// ============================================================================
// Session Management
// ============================================================================

// CreateSessionRequest for creating a new session
message CreateSessionRequest {
  // Identity to create session for
  string identity_id = 1;

  // Provider to use
  Provider provider = 2;

  // How long the session should be valid (in seconds)
  int64 expires_in_seconds = 3;

  // Optional: Device information
  DeviceInfo device_info = 4;

  // Access token for the session
  string access_token = 5;

  // Optional: Refresh token
  string refresh_token = 6;
}

// CreateSessionResponse contains the created session
message CreateSessionResponse {
  // Session identifier
  string session_id = 1;

  // When the session expires
  google.protobuf.Timestamp expires_at = 2;

  // Session token (if different from access token)
  string session_token = 3;

  // When the session was created
  google.protobuf.Timestamp created_at = 4;
}

// GetSessionRequest for retrieving session information
message GetSessionRequest {
  // Session identifier
  string session_id = 1;

  // Provider to use
  Provider provider = 2;
}

// GetSessionResponse contains session information
message GetSessionResponse {
  // Session identifier
  string session_id = 1;

  // Identity associated with the session
  Identity identity = 2;

  // When the session was created
  google.protobuf.Timestamp created_at = 3;

  // When the session expires
  google.protobuf.Timestamp expires_at = 4;

  // Whether the session is active
  bool is_active = 5;

  // Device information
  DeviceInfo device_info = 6;

  // Access token
  string access_token = 7;

  // Refresh token
  string refresh_token = 8;
}

// InvalidateSessionRequest for invalidating a session
message InvalidateSessionRequest {
  // Session identifier
  string session_id = 1;

  // Provider to use
  Provider provider = 2;
}

// InvalidateSessionResponse confirms session invalidation
message InvalidateSessionResponse {
  // Whether invalidation was successful
  bool success = 1;

  // Message about the invalidation
  string message = 2;
}

