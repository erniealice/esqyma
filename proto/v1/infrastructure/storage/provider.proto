syntax = "proto3";

package infrastructure.storage.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/infrastructure/storage";

import "infrastructure/storage/object.proto";

// StorageProviderConfig represents storage provider configuration
message StorageProviderConfig {
  // The provider type
  StorageProvider provider = 1;

  // Whether this provider is enabled
  bool enabled = 2;

  // Display name for the provider
  string display_name = 3;

  // Provider-specific configuration
  oneof config {
    AzureStorageConfig azure_config = 100;
    GcsStorageConfig gcs_config = 101;
    S3StorageConfig s3_config = 102;
    LocalStorageConfig local_config = 103;
  }
}

// AzureStorageConfig contains Azure Blob Storage specific configuration
message AzureStorageConfig {
  // Azure storage account name
  string storage_account = 1;

  // Storage account key (for key-based auth)
  string account_key = 2;

  // Connection string (alternative to account key)
  string connection_string = 3;

  // Whether to use managed identity for authentication
  bool use_managed_identity = 4;

  // Managed identity client ID
  string managed_identity_client_id = 5;

  // Azure AD tenant ID
  string tenant_id = 6;

  // Default container for operations
  string default_container = 7;

  // Blob service endpoint URL
  string endpoint_url = 8;

  // Default encryption scope
  string default_encryption_scope = 9;
}

// GcsStorageConfig contains Google Cloud Storage specific configuration
message GcsStorageConfig {
  // GCP project ID
  string project_id = 1;

  // Service account JSON key (for key-based auth)
  string service_account_key = 2;

  // Service account email
  string service_account_email = 3;

  // Whether to use Application Default Credentials
  bool use_adc = 4;

  // Workload identity configuration (for GKE)
  string workload_identity_provider = 5;

  // Default bucket for operations
  string default_bucket = 6;

  // Storage API endpoint URL (optional)
  string endpoint_url = 7;

  // Default KMS key name for encryption
  string default_kms_key_name = 8;

  // Whether to use uniform bucket-level access by default
  bool uniform_bucket_level_access = 9;
}

// S3StorageConfig contains Amazon S3 specific configuration
message S3StorageConfig {
  // AWS region
  string region = 1;

  // AWS access key ID (for key-based auth)
  string access_key_id = 2;

  // AWS secret access key (for key-based auth)
  string secret_access_key = 3;

  // Session token (for temporary credentials)
  string session_token = 4;

  // Whether to use IAM role credentials
  bool use_iam_role = 5;

  // IAM role ARN to assume
  string iam_role_arn = 6;

  // Default bucket for operations
  string default_bucket = 7;

  // S3 endpoint URL (for S3-compatible services)
  string endpoint_url = 8;

  // Whether to use path-style addressing
  bool use_path_style = 9;

  // Default KMS key ID for encryption
  string default_kms_key_id = 10;

  // Default SSE algorithm
  string default_sse_algorithm = 11;

  // Whether to enable transfer acceleration
  bool enable_transfer_acceleration = 12;

  // Whether to use dual-stack endpoints (IPv4 and IPv6)
  bool use_dual_stack = 13;
}

// LocalStorageConfig contains local filesystem storage configuration
message LocalStorageConfig {
  // Base directory for local storage
  string base_directory = 1;

  // Whether to create directories automatically
  bool auto_create_directories = 2;

  // File permissions (Unix-style, e.g., "0755")
  string file_permissions = 3;

  // Directory permissions (Unix-style, e.g., "0755")
  string directory_permissions = 4;
}