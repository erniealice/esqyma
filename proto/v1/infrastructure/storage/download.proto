syntax = "proto3";

package infrastructure.storage.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/infrastructure/storage";

import "google/protobuf/timestamp.proto";
import "infrastructure/storage/object.proto";

// DownloadObjectRequest is a request to download an object from storage
message DownloadObjectRequest {
  // Storage provider
  StorageProvider provider = 1;

  // Container/bucket name
  string container_name = 2;

  // Object key/name
  string object_key = 3;

  // Version ID (if versioning is enabled)
  string version_id = 4;

  // Range to download (optional, for partial downloads)
  // Format: "bytes=0-1023" for first 1024 bytes
  string range = 5;
}

// DownloadObjectResponse contains the downloaded object
message DownloadObjectResponse {
  // Whether the download was successful
  bool success = 1;

  // The object metadata
  StorageObject object = 2;

  // File content (for small files)
  bytes content = 3;

  // Download duration in milliseconds
  int64 download_duration_ms = 4;

  // Message about the download
  string message = 5;
}

// GetPresignedUrlRequest is a request to generate a presigned/SAS URL
message GetPresignedUrlRequest {
  // Storage provider
  StorageProvider provider = 1;

  // Container/bucket name
  string container_name = 2;

  // Object key/name
  string object_key = 3;

  // URL operation (download, upload, delete)
  PresignedUrlOperation operation = 4;

  // How long the URL should be valid (in seconds)
  int64 expires_in_seconds = 5;

  // Content type for upload operations (optional)
  string content_type = 6;

  // Custom filename for Content-Disposition header (optional)
  string filename = 7;
}

// PresignedUrlOperation represents the operation the presigned URL will allow
enum PresignedUrlOperation {
  PRESIGNED_URL_OPERATION_UNSPECIFIED = 0;
  PRESIGNED_URL_OPERATION_DOWNLOAD = 1;  // GET operation
  PRESIGNED_URL_OPERATION_UPLOAD = 2;    // PUT operation
  PRESIGNED_URL_OPERATION_DELETE = 3;    // DELETE operation
}

// GetPresignedUrlResponse contains the generated presigned URL
message GetPresignedUrlResponse {
  // Whether generation was successful
  bool success = 1;

  // The presigned URL
  string url = 2;

  // When the URL expires
  google.protobuf.Timestamp expires_at = 3;

  // HTTP method to use with the URL (GET, PUT, DELETE)
  string http_method = 4;

  // Headers that must be included in the request (provider-specific)
  map<string, string> required_headers = 5;

  // Message about the URL generation
  string message = 6;
}

// StreamDownloadRequest is a request to stream download a large file
// TODO: Implement streaming downloads in future phase
message StreamDownloadRequest {
  // Storage provider
  StorageProvider provider = 1;

  // Container/bucket name
  string container_name = 2;

  // Object key/name
  string object_key = 3;

  // Chunk size in bytes (for streaming)
  int64 chunk_size = 4;

  // Offset to start from (for resuming downloads)
  int64 offset = 5;
}

// StreamDownloadResponse contains a chunk of the downloaded file
// TODO: Implement streaming downloads in future phase
message StreamDownloadResponse {
  // Whether this chunk was successful
  bool success = 1;

  // The chunk content
  bytes chunk = 2;

  // Chunk number (0-indexed)
  int32 chunk_number = 3;

  // Offset of this chunk in the file
  int64 offset = 4;

  // Size of this chunk
  int64 chunk_size = 5;

  // Whether this is the last chunk
  bool is_last_chunk = 6;

  // Total file size
  int64 total_size = 7;
}

// GetDownloadProgressRequest gets the progress of an ongoing download
// TODO: Implement download progress tracking in future phase
message GetDownloadProgressRequest {
  // Download ID
  string download_id = 1;

  // Storage provider
  StorageProvider provider = 2;
}

// GetDownloadProgressResponse contains the download progress
// TODO: Implement download progress tracking in future phase
message GetDownloadProgressResponse {
  // Download ID
  string download_id = 1;

  // Bytes downloaded so far
  int64 bytes_downloaded = 2;

  // Total bytes to download
  int64 total_bytes = 3;

  // Download progress percentage (0-100)
  float progress_percentage = 4;

  // Current download speed in bytes per second
  int64 speed_bps = 5;

  // Estimated time remaining in seconds
  int64 estimated_seconds_remaining = 6;
}