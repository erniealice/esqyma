syntax = "proto3";

package infrastructure.storage.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/infrastructure/storage";

import "infrastructure/storage/object.proto";
import "infrastructure/storage/container.proto";
import "infrastructure/storage/upload.proto";
import "infrastructure/storage/download.proto";

// StorageDomainService provides storage operations
service StorageDomainService {
  // Container/bucket operations
  rpc CreateContainer(CreateContainerRequest) returns (CreateContainerResponse);
  rpc GetContainer(GetContainerRequest) returns (GetContainerResponse);
  rpc DeleteContainer(DeleteContainerRequest) returns (DeleteContainerResponse);

  // Upload operations
  rpc UploadObject(UploadObjectRequest) returns (UploadObjectResponse);

  // Download operations
  rpc DownloadObject(DownloadObjectRequest) returns (DownloadObjectResponse);
  rpc GetPresignedUrl(GetPresignedUrlRequest) returns (GetPresignedUrlResponse);

  // TODO: Implement object listing operations
  // rpc ListObjects(ListObjectsRequest) returns (ListObjectsResponse);
  // rpc ListContainers(ListContainersRequest) returns (ListContainersResponse);

  // TODO: Implement object metadata operations
  // rpc GetObjectMetadata(GetObjectMetadataRequest) returns (GetObjectMetadataResponse);
  // rpc UpdateObjectMetadata(UpdateObjectMetadataRequest) returns (UpdateObjectMetadataResponse);

  // TODO: Implement object deletion operations
  // rpc DeleteObject(DeleteObjectRequest) returns (DeleteObjectResponse);
  // rpc DeleteObjects(DeleteObjectsRequest) returns (DeleteObjectsResponse);

  // TODO: Implement object copy/move operations
  // rpc CopyObject(CopyObjectRequest) returns (CopyObjectResponse);
  // rpc MoveObject(MoveObjectRequest) returns (MoveObjectResponse);

  // TODO: Implement access control operations
  // rpc SetObjectAcl(SetObjectAclRequest) returns (SetObjectAclResponse);
  // rpc GetObjectAcl(GetObjectAclRequest) returns (GetObjectAclResponse);

  // TODO: Implement lifecycle management operations
  // rpc SetLifecyclePolicy(SetLifecyclePolicyRequest) returns (SetLifecyclePolicyResponse);
  // rpc GetLifecyclePolicy(GetLifecyclePolicyRequest) returns (GetLifecyclePolicyResponse);

  // TODO: Implement multipart upload operations
  // rpc InitiateMultipartUpload(InitiateMultipartUploadRequest) returns (InitiateMultipartUploadResponse);
  // rpc UploadPart(UploadPartRequest) returns (UploadPartResponse);
  // rpc CompleteMultipartUpload(CompleteMultipartUploadRequest) returns (CompleteMultipartUploadResponse);
  // rpc AbortMultipartUpload(AbortMultipartUploadRequest) returns (AbortMultipartUploadResponse);

  // TODO: Implement streaming operations
  // rpc StreamDownload(StreamDownloadRequest) returns (stream StreamDownloadResponse);
  // rpc StreamUpload(stream StreamUploadRequest) returns (StreamUploadResponse);
}

// GetObjectMetadataRequest is a request to get object metadata without downloading
// TODO: Implement in future phase
message GetObjectMetadataRequest {
  StorageProvider provider = 1;
  string container_name = 2;
  string object_key = 3;
  string version_id = 4;
}

// GetObjectMetadataResponse contains the object metadata
// TODO: Implement in future phase
message GetObjectMetadataResponse {
  bool success = 1;
  StorageObject object = 2;
}

// DeleteObjectRequest is a request to delete an object
// TODO: Implement in future phase
message DeleteObjectRequest {
  StorageProvider provider = 1;
  string container_name = 2;
  string object_key = 3;
  string version_id = 4;
  bool permanent = 5;  // Bypass soft delete if enabled
}

// DeleteObjectResponse confirms the deletion
// TODO: Implement in future phase
message DeleteObjectResponse {
  bool success = 1;
  string message = 2;
}

// ListObjectsRequest is a request to list objects in a container
// TODO: Implement in future phase
message ListObjectsRequest {
  StorageProvider provider = 1;
  string container_name = 2;
  string prefix = 3;  // Filter by prefix
  string delimiter = 4;  // Delimiter for hierarchy
  int32 max_results = 5;
  string continuation_token = 6;
}

// ListObjectsResponse contains the list of objects
// TODO: Implement in future phase
message ListObjectsResponse {
  repeated ObjectMetadata objects = 1;
  string continuation_token = 2;
  bool is_truncated = 3;
  int32 total_count = 4;
}