syntax = "proto3";

package service.security.v1;

import "domain/entity/principal_type/principal_type.proto";

option go_package = "github.com/erniealice/esqyma/golang/v1/service/security";

// ---------------------------------------------------------------------------
// Permission query — service-driven domain (per Q7 in
// docs/plan/20260518-hexagonal-strict-adherence/proto-service.md, and the
// follow-up migration plan docs/plan/20260520-service-domain-migration/).
//
// PermissionQuery is the narrow RBAC permission-code lookup surface, distinct
// from AuthorizationService (which answers boolean "may user X do action Y on
// entity Z?" questions). The service synthesizes ALLOW codes net of DENYs
// across role + workspace_user_role + permission rows — a cross-domain read,
// no aggregate root of its own. That makes it a service-driven domain.
//
// DENY-wins semantics: if the user holds both an ALLOW and a DENY grant for
// a given permission code, it is treated as denied and omitted from the
// returned set. The empty slice (not nil) is returned when the user has no
// permissions in the workspace.
//
// Consumed by
// internal/application/usecases/service/security/get_user_permission_codes.go.
//
// ---------------------------------------------------------------------------
// Vocabulary note — `binding_kind` + `binding_id` (added 2026-05-24 for A2 /
// WKR-P0-2 — silent privilege-elevation fix).
//
// These fields constrain the permission lookup to a SINGLE selected binding
// (the User × Workspace × role-grant join row from the session) so a user
// holding multiple bindings in one workspace (e.g. CLIENT + OPERATOR_STAFF)
// no longer receives the UNION of permissions across all bindings.
//
// Field-name vocabulary is `binding_*` per Q-BR-1 lock 2026-05-24 (see
// docs/plan/20260522-principal-to-binding-rename/decisions.md §Lock
// rationale). The enum still imports `domain.entity.v1.PrincipalType`
// because the proto rename to `BindingKind` is owned by PTB plan's P1
// sweep (~3 weeks). Acceptable temporary inconsistency vs. avoiding a
// redundant rename pass; the field NAMES are the locked vocabulary
// beachhead.
//
// Compatibility: both fields are OPTIONAL on the wire. A caller that
// supplies the zero values (BindingKind=UNSPECIFIED, BindingId="") gets
// the legacy UNION behaviour preserved (no filtering). Production callers
// MUST supply both; the silent-elevation fix only applies when both are
// non-zero.
// ---------------------------------------------------------------------------

message GetUserPermissionCodesRequest {
  string user_id = 1;
  string workspace_id = 2;
  // BindingKind — which kind of binding the session is currently active as
  // (OPERATOR_OWNER / OPERATOR_STAFF / CLIENT / CLIENT_DELEGATE / SUPPLIER /
  // SUPPLIER_DELEGATE). Sourced from session.principal_type. When
  // UNSPECIFIED the adapter falls back to legacy union-across-all-bindings
  // behaviour for backwards compatibility.
  domain.entity.v1.PrincipalType binding_kind = 3;
  // BindingId — the row id of the underlying grant (workspace_user.id /
  // client_portal_grant.id / supplier_portal_grant.id / delegate.id).
  // Sourced from session.principal_id. When empty the adapter falls back
  // to legacy union behaviour.
  string binding_id = 4;
  // ActingAsClientId — for delegate principals only, the underlying
  // client_id the delegate is currently acting on behalf of (the
  // delegate_client.client_id row that owns the grant). Sourced from the
  // session row's acting_as_client_id column.
  //
  // REQUIRED when binding_kind == CLIENT_DELEGATE: the adapter scopes
  // grant resolution to the per-target delegate_client row identified by
  // (delegate_id = binding_id, client_id = acting_as_client_id). When
  // empty for a CLIENT_DELEGATE lookup the adapter FAILS CLOSED (returns
  // empty permission set) rather than unioning across all targets — this
  // closes the silent privilege-elevation hole where a delegate with
  // multiple clients in one workspace would receive the union of all
  // per-target grants.
  //
  // IGNORED for non-delegate binding kinds. The acting-as target boundary
  // is the same row that principal_switch.lockTargetBinding locks during
  // session rotation (see apps/service-admin/internal/composition/
  // principal_switch.go), making permission resolution consistent with
  // the existing lock semantics.
  //
  // Added 2026-05-24 per A2-followup (codex red-team A2-P0-1 fix).
  string acting_as_client_id = 5;
  // ActingAsSupplierId — symmetric counterpart of acting_as_client_id for
  // SUPPLIER_DELEGATE principals. Sourced from the session row's
  // acting_as_supplier_id column.
  //
  // REQUIRED when binding_kind == SUPPLIER_DELEGATE; absent →
  // fail-closed empty permission set. IGNORED for non-delegate binding
  // kinds. The acting-as target boundary matches
  // principal_switch.lockTargetBinding for SUPPLIER_DELEGATE rotation
  // locking.
  //
  // Added 2026-05-24 per A2-followup (codex red-team A2-P0-1 fix).
  string acting_as_supplier_id = 6;
}

message GetUserPermissionCodesResponse {
  repeated string permission_codes = 1;
}
