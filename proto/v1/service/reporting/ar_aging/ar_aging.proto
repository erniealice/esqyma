syntax = "proto3";

package service.reporting.v1;

option go_package = "github.com/erniealice/esqyma/pkg/schema/v1/service/reporting/ar_aging";

import "domain/common/error.proto";
import "domain/common/pagination.proto";

// ---------------------------------------------------------------------------
// AR aging reporting — service-driven domain (Q7 + Q-SDM-LEDGER-INTERFACE).
//
// Hosts the two AR-side ledger reporting reads previously declared on the
// 15-method `ledgerReportingInner` duck interface at
// `apps/service-admin/internal/composition/ledger_reporting.go:65-81`:
//
//   - GetReceivablesAgingReport — outstanding receivables bucketed by age
//   - GetCollectionSummaryReport — two-dimensional pivot of collected cash
//
// Per Q-SDM-LEDGER-DECOMP the 15-method interface decomposes into 5 report-
// group sub-candidates; AR aging is P1.E.1 (the first such sub-candidate).
//
// Per Q-SDM-LEDGER-INTERFACE there is NO replacement Go interface — each
// group's proto types are imported directly by downstream consumers. The
// messages here mirror the shapes of the previous
// `domain/ledger/reporting/receivables_aging` + `domain/treasury/reporting/
// collection_summary` protos so the migration is mechanical: same field
// shapes, same semantics, just a new package + new top-level Request/Response
// names that disambiguate them from the underlying entity-domain protos.
// ---------------------------------------------------------------------------

// =============================================================================
// Receivables aging report
// =============================================================================

// GetReceivablesAgingRequest defines parameters for the receivables aging report.
message GetReceivablesAgingRequest {
  optional string as_of_date = 1;               // ISO 8601 date (YYYY-MM-DD) — date to calculate aging from (default: today)
  optional string start_date = 2;               // ISO 8601 date (YYYY-MM-DD) — filter revenues created after
  optional string end_date = 3;                 // ISO 8601 date (YYYY-MM-DD) — filter revenues created before
  string row_dimension = 4;                     // Row axis: client/client_category/location/location_area
  optional string client_id = 5;                // Filter by specific client
  optional string client_category_id = 6;       // Filter by client category
  optional string location_id = 7;              // Filter by specific location
  optional string location_area_id = 8;         // Filter by location area
  optional string revenue_category_id = 9;      // Filter by revenue category
  optional string currency = 10;                // Filter by currency (default: all)
  optional domain.common.v1.PaginationRequest pagination = 11;
}

// AgingBuckets represents amounts in each aging bucket (all values in centavos).
message AgingBuckets {
  int64 current = 1;                            // Not yet due (0 days past due)
  int64 days_1_30 = 2;                          // 1-30 days past due
  int64 days_31_60 = 3;                         // 31-60 days past due
  int64 days_61_90 = 4;                         // 61-90 days past due
  int64 days_over_90 = 5;                       // Over 90 days past due
}

// ReceivablesAgingRow represents one row in the aging report.
message ReceivablesAgingRow {
  string row_key = 1;                           // Human-readable row label
  optional string row_id = 2;                   // Entity ID for the row dimension
  AgingBuckets buckets = 3;                     // centavos — amounts in each aging bucket
  int64 total_outstanding = 4;                  // centavos — sum of all buckets
  int32 invoice_count = 5;                      // Number of outstanding invoices
}

// ReceivablesAgingSummary provides report-level totals.
message ReceivablesAgingSummary {
  AgingBuckets buckets = 1;                     // Grand total per aging bucket
  int64 grand_total_outstanding = 2;            // centavos — sum of all outstanding
  int32 total_invoice_count = 3;                // Total number of outstanding invoices
  optional string as_of_date = 4;               // ISO 8601 date (YYYY-MM-DD)
  optional string start_date = 5;               // ISO 8601 date (YYYY-MM-DD)
  optional string end_date = 6;                 // ISO 8601 date (YYYY-MM-DD)
  string currency = 7;                          // Currency of all monetary values
}

// GetReceivablesAgingResponse returns the generated receivables aging report.
message GetReceivablesAgingResponse {
  repeated string bucket_labels = 1;            // ["Current", "1-30 Days", "31-60 Days", "61-90 Days", "Over 90 Days"]
  repeated ReceivablesAgingRow rows = 2;        // One row per row_dimension value
  optional ReceivablesAgingSummary summary = 3;
  optional domain.common.v1.PaginationResponse pagination = 4;
  bool success = 5;
  optional domain.common.v1.Error error = 6;
}

// =============================================================================
// Collection summary report (AR-side cash receipts pair to receivables_aging)
// =============================================================================

// GetCollectionSummaryRequest defines parameters for a two-axis pivot collection summary report.
message GetCollectionSummaryRequest {
  optional string start_date = 1;               // ISO 8601 date (YYYY-MM-DD) — report period start
  optional string end_date = 2;                 // ISO 8601 date (YYYY-MM-DD) — report period end
  string primary_dimension = 3;                 // Column axis: monthly/quarterly/yearly/client/client_category/location/location_area/collection_method
  string row_dimension = 4;                     // Row axis: same options
  optional string client_id = 5;                // Filter by specific client
  optional string client_category_id = 6;       // Filter by client category
  optional string location_id = 7;              // Filter by specific location
  optional string location_area_id = 8;         // Filter by location area
  optional string collection_method_id = 9;     // Filter by collection method
  optional string currency = 10;                // Filter by currency (default: all)
  optional string collection_type = 11;         // Filter by type: subscription/sale/refund/invoice/deposit/walk_in
  optional domain.common.v1.PaginationRequest pagination = 12;
}

// CollectionSummaryCell represents one cell in the pivot table.
message CollectionSummaryCell {
  string column_key = 1;                        // Human-readable column label
  optional string column_id = 2;                // Entity ID for the column dimension
  int64 total_collected = 3;                    // centavos — sum of collections for this cell
  int64 transaction_count = 4;                  // Number of collection transactions
}

// CollectionSummaryRow represents one row in the pivot table.
message CollectionSummaryRow {
  string row_key = 1;                           // Human-readable row label
  optional string row_id = 2;                   // Entity ID for the row dimension
  repeated CollectionSummaryCell cells = 3;     // One cell per column
  int64 row_total = 4;                          // centavos — sum across all cells in this row
  int64 row_transaction_count = 5;              // Total transactions across all cells in this row
}

// CollectionSummarySummary provides report-level totals.
message CollectionSummarySummary {
  int64 grand_total = 1;                        // centavos — sum of all collections
  int64 total_transactions = 2;                 // Total number of collection transactions
  repeated CollectionSummaryCell column_totals = 3; // Per-column totals across all rows
  optional string start_date = 4;               // ISO 8601 date (YYYY-MM-DD)
  optional string end_date = 5;                 // ISO 8601 date (YYYY-MM-DD)
  string currency = 6;                          // Currency of all monetary values
}

// GetCollectionSummaryResponse returns the generated pivot collection summary report.
message GetCollectionSummaryResponse {
  repeated string column_keys = 1;              // Ordered column headers
  repeated CollectionSummaryRow rows = 2;       // One row per row_dimension value
  optional CollectionSummarySummary summary = 3;
  optional domain.common.v1.PaginationResponse pagination = 4;
  bool success = 5;
  optional domain.common.v1.Error error = 6;
}

// =============================================================================
// Service definition
// =============================================================================

// ARAgingService defines AR-side ledger reporting reads.
service ARAgingService {
  rpc GetReceivablesAgingReport(GetReceivablesAgingRequest) returns (GetReceivablesAgingResponse);
  rpc GetCollectionSummaryReport(GetCollectionSummaryRequest) returns (GetCollectionSummaryResponse);
}
