  int64 row_total = 4;                             // centavos — sum across all cells in this row
  int64 row_transaction_count = 5;                 // Total transactions across all cells
  double row_total_quantity = 6;                   // Total quantity across all cells
}

// ExpenditureReportSummary provides report-level totals.
message ExpenditureReportSummary {
  int64 grand_total = 1;                                // centavos — sum of all expenditures
  int64 total_transactions = 2;                         // Total number of expenditure transactions
  double total_quantity = 3;                            // Total units across all rows/columns
  repeated ExpenditureReportCell column_totals = 4;     // Per-column totals across all rows
  optional string start_date = 5;                       // ISO 8601 date (YYYY-MM-DD)
  optional string end_date = 6;                         // ISO 8601 date (YYYY-MM-DD)
  string currency = 7;                                  // Currency of all monetary values
}

// GetExpenditureReportResponse returns the generated pivot expenditure
