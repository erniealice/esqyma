syntax = "proto3";

package service.dashboard.location.v1;

option go_package = "github.com/erniealice/esqyma/pkg/schema/v1/service/dashboard/location";

import "domain/common/error.proto";
import "domain/entity/location/location.proto";

// ---------------------------------------------------------------------------
// Location dashboard — service-driven domain (Q7 signal 1: cross-entity
// projection reading across location + location_area).
//
// See docs/plan/20260520-service-domain-migration/wave-b-surface-map.md
// §P1.C.2 (Location) and the Q-ORCH-2-REFINEMENT lock at
// docs/plan/20260520-orchestration/decisions.md.
//
// Owned by the espyna service-driven category (relocated from
// `proto/v1/domain/entity/location/dashboard/dashboard.proto` per
// Q-SDM-DASHBOARD-LAYOUT LOCKED 2026-05-20: subdir-per-dashboard under
// `proto/v1/service/dashboard/<X>/`).
//
// Per Q-SDM-DASHBOARD-SHARED-TYPES (LOCKED 2026-05-20), this file owns its
// own messages — there is no `service/dashboard/common.proto`. Each dashboard
// proto package defines its own *Stats / *Row / *Slice shapes.
//
// Consumed by
// internal/application/usecases/service/dashboard/location/get_location_dashboard.go.
// ---------------------------------------------------------------------------

// LocationStats are the four stat cards shown at the top of the location
// dashboard: Total / Active / Regions / Areas Count.
message LocationStats {
  int64 total_locations  = 1;
  int64 active_locations = 2;
  int64 regions_count    = 3;
  int64 areas_count      = 4;
}

// LocationAreaCount is one row of the "top areas by location count" widget.
message LocationAreaCount {
  string location_area_id   = 1;
  string location_area_name = 2;
  int64  location_count     = 3;
}

// GetLocationDashboardRequest is the workspace-scoped input for the
// location dashboard use case.
message GetLocationDashboardRequest {
  string workspace_id = 1;
  // now_millis is unused by the current implementation but kept for
  // future time-range filtering. Zero means "use server time".
  optional int64 now_millis = 2;
}

// GetLocationDashboardResponse is the projected aggregate set the
// view layer renders into the dashboard page.
message GetLocationDashboardResponse {
  bool success                          = 1;
  optional domain.common.v1.Error error = 2;
  LocationStats stats                   = 3;
  map<string, int64> locations_by_region = 4;
  repeated LocationAreaCount top_areas   = 5;
  repeated domain.entity.v1.Location recent_locations = 6;
}
