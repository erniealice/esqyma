syntax = "proto3";

package service.dashboard.payroll.v1;

option go_package = "github.com/erniealice/esqyma/pkg/schema/v1/service/dashboard/payroll";

import "domain/common/error.proto";
import "domain/payroll/payroll_run/payroll_run.proto";
import "domain/payroll/payroll_remittance/payroll_remittance.proto";

// ---------------------------------------------------------------------------
// Payroll dashboard — service-driven domain (Q7 signal 3: cross-entity
// projection reading across payroll_run + payroll_remittance).
//
// See docs/plan/20260520-service-domain-migration/wave-b-surface-map.md
// §P1.C.6 (Payroll) and the Q-ORCH-2-REFINEMENT lock at
// docs/plan/20260520-orchestration/decisions.md.
//
// Owned by the espyna service-driven category (relocated from
// `proto/v1/domain/payroll/dashboard/dashboard.proto` per Q-SDM-DASHBOARD-LAYOUT
// LOCKED 2026-05-20: subdir-per-dashboard under `proto/v1/service/dashboard/<X>/`).
//
// Per Q-SDM-DASHBOARD-SHARED-TYPES (LOCKED 2026-05-20), this file owns its
// own messages — there is no `service/dashboard/common.proto`. Each dashboard
// proto package defines its own *Stats / *Row / *Slice shapes.
//
// Consumed by
// internal/application/usecases/service/dashboard/payroll/get_payroll_dashboard.go.
// ---------------------------------------------------------------------------

// PayrollStats are the four dashboard stats for payroll.
message PayrollStats {
  // current_run_status: "draft" | "calculated" | "approved" | "posted" | "" (no run)
  string current_run_status    = 1;
  int32  employees_in_current  = 2;
  int64  total_gross_mtd       = 3; // centavos
  int64  remittances_due30_cnt = 4;
}

// GetPayrollDashboardRequest is the request shape.
message GetPayrollDashboardRequest {
  string workspace_id = 1;
  // now_millis — unix milliseconds used for MTD and 12-month trend calculations.
  // Zero means "use server time".
  optional int64 now_millis = 2;
}

// GetPayrollDashboardResponse is the view-layer projection.
message GetPayrollDashboardResponse {
  bool success                          = 1;
  optional domain.common.v1.Error error = 2;
  PayrollStats stats                    = 3;
  optional domain.payroll.v1.PayrollRun latest_run                    = 4;
  repeated domain.payroll.v1.PayrollRun recent_runs                   = 5;
  repeated domain.payroll.v1.PayrollRemittance upcoming_deadlines      = 6;
  repeated string  gross_trend_labels   = 7;
  repeated double  gross_trend_values   = 8;
}
