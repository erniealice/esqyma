syntax = "proto3";

package service.tax.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/service/tax";

import "domain/common/error.proto";
import "domain/revenue/revenue_tax_line/revenue_tax_line.proto";

// ---------------------------------------------------------------------------
// Tax compute — service-driven domain (Q7 signal 1: cross-domain read/compute;
// see docs/plan/20260518-hexagonal-strict-adherence/proto-service.md and the
// follow-up migration plan docs/plan/20260520-service-domain-migration/,
// decision Q-SDM-TAX LOCKED 2026-05-20).
//
// ComputeTaxesForRevenue is the service-shape operation that computes
// SURCHARGE + WITHHOLDING tax lines for a Revenue. It reads across many
// entity domains (revenue, revenue_line_item, workspace, product, tax_*,
// withholding_certificate) and writes append-only revenue_tax_line records
// as a side-effect of the revenue write — it has no aggregate root of its
// own, which makes it a service-driven domain rather than entity-driven.
//
// This proto formalizes the previously Go-only Request/Response types at
// packages/espyna-golang/internal/application/usecases/tax/compute_taxes_for_revenue/compute.go:92, :108
// so that the service-shape operation now has a versioned wire-contract.
// The entity-layer use case (usecases/tax/compute_taxes_for_revenue/) is
// retained as the algorithmic implementation; the service-layer wrapper
// (usecases/service/tax/compute_taxes_for_revenue.go) translates these
// proto messages to/from that use case.
//
// Consumed by
// internal/application/usecases/service/tax/compute_taxes_for_revenue.go.
// ---------------------------------------------------------------------------

message ComputeTaxesForRevenueRequest {
  // RevenueID is the revenue to compute taxes for. Required.
  string revenue_id = 1;
  // WorkspaceID is the owning workspace. Required — Revenue proto has no
  // workspace_id field, so the caller (who has the workspace context) must
  // supply it.
  string workspace_id = 2;
  // AsOfDate is the effective date for reading registrations and rates,
  // formatted YYYY-MM-DD. Empty falls back to revenue.revenue_date.
  string as_of_date = 3;
  // DryRun skips all writes and returns preview lines only.
  bool dry_run = 4;
  // IsRecompute applies the recompute blocking rules (settled / non-void
  // withholding certificate).
  bool is_recompute = 5;
}

message ComputeTaxesForRevenueResponse {
  repeated domain.revenue.v1.RevenueTaxLine lines = 1;
  optional domain.common.v1.Error error = 2;
}
