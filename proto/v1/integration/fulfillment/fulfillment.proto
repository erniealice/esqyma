syntax = "proto3";

package integration.fulfillment.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/integration/fulfillment";

import "google/protobuf/timestamp.proto";

// FulfillmentProviderType represents the type of fulfillment provider
enum FulfillmentProviderType {
  FULFILLMENT_PROVIDER_TYPE_UNSPECIFIED = 0;
  FULFILLMENT_PROVIDER_TYPE_ON_DEMAND = 1;     // Lalamove, GrabExpress (instant dispatch)
  FULFILLMENT_PROVIDER_TYPE_COURIER = 2;        // Traditional courier (J&T, LBC)
  FULFILLMENT_PROVIDER_TYPE_SELF_DELIVERY = 3;  // In-house delivery fleet
  FULFILLMENT_PROVIDER_TYPE_MOCK = 4;           // Mock/test provider
}

// DeliveryStatus represents the status of a delivery order
enum DeliveryStatus {
  DELIVERY_STATUS_UNSPECIFIED = 0;
  DELIVERY_STATUS_QUOTED = 1;         // Price quote received
  DELIVERY_STATUS_PLACED = 2;         // Order placed with provider
  DELIVERY_STATUS_ACCEPTED = 3;       // Driver/courier accepted
  DELIVERY_STATUS_PICKING_UP = 4;     // Driver en route to pickup
  DELIVERY_STATUS_IN_TRANSIT = 5;     // Package in transit
  DELIVERY_STATUS_DELIVERED = 6;      // Successfully delivered
  DELIVERY_STATUS_FAILED = 7;         // Delivery failed
  DELIVERY_STATUS_CANCELLED = 8;      // Order cancelled
  DELIVERY_STATUS_RETURNED = 9;       // Package returned to sender
  DELIVERY_STATUS_EXPIRED = 10;       // Quote or order expired
}

// FulfillmentCapability represents features supported by a provider
enum FulfillmentCapability {
  FULFILLMENT_CAPABILITY_UNSPECIFIED = 0;
  FULFILLMENT_CAPABILITY_INSTANT_QUOTE = 1;      // Real-time price quotes
  FULFILLMENT_CAPABILITY_SCHEDULE_PICKUP = 2;     // Schedule future pickups
  FULFILLMENT_CAPABILITY_LIVE_TRACKING = 3;       // Real-time GPS tracking
  FULFILLMENT_CAPABILITY_PROOF_OF_DELIVERY = 4;   // Photo/signature proof
  FULFILLMENT_CAPABILITY_MULTIPLE_STOPS = 5;      // Multi-drop routes
  FULFILLMENT_CAPABILITY_CASH_ON_DELIVERY = 6;    // COD collection
  FULFILLMENT_CAPABILITY_WEBHOOKS = 7;            // Status change callbacks
  FULFILLMENT_CAPABILITY_CANCEL = 8;              // Cancel after placement
  FULFILLMENT_CAPABILITY_INSURANCE = 9;           // Package insurance
}

// VehicleType for delivery service selection
enum VehicleType {
  VEHICLE_TYPE_UNSPECIFIED = 0;
  VEHICLE_TYPE_MOTORCYCLE = 1;
  VEHICLE_TYPE_SEDAN = 2;
  VEHICLE_TYPE_MPV = 3;
  VEHICLE_TYPE_VAN = 4;
  VEHICLE_TYPE_TRUCK = 5;
}

// DeliveryOrder represents a delivery request to a fulfillment provider
message DeliveryOrder {
  // Internal order ID (generated by our system)
  string id = 1;

  // Provider order/reference ID
  string provider_order_id = 2;

  // Provider identifier (e.g., "lalamove", "grabexpress")
  string provider_id = 3;

  // Provider type
  FulfillmentProviderType provider_type = 4;

  // Current delivery status
  DeliveryStatus status = 5;

  // Vehicle type
  VehicleType vehicle_type = 6;

  // Pickup location
  DeliveryLocation pickup = 7;

  // Drop-off location(s)
  repeated DeliveryLocation dropoffs = 8;

  // Pricing
  DeliveryQuote quote = 9;

  // Driver/courier info (populated after acceptance)
  DriverInfo driver = 10;

  // Tracking URL (for customer/admin to track)
  string tracking_url = 11;

  // Proof of delivery
  ProofOfDelivery proof = 12;

  // Associated entity references (for linking to our domain)
  string fulfillment_id = 13;  // FK to domain.fulfillment
  string revenue_id = 14;

  // Special instructions
  string remarks = 15;

  // Custom metadata
  map<string, string> metadata = 16;

  // Timestamps
  google.protobuf.Timestamp created_at = 17;
  google.protobuf.Timestamp updated_at = 18;
  google.protobuf.Timestamp scheduled_at = 19;
  google.protobuf.Timestamp picked_up_at = 20;
  google.protobuf.Timestamp delivered_at = 21;
}

// DeliveryLocation represents a pickup or drop-off point
message DeliveryLocation {
  string address = 1;
  double latitude = 2;
  double longitude = 3;
  string contact_name = 4;
  string contact_phone = 5;
  string remarks = 6;
}

// DeliveryQuote represents a price quote from a provider
message DeliveryQuote {
  string quote_id = 1;
  int64 amount = 2; // centavos
  string currency = 3;
  double distance_km = 4;
  int32 estimated_minutes = 5;
  google.protobuf.Timestamp expires_at = 6;
}

// DriverInfo represents the assigned driver/courier
message DriverInfo {
  string name = 1;
  string phone = 2;
  string plate_number = 3;
  string photo_url = 4;
  double latitude = 5;
  double longitude = 6;
}

// ProofOfDelivery for delivery confirmation
message ProofOfDelivery {
  string photo_url = 1;
  string signature_url = 2;
  string recipient_name = 3;
  google.protobuf.Timestamp timestamp = 4;
}
