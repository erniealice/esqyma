syntax = "proto3";

package integration.webhook.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/integration/webhook";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

// WebhookRequest represents a generic incoming webhook request
// This can be used across different integrations (payment, email, etc.)
message WebhookRequest {
  // Provider identifier (e.g., "asiapay", "paymaya", "stripe")
  string provider_id = 1;

  // Raw request body as bytes (for form-urlencoded, JSON, etc.)
  bytes payload = 2;

  // HTTP headers from the request
  map<string, string> headers = 3;

  // URL query parameters
  map<string, string> query = 4;

  // URL path parameters (e.g., from route like /webhooks/:provider/:action)
  map<string, string> params = 5;

  // Content-Type header value
  string content_type = 6;

  // Signature for webhook verification (provider-specific)
  string signature = 7;

  // Request method (POST, GET, etc.)
  string method = 8;

  // Full request URL
  string url = 9;

  // Client IP address
  string client_ip = 10;

  // Timestamp when the webhook was received
  google.protobuf.Timestamp received_at = 11;
}

// WebhookResponse represents a generic webhook processing response
message WebhookResponse {
  // Whether processing was successful
  bool success = 1;

  // Action taken (e.g., "payment_success", "payment_failed", "ignored")
  string action = 2;

  // Human-readable message
  string message = 3;

  // Error message if processing failed
  string error_message = 4;

  // Error code for programmatic handling
  string error_code = 5;

  // Provider-specific response data
  google.protobuf.Struct data = 6;

  // Processing timestamp
  google.protobuf.Timestamp processed_at = 7;
}

// WebhookLog represents a stored webhook log entry
// Can be stored in collections like integration_payment, integration_email, etc.
message WebhookLog {
  // Unique log entry ID
  string id = 1;

  // Provider identifier
  string provider_id = 2;

  // Webhook type/event (e.g., "payment.success", "invitee.created")
  string event_type = 3;

  // Original request (stored for audit/replay)
  WebhookRequest request = 4;

  // Processing response
  WebhookResponse response = 5;

  // Associated entity IDs for cross-referencing
  string payment_id = 6;
  string subscription_id = 7;
  string client_id = 8;
  string order_ref = 9;

  // Processing metadata
  string execution_id = 10;
  int32 retry_count = 11;
  string status = 12;  // pending, processed, failed, retrying

  // Timestamps
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
  google.protobuf.Timestamp processed_at = 15;

  // Whether this log entry is active
  bool active = 16;
}

// ===== Service Definition =====

// WebhookService provides generic webhook operations
service WebhookService {
  // Log an incoming webhook (for audit purposes)
  rpc LogWebhook(LogWebhookRequest) returns (LogWebhookResponse);

  // Get a webhook log by ID
  rpc GetWebhookLog(GetWebhookLogRequest) returns (GetWebhookLogResponse);

  // List webhook logs with filtering
  rpc ListWebhookLogs(ListWebhookLogsRequest) returns (ListWebhookLogsResponse);
}

message LogWebhookRequest {
  WebhookLog log = 1;
}

message LogWebhookResponse {
  bool success = 1;
  string log_id = 2;
  string error_message = 3;
}

message GetWebhookLogRequest {
  string id = 1;
}

message GetWebhookLogResponse {
  bool success = 1;
  WebhookLog log = 2;
  string error_message = 3;
}

message ListWebhookLogsRequest {
  string provider_id = 1;
  string event_type = 2;
  string status = 3;
  string payment_id = 4;
  string subscription_id = 5;
  google.protobuf.Timestamp from_date = 6;
  google.protobuf.Timestamp to_date = 7;
  int32 limit = 8;
  string page_token = 9;
}

message ListWebhookLogsResponse {
  repeated WebhookLog logs = 1;
  string next_page_token = 2;
  int32 total_count = 3;
}
