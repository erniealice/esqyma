syntax = "proto3";

package integration.email.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/integration/email";

import "google/protobuf/timestamp.proto";
import "integration/email/email.proto";
import "integration/email/provider.proto";
import "integration/email/template.proto";
import "domain/common/error.proto";

// EmailDomainService provides email operations across multiple providers
// This service defines the contract; the hexagonal architecture adapters
// implement provider-specific behavior
service EmailDomainService {
  // Send a standard email
  rpc SendEmail(SendEmailRequest) returns (SendEmailResponse);

  // Send an email using a template
  rpc SendTemplatedEmail(SendTemplatedEmailRequest) returns (SendTemplatedEmailResponse);

  // Send batch emails (multiple recipients/messages)
  rpc SendBatchEmails(SendBatchEmailsRequest) returns (SendBatchEmailsResponse);

  // Get inbox messages
  rpc GetInboxMessages(GetInboxMessagesRequest) returns (GetInboxMessagesResponse);

  // Get a specific email message
  rpc GetMessage(GetMessageRequest) returns (GetMessageResponse);

  // Search messages
  rpc SearchMessages(SearchMessagesRequest) returns (SearchMessagesResponse);

  // Delete a message
  rpc DeleteMessage(DeleteMessageRequest) returns (DeleteMessageResponse);

  // Mark message as read/unread
  rpc MarkAsRead(MarkAsReadRequest) returns (MarkAsReadResponse);

  // Move message to folder/label
  rpc MoveMessage(MoveMessageRequest) returns (MoveMessageResponse);

  // Check provider health
  rpc CheckHealth(CheckHealthRequest) returns (CheckHealthResponse);

  // Get provider capabilities
  rpc GetCapabilities(GetCapabilitiesRequest) returns (GetCapabilitiesResponse);

  // Template management operations
  rpc CreateTemplate(CreateTemplateRequest) returns (CreateTemplateResponse);
  rpc UpdateTemplate(UpdateTemplateRequest) returns (UpdateTemplateResponse);
  rpc GetTemplate(GetTemplateRequest) returns (GetTemplateResponse);
  rpc ListTemplates(ListTemplatesRequest) returns (ListTemplatesResponse);
  rpc DeleteTemplate(DeleteTemplateRequest) returns (DeleteTemplateResponse);
}

// SendEmailRequest is a request to send a standard email
message SendEmailRequest {
  EmailData data = 1;
}

message EmailData {
  // Email provider identifier
  string provider_id = 1;

  // From address
  EmailAddress from = 2;

  // To recipients
  repeated EmailAddress to = 3;

  // CC recipients
  repeated EmailAddress cc = 4;

  // BCC recipients
  repeated EmailAddress bcc = 5;

  // Reply-to address
  EmailAddress reply_to = 6;

  // Subject line
  string subject = 7;

  // Plain text body
  string text_body = 8;

  // HTML body
  string html_body = 9;

  // Attachments
  repeated EmailAttachment attachments = 10;

  // Custom headers
  map<string, string> headers = 11;

  // Tags for tracking
  repeated string tags = 12;

  // Custom metadata
  map<string, string> metadata = 13;

  // Send options
  SendOptions options = 14;

  // Inline template HTML content (alternative to html_body)
  // When provided, template_values will be applied using {{key}} → value replacement
  // This takes precedence over html_body if both are provided
  string template_html = 15;

  // Template variable values for replacement
  // Keys should match {{key}} placeholders in template_html, subject, or text_body
  // Example: {"client_name": "John Doe", "plan_name": "Premium Plan"}
  map<string, string> template_values = 16;
}

// SendEmailResponse contains the result of sending an email
message SendEmailResponse {
  bool success = 1;
  repeated EmailResult data = 2;
  domain.common.v1.Error error = 3;
}

message EmailResult {
  // Message ID from provider
  string message_id = 1;

  // The complete email message that was sent
  EmailMessage message = 2;

  // Provider-specific response data
  map<string, string> provider_response = 3;

  // Timestamp when sent
  google.protobuf.Timestamp sent_at = 4;
}

// SendBatchEmailsRequest is a request to send multiple emails
message SendBatchEmailsRequest {
  BatchEmailData data = 1;
}

message BatchEmailData {
  // Provider identifier
  string provider_id = 1;

  // Emails to send
  repeated EmailData emails = 2;

  // Batch ID for tracking
  string batch_id = 3;

  // Whether to fail entire batch on first error
  bool fail_fast = 4;

  // Maximum concurrent sends
  int32 max_concurrent = 5;
}

// SendBatchEmailsResponse contains results for batch sending
message SendBatchEmailsResponse {
  bool success = 1;
  repeated BatchEmailResult data = 2;
  domain.common.v1.Error error = 3;
}

message BatchEmailResult {
  // Results for each email
  repeated EmailResult results = 1;

  // Number of successful sends
  int32 success_count = 2;

  // Number of failed sends
  int32 failure_count = 3;

  // Batch ID
  string batch_id = 4;
}

// GetInboxMessagesRequest is a request to retrieve inbox messages
message GetInboxMessagesRequest {
  InboxQueryData data = 1;
}

message InboxQueryData {
  // Email provider identifier
  string provider_id = 1;

  // Maximum number of messages to return
  int32 max_results = 2;

  // Page token for pagination
  string page_token = 3;

  // Search query (provider-specific syntax)
  string query = 4;

  // Filter by labels/folders (provider-specific)
  repeated string label_ids = 5;

  // Only return unread messages
  bool unread_only = 6;

  // Only return messages after this timestamp
  google.protobuf.Timestamp after = 7;

  // Only return messages before this timestamp
  google.protobuf.Timestamp before = 8;

  // Filter by sender email
  string from_email = 9;

  // Include message bodies (can be expensive)
  bool include_body = 10;

  // Include attachments (can be expensive)
  bool include_attachments = 11;
}

// GetInboxMessagesResponse contains the retrieved messages
message GetInboxMessagesResponse {
  bool success = 1;
  repeated EmailMessage data = 2;
  domain.common.v1.Error error = 3;
  string next_page_token = 4;
  int32 total_count = 5;
}

// GetMessageRequest is a request to retrieve a specific message
message GetMessageRequest {
  MessageLookupData data = 1;
}

message MessageLookupData {
  // Email provider identifier
  string provider_id = 1;

  // Message ID
  string message_id = 2;

  // Whether to include full message body
  bool include_body = 3;

  // Whether to include attachments
  bool include_attachments = 4;

  // Format for message retrieval
  MessageFormat format = 5;
}

// MessageFormat represents the format for retrieving messages
enum MessageFormat {
  MESSAGE_FORMAT_UNSPECIFIED = 0;
  MESSAGE_FORMAT_FULL = 1;        // Full message with all fields
  MESSAGE_FORMAT_METADATA = 2;    // Metadata only (no body)
  MESSAGE_FORMAT_MINIMAL = 3;     // Minimal fields (id, from, subject)
  MESSAGE_FORMAT_RAW = 4;         // Raw MIME message
}

// GetMessageResponse contains the retrieved message
message GetMessageResponse {
  bool success = 1;
  repeated EmailMessage data = 2;
  domain.common.v1.Error error = 3;
}

// SearchMessagesRequest is a request for advanced message search
message SearchMessagesRequest {
  SearchQueryData data = 1;
}

message SearchQueryData {
  // Provider identifier
  string provider_id = 1;

  // Search query
  string query = 2;

  // Search filters
  SearchFilters filters = 3;

  // Maximum results
  int32 max_results = 4;

  // Page token for pagination
  string page_token = 5;

  // Sort options
  SortOptions sort_options = 6;
}

// SearchFilters represents search filter criteria
message SearchFilters {
  // Filter by sender email
  string from = 1;

  // Filter by recipient email
  string to = 2;

  // Filter by subject (contains)
  string subject = 3;

  // Filter by date range
  google.protobuf.Timestamp after = 4;
  google.protobuf.Timestamp before = 5;

  // Filter by labels/folders
  repeated string labels = 6;

  // Filter by read status
  optional bool is_read = 7;

  // Filter by has attachments
  optional bool has_attachments = 8;

  // Filter by tags
  repeated string tags = 9;
}

// SortOptions represents sorting configuration
message SortOptions {
  // Field to sort by
  SortField field = 1;

  // Sort order
  SortOrder order = 2;
}

// SortField represents fields that can be sorted
enum SortField {
  SORT_FIELD_UNSPECIFIED = 0;
  SORT_FIELD_DATE = 1;
  SORT_FIELD_FROM = 2;
  SORT_FIELD_SUBJECT = 3;
  SORT_FIELD_SIZE = 4;
}

// SearchMessagesResponse contains search results
message SearchMessagesResponse {
  bool success = 1;
  repeated EmailMessage data = 2;
  domain.common.v1.Error error = 3;
  string next_page_token = 4;
  int32 total_count = 5;
}

// DeleteMessageRequest is a request to delete a message
message DeleteMessageRequest {
  MessageDeleteData data = 1;
}

message MessageDeleteData {
  // Provider identifier
  string provider_id = 1;

  // Message ID
  string message_id = 2;

  // Whether to permanently delete (vs move to trash)
  bool permanent = 3;
}

// DeleteMessageResponse confirms the deletion
message DeleteMessageResponse {
  bool success = 1;
  repeated MessageDeleteResult data = 2;
  domain.common.v1.Error error = 3;
}

message MessageDeleteResult {
  // Confirmation message
  string message = 1;
}

// MarkAsReadRequest is a request to mark a message as read/unread
message MarkAsReadRequest {
  MarkReadData data = 1;
}

message MarkReadData {
  // Provider identifier
  string provider_id = 1;

  // Message IDs to mark
  repeated string message_ids = 2;

  // Whether to mark as read (true) or unread (false)
  bool is_read = 3;
}

// MarkAsReadResponse confirms the operation
message MarkAsReadResponse {
  bool success = 1;
  repeated MarkReadResult data = 2;
  domain.common.v1.Error error = 3;
}

message MarkReadResult {
  // Number of messages updated
  int32 updated_count = 1;
}

// MoveMessageRequest is a request to move a message to a folder/label
message MoveMessageRequest {
  MoveMessageData data = 1;
}

message MoveMessageData {
  // Provider identifier
  string provider_id = 1;

  // Message ID to move
  string message_id = 2;

  // Target folder/label ID
  string target_folder = 3;

  // Source folder/label ID (optional, for providers that need it)
  string source_folder = 4;
}

// MoveMessageResponse confirms the move
message MoveMessageResponse {
  bool success = 1;
  repeated MoveMessageResult data = 2;
  domain.common.v1.Error error = 3;
}

message MoveMessageResult {
  // Confirmation message
  string message = 1;
}

// CheckHealthRequest is a request to check provider health
message CheckHealthRequest {
  HealthCheckData data = 1;
}

message HealthCheckData {
  // Email provider identifier to check
  string provider_id = 1;

  // Whether to perform deep health check
  bool deep_check = 2;
}

// CheckHealthResponse contains the health check result
message CheckHealthResponse {
  bool success = 1;
  repeated EmailHealthStatus data = 2;
  domain.common.v1.Error error = 3;
}

message EmailHealthStatus {
  // Whether the provider is healthy
  bool is_healthy = 1;

  // Health status message
  string status_message = 2;

  // Provider health status
  ProviderHealthStatus health_status = 3;

  // Additional health details
  map<string, string> details = 4;
}

// GetCapabilitiesRequest is a request to get provider capabilities
message GetCapabilitiesRequest {
  ProviderLookup data = 1;
}

message ProviderLookup {
  // Provider identifier
  string provider_id = 1;
}

// GetCapabilitiesResponse contains the provider's capabilities
message GetCapabilitiesResponse {
  bool success = 1;
  repeated EmailProviderCapabilities data = 2;
  domain.common.v1.Error error = 3;
}

message EmailProviderCapabilities {
  // Provider identifier
  string provider_id = 1;

  // Provider type
  EmailProviderType provider_type = 2;

  // Supported capabilities
  repeated EmailCapability capabilities = 3;

  // Capability-specific limits and features
  map<string, CapabilityDetails> capability_details = 4;

  // Rate limits
  RateLimits rate_limits = 5;

  // Maximum attachment size in bytes
  int64 max_attachment_size = 6;

  // Maximum total message size in bytes
  int64 max_message_size = 7;

  // Maximum recipients per message
  int32 max_recipients = 8;
}

// CapabilityDetails provides details about a specific capability
message CapabilityDetails {
  // Whether this capability is enabled
  bool enabled = 1;

  // Capability-specific configuration
  map<string, string> config = 2;

  // Usage limits for this capability
  map<string, int32> limits = 3;
}

// RateLimits represents API rate limiting information
message RateLimits {
  // Requests per second
  int32 requests_per_second = 1;

  // Requests per minute
  int32 requests_per_minute = 2;

  // Requests per hour
  int32 requests_per_hour = 3;

  // Requests per day
  int32 requests_per_day = 4;

  // Emails per second
  int32 emails_per_second = 5;

  // Emails per day
  int32 emails_per_day = 6;
}