version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/erniealice/esqyma/pkg/schema/v1
plugins:
  - remote: buf.build/protocolbuffers/go
    out: pkg/schema/v1
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go
    out: pkg/schema/v1
    opt:
      - paths=source_relative
