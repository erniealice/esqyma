  string provider_id = 1;
}

message EmailProviderCapabilities {
  // Provider identifier
  string provider_id = 1;

  // Provider type
  EmailProviderType provider_type = 2;

  // Supported capabilities
  repeated EmailCapability capabilities = 3;

  // Capability-specific limits and features
  map<string, CapabilityDetails> capability_details = 4;

  // Rate limits
  RateLimits rate_limits = 5;

  // Maximum attachment size in bytes
  int64 max_attachment_size = 6;

  // Maximum total message size in bytes
  int64 max_message_size = 7;

