// ───── infrastructure/storage/object.proto ─────

syntax = "proto3";

package infrastructure.storage.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/infrastructure/storage";

import "google/protobuf/timestamp.proto";

// StorageProvider represents the cloud storage provider
enum StorageProvider {
  STORAGE_PROVIDER_UNSPECIFIED = 0;
  STORAGE_PROVIDER_AZURE = 1;    // Azure Blob Storage
  STORAGE_PROVIDER_GCP = 2;      // Google Cloud Storage
  STORAGE_PROVIDER_AWS = 3;      // Amazon S3
  STORAGE_PROVIDER_LOCAL = 4;    // Local file system
}

// StorageObject represents a file/blob in cloud storage
message StorageObject {
  // Unique identifier for the object (provider-specific)
  string id = 1;

  // Storage provider
  StorageProvider provider = 2;

  // Container/bucket name
  string container_name = 3;

  // Object key/name (path within the container)
  string object_key = 4;

  // File size in bytes
  int64 size = 5;

  // Content type (MIME type)
  string content_type = 6;

  // ETag or checksum for integrity verification
  string etag = 7;

  // When the object was last modified
  google.protobuf.Timestamp last_modified = 8;

  // When the object was created
  google.protobuf.Timestamp created_at = 9;

  // Storage class/access tier (see access_tier.proto)
  string storage_class = 10;

  // Whether the object is encrypted
  bool is_encrypted = 11;

  // Encryption algorithm used (if encrypted)
  string encryption_algorithm = 12;

  // Whether versioning is enabled for this object
  bool versioning_enabled = 13;

  // Version ID (if versioning is enabled)
  string version_id = 14;

  // Custom metadata key-value pairs
  map<string, string> metadata = 15;

  // URL to access the object (if public or presigned)
  string url = 16;

  // Provider-specific object information
  oneof provider_object {
    AzureBlobObject azure_blob = 100;
    GcsObject gcs_object = 101;
    S3Object s3_object = 102;
  }
}

// AzureBlobObject contains Azure Blob Storage specific fields
message AzureBlobObject {
  // Storage account name
  string storage_account = 1;

  // Blob type (BlockBlob, AppendBlob, PageBlob)
  AzureBlobType blob_type = 2;

  // Lease status
  string lease_status = 3;

  // Lease state
  string lease_state = 4;

  // Access tier (Hot, Cool, Cold, Archive)
  string access_tier = 5;

  // Archive status (if in archive tier)
  string archive_status = 6;

  // Snapshot timestamp (if this is a snapshot)
  google.protobuf.Timestamp snapshot_time = 7;
}

// AzureBlobType enum for blob types
enum AzureBlobType {
  AZURE_BLOB_TYPE_UNSPECIFIED = 0;
  AZURE_BLOB_TYPE_BLOCK = 1;    // Block blob (default, for most files)
  AZURE_BLOB_TYPE_APPEND = 2;   // Append blob (for logging)
  AZURE_BLOB_TYPE_PAGE = 3;     // Page blob (for VHDs)
}

// GcsObject contains Google Cloud Storage specific fields
message GcsObject {
  // GCP project ID
  string project_id = 1;

  // Storage class (Standard, Nearline, Coldline, Archive)
  string storage_class = 2;

  // Object generation number
  int64 generation = 3;

  // Object metageneration number
  int64 metageneration = 4;

  // Customer-managed encryption key (CMEK) name
  string kms_key_name = 5;

  // Whether customer-supplied encryption is used
  bool customer_encryption = 6;

  // Time the object was deleted (for soft-deleted objects)
  google.protobuf.Timestamp time_deleted = 7;

  // Whether the object is in a hierarchical namespace bucket
  bool is_hierarchical = 8;
}

// S3Object contains Amazon S3 specific fields
message S3Object {
  // AWS region
  string region = 1;

  // Storage class (Standard, Standard-IA, Intelligent-Tiering, etc.)
  string storage_class = 2;

  // Version ID (if versioning is enabled)
  string version_id = 3;

  // Whether the object has object lock enabled
  bool object_lock_enabled = 4;

  // Object lock mode (Governance, Compliance)
  string object_lock_mode = 5;

  // Object lock retain until date
  google.protobuf.Timestamp object_lock_retain_until = 6;

  // Whether legal hold is on
  bool legal_hold = 7;

  // Replication status
  string replication_status = 8;

  // Server-side encryption method
  string sse_algorithm = 9;

  // KMS key ID (if using SSE-KMS)
  string kms_key_id = 10;
}

// ObjectMetadata is a simplified representation for listing operations
message ObjectMetadata {
  // Object key/name
  string object_key = 1;

  // File size in bytes
  int64 size = 2;

  // When the object was last modified
  google.protobuf.Timestamp last_modified = 3;

  // Content type
  string content_type = 4;

  // ETag
  string etag = 5;

  // Storage class
  string storage_class = 6;
}

// ───── infrastructure/storage/provider.proto ─────

syntax = "proto3";

package infrastructure.storage.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/infrastructure/storage";

import "infrastructure/storage/object.proto";

// StorageProviderConfig represents storage provider configuration
message StorageProviderConfig {
  // The provider type
  StorageProvider provider = 1;

  // Whether this provider is enabled
  bool enabled = 2;

  // Display name for the provider
  string display_name = 3;

  // Provider-specific configuration
  oneof config {
    AzureStorageConfig azure_config = 100;
    GcsStorageConfig gcs_config = 101;
    S3StorageConfig s3_config = 102;
    LocalStorageConfig local_config = 103;
  }
}

// AzureStorageConfig contains Azure Blob Storage specific configuration
message AzureStorageConfig {
  // Azure storage account name
  string storage_account = 1;

  // Storage account key (for key-based auth)
  string account_key = 2;

  // Connection string (alternative to account key)
  string connection_string = 3;

  // Whether to use managed identity for authentication
  bool use_managed_identity = 4;

  // Managed identity client ID
  string managed_identity_client_id = 5;

  // Azure AD tenant ID
  string tenant_id = 6;

  // Default container for operations
  string default_container = 7;

  // Blob service endpoint URL
  string endpoint_url = 8;

  // Default encryption scope
  string default_encryption_scope = 9;
}

// GcsStorageConfig contains Google Cloud Storage specific configuration
message GcsStorageConfig {
  // GCP project ID
  string project_id = 1;

  // Service account JSON key (for key-based auth)
  string service_account_key = 2;

  // Service account email
  string service_account_email = 3;

  // Whether to use Application Default Credentials
  bool use_adc = 4;

  // Workload identity configuration (for GKE)
  string workload_identity_provider = 5;

  // Default bucket for operations
  string default_bucket = 6;

  // Storage API endpoint URL (optional)
  string endpoint_url = 7;

  // Default KMS key name for encryption
  string default_kms_key_name = 8;

  // Whether to use uniform bucket-level access by default
  bool uniform_bucket_level_access = 9;
}

// S3StorageConfig contains Amazon S3 specific configuration
message S3StorageConfig {
  // AWS region
  string region = 1;

  // AWS access key ID (for key-based auth)
  string access_key_id = 2;

  // AWS secret access key (for key-based auth)
  string secret_access_key = 3;

  // Session token (for temporary credentials)
  string session_token = 4;

  // Whether to use IAM role credentials
  bool use_iam_role = 5;

  // IAM role ARN to assume
  string iam_role_arn = 6;

  // Default bucket for operations
  string default_bucket = 7;

  // S3 endpoint URL (for S3-compatible services)
  string endpoint_url = 8;

  // Whether to use path-style addressing
  bool use_path_style = 9;

  // Default KMS key ID for encryption
  string default_kms_key_id = 10;

  // Default SSE algorithm
  string default_sse_algorithm = 11;

  // Whether to enable transfer acceleration
  bool enable_transfer_acceleration = 12;

  // Whether to use dual-stack endpoints (IPv4 and IPv6)
  bool use_dual_stack = 13;
}

// LocalStorageConfig contains local filesystem storage configuration
message LocalStorageConfig {
  // Base directory for local storage
  string base_directory = 1;

  // Whether to create directories automatically
  bool auto_create_directories = 2;

  // File permissions (Unix-style, e.g., "0755")
  string file_permissions = 3;

  // Directory permissions (Unix-style, e.g., "0755")
  string directory_permissions = 4;
}

