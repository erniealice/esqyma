option go_package = "github.com/erniealice/esqyma/golang/v1/domain/common";

import "domain/common/error.proto";
import "domain/common/filter.proto";
import "domain/common/pagination.proto";
import "options/db.proto";

// Category represents a common category entity that can be used across domains.
// This provides a base structure for categorizing various entities like clients,
// products, locations, etc. Domain-specific categories can reference this common
// Category entity.
// FK References (module="client"): client_category.category_id, client.category_id
message Category {
  option (options.v1.table).table = true;

  // Unique identifier for the category
  string id = 1;

  // Human-readable name of the category
  string name = 2;

  // Detailed description of what this category represents
  string description = 3;

  // Code/identifier for the category (useful for system references)
  string code = 4;

  // Module or domain this category belongs to (e.g., "client", "product", "location")
  string module = 5;

  // Parent category ID if this is a sub-category (optional)
  optional string parent_id = 6 [(options.v1.db).references = "category", (options.v1.db).index = true];

  // Creation timestamp as Unix epoch (milliseconds)
  optional int64 date_created = 7;

  // Creation timestamp as human-readable string
  optional string date_created_string = 8;

  // Last modification timestamp as Unix epoch (milliseconds)
  optional int64 date_modified = 9;

  // Last modification timestamp as human-readable string
  optional string date_modified_string = 10;

  // Whether the category is currently active
  bool active = 11 [(options.v1.db).default = "true"];

  // Display order for sorting categories (optional)
  optional int32 display_order = 12;
}

// CategoryCodeValue represents a category by its code and value.
// Used for code-based category creation where the code is resolved to an ID internally.
message CategoryCodeValue {
  string code = 1;
  string value = 2;
}

// ───── domain/common/error.proto ─────

syntax = "proto3";

package domain.common.v1;

import "google/protobuf/any.proto";

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/common";

/**
 * Error severity levels
 */
enum ErrorSeverity {
  ERROR_SEVERITY_UNSPECIFIED = 0;
  ERROR_SEVERITY_INFO = 1;
  ERROR_SEVERITY_WARNING = 2;
  ERROR_SEVERITY_ERROR = 3;
  ERROR_SEVERITY_CRITICAL = 4;
}

/**
 * Error categories for better classification
 */
enum ErrorCategory {
  ERROR_CATEGORY_UNSPECIFIED = 0;
  ERROR_CATEGORY_VALIDATION = 1;
  ERROR_CATEGORY_AUTHENTICATION = 2;
  ERROR_CATEGORY_AUTHORIZATION = 3;
  ERROR_CATEGORY_NOT_FOUND = 4;
  ERROR_CATEGORY_CONFLICT = 5;
  ERROR_CATEGORY_RATE_LIMIT = 6;
  ERROR_CATEGORY_INTERNAL_SERVER = 7;
  ERROR_CATEGORY_EXTERNAL_SERVICE = 8;
  ERROR_CATEGORY_NETWORK = 9;
  ERROR_CATEGORY_TIMEOUT = 10;
}

/**
 * Individual error detail for field-specific errors
 */
message ErrorDetail {
  string field = 1;
  string message = 2;
  string code = 3;
  map<string, string> metadata = 4;
}

/**
 * Main error message structure
 */
message Error {
  string code = 1;
  int32 status_code = 2;
  string description = 3;
  string message = 4;
  ErrorSeverity severity = 5;
  ErrorCategory category = 6;
  repeated ErrorDetail details = 7;
  string trace_id = 8;
  string timestamp = 9;
  string service = 10;
  string operation = 11;
  map<string, string> metadata = 12;
}

/**
 * Result wrapper for service responses
 */
message ServiceResult {
  oneof result {
    google.protobuf.Any data = 1;
    Error error = 2;
  }
  bool success = 3;
  string request_id = 4;
  string timestamp = 5;
}

/**
 * Generic success response
 */

/**
 * Generic error response
 */

// ───── domain/common/filter.proto ─────

syntax = "proto3";

package domain.common.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/common";

// Logic for combining multiple filters
enum FilterLogic {
  AND = 0;
  OR = 1;
}

// Typed filter that can be one of several filter types
message TypedFilter {
  string field = 1; // Field to filter on (supports dot notation)

  oneof filter_type {
    StringFilter  string_filter  = 2;
    NumberFilter  number_filter  = 3;
    DateFilter    date_filter    = 4;
    ListFilter    list_filter    = 5;
    RangeFilter   range_filter   = 6;
    BooleanFilter boolean_filter = 7;
    MoneyFilter   money_filter   = 8;   // NEW
    StatusFilter  status_filter  = 9;   // NEW
  }
}

// String filter operations
message StringFilter {
  string value = 1;
  StringOperator operator = 2;
  bool case_sensitive = 3;
}

enum StringOperator {
  STRING_EQUALS = 0;
  STRING_NOT_EQUALS = 1;
  STRING_CONTAINS = 2;
  STRING_STARTS_WITH = 3;
  STRING_ENDS_WITH = 4;
  STRING_REGEX = 5;
}

// Number filter operations
message NumberFilter {
  double value = 1;
  NumberOperator operator = 2;
}

enum NumberOperator {
  NUMBER_EQUALS = 0;
  NUMBER_NOT_EQUALS = 1;
  NUMBER_GREATER_THAN = 2;
  NUMBER_GREATER_THAN_OR_EQUAL = 3;
  NUMBER_LESS_THAN = 4;
  NUMBER_LESS_THAN_OR_EQUAL = 5;
}

// Date filter operations
message DateFilter {
  string value = 1; // ISO 8601 date string
  DateOperator operator = 2;
  optional string range_end = 3; // For BETWEEN operator
}

enum DateOperator {
  DATE_EQUALS = 0;
  DATE_BEFORE = 1;
  DATE_AFTER = 2;
  DATE_BETWEEN = 3;
}

// List filter operations (IN/NOT_IN)
message ListFilter {
  repeated string values = 1;
  ListOperator operator = 2;
}

enum ListOperator {
  LIST_IN = 0;
  LIST_NOT_IN = 1;
}

// Range filter for numeric values
message RangeFilter {
  double min = 1;
  double max = 2;
  bool include_min = 3;
  bool include_max = 4;
}

// Boolean filter
message BooleanFilter {
  bool value = 1;
}

// Money filter operators
enum MoneyOperator {
  MONEY_EQUALS = 0;
  MONEY_LESS_THAN = 1;
  MONEY_GREATER_THAN = 2;
  MONEY_LESS_THAN_OR_EQUAL = 3;
  MONEY_GREATER_THAN_OR_EQUAL = 4;
  MONEY_BETWEEN = 5;
}

// Money filter for monetary amounts
message MoneyFilter {
  double amount = 1;
  MoneyOperator operator = 2;
  double amount_to = 3; // used when operator = MONEY_BETWEEN
}

// Status filter — IN check against selected values
message StatusFilter {
  repeated string values = 1;
}

