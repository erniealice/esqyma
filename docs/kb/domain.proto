// ───── domain/payroll/payroll_remittance/payroll_remittance.proto ─────

syntax = "proto3";

package domain.payroll.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/payroll/payroll_remittance";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "options/db.proto";

// RemittanceType identifies which government agency the remittance is for.
// Philippine mandatory contributions: SSS, PhilHealth, Pag-IBIG, BIR withholding tax.
enum RemittanceType {
  REMITTANCE_TYPE_UNSPECIFIED = 0;
  REMITTANCE_TYPE_SSS = 1;               // Social Security System
  REMITTANCE_TYPE_PHILHEALTH = 2;        // Philippine Health Insurance Corporation
  REMITTANCE_TYPE_PAGIBIG = 3;           // Home Development Mutual Fund
  REMITTANCE_TYPE_BIR_WITHHOLDING = 4;  // Bureau of Internal Revenue — income tax withholding
}

// RemittanceStatus tracks the filing and payment lifecycle.
enum RemittanceStatus {
  REMITTANCE_STATUS_UNSPECIFIED = 0;
  REMITTANCE_STATUS_PENDING = 1;  // Not yet filed
  REMITTANCE_STATUS_FILED = 2;    // Form submitted but payment not yet confirmed
  REMITTANCE_STATUS_PAID = 3;     // Payment confirmed
}

// PayrollRemittance records the obligation to remit government contributions from a payroll run.
// One remittance record per agency per payroll run.
message PayrollRemittance {
  option (options.v1.table).table = true;

  string id = 1;

  // Parent payroll run
  string payroll_run_id = 2 [(options.v1.db).references = "payroll_run", (options.v1.db).index = true];

  RemittanceType remittance_type = 3;
  double amount = 4;

  int64 due_date = 5;
  optional string due_date_string = 6;

  RemittanceStatus status = 7;

  optional int64 filed_at = 8;
  optional string filed_at_string = 9;
  optional int64 paid_at = 10;
  optional string paid_at_string = 11;

  optional string reference_number = 12;  // Government filing reference (e.g. SBR number for SSS)

  // Audit fields
  optional int64 date_created = 13;
  optional string date_created_string = 14;
}

// ───── domain/payroll/payroll_run/payroll_run.proto ─────

syntax = "proto3";

package domain.payroll.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/payroll/payroll_run";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "options/db.proto";

// PayrollRunStatus tracks the lifecycle of a payroll processing batch.
enum PayrollRunStatus {
  PAYROLL_RUN_STATUS_UNSPECIFIED = 0;
  PAYROLL_RUN_STATUS_DRAFT = 1;        // In preparation — payslips not yet finalized
  PAYROLL_RUN_STATUS_CALCULATED = 2;  // Amounts locked — pending approval
  PAYROLL_RUN_STATUS_APPROVED = 3;    // Approved by CFO/Owner — ready for disbursement
  PAYROLL_RUN_STATUS_POSTED = 4;      // JournalEntry created; disbursement completed
}

// PayrollRun is the header record for a payroll processing batch.
// A single run covers one pay period for all employees.
// Posting creates a PAYROLL JournalEntry that records gross pay, deductions, and net pay.
message PayrollRun {
  option (options.v1.table).table = true;

  string id = 1;
  string run_number = 2 [(options.v1.db).unique = true, (options.v1.db).index = true];

  // Pay period
  int64 pay_period_start = 3;
  optional string pay_period_start_string = 4;
  int64 pay_period_end = 5;
  optional string pay_period_end_string = 6;

  // Aggregated totals across all employee lines
  double total_gross = 7 [(options.v1.db).default = "0"];
  double total_deductions = 8 [(options.v1.db).default = "0"];
  double total_net = 9 [(options.v1.db).default = "0"];
  int32 employee_count = 10 [(options.v1.db).default = "0"];

  PayrollRunStatus status = 11;

  // Approval and posting audit
  optional string approved_by = 12;  // FK to entity.User
  optional int64 posted_at = 13;
  optional string posted_at_string = 14;

  // Audit fields
  optional int64 date_created = 15;
  optional string date_created_string = 16;
  optional int64 date_modified = 17;
  optional string date_modified_string = 18;
}

