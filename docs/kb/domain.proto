syntax = "proto3";

package domain.ledger.v1;

option go_package = "github.com/erniealice/esqyma/pkg/schema/v1/domain/ledger/reporting/gross_profit";

import "domain/common/error.proto";
import "domain/common/pagination.proto";

// GrossProfitLineItem represents one row in the gross profit report.
message GrossProfitLineItem {
  string group_key = 1;              // The grouping key value (product name, location, date, etc.)
  optional string group_id = 2;      // The grouping entity ID (product_id, location_id, etc.)
  double total_revenue = 3;          // Sum of revenue line item totals
  double total_discount = 4;         // Sum of discounts applied
  double net_revenue = 5;            // total_revenue - total_discount
  double cost_of_goods_sold = 6;     // Sum of COGS from inventory transactions
  double gross_profit = 7;           // net_revenue - cost_of_goods_sold
  double gross_profit_margin = 8;    // (gross_profit / net_revenue) * 100
  int64 units_sold = 9;             // Total units sold in this group
  int64 transaction_count = 10;      // Number of revenue transactions
}

// GrossProfitSummary provides report-level totals.
message GrossProfitSummary {
  double total_revenue = 1;
  double total_discount = 2;
  double net_revenue = 3;
  double total_cogs = 4;
  double total_gross_profit = 5;
  double overall_margin = 6;         // (total_gross_profit / net_revenue) * 100
  int64 total_units_sold = 7;
  int64 total_transactions = 8;
  string currency = 9;
  optional int64 start_date = 10;
  optional int64 end_date = 11;
}

