import "domain/common/sort.proto";
import "domain/common/search.proto";

import "options/db.proto";

// JournalLine is an individual debit or credit line within a JournalEntry.
// Exactly one of debit_amount or credit_amount is non-zero per line.
// The sum of all debit_amount values must equal the sum of all credit_amount values
// within the parent JournalEntry.
message JournalLine {
  option (options.v1.table).table = true;

  string id = 1;

  // Parent journal entry
  string journal_entry_id = 2 [(options.v1.db).references = "journal_entry", (options.v1.db).index = true];

  // Account posted to
  string account_id = 3 [(options.v1.db).references = "account", (options.v1.db).index = true];

  optional string description = 4;

  // Debit/credit amounts — exactly one should be non-zero per line
  double debit_amount = 5 [(options.v1.db).default = "0"];
  double credit_amount = 6 [(options.v1.db).default = "0"];

  // Presentation order within the journal entry
  int32 line_order = 7 [(options.v1.db).default = "0"];

  // Audit fields
  bool active = 8 [(options.v1.db).default = "true"];
  optional int64 date_created = 9;
  optional string date_created_string = 10;
}

// ───── domain/ledger/recurring_journal_template/recurring_journal_template.proto ─────

syntax = "proto3";

package domain.ledger.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/ledger/recurring_journal_template";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "options/db.proto";

// RecurrenceFrequency defines how often a recurring journal entry is generated.
enum RecurrenceFrequency {
  RECURRENCE_FREQUENCY_UNSPECIFIED = 0;
  RECURRENCE_FREQUENCY_DAILY = 1;
  RECURRENCE_FREQUENCY_WEEKLY = 2;
  RECURRENCE_FREQUENCY_MONTHLY = 3;
  RECURRENCE_FREQUENCY_QUARTERLY = 4;
  RECURRENCE_FREQUENCY_YEARLY = 5;
}

// RecurringJournalTemplateLine defines one debit or credit line in the template.
// Mirrors the structure of JournalLine but belongs to a template, not a live entry.
message RecurringJournalTemplateLine {
  string account_id = 1;                  // FK to account
  optional string description = 2;
  double debit_amount = 3;
  double credit_amount = 4;
  int32 line_order = 5;
}

// RecurringJournalTemplate is a system-scheduled template that generates JournalEntry
// records automatically on each recurrence date (e.g. monthly depreciation, rent).
message RecurringJournalTemplate {
  option (options.v1.table).table = true;

  string id = 1;
  string name = 2;
  optional string description = 3;
  RecurrenceFrequency frequency = 4;

  // Schedule — next_run_date is updated after each successful generation
  int64 next_run_date = 5;
  optional string next_run_date_string = 6;
  optional int64 end_date = 7;             // Null = runs indefinitely
  optional string end_date_string = 8;

  // Template description copied to each generated JournalEntry
  string template_description = 9;

  // Template lines — embedded for reads; stored separately in DB
  repeated RecurringJournalTemplateLine lines = 10;

  // Audit fields
  bool active = 11 [(options.v1.db).default = "true"];
  optional int64 date_created = 12;
  optional string date_created_string = 13;
  optional int64 date_modified = 14;
  optional string date_modified_string = 15;
}

