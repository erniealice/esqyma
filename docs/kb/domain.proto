  EquityTransactionType transaction_type = 3;
  double amount = 4;
  optional string description = 5;

  // Transaction date
  int64 transaction_date = 6;
  optional string transaction_date_string = 7;

  // GL traceability — FK to the auto-generated JournalEntry
  optional string journal_entry_id = 8 [(options.v1.db).references = "journal_entry", (options.v1.db).index = true];

  // Audit fields
  optional int64 date_created = 9;
  optional string date_created_string = 10;
}

// ───── domain/ledger/fiscal_period/fiscal_period.proto ─────

syntax = "proto3";

package domain.ledger.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/ledger/fiscal_period";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "options/db.proto";

// FiscalPeriodStatus controls whether journal entries can be posted to this period.
enum FiscalPeriodStatus {
  FISCAL_PERIOD_STATUS_UNSPECIFIED = 0;
  FISCAL_PERIOD_STATUS_OPEN = 1;    // Posting allowed
  FISCAL_PERIOD_STATUS_CLOSED = 2;  // Posting blocked; financial statements can be generated
  FISCAL_PERIOD_STATUS_LOCKED = 3;  // Immutable; typically after audit sign-off
}

// FiscalPeriod represents a discrete accounting period (typically one month).
// Journal entries must be assigned to an open period at posting time.
message FiscalPeriod {
  option (options.v1.table).table = true;

  string id = 1;
  string name = 2;                             // e.g. "March 2026"
  int32 period_number = 3;                     // 1–12 (month number within the fiscal year)
  int32 fiscal_year = 4 [(options.v1.db).index = true];  // e.g. 2026

  // Date range — unix timestamps
  int64 start_date = 5;
  int64 end_date = 6;
  optional string start_date_string = 7;
  optional string end_date_string = 8;

  // Status
  FiscalPeriodStatus status = 9;

  // Close audit
  optional string closed_by = 10;  // FK to entity.User
  optional int64 closed_at = 11;
  optional string closed_at_string = 12;

  // Audit fields
  bool active = 13 [(options.v1.db).default = "true"];
  optional int64 date_created = 14;
  optional string date_created_string = 15;
  optional int64 date_modified = 16;
  optional string date_modified_string = 17;
}

// ───── domain/ledger/journal_entry/journal_entry.proto ─────

syntax = "proto3";

package domain.ledger.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/ledger/journal_entry";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "options/db.proto";

// JournalEntryStatus represents the lifecycle state of a journal entry.
enum JournalEntryStatus {
  JOURNAL_ENTRY_STATUS_UNSPECIFIED = 0;
  JOURNAL_ENTRY_STATUS_DRAFT = 1;
  JOURNAL_ENTRY_STATUS_POSTED = 2;
  JOURNAL_ENTRY_STATUS_REVERSED = 3;
}

// JournalSourceType identifies the business event that originated this journal entry.
// Used for bidirectional traceability between operational transactions and the ledger.
enum JournalSourceType {
  JOURNAL_SOURCE_TYPE_UNSPECIFIED = 0;
  JOURNAL_SOURCE_TYPE_MANUAL = 1;
  JOURNAL_SOURCE_TYPE_REVENUE = 2;
  JOURNAL_SOURCE_TYPE_EXPENDITURE = 3;
  JOURNAL_SOURCE_TYPE_COLLECTION = 4;
  JOURNAL_SOURCE_TYPE_DISBURSEMENT = 5;
  JOURNAL_SOURCE_TYPE_DEPRECIATION = 6;
  JOURNAL_SOURCE_TYPE_ASSET_ACQUISITION = 7;
  JOURNAL_SOURCE_TYPE_ASSET_DISPOSAL = 8;
  JOURNAL_SOURCE_TYPE_PREPAYMENT = 9;
  JOURNAL_SOURCE_TYPE_PREPAYMENT_AMORTIZATION = 10;
  JOURNAL_SOURCE_TYPE_LOAN_RECEIPT = 11;
  JOURNAL_SOURCE_TYPE_LOAN_PAYMENT = 12;
  JOURNAL_SOURCE_TYPE_LOAN_FEE_AMORTIZATION = 13;
  JOURNAL_SOURCE_TYPE_PETTY_CASH_REPLENISHMENT = 14;
  JOURNAL_SOURCE_TYPE_BAD_DEBT_PROVISION = 15;
  JOURNAL_SOURCE_TYPE_DEFERRED_REVENUE = 16;
  JOURNAL_SOURCE_TYPE_DEFERRED_REVENUE_RECOGNITION = 17;
  JOURNAL_SOURCE_TYPE_COLLECTION_APPLICATION = 18;
  JOURNAL_SOURCE_TYPE_DEBT_RECLASSIFICATION = 19;
  JOURNAL_SOURCE_TYPE_EQUITY_CONTRIBUTION = 20;
  JOURNAL_SOURCE_TYPE_EQUITY_WITHDRAWAL = 21;
  JOURNAL_SOURCE_TYPE_EQUITY_DISTRIBUTION = 22;
  JOURNAL_SOURCE_TYPE_YEAR_END_CLOSE = 23;
  JOURNAL_SOURCE_TYPE_RECURRING = 24;
  JOURNAL_SOURCE_TYPE_PAYROLL = 25;
}

// JournalEntry is the double-entry bookkeeping record. Each entry must have
// equal total debits and total credits across its journal lines.
message JournalEntry {
  option (options.v1.table).table = true;

  // Core identity
  string id = 1;
  string entry_number = 2 [(options.v1.db).unique = true, (options.v1.db).index = true];
  string description = 3;

  // Date — unix timestamp + display string
  int64 entry_date = 4;
  optional string entry_date_string = 5;

  // Status and source traceability
  JournalEntryStatus status = 6;
  JournalSourceType source_type = 7;
  optional string source_id = 8 [(options.v1.db).index = true];  // FK to originating entity

  // Fiscal period association
  optional string fiscal_period_id = 9 [(options.v1.db).references = "fiscal_period", (options.v1.db).index = true];

  // Totals — must balance (total_debit == total_credit)
  double total_debit = 10;
  double total_credit = 11;

  // Posting audit
  optional string posted_by = 12;   // FK to entity.User
  optional int64 posted_at = 13;
  optional string posted_at_string = 14;

  // Reversal
  optional string reversed_by = 15;  // FK to entity.User
  optional int64 reversed_at = 16;
  optional string reversed_at_string = 17;
  optional string reversal_entry_id = 18 [(options.v1.db).references = "journal_entry", (options.v1.db).index = true];

  optional string notes = 19;

  // Audit fields
  bool active = 20 [(options.v1.db).default = "true"];
  optional int64 date_created = 21;
  optional string date_created_string = 22;
  optional int64 date_modified = 23;
  optional string date_modified_string = 24;
}

