// LicenseHistoryAction defines what happened to a license
enum LicenseHistoryAction {
  LICENSE_HISTORY_ACTION_UNSPECIFIED = 0;
  LICENSE_HISTORY_ACTION_CREATED = 1;      // License created (with or without assignment)
  LICENSE_HISTORY_ACTION_ASSIGNED = 2;     // Assigned to someone (from unassigned)
  LICENSE_HISTORY_ACTION_REVOKED = 3;      // Assignment removed (back to unassigned)
  LICENSE_HISTORY_ACTION_REASSIGNED = 4;   // Transferred to different assignee
  LICENSE_HISTORY_ACTION_SUSPENDED = 5;    // Temporarily disabled
  LICENSE_HISTORY_ACTION_REACTIVATED = 6;  // Re-enabled after suspension
  LICENSE_HISTORY_ACTION_EXPIRED = 7;      // Validity ended
  LICENSE_HISTORY_ACTION_DELETED = 8;      // Soft deleted
}

// LicenseHistory tracks assignment changes over time (audit trail)
