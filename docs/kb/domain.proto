syntax = "proto3";

package domain.treasury.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/treasury/loan_payment";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "options/db.proto";

// LoanPayment records an actual payment made against a Loan.
// Distinct from LoanScheduleLine (which is the theoretical amortization schedule).
// Posting a payment creates two JournalEntry records:
//   1. LOAN_PAYMENT — principal + interest
//   2. LOAN_FEE_AMORTIZATION — debt issuance cost amortization (PFRS 9)
message LoanPayment {
  option (options.v1.table).table = true;

  string id = 1;

  // Parent loan
  string loan_id = 2 [(options.v1.db).references = "loan", (options.v1.db).index = true];

  string payment_number = 3 [(options.v1.db).unique = true, (options.v1.db).index = true];

  int64 payment_date = 4;
  optional string payment_date_string = 5;

  // Payment breakdown
  double principal_amount = 6;
  double interest_amount = 7;
  double fee_amount = 8 [(options.v1.db).default = "0"];  // Debt issuance cost (PFRS 9)
  double total_amount = 9;

  // Running balance after this payment
  double remaining_balance = 10;

  optional string notes = 11;

  // Audit fields
  optional int64 date_created = 12;
  optional string date_created_string = 13;
}

// ───── domain/treasury/petty_cash_fund/petty_cash_fund.proto ─────

syntax = "proto3";

package domain.treasury.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/treasury/petty_cash_fund";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "options/db.proto";

// PettyCashFund is the imprest fund header.
// The authorized_amount is the float ceiling; current_balance decreases as vouchers are issued
// and is replenished back to authorized_amount on each replenishment event.
message PettyCashFund {
  option (options.v1.table).table = true;

  string id = 1;
  string name = 2;                                  // e.g. "Front Desk Petty Cash"

  // Fund limits
  double authorized_amount = 3;                     // Maximum float
  double current_balance = 4 [(options.v1.db).default = "0"];  // Running balance

  // Custodian and location
  optional string custodian_id = 5 [(options.v1.db).index = true];  // FK to entity.User
  optional string location_id = 6 [(options.v1.db).references = "location", (options.v1.db).index = true];

  // Audit fields
  bool active = 7 [(options.v1.db).default = "true"];
  optional int64 date_created = 8;
  optional string date_created_string = 9;
  optional int64 date_modified = 10;
  optional string date_modified_string = 11;
}

// ───── domain/treasury/petty_cash_replenishment/petty_cash_replenishment.proto ─────

syntax = "proto3";

package domain.treasury.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/treasury/petty_cash_replenishment";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "options/db.proto";

// PettyCashReplenishment records a fund replenishment event that covers one or more vouchers.
// Posting this event creates a JournalEntry (source type: PETTY_CASH_REPLENISHMENT).
message PettyCashReplenishment {
  option (options.v1.table).table = true;

  string id = 1;

  // Parent fund
  string fund_id = 2 [(options.v1.db).references = "petty_cash_fund", (options.v1.db).index = true];

  string replenishment_number = 3 [(options.v1.db).unique = true, (options.v1.db).index = true];
  double amount = 4;                         // Total cash returned to fund (sum of vouchers)

  int64 replenishment_date = 5;
  optional string replenishment_date_string = 6;

  // Vouchers covered by this replenishment
  repeated string voucher_ids = 7;           // FK to petty_cash_voucher (repeated)

  optional string posted_by = 8;             // FK to entity.User
  optional string notes = 9;

  // Audit fields
  optional int64 date_created = 10;
  optional string date_created_string = 11;
}

// ───── domain/treasury/petty_cash_voucher/petty_cash_voucher.proto ─────

syntax = "proto3";

package domain.treasury.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/treasury/petty_cash_voucher";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "options/db.proto";

// VoucherStatus tracks the approval and replenishment lifecycle of a petty cash voucher.
enum VoucherStatus {
  VOUCHER_STATUS_UNSPECIFIED = 0;
  VOUCHER_STATUS_DRAFT = 1;
  VOUCHER_STATUS_APPROVED = 2;
  VOUCHER_STATUS_REPLENISHED = 3;
}

// PettyCashVoucher is an individual expense voucher issued against a PettyCashFund.
// Multiple vouchers are grouped into a PettyCashReplenishment to restore the fund balance.
message PettyCashVoucher {
  option (options.v1.table).table = true;

  string id = 1;

  // Parent fund
  string fund_id = 2 [(options.v1.db).references = "petty_cash_fund", (options.v1.db).index = true];

  string voucher_number = 3 [(options.v1.db).unique = true, (options.v1.db).index = true];
  optional string payee = 4;
  string description = 5;
  double total_amount = 6;
  VoucherStatus status = 7;

  // Approval
  optional string approved_by = 8;   // FK to entity.User
  optional int64 approved_at = 9;
  optional string approved_at_string = 10;

  // Audit fields
  optional int64 date_created = 11;
  optional string date_created_string = 12;
}

// ───── domain/treasury/security_deposit/security_deposit.proto ─────

syntax = "proto3";

package domain.treasury.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/treasury/security_deposit";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "options/db.proto";

// DepositDirection indicates whether the business paid a deposit or received one.
enum DepositDirection {
  DEPOSIT_DIRECTION_UNSPECIFIED = 0;
  DEPOSIT_DIRECTION_PAID = 1;      // Asset — deposit paid to a landlord/vendor
  DEPOSIT_DIRECTION_RECEIVED = 2;  // Liability — deposit received from a customer/tenant
}

// DepositStatus tracks the lifecycle of the deposit.
enum DepositStatus {
  DEPOSIT_STATUS_UNSPECIFIED = 0;
  DEPOSIT_STATUS_ACTIVE = 1;
  DEPOSIT_STATUS_SETTLED = 2;    // Returned (or fully applied)
  DEPOSIT_STATUS_FORFEITED = 3;  // Not returned (e.g. lease break penalty)
}

// SecurityDeposit records deposits paid to or received from counter-parties.
// Settlement events (refund, forfeiture, partial deductions) are child entities.
message SecurityDeposit {
  option (options.v1.table).table = true;

  string id = 1;
  DepositDirection direction = 2;
  string counterparty_name = 3;    // Landlord name (PAID) or tenant/customer name (RECEIVED)
  double amount = 4;

  int64 deposit_date = 5;
  optional string deposit_date_string = 6;

  DepositStatus status = 7;

  // GL integration — FK to the Chart of Accounts
  optional string account_id = 8 [(options.v1.db).references = "account", (options.v1.db).index = true];

  optional string notes = 9;

  // Audit fields
  bool active = 10 [(options.v1.db).default = "true"];
  optional int64 date_created = 11;
  optional string date_created_string = 12;
  optional int64 date_modified = 13;
  optional string date_modified_string = 14;
}

