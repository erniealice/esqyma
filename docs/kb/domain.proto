// EquityAccountType classifies the capital account's role in the equity section.
enum EquityAccountType {
  EQUITY_ACCOUNT_TYPE_UNSPECIFIED = 0;
  EQUITY_ACCOUNT_TYPE_OWNERS_CAPITAL = 1;              // Initial and additional capital contributions
  EQUITY_ACCOUNT_TYPE_OWNERS_DRAW = 2;                 // Withdrawals reducing equity
  EQUITY_ACCOUNT_TYPE_RETAINED_EARNINGS = 3;           // Accumulated profits/losses
  EQUITY_ACCOUNT_TYPE_ADDITIONAL_PAID_IN_CAPITAL = 4;  // Excess over par value (corporations)
}

// EquityAccount is a capital account in the Funding > Equity app.
// Each equity participant (owner, partner) has one or more capital accounts.
// Linked to a GL account for double-entry integration.
message EquityAccount {
  option (options.v1.table).table = true;

  string id = 1;
  string name = 2;
  EquityAccountType account_type = 3;
  optional string owner_name = 4;                  // Display name for the equity holder

  // GL account integration — FK to the Chart of Accounts
  string account_id = 5 [(options.v1.db).references = "account", (options.v1.db).index = true];

  // Running balance (updated on each equity transaction)
  double balance = 6 [(options.v1.db).default = "0"];

  // Audit fields
  bool active = 7 [(options.v1.db).default = "true"];
  optional int64 date_created = 8;
  optional string date_created_string = 9;
  optional int64 date_modified = 10;
  optional string date_modified_string = 11;
}

// ───── domain/ledger/equity_transaction/equity_transaction.proto ─────

syntax = "proto3";

package domain.ledger.v1;

option go_package = "github.com/erniealice/esqyma/golang/v1/domain/ledger/equity_transaction";

