version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: leapfor.xyz/esqyma/golang/v1
plugins:
  - remote: buf.build/protocolbuffers/go
    out: golang/v1
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go
    out: golang/v1
    opt:
      - paths=source_relative
  - local: protoc-gen-es
    out: typescript/v1
    opt:
      - target=ts
