syntax = "proto3";

package integration.datasheet.v1;

option go_package = "leapfor.xyz/esqyma/golang/v1/integration/datasheet";

import "google/protobuf/timestamp.proto";
import "integration/datasheet/datasheet.proto";
import "integration/datasheet/provider.proto";
import "domain/common/error.proto";

// DatasheetDomainService provides datasheet operations across multiple providers
// This service defines the contract; the hexagonal architecture adapters
// implement provider-specific behavior
service DatasheetDomainService {
  // Row Operations
  rpc AddRows(AddRowsRequest) returns (AddRowsResponse);
  rpc UpdateRows(UpdateRowsRequest) returns (UpdateRowsResponse);
  rpc DeleteRows(DeleteRowsRequest) returns (DeleteRowsResponse);
  rpc SearchRows(SearchRowsRequest) returns (SearchRowsResponse);

  // Range Operations
  rpc ReadRange(ReadRangeRequest) returns (ReadRangeResponse);
  rpc WriteRange(WriteRangeRequest) returns (WriteRangeResponse);
  rpc ClearRange(ClearRangeRequest) returns (ClearRangeResponse);

  // Sheet Operations
  rpc GetSheetMetadata(GetSheetMetadataRequest) returns (GetSheetMetadataResponse);
  rpc CreateSheet(CreateSheetRequest) returns (CreateSheetResponse);
  rpc DeleteSheet(DeleteSheetRequest) returns (DeleteSheetResponse);
  rpc RenameSheet(RenameSheetRequest) returns (RenameSheetResponse);
  rpc CopySheet(CopySheetRequest) returns (CopySheetResponse);

  // Spreadsheet Operations
  rpc GetSpreadsheet(GetSpreadsheetRequest) returns (GetSpreadsheetResponse);
  rpc CreateSpreadsheet(CreateSpreadsheetRequest) returns (CreateSpreadsheetResponse);

  // Batch Operations
  rpc BatchUpdate(BatchUpdateRequest) returns (BatchUpdateResponse);

  // Provider Health
  rpc CheckHealth(CheckDatasheetHealthRequest) returns (CheckDatasheetHealthResponse);
  rpc GetCapabilities(GetDatasheetCapabilitiesRequest) returns (GetDatasheetCapabilitiesResponse);
}

// ============================================================================
// Row Operations
// ============================================================================

// AddRowsRequest is a request to add new rows to a sheet
message AddRowsRequest {
  AddRowsData data = 1;
}

message AddRowsData {
  // Provider identifier
  string provider_id = 1;

  // Spreadsheet identifier
  string spreadsheet_id = 2;

  // Target sheet name
  string sheet_name = 3;

  // Rows to add
  repeated Row rows = 4;

  // Insert position (0 = beginning, -1 or omit = end/append)
  int32 insert_at_index = 5;

  // How input values should be interpreted
  ValueInputOption value_input_option = 6;

  // Whether to insert empty rows before adding data
  bool insert_data_option = 7;
}

// AddRowsResponse contains the result of adding rows
message AddRowsResponse {
  bool success = 1;
  repeated AddRowsResult data = 2;
  domain.common.v1.Error error = 3;
}

message AddRowsResult {
  // Range where data was added (in A1 notation)
  string updated_range = 1;

  // Number of rows added
  int32 rows_added = 2;

  // Number of cells updated
  int32 cells_updated = 3;

  // The rows that were added (with any server-assigned values)
  repeated Row added_rows = 4;
}

// UpdateRowsRequest is a request to update existing rows
message UpdateRowsRequest {
  UpdateRowsData data = 1;
}

message UpdateRowsData {
  // Provider identifier
  string provider_id = 1;

  // Spreadsheet identifier
  string spreadsheet_id = 2;

  // Target range to update
  Range range = 3;

  // Rows with updated values
  repeated Row rows = 4;

  // Optional conditions to filter which rows to update (update where)
  ConditionGroup conditions = 5;

  // How input values should be interpreted
  ValueInputOption value_input_option = 6;

  // Update mode
  UpdateMode update_mode = 7;
}

// UpdateRowsResponse contains the result of updating rows
message UpdateRowsResponse {
  bool success = 1;
  repeated UpdateRowsResult data = 2;
  domain.common.v1.Error error = 3;
}

message UpdateRowsResult {
  // Range that was updated (in A1 notation)
  string updated_range = 1;

  // Number of rows updated
  int32 rows_updated = 2;

  // Number of cells updated
  int32 cells_updated = 3;

  // Number of rows matched by conditions
  int32 rows_matched = 4;
}

// DeleteRowsRequest is a request to delete rows
message DeleteRowsRequest {
  DeleteRowsData data = 1;
}

message DeleteRowsData {
  // Provider identifier
  string provider_id = 1;

  // Spreadsheet identifier
  string spreadsheet_id = 2;

  // Target sheet name
  string sheet_name = 3;

  // Specific row indices to delete (0-based)
  repeated int32 row_indices = 4;

  // Alternative: conditions to match rows for deletion (delete where)
  ConditionGroup conditions = 5;

  // Whether to shift remaining rows up after deletion
  bool shift_rows = 6;
}

// DeleteRowsResponse contains the result of deleting rows
message DeleteRowsResponse {
  bool success = 1;
  repeated DeleteRowsResult data = 2;
  domain.common.v1.Error error = 3;
}

message DeleteRowsResult {
  // Number of rows deleted
  int32 rows_deleted = 1;

  // Indices of rows that were deleted
  repeated int32 deleted_indices = 2;
}

// SearchRowsRequest is a request to search for rows matching conditions
message SearchRowsRequest {
  SearchRowsData data = 1;
}

message SearchRowsData {
  // Provider identifier
  string provider_id = 1;

  // Spreadsheet identifier
  string spreadsheet_id = 2;

  // Target sheet name
  string sheet_name = 3;

  // Search conditions
  ConditionGroup conditions = 4;

  // Maximum number of rows to return
  int32 limit = 5;

  // Number of rows to skip (for pagination)
  int32 offset = 6;

  // Sort specifications
  repeated SortSpec sort_by = 7;

  // Columns to return (empty = all columns)
  repeated int32 column_indices = 8;

  // Whether to include formatting information
  bool include_formatting = 9;

  // How values should be rendered
  ValueRenderOption value_render_option = 10;
}

// SearchRowsResponse contains the search results
message SearchRowsResponse {
  bool success = 1;
  repeated SearchRowsResult data = 2;
  domain.common.v1.Error error = 3;
}

message SearchRowsResult {
  // Matching rows
  repeated Row rows = 1;

  // Total count of matching rows (before limit/offset)
  int32 total_count = 2;

  // Whether there are more results available
  bool has_more = 3;
}

// ============================================================================
// Range Operations
// ============================================================================

// ReadRangeRequest is a request to read data from a range
message ReadRangeRequest {
  ReadRangeData data = 1;
}

message ReadRangeData {
  // Provider identifier
  string provider_id = 1;

  // Spreadsheet identifier
  string spreadsheet_id = 2;

  // Range to read
  Range range = 3;

  // Whether to include formatting information
  bool include_formatting = 4;

  // Whether to include notes/comments
  bool include_notes = 5;

  // How values should be rendered
  ValueRenderOption value_render_option = 6;

  // Date/time render option
  string date_time_render_option = 7;
}

// ReadRangeResponse contains the data from the range
message ReadRangeResponse {
  bool success = 1;
  repeated ReadRangeResult data = 2;
  domain.common.v1.Error error = 3;
}

message ReadRangeResult {
  // Range that was read (in A1 notation)
  string range = 1;

  // Rows of data from the range
  repeated Row rows = 2;

  // Major dimension of the data (ROWS or COLUMNS)
  string major_dimension = 3;
}

// WriteRangeRequest is a request to write data to a range
message WriteRangeRequest {
  WriteRangeData data = 1;
}

message WriteRangeData {
  // Provider identifier
  string provider_id = 1;

  // Spreadsheet identifier
  string spreadsheet_id = 2;

  // Target range
  Range range = 3;

  // Rows to write
  repeated Row rows = 4;

  // How input values should be interpreted
  ValueInputOption value_input_option = 5;
}

// WriteRangeResponse contains the result of writing to a range
message WriteRangeResponse {
  bool success = 1;
  repeated WriteRangeResult data = 2;
  domain.common.v1.Error error = 3;
}

message WriteRangeResult {
  // Range that was written (in A1 notation)
  string updated_range = 1;

  // Number of rows written
  int32 rows_updated = 2;

  // Number of columns written
  int32 columns_updated = 3;

  // Number of cells written
  int32 cells_updated = 4;
}

// ClearRangeRequest is a request to clear data from a range
message ClearRangeRequest {
  ClearRangeData data = 1;
}

message ClearRangeData {
  // Provider identifier
  string provider_id = 1;

  // Spreadsheet identifier
  string spreadsheet_id = 2;

  // Range to clear
  Range range = 3;

  // Clear values only (preserve formatting)
  bool values_only = 4;

  // Clear formatting only (preserve values)
  bool formatting_only = 5;
}

// ClearRangeResponse contains the result of clearing a range
message ClearRangeResponse {
  bool success = 1;
  repeated ClearRangeResult data = 2;
  domain.common.v1.Error error = 3;
}

message ClearRangeResult {
  // Range that was cleared (in A1 notation)
  string cleared_range = 1;
}

// ============================================================================
// Sheet Operations
// ============================================================================

// GetSheetMetadataRequest is a request to get sheet metadata
message GetSheetMetadataRequest {
  GetSheetMetadataData data = 1;
}

message GetSheetMetadataData {
  // Provider identifier
  string provider_id = 1;

  // Spreadsheet identifier
  string spreadsheet_id = 2;

  // Specific sheet name (optional - if omitted, returns all sheets)
  string sheet_name = 3;

  // Whether to include column headers
  bool include_columns = 4;
}

// GetSheetMetadataResponse contains sheet metadata
message GetSheetMetadataResponse {
  bool success = 1;
  repeated GetSheetMetadataResult data = 2;
  domain.common.v1.Error error = 3;
}

message GetSheetMetadataResult {
  // Spreadsheet information
  Spreadsheet spreadsheet = 1;

  // Specific sheet (if sheet_name was provided)
  Sheet sheet = 2;
}

// CreateSheetRequest is a request to create a new sheet
message CreateSheetRequest {
  CreateSheetData data = 1;
}

message CreateSheetData {
  // Provider identifier
  string provider_id = 1;

  // Spreadsheet identifier
  string spreadsheet_id = 2;

  // Name for the new sheet
  string sheet_name = 3;

  // Column definitions (optional)
  repeated Column columns = 4;

  // Initial number of rows
  int32 row_count = 5;

  // Initial number of columns
  int32 column_count = 6;

  // Position index for the new sheet
  int32 index = 7;

  // Tab color (hex format)
  string tab_color = 8;
}

// CreateSheetResponse contains the result of creating a sheet
message CreateSheetResponse {
  bool success = 1;
  repeated CreateSheetResult data = 2;
  domain.common.v1.Error error = 3;
}

message CreateSheetResult {
  // The created sheet
  Sheet sheet = 1;
}

// DeleteSheetRequest is a request to delete a sheet
message DeleteSheetRequest {
  DeleteSheetData data = 1;
}

message DeleteSheetData {
  // Provider identifier
  string provider_id = 1;

  // Spreadsheet identifier
  string spreadsheet_id = 2;

  // Sheet name to delete
  string sheet_name = 3;

  // Sheet ID to delete (alternative to sheet_name)
  string sheet_id = 4;
}

// DeleteSheetResponse contains the result of deleting a sheet
message DeleteSheetResponse {
  bool success = 1;
  repeated DeleteSheetResult data = 2;
  domain.common.v1.Error error = 3;
}

message DeleteSheetResult {
  // Confirmation message
  string message = 1;
}

// RenameSheetRequest is a request to rename a sheet
message RenameSheetRequest {
  RenameSheetData data = 1;
}

message RenameSheetData {
  // Provider identifier
  string provider_id = 1;

  // Spreadsheet identifier
  string spreadsheet_id = 2;

  // Current sheet name
  string current_name = 3;

  // New sheet name
  string new_name = 4;
}

// RenameSheetResponse contains the result of renaming a sheet
message RenameSheetResponse {
  bool success = 1;
  repeated RenameSheetResult data = 2;
  domain.common.v1.Error error = 3;
}

message RenameSheetResult {
  // The updated sheet
  Sheet sheet = 1;
}

// CopySheetRequest is a request to copy a sheet
message CopySheetRequest {
  CopySheetData data = 1;
}

message CopySheetData {
  // Provider identifier
  string provider_id = 1;

  // Source spreadsheet identifier
  string source_spreadsheet_id = 2;

  // Source sheet name
  string source_sheet_name = 3;

  // Destination spreadsheet identifier (optional - same spreadsheet if omitted)
  string destination_spreadsheet_id = 4;

  // Name for the copied sheet (optional - auto-generated if omitted)
  string new_sheet_name = 5;
}

// CopySheetResponse contains the result of copying a sheet
message CopySheetResponse {
  bool success = 1;
  repeated CopySheetResult data = 2;
  domain.common.v1.Error error = 3;
}

message CopySheetResult {
  // The copied sheet
  Sheet sheet = 1;
}

// ============================================================================
// Spreadsheet Operations
// ============================================================================

// GetSpreadsheetRequest is a request to get spreadsheet information
message GetSpreadsheetRequest {
  GetSpreadsheetData data = 1;
}

message GetSpreadsheetData {
  // Provider identifier
  string provider_id = 1;

  // Spreadsheet identifier
  string spreadsheet_id = 2;

  // Whether to include sheet details
  bool include_sheets = 3;

  // Whether to include sheet data
  bool include_data = 4;
}

// GetSpreadsheetResponse contains spreadsheet information
message GetSpreadsheetResponse {
  bool success = 1;
  repeated Spreadsheet data = 2;
  domain.common.v1.Error error = 3;
}

// CreateSpreadsheetRequest is a request to create a new spreadsheet
message CreateSpreadsheetRequest {
  CreateSpreadsheetData data = 1;
}

message CreateSpreadsheetData {
  // Provider identifier
  string provider_id = 1;

  // Title for the new spreadsheet
  string title = 2;

  // Initial sheets to create
  repeated CreateSheetData sheets = 3;

  // Locale (e.g., "en_US")
  string locale = 4;

  // Time zone (e.g., "America/New_York")
  string time_zone = 5;

  // Folder ID to create spreadsheet in (provider-specific)
  string folder_id = 6;
}

// CreateSpreadsheetResponse contains the result of creating a spreadsheet
message CreateSpreadsheetResponse {
  bool success = 1;
  repeated Spreadsheet data = 2;
  domain.common.v1.Error error = 3;
}

// ============================================================================
// Batch Operations
// ============================================================================

// BatchUpdateRequest is a request to perform multiple operations atomically
message BatchUpdateRequest {
  BatchUpdateData data = 1;
}

message BatchUpdateData {
  // Provider identifier
  string provider_id = 1;

  // Spreadsheet identifier
  string spreadsheet_id = 2;

  // Operations to perform
  repeated BatchOperation operations = 3;

  // Whether to stop on first error
  bool fail_fast = 4;

  // Batch ID for tracking
  string batch_id = 5;
}

// BatchOperation represents a single operation in a batch
message BatchOperation {
  // Operation identifier
  string operation_id = 1;

  // The operation to perform
  oneof operation {
    AddRowsData add_rows = 2;
    UpdateRowsData update_rows = 3;
    DeleteRowsData delete_rows = 4;
    WriteRangeData write_range = 5;
    ClearRangeData clear_range = 6;
    CreateSheetData create_sheet = 7;
    DeleteSheetData delete_sheet = 8;
  }
}

// BatchUpdateResponse contains the results of batch operations
message BatchUpdateResponse {
  bool success = 1;
  repeated BatchUpdateResult data = 2;
  domain.common.v1.Error error = 3;
}

message BatchUpdateResult {
  // Batch ID
  string batch_id = 1;

  // Results for each operation
  repeated BatchOperationResult operation_results = 2;

  // Number of successful operations
  int32 success_count = 3;

  // Number of failed operations
  int32 failure_count = 4;
}

message BatchOperationResult {
  // Operation identifier
  string operation_id = 1;

  // Whether this operation succeeded
  bool success = 2;

  // Error if operation failed
  domain.common.v1.Error error = 3;

  // Result data (type depends on operation)
  oneof result {
    AddRowsResult add_rows_result = 4;
    UpdateRowsResult update_rows_result = 5;
    DeleteRowsResult delete_rows_result = 6;
    WriteRangeResult write_range_result = 7;
    ClearRangeResult clear_range_result = 8;
    CreateSheetResult create_sheet_result = 9;
    DeleteSheetResult delete_sheet_result = 10;
  }
}

// ============================================================================
// Health and Capabilities
// ============================================================================

// CheckDatasheetHealthRequest is a request to check provider health
message CheckDatasheetHealthRequest {
  DatasheetHealthCheckData data = 1;
}

message DatasheetHealthCheckData {
  // Provider identifier to check
  string provider_id = 1;

  // Whether to perform deep health check
  bool deep_check = 2;

  // Test spreadsheet ID for deep check (optional)
  string test_spreadsheet_id = 3;
}

// CheckDatasheetHealthResponse contains the health check result
message CheckDatasheetHealthResponse {
  bool success = 1;
  repeated DatasheetHealthStatus data = 2;
  domain.common.v1.Error error = 3;
}

message DatasheetHealthStatus {
  // Whether the provider is healthy
  bool is_healthy = 1;

  // Health status message
  string status_message = 2;

  // Provider health status details
  ProviderHealthStatus health_status = 3;

  // Additional health details
  map<string, string> details = 4;
}

// GetDatasheetCapabilitiesRequest is a request to get provider capabilities
message GetDatasheetCapabilitiesRequest {
  DatasheetProviderLookup data = 1;
}

message DatasheetProviderLookup {
  // Provider identifier
  string provider_id = 1;
}

// GetDatasheetCapabilitiesResponse contains the provider's capabilities
message GetDatasheetCapabilitiesResponse {
  bool success = 1;
  repeated DatasheetProviderCapabilities data = 2;
  domain.common.v1.Error error = 3;
}

message DatasheetProviderCapabilities {
  // Provider identifier
  string provider_id = 1;

  // Provider type
  DatasheetProviderType provider_type = 2;

  // Supported capabilities
  repeated DatasheetCapability capabilities = 3;

  // Maximum cells per request
  int32 max_cells_per_request = 4;

  // Maximum rows per request
  int32 max_rows_per_request = 5;

  // Maximum concurrent requests
  int32 max_concurrent_requests = 6;

  // Rate limits
  DatasheetRateLimits rate_limits = 7;

  // Capability-specific details
  map<string, string> capability_details = 8;
}

// DatasheetRateLimits represents API rate limiting information
message DatasheetRateLimits {
  // Requests per minute (read)
  int32 read_requests_per_minute = 1;

  // Requests per minute (write)
  int32 write_requests_per_minute = 2;

  // Requests per day
  int32 requests_per_day = 3;

  // Cells per read request
  int32 cells_per_read = 4;

  // Cells per write request
  int32 cells_per_write = 5;
}
