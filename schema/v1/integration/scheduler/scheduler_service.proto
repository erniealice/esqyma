syntax = "proto3";

package integration.scheduler.v1;

option go_package = "leapfor.xyz/esqyma/golang/v1/integration/scheduler";

import "google/protobuf/timestamp.proto";
import "integration/scheduler/scheduler.proto";
import "domain/common/error.proto";

// SchedulerIntegrationService provides unified scheduler operations
// This service abstracts scheduling providers like Calendly, Google Calendar, etc.
service SchedulerIntegrationService {
  // Create a scheduled event (book an appointment)
  rpc CreateSchedule(CreateScheduleRequest) returns (CreateScheduleResponse);

  // Cancel a scheduled event
  rpc CancelSchedule(CancelScheduleRequest) returns (CancelScheduleResponse);

  // Get schedule details by ID
  rpc GetSchedule(GetScheduleRequest) returns (GetScheduleResponse);

  // List schedules with filtering
  rpc ListSchedules(ListSchedulesRequest) returns (ListSchedulesResponse);

  // Check available time slots for booking
  rpc CheckAvailability(CheckAvailabilityRequest) returns (CheckAvailabilityResponse);

  // Process incoming webhook from scheduler provider
  rpc ProcessWebhook(ProcessSchedulerWebhookRequest) returns (ProcessSchedulerWebhookResponse);

  // List available event types
  rpc ListEventTypes(ListEventTypesRequest) returns (ListEventTypesResponse);

  // Get event type details
  rpc GetEventType(GetEventTypeRequest) returns (GetEventTypeResponse);

  // Check provider health
  rpc CheckHealth(CheckSchedulerHealthRequest) returns (CheckSchedulerHealthResponse);

  // Get provider capabilities
  rpc GetCapabilities(GetSchedulerCapabilitiesRequest) returns (GetSchedulerCapabilitiesResponse);
}

// ===== Create Schedule =====

message CreateScheduleRequest {
  ScheduleCreateData data = 1;
}

message ScheduleCreateData {
  // Provider to use (optional, uses default if not specified)
  string provider_id = 1;

  // Event type URI/ID (required)
  string event_type_id = 2;

  // Start date (format: YYYY-MM-DD)
  string start_date = 3;

  // Start time (format: HH:mm, 24-hour)
  string start_time = 4;

  // End date (optional, defaults to start_date)
  string end_date = 5;

  // End time (optional, calculated from duration if not provided)
  string end_time = 6;

  // Invitee information (required)
  InviteeInfo invitee = 7;

  // Location preference (optional)
  ScheduleLocation location = 8;

  // Associated entity references (for linking to our domain)
  string client_id = 9;
  string subscription_id = 10;
  string payment_id = 11;

  // Custom metadata
  map<string, string> metadata = 12;
}

message CreateScheduleResponse {
  bool success = 1;
  repeated Schedule data = 2;
  domain.common.v1.Error error = 3;
}

// ===== Cancel Schedule =====

message CancelScheduleRequest {
  ScheduleCancelData data = 1;
}

message ScheduleCancelData {
  // Provider to use
  string provider_id = 1;

  // Internal schedule ID
  string schedule_id = 2;

  // Provider schedule reference (alternative to schedule_id)
  string provider_schedule_id = 3;

  // Cancellation reason
  string reason = 4;

  // Whether to notify invitee about cancellation
  bool notify_invitee = 5;
}

message CancelScheduleResponse {
  bool success = 1;
  repeated ScheduleCancelResult data = 2;
  domain.common.v1.Error error = 3;
}

message ScheduleCancelResult {
  // Updated status (should be CANCELLED)
  ScheduleStatus status = 1;

  // Success message
  string message = 2;
}

// ===== Get Schedule =====

message GetScheduleRequest {
  ScheduleLookup data = 1;
}

message ScheduleLookup {
  // Provider to use
  string provider_id = 1;

  // Internal schedule ID
  string schedule_id = 2;

  // Provider schedule reference (alternative to schedule_id)
  string provider_schedule_id = 3;
}

message GetScheduleResponse {
  bool success = 1;
  repeated Schedule data = 2;
  domain.common.v1.Error error = 3;
}

// ===== List Schedules =====

message ListSchedulesRequest {
  ScheduleListFilter data = 1;
}

message ScheduleListFilter {
  // Provider to use
  string provider_id = 1;

  // Filter by event type
  string event_type_id = 2;

  // Filter by status (active, cancelled, etc.)
  string status = 3;

  // Filter by client ID
  string client_id = 4;

  // Date range filter - start (format: YYYY-MM-DD)
  string from_date = 5;

  // Date range filter - end (format: YYYY-MM-DD)
  string to_date = 6;

  // Pagination limit
  int32 limit = 7;

  // Pagination token
  string page_token = 8;

  // Filter by invitee email
  string invitee_email = 9;

  // Sort order: "asc" or "desc"
  string sort_order = 10;
}

message ListSchedulesResponse {
  bool success = 1;
  repeated Schedule data = 2;
  domain.common.v1.Error error = 3;
  string next_page_token = 4;
  int32 total_count = 5;
}

// ===== Check Availability =====

message CheckAvailabilityRequest {
  AvailabilityCheckData data = 1;
}

message AvailabilityCheckData {
  // Provider to use
  string provider_id = 1;

  // Event type to check availability for (required)
  string event_type_id = 2;

  // Start date (format: YYYY-MM-DD)
  string start_date = 3;

  // Start time (format: HH:mm, 24-hour) - optional, defaults to day start
  string start_time = 4;

  // End date (format: YYYY-MM-DD)
  string end_date = 5;

  // End time (format: HH:mm, 24-hour) - optional, defaults to day end
  string end_time = 6;

  // Timezone for the request (IANA format, e.g., "Asia/Singapore")
  string timezone = 7;
}

message CheckAvailabilityResponse {
  bool success = 1;
  repeated TimeSlot data = 2;
  domain.common.v1.Error error = 3;
}

// ===== Process Webhook =====

message ProcessSchedulerWebhookRequest {
  SchedulerWebhookData data = 1;
}

message SchedulerWebhookData {
  // Provider identifier (e.g., "calendly")
  string provider_id = 1;

  // Raw webhook payload as bytes
  bytes payload = 2;

  // HTTP headers from the webhook request
  map<string, string> headers = 3;

  // Content type of the payload
  string content_type = 4;

  // Signature for webhook verification
  string signature = 5;

  // URL query parameters
  map<string, string> query = 6;

  // HTTP method (POST, GET, etc.)
  string method = 7;

  // Full request URL
  string url = 8;
}

message ProcessSchedulerWebhookResponse {
  bool success = 1;
  repeated SchedulerWebhookResult data = 2;
  domain.common.v1.Error error = 3;
}

message SchedulerWebhookResult {
  // Event type from webhook (e.g., "invitee.created", "invitee.canceled")
  string event_type = 1;

  // Processed schedule (extracted from webhook)
  Schedule schedule = 2;

  // Action taken (created, cancelled, rescheduled, no_action, etc.)
  string action = 3;

  // Whether this is a reschedule (old_invitee present)
  bool is_reschedule = 4;

  // Old schedule ID (for reschedules)
  string old_schedule_id = 5;
}

// ===== Event Types =====

message ListEventTypesRequest {
  EventTypeListFilter data = 1;
}

message EventTypeListFilter {
  // Provider to use
  string provider_id = 1;

  // Only return active event types
  bool active_only = 2;

  // Filter by user URI (for multi-user organizations)
  string user_uri = 3;
}

message ListEventTypesResponse {
  bool success = 1;
  repeated EventType data = 2;
  domain.common.v1.Error error = 3;
}

message GetEventTypeRequest {
  EventTypeLookup data = 1;
}

message EventTypeLookup {
  // Provider to use
  string provider_id = 1;

  // Event type URI/ID
  string event_type_id = 2;
}

message GetEventTypeResponse {
  bool success = 1;
  repeated EventType data = 2;
  domain.common.v1.Error error = 3;
}

// ===== Health & Capabilities =====

message CheckSchedulerHealthRequest {
  SchedulerHealthCheckData data = 1;
}

message SchedulerHealthCheckData {
  // Provider to check
  string provider_id = 1;

  // Perform deep health check (e.g., verify API connectivity)
  bool deep_check = 2;
}

message CheckSchedulerHealthResponse {
  bool success = 1;
  repeated SchedulerHealthStatus data = 2;
  domain.common.v1.Error error = 3;
}

message SchedulerHealthStatus {
  // Whether the provider is healthy
  bool is_healthy = 1;

  // Detailed health status
  SchedulerProviderHealthStatus health_status = 2;
}

message GetSchedulerCapabilitiesRequest {
  SchedulerProviderLookup data = 1;
}

message SchedulerProviderLookup {
  // Provider to query
  string provider_id = 1;
}

message GetSchedulerCapabilitiesResponse {
  bool success = 1;
  repeated SchedulerProviderCapabilities data = 2;
  domain.common.v1.Error error = 3;
}

message SchedulerProviderCapabilities {
  // Provider identifier
  string provider_id = 1;

  // Provider type
  SchedulerProviderType provider_type = 2;

  // List of supported capabilities
  repeated SchedulerCapability capabilities = 3;

  // Provider-specific limits (e.g., max_days_ahead, max_events_per_request)
  map<string, string> limits = 4;
}
