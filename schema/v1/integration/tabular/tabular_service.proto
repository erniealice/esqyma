syntax = "proto3";
package integration.tabular.v1;
option go_package = "leapfor.xyz/esqyma/golang/v1/integration/tabular";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "integration/tabular/tabular.proto";
import "integration/tabular/provider.proto";
import "domain/common/error.proto";

// TabularDataService provides generic tabular data operations across multiple providers
// This service defines the contract; the hexagonal architecture adapters
// implement provider-specific behavior
service TabularDataService {
  // Record Operations
  rpc ReadRecords(ReadRecordsRequest) returns (ReadRecordsResponse);
  rpc WriteRecords(WriteRecordsRequest) returns (WriteRecordsResponse);
  rpc WriteRecordSimple(WriteRecordSimpleRequest) returns (WriteRecordSimpleResponse);
  rpc UpdateRecords(UpdateRecordsRequest) returns (UpdateRecordsResponse);
  rpc DeleteRecords(DeleteRecordsRequest) returns (DeleteRecordsResponse);
  rpc SearchRecords(SearchRecordsRequest) returns (SearchRecordsResponse);

  // Schema Operations
  rpc GetSchema(GetSchemaRequest) returns (GetSchemaResponse);
  rpc GetSource(GetSourceRequest) returns (GetSourceResponse);
  rpc ListTables(ListTablesRequest) returns (ListTablesResponse);

  // Batch Operations
  rpc BatchExecute(BatchExecuteRequest) returns (BatchExecuteResponse);

  // Health
  rpc CheckHealth(CheckHealthRequest) returns (CheckHealthResponse);
  rpc GetCapabilities(GetCapabilitiesRequest) returns (GetCapabilitiesResponse);
}

// ============================================================================
// Record Operations
// ============================================================================

// ReadRecordsRequest is a request to read records from a tabular source
message ReadRecordsRequest {
  ReadRecordsData data = 1;
}

message ReadRecordsData {
  // Provider identifier
  string provider_id = 1;

  // Source identifier (e.g., spreadsheet ID, database name)
  string source_id = 2;

  // Selection criteria for which records to read
  Selection selection = 3;

  // Sort specifications
  repeated SortSpec sort_by = 4;

  // Whether to include schema information in the response
  bool include_schema = 5;
}

// ReadRecordsResponse contains the records from the source
message ReadRecordsResponse {
  bool success = 1;
  repeated ReadRecordsResult data = 2;
  domain.common.v1.Error error = 3;
}

message ReadRecordsResult {
  // Records retrieved
  repeated Record records = 1;

  // Total count of matching records
  int64 total_count = 2;

  // Schema of the table (if include_schema was true)
  TableSchema schema = 3;

  // Whether there are more records available
  bool has_more = 4;

  // Offset for the next page of results
  int32 next_offset = 5;
}

// ============================================================================
// WriteRecordsRequest is a request to write new records to a tabular source
// ============================================================================

message WriteRecordsRequest {
  WriteRecordsData data = 1;
}

message WriteRecordsData {
  // Provider identifier
  string provider_id = 1;

  // Source identifier (e.g., spreadsheet ID, database name)
  string source_id = 2;

  // Table name within the source
  string table = 3;

  // Records to write
  repeated Record records = 4;

  // Insert position (-1 = append to end)
  int64 insert_at = 5;

  // Write options
  WriteOptions options = 6;
}

// WriteOptions represents options for write operations
message WriteOptions {
  // Skip validation of the data
  bool skip_validation = 1;

  // Return the written records in the response
  bool return_records = 2;

  // How input values should be interpreted (RAW, USER_ENTERED)
  string value_input_option = 3;
}

// WriteRecordsResponse contains the result of writing records
message WriteRecordsResponse {
  bool success = 1;
  repeated WriteRecordsResult data = 2;
  domain.common.v1.Error error = 3;
}

message WriteRecordsResult {
  // Number of records written
  int32 records_written = 1;

  // The written records (if return_records was true)
  repeated Record written_records = 2;

  // Location where records were written
  string location = 3;
}

// ============================================================================
// WriteRecordSimpleRequest - Workflow-friendly single record write
// Accepts flat key-value pairs instead of complex Record structure
// ============================================================================

message WriteRecordSimpleRequest {
  WriteRecordSimpleData data = 1;
}

message WriteRecordSimpleData {
  // Source identifier (e.g., spreadsheet ID) - REQUIRED
  string source_id = 1;

  // Table/sheet name within the source (default: "Sheet1")
  string table = 2;

  // Field values as a flexible struct (maps to map[string]interface{} in Go)
  // All keys become column names, values become cell values
  // Example: {"first_name": "John", "last_name": "Doe", "amount": 100}
  google.protobuf.Struct fields = 3;
}

// WriteRecordSimpleResponse contains the result of writing a single record
message WriteRecordSimpleResponse {
  bool success = 1;
  repeated WriteRecordSimpleResult data = 2;
  domain.common.v1.Error error = 3;
}

message WriteRecordSimpleResult {
  // Number of records written (typically 1)
  int32 records_written = 1;

  // Location where the record was written (e.g., "Sheet1!A10:D10")
  string location = 2;
}

// ============================================================================
// UpdateRecordsRequest is a request to update existing records
// ============================================================================

message UpdateRecordsRequest {
  UpdateRecordsData data = 1;
}

message UpdateRecordsData {
  // Provider identifier
  string provider_id = 1;

  // Source identifier (e.g., spreadsheet ID, database name)
  string source_id = 2;

  // Selection criteria for which records to update
  Selection selection = 3;

  // Field-level updates to apply
  repeated FieldUpdate updates = 4;

  // Complete replacement records (alternative to field updates)
  repeated Record replacement_records = 5;
}

// FieldUpdate represents an update to a specific field
message FieldUpdate {
  // Field identifier (one of the following)
  oneof field {
    int32 field_index = 1;   // Field by index
    string field_name = 2;   // Field by name
  }

  // New value for the field
  FieldValue value = 3;
}

// UpdateRecordsResponse contains the result of updating records
message UpdateRecordsResponse {
  bool success = 1;
  repeated UpdateRecordsResult data = 2;
  domain.common.v1.Error error = 3;
}

message UpdateRecordsResult {
  // Number of records updated
  int32 records_updated = 1;

  // Number of records matched by the selection
  int32 records_matched = 2;
}

// ============================================================================
// DeleteRecordsRequest is a request to delete records
// ============================================================================

message DeleteRecordsRequest {
  DeleteRecordsData data = 1;
}

message DeleteRecordsData {
  // Provider identifier
  string provider_id = 1;

  // Source identifier (e.g., spreadsheet ID, database name)
  string source_id = 2;

  // Selection criteria for which records to delete
  Selection selection = 3;

  // Whether to shift remaining records up after deletion
  bool shift_remaining = 4;
}

// DeleteRecordsResponse contains the result of deleting records
message DeleteRecordsResponse {
  bool success = 1;
  repeated DeleteRecordsResult data = 2;
  domain.common.v1.Error error = 3;
}

message DeleteRecordsResult {
  // Number of records deleted
  int32 records_deleted = 1;
}

// ============================================================================
// SearchRecordsRequest is a request to search for records
// ============================================================================

message SearchRecordsRequest {
  SearchRecordsData data = 1;
}

message SearchRecordsData {
  // Provider identifier
  string provider_id = 1;

  // Source identifier (e.g., spreadsheet ID, database name)
  string source_id = 2;

  // Table name within the source
  string table = 3;

  // Filter conditions
  FilterGroup filter = 4;

  // Fields to return
  FieldSelection fields = 5;

  // Sort specifications
  repeated SortSpec sort_by = 6;

  // Maximum number of records to return
  int32 limit = 7;

  // Number of records to skip (for pagination)
  int32 offset = 8;
}

// SearchRecordsResponse contains the search results
message SearchRecordsResponse {
  bool success = 1;
  repeated SearchRecordsResult data = 2;
  domain.common.v1.Error error = 3;
}

message SearchRecordsResult {
  // Matching records
  repeated Record records = 1;

  // Total count of matching records
  int64 total_count = 2;

  // Whether there are more results available
  bool has_more = 3;
}

// ============================================================================
// Schema Operations
// ============================================================================

// GetSchemaRequest is a request to get schema information
message GetSchemaRequest {
  GetSchemaData data = 1;
}

message GetSchemaData {
  // Provider identifier
  string provider_id = 1;

  // Source identifier (e.g., spreadsheet ID, database name)
  string source_id = 2;

  // Table name (optional - if omitted, returns source-level schema)
  string table = 3;
}

// GetSchemaResponse contains schema information
message GetSchemaResponse {
  bool success = 1;
  repeated GetSchemaResult data = 2;
  domain.common.v1.Error error = 3;
}

message GetSchemaResult {
  // Source information
  Source source = 1;

  // Table schema (if table was specified)
  TableSchema table_schema = 2;
}

// GetSourceRequest is a request to get source information
message GetSourceRequest {
  GetSourceData data = 1;
}

message GetSourceData {
  // Provider identifier
  string provider_id = 1;

  // Source identifier (e.g., spreadsheet ID, database name)
  string source_id = 2;

  // Whether to include table information
  bool include_tables = 3;
}

// GetSourceResponse contains source information
message GetSourceResponse {
  bool success = 1;
  repeated Source data = 2;
  domain.common.v1.Error error = 3;
}

// ListTablesRequest is a request to list tables in a source
message ListTablesRequest {
  ListTablesData data = 1;
}

message ListTablesData {
  // Provider identifier
  string provider_id = 1;

  // Source identifier (e.g., spreadsheet ID, database name)
  string source_id = 2;
}

// ListTablesResponse contains the list of tables
message ListTablesResponse {
  bool success = 1;
  repeated Table data = 2;
  domain.common.v1.Error error = 3;
}

// ============================================================================
// Batch Operations
// ============================================================================

// BatchExecuteRequest is a request to execute multiple operations
message BatchExecuteRequest {
  BatchExecuteData data = 1;
}

message BatchExecuteData {
  // Provider identifier
  string provider_id = 1;

  // Source identifier (e.g., spreadsheet ID, database name)
  string source_id = 2;

  // Operations to perform
  repeated BatchOperation operations = 3;

  // Whether to stop on first error
  bool fail_fast = 4;

  // Whether to execute as a single transaction
  bool transactional = 5;
}

// BatchOperation represents a single operation in a batch
message BatchOperation {
  // Operation identifier for tracking
  string operation_id = 1;

  // The operation to perform
  oneof operation {
    WriteRecordsData write = 2;
    UpdateRecordsData update = 3;
    DeleteRecordsData delete = 4;
  }
}

// BatchExecuteResponse contains the results of batch operations
message BatchExecuteResponse {
  bool success = 1;
  repeated BatchExecuteResult data = 2;
  domain.common.v1.Error error = 3;
}

message BatchExecuteResult {
  // Number of successful operations
  int32 success_count = 1;

  // Number of failed operations
  int32 failure_count = 2;

  // Results for each operation
  repeated BatchOperationResult results = 3;
}

// BatchOperationResult represents the result of a single batch operation
message BatchOperationResult {
  // Operation identifier
  string operation_id = 1;

  // Whether this operation succeeded
  bool success = 2;

  // Error if operation failed
  domain.common.v1.Error error = 3;
}

// ============================================================================
// Health and Capabilities
// ============================================================================

// CheckHealthRequest is a request to check provider health
message CheckHealthRequest {
  CheckHealthData data = 1;
}

message CheckHealthData {
  // Provider identifier to check
  string provider_id = 1;

  // Whether to perform deep health check
  bool deep_check = 2;
}

// CheckHealthResponse contains the health check result
message CheckHealthResponse {
  bool success = 1;
  repeated HealthStatus data = 2;
  domain.common.v1.Error error = 3;
}

// HealthStatus represents the health status of a provider
message HealthStatus {
  // Whether the provider is healthy
  bool is_healthy = 1;

  // Health status message
  string message = 2;

  // Additional health details
  map<string, string> details = 3;
}

// GetCapabilitiesRequest is a request to get provider capabilities
message GetCapabilitiesRequest {
  GetCapabilitiesData data = 1;
}

message GetCapabilitiesData {
  // Provider identifier
  string provider_id = 1;
}

// GetCapabilitiesResponse contains the provider's capabilities
message GetCapabilitiesResponse {
  bool success = 1;
  repeated ProviderCapabilities data = 2;
  domain.common.v1.Error error = 3;
}

// ProviderCapabilities represents the capabilities of a provider
message ProviderCapabilities {
  // Provider identifier
  string provider_id = 1;

  // Provider type
  TabularProviderType provider_type = 2;

  // Supported capabilities
  repeated TabularCapability capabilities = 3;

  // Maximum records per request
  int32 max_records_per_request = 4;

  // Maximum fields per record
  int32 max_fields_per_record = 5;

  // Maximum source size in bytes
  int64 max_source_size_bytes = 6;
}
