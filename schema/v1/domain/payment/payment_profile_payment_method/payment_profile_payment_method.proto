syntax = "proto3";

package domain.payment.v1;

option go_package = "leapfor.xyz/esqyma/golang/v1/domain/payment/payment_profile_payment_method";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "domain/payment/payment_profile/payment_profile.proto";
import "domain/payment/payment_method/payment_method.proto";

message PaymentProfilePaymentMethod {
  string id = 1;
  optional int64 date_created = 2;
  optional string date_created_string = 3;
  optional int64 date_modified = 4;
  optional string date_modified_string = 5;
  bool active = 6;
  optional PaymentProfile payment_profile = 7;
  string payment_profile_id = 8;
  optional PaymentMethod payment_method = 9;
  string payment_method_id = 10;
  bool primary = 11;
  optional string notes = 12;
  optional int32 display_order = 13;
  string payment_identifier = 14; // Generic identifier: card number, PayPal email, account ID, etc.
  string identifier_type = 15; // "card", "paypal", "bank", "crypto", "other"
  optional string display_name = 16; // User-friendly nickname for this payment method
  bool masked = 17; // Whether the payment_identifier is masked/tokenized
}

service PaymentProfilePaymentMethodDomainService {
  rpc CreatePaymentProfilePaymentMethod(CreatePaymentProfilePaymentMethodRequest) returns (CreatePaymentProfilePaymentMethodResponse);
  rpc ReadPaymentProfilePaymentMethod(ReadPaymentProfilePaymentMethodRequest) returns (ReadPaymentProfilePaymentMethodResponse);
  rpc UpdatePaymentProfilePaymentMethod(UpdatePaymentProfilePaymentMethodRequest) returns (UpdatePaymentProfilePaymentMethodResponse);
  rpc DeletePaymentProfilePaymentMethod(DeletePaymentProfilePaymentMethodRequest) returns (DeletePaymentProfilePaymentMethodResponse);
  rpc ListPaymentProfilePaymentMethods(ListPaymentProfilePaymentMethodsRequest) returns (ListPaymentProfilePaymentMethodsResponse);
  rpc GetPaymentProfilePaymentMethodListPageData(GetPaymentProfilePaymentMethodListPageDataRequest)
    returns (GetPaymentProfilePaymentMethodListPageDataResponse);
  rpc GetPaymentProfilePaymentMethodItemPageData(GetPaymentProfilePaymentMethodItemPageDataRequest)
    returns (GetPaymentProfilePaymentMethodItemPageDataResponse);
}

message CreatePaymentProfilePaymentMethodRequest {
  PaymentProfilePaymentMethod data = 1;
}

message CreatePaymentProfilePaymentMethodResponse {
  repeated PaymentProfilePaymentMethod data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadPaymentProfilePaymentMethodRequest {
  PaymentProfilePaymentMethod data = 1;
}

message ReadPaymentProfilePaymentMethodResponse {
  repeated PaymentProfilePaymentMethod data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdatePaymentProfilePaymentMethodRequest {
  PaymentProfilePaymentMethod data = 1;
}

message UpdatePaymentProfilePaymentMethodResponse {
  repeated PaymentProfilePaymentMethod data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeletePaymentProfilePaymentMethodRequest {
  PaymentProfilePaymentMethod data = 1;
}

message DeletePaymentProfilePaymentMethodResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListPaymentProfilePaymentMethodsRequest {
  optional string payment_profile_id = 1;
  optional string payment_method_id = 2;
  optional bool primary_only = 3;
  optional domain.common.v1.SearchRequest search = 4;
  optional domain.common.v1.FilterRequest filters = 5;
  optional domain.common.v1.SortRequest sort = 6;
  optional domain.common.v1.PaginationRequest pagination = 7;
}

message ListPaymentProfilePaymentMethodsResponse {
  repeated PaymentProfilePaymentMethod data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetPaymentProfilePaymentMethodListPageDataRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message GetPaymentProfilePaymentMethodListPageDataResponse {
  repeated PaymentProfilePaymentMethod payment_profile_payment_method_list = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
  optional domain.common.v1.PaginationResponse pagination = 4;
  repeated domain.common.v1.SearchResult search_results = 5;
}

message GetPaymentProfilePaymentMethodItemPageDataRequest {
  string payment_profile_payment_method_id = 1;
}

message GetPaymentProfilePaymentMethodItemPageDataResponse {
  PaymentProfilePaymentMethod payment_profile_payment_method = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}