syntax = "proto3";

package domain.entity.v1;

option go_package = "leapfor.xyz/esqyma/golang/v1/domain/entity/workspace_user";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "domain/entity/workspace/workspace.proto";
import "domain/entity/user/user.proto";
import "domain/entity/workspace_user_role/workspace_user_role.proto";

message WorkspaceUser {
  string id = 1;
  optional Workspace workspace = 2;
  string workspace_id = 3;
  optional User user = 4;
  string user_id = 5;

  // Junction table exposure: We expose WorkspaceUserRole instead of hiding it behind a simple
  // repeated Role field. This allows:
  // 1. Access to junction record IDs for deletion (DELETE /workspace-user-role/{id})
  // 2. Access to relationship metadata (date_created, active status on the junction)
  // 3. Consistent CRUD patterns across all entities
  // Frontend accesses role data via: workspaceUser.workspace_user_roles[0].role.name
  repeated WorkspaceUserRole workspace_user_roles = 6;

  optional int64 date_created = 7;
  optional string date_created_string = 8;
  optional int64 date_modified = 9;
  optional string date_modified_string = 10;
  bool active = 11;
}

service WorkspaceUserDomainService {
  rpc CreateWorkspaceUser(CreateWorkspaceUserRequest) returns (CreateWorkspaceUserResponse);
  rpc ReadWorkspaceUser(ReadWorkspaceUserRequest) returns (ReadWorkspaceUserResponse);
  rpc UpdateWorkspaceUser(UpdateWorkspaceUserRequest) returns (UpdateWorkspaceUserResponse);
  rpc DeleteWorkspaceUser(DeleteWorkspaceUserRequest) returns (DeleteWorkspaceUserResponse);
  rpc ListWorkspaceUsers(ListWorkspaceUsersRequest) returns (ListWorkspaceUsersResponse);

  // Enhanced list with pagination, filtering, sorting, search
  rpc GetWorkspaceUserListPageData(GetWorkspaceUserListPageDataRequest)
    returns (GetWorkspaceUserListPageDataResponse);

  // Enhanced item view
  rpc GetWorkspaceUserItemPageData(GetWorkspaceUserItemPageDataRequest)
    returns (GetWorkspaceUserItemPageDataResponse);
}

message CreateWorkspaceUserRequest {
  WorkspaceUser data = 1;
}

message CreateWorkspaceUserResponse {
  repeated WorkspaceUser data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadWorkspaceUserRequest {
  WorkspaceUser data = 1;
}

message ReadWorkspaceUserResponse {
  repeated WorkspaceUser data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateWorkspaceUserRequest {
  WorkspaceUser data = 1;
}

message UpdateWorkspaceUserResponse {
  repeated WorkspaceUser data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteWorkspaceUserRequest {
  WorkspaceUser data = 1;
}

message DeleteWorkspaceUserResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListWorkspaceUsersRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListWorkspaceUsersResponse {
  repeated WorkspaceUser data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// Enhanced list request
message GetWorkspaceUserListPageDataRequest {
  domain.common.v1.PaginationRequest pagination = 1;
  domain.common.v1.FilterRequest filters = 2;
  domain.common.v1.SortRequest sort = 3;
  domain.common.v1.SearchRequest search = 4;
}

// Enhanced list response
message GetWorkspaceUserListPageDataResponse {
  repeated WorkspaceUser workspace_user_list = 1;
  domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

// Item request
message GetWorkspaceUserItemPageDataRequest {
  string workspace_user_id = 1;
}

// Item response
message GetWorkspaceUserItemPageDataResponse {
  WorkspaceUser workspace_user = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}