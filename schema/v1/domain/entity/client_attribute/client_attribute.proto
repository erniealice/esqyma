syntax = "proto3";

package domain.entity.v1;

option go_package = "leapfor.xyz/esqyma/golang/v1/domain/entity/client_attribute";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "domain/entity/client/client.proto";
import "domain/common/attribute.proto";

message ClientAttribute {
  string id = 1;
  string client_id = 2;
  string attribute_id = 3;
  string value = 4;
  Client client = 5;
  domain.common.v1.Attribute attribute = 6;
  optional int64 date_created = 7;
  optional string date_created_string = 8;
  optional int64 date_modified = 9;
  optional string date_modified_string = 10;
  bool active = 11;
}

service ClientAttributeDomainService {
  rpc CreateClientAttribute(CreateClientAttributeRequest) returns (CreateClientAttributeResponse);
  rpc ReadClientAttribute(ReadClientAttributeRequest) returns (ReadClientAttributeResponse);
  rpc UpdateClientAttribute(UpdateClientAttributeRequest) returns (UpdateClientAttributeResponse);
  rpc DeleteClientAttribute(DeleteClientAttributeRequest) returns (DeleteClientAttributeResponse);
  rpc ListClientAttributes(ListClientAttributesRequest) returns (ListClientAttributesResponse);

  // NEW: Enhanced list with pagination, filtering, sorting, search
  rpc GetClientAttributeListPageData(GetClientAttributeListPageDataRequest)
    returns (GetClientAttributeListPageDataResponse);

  // NEW: Enhanced item view with related data
  rpc GetClientAttributeItemPageData(GetClientAttributeItemPageDataRequest)
    returns (GetClientAttributeItemPageDataResponse);
}

message CreateClientAttributeRequest {
  ClientAttribute data = 1;
}

message CreateClientAttributeResponse {
  repeated ClientAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadClientAttributeRequest {
  ClientAttribute data = 1;
}

message ReadClientAttributeResponse {
  repeated ClientAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateClientAttributeRequest {
  ClientAttribute data = 1;
}

message UpdateClientAttributeResponse {
  repeated ClientAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteClientAttributeRequest {
  ClientAttribute data = 1;
}

message DeleteClientAttributeResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListClientAttributesRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListClientAttributesResponse {
  repeated ClientAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// NEW: Enhanced list request with core features
message GetClientAttributeListPageDataRequest {
  // Pagination settings
  domain.common.v1.PaginationRequest pagination = 1;

  // Filter conditions
  domain.common.v1.FilterRequest filters = 2;

  // Sort settings
  domain.common.v1.SortRequest sort = 3;

  // Search settings
  domain.common.v1.SearchRequest search = 4;
}

// NEW: Enhanced list response with metadata
message GetClientAttributeListPageDataResponse {
  // The client attribute data
  repeated ClientAttribute client_attribute_list = 1;

  // Pagination metadata
  domain.common.v1.PaginationResponse pagination = 2;

  // Search results metadata (when search is used)
  repeated domain.common.v1.SearchResult search_results = 3;

  // Response status
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

// NEW: Simple item request
message GetClientAttributeItemPageDataRequest {
  // The client attribute ID to retrieve
  string client_attribute_id = 1;
}

// NEW: Simple item response
message GetClientAttributeItemPageDataResponse {
  // The client attribute data
  ClientAttribute client_attribute = 1;

  // Response status
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
