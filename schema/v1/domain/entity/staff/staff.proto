syntax = "proto3";

package domain.entity.v1;

option go_package = "leapfor.xyz/esqyma/golang/v1/domain/entity/staff";

import "domain/common/error.proto";
import "domain/common/search.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/pagination.proto";

import "domain/entity/user/user.proto";

message Staff {
  string id = 1;
  optional User user = 2;
  string user_id = 3;
  optional int64 date_created = 4;
  optional string date_created_string = 5;
  optional int64 date_modified = 6;
  optional string date_modified_string = 7;
  bool active = 8;
}

service StaffDomainService {
  rpc CreateStaff(CreateStaffRequest) returns (CreateStaffResponse);
  rpc ReadStaff(ReadStaffRequest) returns (ReadStaffResponse);
  rpc UpdateStaff(UpdateStaffRequest) returns (UpdateStaffResponse);
  rpc DeleteStaff(DeleteStaffRequest) returns (DeleteStaffResponse);
  rpc ListStaffs(ListStaffsRequest) returns (ListStaffsResponse);
  rpc GetStaffListPageData(GetStaffListPageDataRequest) returns (GetStaffListPageDataResponse);
  rpc GetStaffItemPageData(GetStaffItemPageDataRequest) returns (GetStaffItemPageDataResponse);
}

message CreateStaffRequest {
  Staff data = 1;
}

message CreateStaffResponse {
  repeated Staff data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadStaffRequest {
  Staff data = 1;
}

message ReadStaffResponse {
  repeated Staff data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateStaffRequest {
  Staff data = 1;
}

message UpdateStaffResponse {
  repeated Staff data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteStaffRequest {
  Staff data = 1;
}

message DeleteStaffResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListStaffsRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListStaffsResponse {
  repeated Staff data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetStaffListPageDataRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message GetStaffListPageDataResponse {
  repeated Staff staff_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetStaffItemPageDataRequest {
  string staff_id = 1;
}

message GetStaffItemPageDataResponse {
  optional Staff staff = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}