syntax = "proto3";

package domain.entity.v1;

option go_package = "leapfor.xyz/esqyma/golang/v1/domain/entity/delegate_attribute";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "domain/entity/delegate/delegate.proto";
import "domain/common/attribute.proto";

message DelegateAttribute {
  string id = 1;
  string delegate_id = 2;
  string attribute_id = 3;
  string value = 4;
  Delegate delegate = 5;
  domain.common.v1.Attribute attribute = 6;
  optional int64 date_created = 7;
  optional string date_created_string = 8;
  optional int64 date_modified = 9;
  optional string date_modified_string = 10;
  bool active = 11;
}

service DelegateAttributeDomainService {
  rpc CreateDelegateAttribute(CreateDelegateAttributeRequest) returns (CreateDelegateAttributeResponse);
  rpc ReadDelegateAttribute(ReadDelegateAttributeRequest) returns (ReadDelegateAttributeResponse);
  rpc UpdateDelegateAttribute(UpdateDelegateAttributeRequest) returns (UpdateDelegateAttributeResponse);
  rpc DeleteDelegateAttribute(DeleteDelegateAttributeRequest) returns (DeleteDelegateAttributeResponse);
  rpc ListDelegateAttributes(ListDelegateAttributesRequest) returns (ListDelegateAttributesResponse);

  // NEW: Enhanced list with pagination, filtering, sorting, search
  rpc GetDelegateAttributeListPageData(GetDelegateAttributeListPageDataRequest)
    returns (GetDelegateAttributeListPageDataResponse);

  // NEW: Enhanced item view with related data
  rpc GetDelegateAttributeItemPageData(GetDelegateAttributeItemPageDataRequest)
    returns (GetDelegateAttributeItemPageDataResponse);
}

message CreateDelegateAttributeRequest {
  DelegateAttribute data = 1;
}

message CreateDelegateAttributeResponse {
  repeated DelegateAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadDelegateAttributeRequest {
  DelegateAttribute data = 1;
}

message ReadDelegateAttributeResponse {
  repeated DelegateAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateDelegateAttributeRequest {
  DelegateAttribute data = 1;
}

message UpdateDelegateAttributeResponse {
  repeated DelegateAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteDelegateAttributeRequest {
  DelegateAttribute data = 1;
}

message DeleteDelegateAttributeResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListDelegateAttributesRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListDelegateAttributesResponse {
  repeated DelegateAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// NEW: Enhanced list request with core features
message GetDelegateAttributeListPageDataRequest {
  // Pagination settings
  domain.common.v1.PaginationRequest pagination = 1;

  // Filter conditions
  domain.common.v1.FilterRequest filters = 2;

  // Sort settings
  domain.common.v1.SortRequest sort = 3;

  // Search settings
  domain.common.v1.SearchRequest search = 4;
}

// NEW: Enhanced list response with metadata
message GetDelegateAttributeListPageDataResponse {
  // The delegate attribute data
  repeated DelegateAttribute delegate_attribute_list = 1;

  // Pagination metadata
  domain.common.v1.PaginationResponse pagination = 2;

  // Search results metadata (when search is used)
  repeated domain.common.v1.SearchResult search_results = 3;

  // Response status
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

// NEW: Simple item request
message GetDelegateAttributeItemPageDataRequest {
  // The delegate attribute ID to retrieve
  string delegate_attribute_id = 1;
}

// NEW: Simple item response
message GetDelegateAttributeItemPageDataResponse {
  // The delegate attribute data
  DelegateAttribute delegate_attribute = 1;

  // Response status
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
