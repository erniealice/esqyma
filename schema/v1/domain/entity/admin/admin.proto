syntax = "proto3";

package domain.entity.v1;

option go_package = "leapfor.xyz/esqyma/golang/v1/domain/entity/admin";

import "domain/common/error.proto";
import "domain/common/search.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/pagination.proto";

import "domain/entity/user/user.proto";

message Admin {
  string id = 1;
  optional User user = 2;
  string user_id = 3;
  optional int64 date_created = 4;
  optional string date_created_string = 5;
  optional int64 date_modified = 6;
  optional string date_modified_string = 7;
  bool active = 8;
}

service AdminDomainService {
  rpc CreateAdmin(CreateAdminRequest) returns (CreateAdminResponse);
  rpc ReadAdmin(ReadAdminRequest) returns (ReadAdminResponse);
  rpc UpdateAdmin(UpdateAdminRequest) returns (UpdateAdminResponse);
  rpc DeleteAdmin(DeleteAdminRequest) returns (DeleteAdminResponse);
  rpc ListAdmins(ListAdminsRequest) returns (ListAdminsResponse);
  rpc GetAdminListPageData(GetAdminListPageDataRequest) returns (GetAdminListPageDataResponse);
  rpc GetAdminItemPageData(GetAdminItemPageDataRequest) returns (GetAdminItemPageDataResponse);
}

message CreateAdminRequest {
  Admin data = 1;
}

message CreateAdminResponse {
  repeated Admin data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadAdminRequest {
  Admin data = 1;
}

message ReadAdminResponse {
  repeated Admin data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateAdminRequest {
  Admin data = 1;
}

message UpdateAdminResponse {
  repeated Admin data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteAdminRequest {
  Admin data = 1;
}

message DeleteAdminResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListAdminsRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListAdminsResponse {
  repeated Admin data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetAdminListPageDataRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message GetAdminListPageDataResponse {
  repeated Admin admin_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetAdminItemPageDataRequest {
  string admin_id = 1;
}

message GetAdminItemPageDataResponse {
  optional Admin admin = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}