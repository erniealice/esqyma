syntax = "proto3";

package domain.common.v1;

option go_package = "leapfor.xyz/esqyma/golang/v1/domain/common";

// Pagination request with support for both offset and cursor-based pagination
message PaginationRequest {
  int32 limit = 1; // Number of items per page (max 100)

  oneof method {
    OffsetPagination offset = 2;
    CursorPagination cursor = 3;
  }
}

// Offset-based pagination (page numbers)
message OffsetPagination {
  int32 page = 1; // Page number (1-based)
}

// Cursor-based pagination (for performance)
message CursorPagination {
  string token = 1; // Opaque cursor token
}

// Pagination response metadata
message PaginationResponse {
  int32 total_items = 1;
  optional int32 current_page = 2; // For offset pagination
  optional int32 total_pages = 3; // For offset pagination
  optional string next_cursor = 4; // For cursor pagination
  optional string prev_cursor = 5; // For cursor pagination
  bool has_next = 6;
  bool has_prev = 7;
}