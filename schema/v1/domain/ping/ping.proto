syntax = "proto3";

package domain.ping.v1;

option go_package = "leapfor.xyz/esqyma/golang/v1/domain/ping";

import "domain/common/error.proto";

message Ping {
  string id = 1;
  string message = 2;
  optional int64 date_created = 3;
  optional string date_created_string = 4;
  optional int64 date_modified = 5;
  optional string date_modified_string = 6;
  bool active = 7;
}

service PingDomainService {
  rpc CreatePing(CreatePingRequest) returns (CreatePingResponse);
  rpc ReadPing(ReadPingRequest) returns (ReadPingResponse);
  rpc UpdatePing(UpdatePingRequest) returns (UpdatePingResponse);
  rpc DeletePing(DeletePingRequest) returns (DeletePingResponse);
  rpc ListPings(ListPingsRequest) returns (ListPingsResponse);
  rpc SayPing(SayPingRequest) returns (SayPingResponse);
}

message SayPingRequest {
  Ping data = 1;
}

message SayPingResponse {
  repeated Ping data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message CreatePingRequest {
  Ping data = 1;
}

message CreatePingResponse {
  repeated Ping data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadPingRequest {
  Ping data = 1;
}

message ReadPingResponse {
  repeated Ping data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdatePingRequest {
  Ping data = 1;
}

message UpdatePingResponse {
  repeated Ping data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeletePingRequest {
  Ping data = 1;
}

message DeletePingResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListPingsRequest {}

message ListPingsResponse {
  repeated Ping data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}