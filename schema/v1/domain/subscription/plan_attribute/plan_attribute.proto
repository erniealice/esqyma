syntax = "proto3";

package domain.subscription.v1;

option go_package = "leapfor.xyz/esqyma/golang/v1/domain/subscription/plan_attribute";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "domain/subscription/plan/plan.proto";
import "domain/common/attribute.proto";

message PlanAttribute {
  string id = 1;
  string plan_id = 2;
  string attribute_id = 3;
  string value = 4;
  Plan plan = 5;
  domain.common.v1.Attribute attribute = 6;
  optional int64 date_created = 7;
  optional string date_created_string = 8;
  optional int64 date_modified = 9;
  optional string date_modified_string = 10;
  bool active = 11;
}

service PlanAttributeDomainService {
  rpc CreatePlanAttribute(CreatePlanAttributeRequest) returns (CreatePlanAttributeResponse);
  rpc ReadPlanAttribute(ReadPlanAttributeRequest) returns (ReadPlanAttributeResponse);
  rpc UpdatePlanAttribute(UpdatePlanAttributeRequest) returns (UpdatePlanAttributeResponse);
  rpc DeletePlanAttribute(DeletePlanAttributeRequest) returns (DeletePlanAttributeResponse);
  rpc ListPlanAttributes(ListPlanAttributesRequest) returns (ListPlanAttributesResponse);

  // NEW: Enhanced list with pagination, filtering, sorting, search
  rpc GetPlanAttributeListPageData(GetPlanAttributeListPageDataRequest)
    returns (GetPlanAttributeListPageDataResponse);

  // NEW: Enhanced item view with related data
  rpc GetPlanAttributeItemPageData(GetPlanAttributeItemPageDataRequest)
    returns (GetPlanAttributeItemPageDataResponse);
}

message CreatePlanAttributeRequest {
  PlanAttribute data = 1;
}

message CreatePlanAttributeResponse {
  repeated PlanAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadPlanAttributeRequest {
  PlanAttribute data = 1;
}

message ReadPlanAttributeResponse {
  repeated PlanAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdatePlanAttributeRequest {
  PlanAttribute data = 1;
}

message UpdatePlanAttributeResponse {
  repeated PlanAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeletePlanAttributeRequest {
  PlanAttribute data = 1;
}

message DeletePlanAttributeResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListPlanAttributesRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListPlanAttributesResponse {
  repeated PlanAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// NEW: Enhanced list request with core features
message GetPlanAttributeListPageDataRequest {
  // Pagination settings
  domain.common.v1.PaginationRequest pagination = 1;

  // Filter conditions
  domain.common.v1.FilterRequest filters = 2;

  // Sort settings
  domain.common.v1.SortRequest sort = 3;

  // Search settings
  domain.common.v1.SearchRequest search = 4;
}

// NEW: Enhanced list response with metadata
message GetPlanAttributeListPageDataResponse {
  // The plan attribute data
  repeated PlanAttribute plan_attribute_list = 1;

  // Pagination metadata
  domain.common.v1.PaginationResponse pagination = 2;

  // Search results metadata (when search is used)
  repeated domain.common.v1.SearchResult search_results = 3;

  // Response status
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

// NEW: Simple item request
message GetPlanAttributeItemPageDataRequest {
  // The plan attribute ID to retrieve
  string plan_attribute_id = 1;
}

// NEW: Simple item response
message GetPlanAttributeItemPageDataResponse {
  // The plan attribute data
  PlanAttribute plan_attribute = 1;

  // Response status
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
