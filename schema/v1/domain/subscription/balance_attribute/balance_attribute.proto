syntax = "proto3";

package domain.subscription.v1;

option go_package = "leapfor.xyz/esqyma/golang/v1/domain/subscription/balance_attribute";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "domain/subscription/balance/balance.proto";
import "domain/common/attribute.proto";

message BalanceAttribute {
  string id = 1;
  string balance_id = 2;
  string attribute_id = 3;
  string value = 4;
  Balance balance = 5;
  domain.common.v1.Attribute attribute = 6;
  optional int64 date_created = 7;
  optional string date_created_string = 8;
  optional int64 date_modified = 9;
  optional string date_modified_string = 10;
  bool active = 11;
}

service BalanceAttributeDomainService {
  rpc CreateBalanceAttribute(CreateBalanceAttributeRequest) returns (CreateBalanceAttributeResponse);
  rpc ReadBalanceAttribute(ReadBalanceAttributeRequest) returns (ReadBalanceAttributeResponse);
  rpc UpdateBalanceAttribute(UpdateBalanceAttributeRequest) returns (UpdateBalanceAttributeResponse);
  rpc DeleteBalanceAttribute(DeleteBalanceAttributeRequest) returns (DeleteBalanceAttributeResponse);
  rpc ListBalanceAttributes(ListBalanceAttributesRequest) returns (ListBalanceAttributesResponse);

  // NEW: Enhanced list with pagination, filtering, sorting, search
  rpc GetBalanceAttributeListPageData(GetBalanceAttributeListPageDataRequest)
    returns (GetBalanceAttributeListPageDataResponse);

  // NEW: Enhanced item view with related data
  rpc GetBalanceAttributeItemPageData(GetBalanceAttributeItemPageDataRequest)
    returns (GetBalanceAttributeItemPageDataResponse);
}

message CreateBalanceAttributeRequest {
  BalanceAttribute data = 1;
}

message CreateBalanceAttributeResponse {
  repeated BalanceAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadBalanceAttributeRequest {
  BalanceAttribute data = 1;
}

message ReadBalanceAttributeResponse {
  repeated BalanceAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateBalanceAttributeRequest {
  BalanceAttribute data = 1;
}

message UpdateBalanceAttributeResponse {
  repeated BalanceAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteBalanceAttributeRequest {
  BalanceAttribute data = 1;
}

message DeleteBalanceAttributeResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListBalanceAttributesRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListBalanceAttributesResponse {
  repeated BalanceAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// NEW: Enhanced list request with core features
message GetBalanceAttributeListPageDataRequest {
  // Pagination settings
  domain.common.v1.PaginationRequest pagination = 1;

  // Filter conditions
  domain.common.v1.FilterRequest filters = 2;

  // Sort settings
  domain.common.v1.SortRequest sort = 3;

  // Search settings
  domain.common.v1.SearchRequest search = 4;
}

// NEW: Enhanced list response with metadata
message GetBalanceAttributeListPageDataResponse {
  // The balance attribute data
  repeated BalanceAttribute balance_attribute_list = 1;

  // Pagination metadata
  domain.common.v1.PaginationResponse pagination = 2;

  // Search results metadata (when search is used)
  repeated domain.common.v1.SearchResult search_results = 3;

  // Response status
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

// NEW: Simple item request
message GetBalanceAttributeItemPageDataRequest {
  // The balance attribute ID to retrieve
  string balance_attribute_id = 1;
}

// NEW: Simple item response
message GetBalanceAttributeItemPageDataResponse {
  // The balance attribute data
  BalanceAttribute balance_attribute = 1;

  // Response status
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
