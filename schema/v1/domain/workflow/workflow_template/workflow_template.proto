syntax = "proto3";

package domain.workflow.v1;

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

option go_package = "leapfor.xyz/esqyma/golang/v1/domain/workflow/workflow_template";


// WorkflowTemplate represents a business workflow template definition
message WorkflowTemplate {
  string id = 1;
  string name = 2;
  optional string description = 3;
  optional string workspace_id = 4;
  string status = 5;
  string business_type = 6;
  optional string configuration_json = 7;   // Runtime config (SLA, notifications, etc.)
  optional int32 version = 8;
  optional string created_by = 9;
  optional int64 date_created = 10;
  optional string date_created_string = 11;
  optional int64 date_modified = 12;
  optional string date_modified_string = 13;
  bool active = 14;
  optional string input_schema_json = 15;   // JSON schema for validating workflow start input

  // System template tracking fields (for seeder-managed templates)
  optional string system_id = 16;           // vya template identifier (e.g., "education:student_enrollment:v1")
  optional bool is_system = 17;             // true if created by seeder
}

// CreateWorkflowTemplateRequest is the request message for creating a workflow template
message CreateWorkflowTemplateRequest {
  WorkflowTemplate data = 1;
}

// CreateWorkflowTemplateResponse is the response message for creating a workflow template
message CreateWorkflowTemplateResponse {
  repeated WorkflowTemplate data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// ReadWorkflowTemplateRequest is the request message for reading a workflow template
message ReadWorkflowTemplateRequest {
  WorkflowTemplate data = 1;
}

// ReadWorkflowTemplateResponse is the response message for reading a workflow template
message ReadWorkflowTemplateResponse {
  repeated WorkflowTemplate data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// UpdateWorkflowTemplateRequest is the request message for updating a workflow template
message UpdateWorkflowTemplateRequest {
  WorkflowTemplate data = 1;
}

// UpdateWorkflowTemplateResponse is the response message for updating a workflow template
message UpdateWorkflowTemplateResponse {
  repeated WorkflowTemplate data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// DeleteWorkflowTemplateRequest is the request message for deleting a workflow template
message DeleteWorkflowTemplateRequest {
  WorkflowTemplate data = 1;
}

// DeleteWorkflowTemplateResponse is the response message for deleting a workflow template
message DeleteWorkflowTemplateResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

// ListWorkflowTemplatesRequest is the request message for listing workflow templates
message ListWorkflowTemplatesRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

// ListWorkflowTemplatesResponse is the response message for listing workflow templates
message ListWorkflowTemplatesResponse {
  repeated WorkflowTemplate data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
  optional string next_page_token = 4;
}

// GetWorkflowTemplateListPageDataRequest is the request message for getting workflow template list page data
message GetWorkflowTemplateListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

// GetWorkflowTemplateListPageDataResponse is the response message for getting workflow template list page data
message GetWorkflowTemplateListPageDataResponse {
  repeated WorkflowTemplate workflow_template_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

// GetWorkflowTemplateItemPageDataRequest is the request message for getting workflow template item page data
message GetWorkflowTemplateItemPageDataRequest {
  string workflow_template_id = 1;
}

// GetWorkflowTemplateItemPageDataResponse is the response message for getting workflow template item page data
message GetWorkflowTemplateItemPageDataResponse {
  optional WorkflowTemplate workflow_template = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// WorkflowTemplateDomainService defines the gRPC service for workflow template operations
service WorkflowTemplateDomainService {
  rpc CreateWorkflowTemplate(CreateWorkflowTemplateRequest) returns (CreateWorkflowTemplateResponse);
  rpc ReadWorkflowTemplate(ReadWorkflowTemplateRequest) returns (ReadWorkflowTemplateResponse);
  rpc UpdateWorkflowTemplate(UpdateWorkflowTemplateRequest) returns (UpdateWorkflowTemplateResponse);
  rpc DeleteWorkflowTemplate(DeleteWorkflowTemplateRequest) returns (DeleteWorkflowTemplateResponse);
  rpc ListWorkflowTemplates(ListWorkflowTemplatesRequest) returns (ListWorkflowTemplatesResponse);
  rpc GetWorkflowTemplateListPageData(GetWorkflowTemplateListPageDataRequest) returns (GetWorkflowTemplateListPageDataResponse);
  rpc GetWorkflowTemplateItemPageData(GetWorkflowTemplateItemPageDataRequest) returns (GetWorkflowTemplateItemPageDataResponse);
}