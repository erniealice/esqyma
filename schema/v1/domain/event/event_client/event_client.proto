syntax = "proto3";

package domain.event.v1;

option go_package = "leapfor.xyz/esqyma/golang/v1/domain/event/event_client";

import "domain/common/error.proto";
import "domain/common/search.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/pagination.proto";

import "domain/entity/client/client.proto";

message EventClient {
  string id = 1;
  string event_id = 3;
  optional domain.entity.v1.Client client = 4;
  string client_id = 5;
  optional int64 date_created = 6;
  optional string date_created_string = 7;
  optional int64 date_modified = 8;
  optional string date_modified_string = 9;
  bool active = 10;
}

service EventClientDomainService {
  rpc CreateEventClient(CreateEventClientRequest) returns (CreateEventClientResponse);
  rpc ReadEventClient(ReadEventClientRequest) returns (ReadEventClientResponse);
  rpc UpdateEventClient(UpdateEventClientRequest) returns (UpdateEventClientResponse);
  rpc DeleteEventClient(DeleteEventClientRequest) returns (DeleteEventClientResponse);
  rpc ListEventClients(ListEventClientsRequest) returns (ListEventClientsResponse);
  rpc GetEventClientListPageData(GetEventClientListPageDataRequest) returns (GetEventClientListPageDataResponse);
  rpc GetEventClientItemPageData(GetEventClientItemPageDataRequest) returns (GetEventClientItemPageDataResponse);
}

message CreateEventClientRequest {
  EventClient data = 1;
}

message CreateEventClientResponse {
  repeated EventClient data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadEventClientRequest {
  EventClient data = 1;
}

message ReadEventClientResponse {
  repeated EventClient data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateEventClientRequest {
  EventClient data = 1;
}

message UpdateEventClientResponse {
  repeated EventClient data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteEventClientRequest {
  EventClient data = 1;
}

message DeleteEventClientResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListEventClientsRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListEventClientsResponse {
  repeated EventClient data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetEventClientListPageDataRequest {
  optional domain.common.v1.PaginationRequest pagination = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.SearchRequest search = 4;
}

message GetEventClientListPageDataResponse {
  repeated EventClient event_client_list = 1;
  optional domain.common.v1.PaginationResponse pagination = 2;
  repeated domain.common.v1.SearchResult search_results = 3;
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

message GetEventClientItemPageDataRequest {
  string event_client_id = 1;
}

message GetEventClientItemPageDataResponse {
  optional EventClient event_client = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}