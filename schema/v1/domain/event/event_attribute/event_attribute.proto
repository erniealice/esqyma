syntax = "proto3";

package domain.event.v1;

option go_package = "leapfor.xyz/esqyma/golang/v1/domain/event/event_attribute";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "domain/event/event/event.proto";
import "domain/common/attribute.proto";

message EventAttribute {
  string id = 1;
  string event_id = 2;
  string attribute_id = 3;
  string value = 4;
  Event event = 5;
  domain.common.v1.Attribute attribute = 6;
  optional int64 date_created = 7;
  optional string date_created_string = 8;
  optional int64 date_modified = 9;
  optional string date_modified_string = 10;
  bool active = 11;
}

service EventAttributeDomainService {
  rpc CreateEventAttribute(CreateEventAttributeRequest) returns (CreateEventAttributeResponse);
  rpc ReadEventAttribute(ReadEventAttributeRequest) returns (ReadEventAttributeResponse);
  rpc UpdateEventAttribute(UpdateEventAttributeRequest) returns (UpdateEventAttributeResponse);
  rpc DeleteEventAttribute(DeleteEventAttributeRequest) returns (DeleteEventAttributeResponse);
  rpc ListEventAttributes(ListEventAttributesRequest) returns (ListEventAttributesResponse);

  // NEW: Enhanced list with pagination, filtering, sorting, search
  rpc GetEventAttributeListPageData(GetEventAttributeListPageDataRequest)
    returns (GetEventAttributeListPageDataResponse);

  // NEW: Enhanced item view with related data
  rpc GetEventAttributeItemPageData(GetEventAttributeItemPageDataRequest)
    returns (GetEventAttributeItemPageDataResponse);
}

message CreateEventAttributeRequest {
  EventAttribute data = 1;
}

message CreateEventAttributeResponse {
  repeated EventAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadEventAttributeRequest {
  EventAttribute data = 1;
}

message ReadEventAttributeResponse {
  repeated EventAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdateEventAttributeRequest {
  EventAttribute data = 1;
}

message UpdateEventAttributeResponse {
  repeated EventAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeleteEventAttributeRequest {
  EventAttribute data = 1;
}

message DeleteEventAttributeResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListEventAttributesRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListEventAttributesResponse {
  repeated EventAttribute data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

// NEW: Enhanced list request with core features
message GetEventAttributeListPageDataRequest {
  // Pagination settings
  domain.common.v1.PaginationRequest pagination = 1;

  // Filter conditions
  domain.common.v1.FilterRequest filters = 2;

  // Sort settings
  domain.common.v1.SortRequest sort = 3;

  // Search settings
  domain.common.v1.SearchRequest search = 4;
}

// NEW: Enhanced list response with metadata
message GetEventAttributeListPageDataResponse {
  // The event attribute data
  repeated EventAttribute event_attribute_list = 1;

  // Pagination metadata
  domain.common.v1.PaginationResponse pagination = 2;

  // Search results metadata (when search is used)
  repeated domain.common.v1.SearchResult search_results = 3;

  // Response status
  bool success = 4;
  optional domain.common.v1.Error error = 5;
}

// NEW: Simple item request
message GetEventAttributeItemPageDataRequest {
  // The event attribute ID to retrieve
  string event_attribute_id = 1;
}

// NEW: Simple item response
message GetEventAttributeItemPageDataResponse {
  // The event attribute data
  EventAttribute event_attribute = 1;

  // Response status
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}
