syntax = "proto3";

package domain.product.v1;

option go_package = "leapfor.xyz/esqyma/golang/v1/domain/product/price_product";

import "domain/common/error.proto";
import "domain/common/pagination.proto";
import "domain/common/filter.proto";
import "domain/common/sort.proto";
import "domain/common/search.proto";

import "domain/product/product/product.proto";

message PriceProduct {
  string id = 1;
  optional int64 date_created = 2;
  optional string date_created_string = 3;
  optional int64 date_modified = 4;
  optional string date_modified_string = 5;
  bool active = 6;
  optional Product product = 7;
  string product_id = 8;
  string name = 9;
  optional string description = 10;
  int64 amount = 11;
  string currency = 12;
  int64 date_start = 13;
  string date_start_string = 14;
  optional int64 date_end = 15;
  optional string date_end_string = 16;
}

service PriceProductDomainService {
  rpc CreatePriceProduct(CreatePriceProductRequest) returns (CreatePriceProductResponse);
  rpc ReadPriceProduct(ReadPriceProductRequest) returns (ReadPriceProductResponse);
  rpc UpdatePriceProduct(UpdatePriceProductRequest) returns (UpdatePriceProductResponse);
  rpc DeletePriceProduct(DeletePriceProductRequest) returns (DeletePriceProductResponse);
  rpc ListPriceProducts(ListPriceProductsRequest) returns (ListPriceProductsResponse);
  rpc GetPriceProductListPageData(GetPriceProductListPageDataRequest)
    returns (GetPriceProductListPageDataResponse);
  rpc GetPriceProductItemPageData(GetPriceProductItemPageDataRequest)
    returns (GetPriceProductItemPageDataResponse);
}

message CreatePriceProductRequest {
  PriceProduct data = 1;
}

message CreatePriceProductResponse {
  repeated PriceProduct data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message ReadPriceProductRequest {
  PriceProduct data = 1;
}

message ReadPriceProductResponse {
  repeated PriceProduct data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message UpdatePriceProductRequest {
  PriceProduct data = 1;
}

message UpdatePriceProductResponse {
  repeated PriceProduct data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message DeletePriceProductRequest {
  PriceProduct data = 1;
}

message DeletePriceProductResponse {
  bool success = 1;
  optional domain.common.v1.Error error = 2;
}

message ListPriceProductsRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message ListPriceProductsResponse {
  repeated PriceProduct data = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}

message GetPriceProductListPageDataRequest {
  optional domain.common.v1.SearchRequest search = 1;
  optional domain.common.v1.FilterRequest filters = 2;
  optional domain.common.v1.SortRequest sort = 3;
  optional domain.common.v1.PaginationRequest pagination = 4;
}

message GetPriceProductListPageDataResponse {
  repeated PriceProduct price_product_list = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
  optional domain.common.v1.PaginationResponse pagination = 4;
  repeated domain.common.v1.SearchResult search_results = 5;
}

message GetPriceProductItemPageDataRequest {
  string price_product_id = 1;
}

message GetPriceProductItemPageDataResponse {
  PriceProduct price_product = 1;
  bool success = 2;
  optional domain.common.v1.Error error = 3;
}